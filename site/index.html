gestion](#thunder-kafka-ingestion));Phoenix 召回在全局语料上做相似度搜索;Grox 离线产出的内容信号供安全过滤与召回使用。\n\n## 外部依赖\n\nhome-mixer 流水线在 `prod()` 构造时并发初始化大量 gRPC / 存储客户端(`phoenix_candidate_pipeline.rs:353-627`),包括:SocialGraph(关注图)、TES(Tweet Entity Service,帖子正文)、Gizmoduck(用户)、Visibility Filtering、Strato、Redis、Kafka、UserActionAggregation(互动历史)等。这些是 X 的内部服务,开源版用 `Mock*` 实现替身(`:661-728`),因此**整套在线服务无法脱离 X 基础设施独立运行**,主要供阅读架构。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 特征工程 | 零手工特征,全靠 transformer | 把复杂度从数据/serving 管线转移到模型,大幅简化基础设施(`README.md:55,325`) |\n| 流水线分层 | 外层混排 + 内层排序两条流水线嵌套 | 帖子排序与广告/模块混排关注点分离,各自独立演化 |\n| 框架抽象 | 统一 `candidate-pipeline` 框架 | 阶段、并行性、错误处理、可观测性集中实现,业务只填组件 |\n| 阶段并行性 | 水合/源并行,过滤/打分顺序 | 独立工作并行提速;有依赖的工作顺序保证正确性 |\n| 召回/排序分离 | 召回当源、排序当打分器 | 经典两阶段:先廉价地把百万缩到千,再用昂贵模型精排 |\n\n## FAQ\n\n**Q:外层为什么没有过滤器和打分器?**\nA:外层 `ForYouCandidatePipeline` 的帖子候选来自 `ScoredPostsSource`,而该源内部已经跑完整条 `PhoenixCandidatePipeline`(含过滤、打分、选择)。外层只需把成品帖子流与广告等混排,所以 hydrator/filter/scorer 都是空的(`for_you_candidate_pipeline.rs:247-269`)。\n\n**Q:一条帖子的最终分怎么算出来的?**\nA:`PhoenixScorer` 先拿到 transformer 预测的多种互动概率(P(favorite)、P(reply)…),`RankingScorer` 再把它们加权求和:`Final Score = Σ(weight_i × P(action_i))`,负向行为(block/mute/report)是负权重。详见 [scoring-and-ranking](#scoring-and-ranking)。\n\n**Q:站内和站外内容怎么平衡?**\nA:候选合并后统一排序,但 `RankingScorer` 会对站外(out-of-network)内容乘一个权重因子降权,偏向关注内容。详见 [scoring-and-ranking](#scoring-and-ranking)。\n\n## 源码锚点\n\n- `candidate-pipeline/candidate_pipeline.rs:21-33` —— `PipelineStage` 十阶段枚举\n- `candidate-pipeline/candidate_pipeline.rs:88-137` —— `execute()` 编排主流程\n- `home-mixer/candidate_pipeline/for_you_candidate_pipeline.rs:48-203` —— 外层流水线\n- `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:143-351` —— 内层流水线组装\n- `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:732-771` —— `CandidatePipeline` trait 实现\n\n## 相关页面\n\n- [how-it-works](#how-it-works) —— 本页的白话版:零代码、配类比讲清整套系统\n- [end-to-end-dataflow](#end-to-end-dataflow) —— 端到端数据流:一条帖子从发布到被推荐的全程串讲\n- [candidate-pipeline-framework](#candidate-pipeline-framework) —— 十阶段流水线框架的 trait 设计与执行细节\n- [home-mixer-orchestration](#home-mixer-orchestration) —— 两条流水线的组装、gRPC 服务、候选源\n- [phoenix-retrieval](#phoenix-retrieval) —— 召回阶段:双塔模型\n- [phoenix-ranking](#phoenix-ranking) —— 排序阶段:Grok transformer 多行为预测\n- [scoring-and-ranking](#scoring-and-ranking) —— 打分器链与最终分计算\n- [candidate-selection](#candidate-selection) —— 打分后的选择阶段:排序、截断、选后水合与过滤\n- [filtering-pipeline](#filtering-pipeline) —— 预打分与选后两道过滤\n- [thunder-in-network-store](#thunder-in-network-store) —— 站内候选源\n- [ads-blending](#ads-blending) —— 外层广告混排\n- [grox-architecture](#grox-architecture) —— 旁路的内容理解服务\n"}, "end-to-end-dataflow": {"title": "端到端数据流:一条帖子从发布到被推荐", "type": "concept", "group": "总览", "md": "# 端到端数据流:一条帖子从发布到被推荐\n\n## 这一页回答什么\n\n各组件页已把子系统讲透了。这一页只做一件事:把它们**串成一条主线** —— 一条帖子被某人发出后,要经过哪些环节,才可能出现在另一个人的 For You 信息流里。\n\n重点不是某个环节的细节(细节链到对应技术页),而是**哪些环节是离线/异步的、哪些在实时请求路径上**。这两类环节的时序、触发方式、对延迟的要求完全不同,混在一起看就理不清整个系统。\n\n## 核心结论\n\n1. **数据流分两条独立的线**:\n   - **写入侧(异步)** —— 帖子一发布就触发,与任何人的请求无关。把帖子灌进 Thunder 内存库、让 Grox 跑内容理解。\n   - **读取侧(实时请求路径)** —— 某个用户打开 For You 才触发,有严格的尾延迟预算。召回 → 水合 → 过滤 → 打分 → 选择。\n2. **两条线靠\"存储\"解耦,不直接相连**。写入侧把结果沉淀到 Thunder 内存库、安全标签存储、嵌入 sink;读取侧请求来时**读**这些存储。帖子发布与帖子被推荐之间没有同步调用。\n3. **Kafka 摄入、Grox 内容理解都在请求路径之外**。它们是后台流式管线,有处理延迟;一条帖子发布后要\"等\"它们处理完,才在读取侧可见、可被安全过滤。\n4. **Thunder 是近期帖子的滑动窗口**,只保留最近约两天(默认 `retention_seconds` 2 天)的帖子。更早的帖子不在站内候选里。\n\n## 全景图:两条线\n\n```mermaid\nflowchart TB\n    POST([某人发布一条帖子])\n\n    subgraph WRITE[写入侧 · 异步 · 不在请求路径上]\n        direction TB\n        KAFKA[(Kafka<br/>帖子事件流)]\n        POST --> KAFKA\n        KAFKA -->|消费者 ①| THFEED[Thunder 摄入<br/>v1 feeder + v2 serving]\n        THFEED --> THSTORE[(Thunder 内存库<br/>近 ~2 天帖子)]\n        KAFKA -->|消费者 ②| GROX[Grox 内容理解<br/>分类器 / 嵌入]\n        GROX --> SINK[(安全标签 / 嵌入<br/>下游存储)]\n    end\n\n    subgraph READ[读取侧 · 实时请求路径 · 有尾延迟预算]\n        direction TB\n        REQ([用户请求 For You]) --> HM[home-mixer 编排]\n        HM --> RETR[召回:取候选]\n        RETR --> HYD[水合:补全候选信息]\n        HYD --> FIL[过滤]\n        FIL --> SCO[打分]\n        SCO --> SEL[选择 / 混排]\n        SEL --> FEED([For You 信息流])\n    end\n\n    THSTORE -. 站内候选源读取 .-> RETR\n    SINK -. 水合阶段读取安全标签 .-> HYD\n\n    classDef async fill:#e8f0ff,stroke:#5577cc\n    classDef rt fill:#fff0e8,stroke:#cc7755\n    class WRITE,KAFKA,THFEED,THSTORE,GROX,SINK async\n    class READ,HM,RETR,HYD,FIL,SCO,SEL rt\n```\n\n关键是那两条**虚线**:它们是写入侧与读取侧唯一的接触点 —— 都是\"读存储\",不是调用。写入侧把数据准备好放在那儿,读取侧请求来时才去拿。\n\n## 写入侧:帖子发布后异步发生什么\n\n帖子一旦发布,X 会把它作为事件投递到 Kafka。`x-algorithm` 开源仓库里有**两个独立的 Kafka 消费者**各取所需:\n\n### ① Thunder 摄入 —— 把帖子灌进站内内存库\n\nThunder 从 Kafka 消费帖子创建/删除事件,维护一个按作者组织的内存库。它分两个角色(由 `is_serving` 参数切换,`thunder/kafka_utils.rs:35,69`):\n\n- **feeder(v1)** 消费原始 Thrift `TweetEvent`,转码成精简的 proto `InNetworkEvent` 再重发;\n- **serving(v2)** 消费 `InNetworkEvent`,直接写进 `PostStore` 内存库。\n\n一条帖子进库后,就成了\"该作者最近发的帖\"之一,可被站内候选源取到。Thunder 只保留近期帖 —— `insert_posts` 写入时就丢掉早于保留期的帖,后台任务每 2 分钟 trim 一次(`thunder/posts/post_store.rs:92-95`,默认保留 2 天)。\n\n摄入细节(两个 listener 的分工、反序列化、保留期裁剪)见 [thunder-kafka-ingestion](#thunder-kafka-ingestion);内存库结构与站内候选服务见 [thunder-in-network-store](#thunder-in-network-store)。\n\n### ② Grox 内容理解 —— 旁路跑分类器和嵌入\n\nGrox 是一个**独立的流式服务**,同样从 Kafka 消费帖子(数据源是 `KafkaPostLoader` 等,`grox/generators/stream_generator.py:6-13`)。它对每条帖子跑一批内容理解任务:安全分类、垃圾检测、质量(\"banger\")初筛、多模态嵌入等(见 [grox-classifiers](#grox-classifiers)、[multimodal-embedders](#multimodal-embedders))。\n\nGrox 的产出**不直接返回给任何人** —— 它把结果写进下游存储。例如安全注解任务 `TaskWriteSafetyPostAnnotationsResultSink` 经 Strato 把安全标签写入 Manhattan(`grox/tasks/task_write_safety_post_annotations_result_sink.py:22-42`)。这些标签后面会被读取侧的水合阶段读回(见下)。\n\nGrox 是流式异步管线,**有处理延迟**:一条帖子从发布到被 Grox 处理完、标签落到存储,中间隔着 Kafka 排队 + 任务执行。它的三进程架构、Plan/Task DAG 见 [grox-architecture](#grox-architecture)。\n\n> **写入侧的本质**:这两条都是后台流式管线,**不在任何用户的请求路径上**。它们的触发源是\"帖子发布\"这个事件,不是\"有人请求 For You\"。它们的产物(Thunder 内存库里的帖子、存储里的安全标签和嵌入)是给读取侧用的\"原料\"。\n\n## 读取侧:一次 For You 请求走的实时路径\n\n当用户打开 For You,`home-mixer` 收到 gRPC 请求,真正的推荐才开始。这条路径有严格的尾延迟预算,与写入侧异步管线是两回事。\n\n入口在 `home-mixer/for_you_server.rs:28-40` —— `get_for_you_feed` 直接 `pipeline.execute(query)`,把请求交给 [候选流水线](#candidate-pipeline-framework)。实际跑的是两条嵌套流水线(外层混排 + 内层排序,见 [home-mixer-orchestration](#home-mixer-orchestration)、[system-architecture](#system-architecture));内层 `PhoenixCandidatePipeline` 才是干活的。流水线执行顺序由框架统一定义(`candidate-pipeline/candidate_pipeline.rs:88-137`)。\n\n把内层流水线的十阶段归并成五步看主线:\n\n### 1. 召回 —— 候选从哪来\n\n流水线的\"源\"阶段(`phoenix_candidate_pipeline.rs:250-257`)并行跑 6 个候选源,两路是主力:\n\n- **站内**:`ThunderSource` 调 Thunder gRPC,带上用户的关注列表,取\"关注的人最近发的帖\"。这一步**读的就是写入侧 ① 灌好的内存库**。\n- **站外**:`PhoenixSource` / `PhoenixTopicsSource` / `PhoenixMOESource` 调 Phoenix 检索服务,用双塔模型从全局语料里 ML 召回\"你可能感兴趣但没关注的\"(见 [phoenix-retrieval](#phoenix-retrieval))。\n\n百万级语料经召回缩到数百~上千条候选。\n\n### 2. 水合 —— 给候选补全信息\n\n源阶段产出的候选是空壳(只有 `tweet_id`/`author_id` 等)。水合阶段(`phoenix_candidate_pipeline.rs:259-272`)并行跑多个水合器,补全帖子正文、媒体、互动计数、以及**安全标签**。\n\n其中 `AdsBrandSafetyHydrator` 通过 `SafetyLabelStoreClient.batch_get_all_labels` 从安全标签存储批量读标签(`home-mixer/candidate_hydrators/ads_brand_safety_hydrator.rs:100-119`)—— **读的就是写入侧 ② Grox 写下去的标签**。这是 Grox 离线产物进入实时路径的接入点:Grox 不在请求路径上,但它的产出在这一步被请求路径\"取用\"。\n\n### 3. 过滤 —— 顺序剔除不该出现的候选\n\n预打分过滤阶段顺序跑 14 个过滤器(可见性、去重、社交图等,见 [filtering-pipeline](#filtering-pipeline))。上一步水合进来的安全标签等信息,在这里成为过滤判据之一。\n\n### 4. 打分 —— ML 排序\n\n打分阶段顺序跑 `PhoenixScorer` → `RankingScorer` → `VMRanker`。`PhoenixScorer` 调 [Phoenix 排序模型](#phoenix-ranking)(基于 Grok 的 transformer)预测每条帖子的多种互动概率;`RankingScorer` 加权成最终分(见 [scoring-and-ranking](#scoring-and-ranking))。\n\n### 5. 选择与混排 —— 成型为信息流\n\n内层 `TopKScoreSelector` 按分数取 top-K,经选后水合/过滤;外层 `ForYouCandidatePipeline` 的 `BlenderSelector` 再把帖子流与广告、Who-to-Follow、Prompts 混排(见 [candidate-selection](#candidate-selection)、[ads-blending](#ads-blending)),最终成为用户看到的 For You。\n\n`ScoredPostsServer::run_pipeline` 是内层流水线的服务封装(`home-mixer/scored_posts_server.rs:41-73`)。\n\n> **读取侧的本质**:这五步**全部在一次请求内同步完成**,有尾延迟预算。它不\"处理\"帖子,只是把写入侧已经准备好的原料(Thunder 里的帖子、存储里的标签和嵌入)组装、筛选、排序成一份信息流。\n\n## 离线/异步 vs 实时:一张对照表\n\n| 环节 | 属于哪条线 | 离线/实时 | 触发源 | 时效特性 |\n|------|-----------|----------|--------|----------|\n| Kafka 帖子事件流 | 写入侧 | 异步 | 帖子发布 | 流式,有传播延迟 |\n| Thunder 摄入(灌内存库) | 写入侧 | 异步 | 消费 Kafka 事件 | 准实时,稳态低 lag;启动追赶 |\n| Grox 内容理解(分类/嵌入) | 写入侧 | **离线/异步** | 消费 Kafka 事件 | 流式,**有明显处理延迟** |\n| Grox 写标签/嵌入到存储 | 写入侧 | 异步 | Grox 任务完成 | 落库后供读取侧读 |\n| 召回(取候选) | 读取侧 | **实时** | 用户请求 For You | 一次请求内完成 |\n| 水合(读正文/标签) | 读取侧 | **实时** | 同上 | 同上 |\n| 过滤 | 读取侧 | **实时** | 同上 | 同上 |\n| 打分(ML 排序) | 读取侧 | **实时** | 同上 | 同上 |\n| 选择 / 混排 | 读取侧 | **实时** | 同上 | 同上 |\n\n一句话:**Kafka 摄入、Grox 内容理解 = 离线/异步、不在请求路径上;召回→水合→过滤→打分→选择 = 实时请求路径。**\n\n## 时效性:帖子发布后多久能被推荐\n\n机制层面的几个要点(线上具体数值仓库未给,不臆测):\n\n- **Thunder 摄入有 lag**。稳态下 Thunder 的 Kafka 消费 lag 很低,新帖很快进库;但摄入是异步的,不存在\"发布即入库\"的强一致。Thunder 还对自己产出的新鲜度做了细致埋点(`GET_IN_NETWORK_POSTS_FOUND_FRESHNESS_SECONDS` 等,见 [thunder-in-network-store](#thunder-in-network-store)),freshness 偏高通常意味着摄入有 lag。\n- **Thunder 只看近 ~2 天**。超过保留期的帖子会被 trim 掉,不再是站内候选。一条帖子\"能被站内推荐\"的时间窗本身是有限的。\n- **Grox 内容理解有处理延迟**。一条新帖从发布到被 Grox 处理完、安全标签落到存储,中间隔着 Kafka 排队和任务执行。在标签就绪之前,读取侧水合阶段读到的可能是空标签。\n- **读取侧本身不产生\"帖子级\"延迟**。它是请求内同步路径,延迟预算针对的是\"一次 For You 请求\",与\"这条帖子发布了多久\"无关。\n\n所以\"一条帖子从发布到出现在某人 For You 里\"的端到端时延,主要由**写入侧异步管线的处理速度**决定,而不是读取侧。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 写入与读取分离 | 两条线靠存储解耦,不直接调用 | 帖子发布的吞吐与 For You 请求的尾延迟是两种约束,分开各自优化 |\n| 内容理解旁路化 | Grox 不在请求路径,异步产标签 | VLM 分类/嵌入是重计算,放进请求路径会拖垮尾延迟;离线算好、请求时只读 |\n| 站内库用内存 + 滑动窗口 | Thunder 只存近 ~2 天帖 | 站内候选对延迟极敏感;只存近期帖,内存可控、查询亚毫秒 |\n| 召回当\"源\"、排序当\"打分器\" | 经典两阶段 | 先廉价地把百万缩到千(召回),再用昂贵 transformer 精排 |\n\n## FAQ\n\n**Q:为什么不在用户请求 For You 时,实时给候选帖跑安全分类?**\nA:Grox 的内容分类靠 VLM、嵌入靠多模态模型,都是重计算。塞进请求路径会让 For You 的尾延迟不可控。系统的做法是:Grox 离线/流式地把每条帖子算好、标签写进存储;请求来时,水合阶段只做一次廉价的\"读标签\"(`AdsBrandSafetyHydrator`,`ads_brand_safety_hydrator.rs:100-119`)。计算与读取在时间上彻底分开。\n\n**Q:一条刚发布几秒的帖子,会立刻出现在关注者的 For You 里吗?**\nA:不保证。要先经写入侧异步管线:Thunder 消费 Kafka 把它灌进内存库(有 lag),Grox 也要消费同一事件流跑内容理解(有处理延迟)。在 Thunder 摄入完成前,站内候选源取不到它;在 Grox 标签就绪前,水合到的安全标签可能为空。端到端时延由这些异步环节决定。\n\n**Q:写入侧和读取侧之间到底怎么\"连\"上的?**\nA:不直接连。写入侧把产物沉淀进**存储**:Thunder 内存库、安全标签存储(Manhattan)、嵌入 sink。读取侧请求来时去**读**这些存储 —— `ThunderSource` 读 Thunder 内存库,`AdsBrandSafetyHydrator` 读安全标签存储,Phoenix 召回用到 Grox 产的内容嵌入。帖子发布与帖子被推荐之间没有任何同步 RPC。\n\n## 源码锚点\n\n- `thunder/kafka_utils.rs:35-115` —— Thunder 两个 Kafka 消费者(feeder / serving)按 `is_serving` 分流\n- `thunder/posts/post_store.rs:92-95` —— `insert_posts` 写入时按保留期过滤\n- `grox/generators/stream_generator.py:6-13,38-53` —— Grox 任务生成器以 `KafkaPostLoader` 为数据源\n- `grox/tasks/task_write_safety_post_annotations_result_sink.py:22-42` —— Grox 经 Strato 把安全注解写入下游存储\n- `home-mixer/for_you_server.rs:28-40` —— For You 请求入口,`pipeline.execute(query)`\n- `candidate-pipeline/candidate_pipeline.rs:88-137` —— 流水线 `execute` 十阶段(读取侧主流程)\n- `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:250-272` —— 内层流水线的 6 个候选源与候选水合器\n- `home-mixer/candidate_hydrators/ads_brand_safety_hydrator.rs:100-119` —— 水合阶段从安全标签存储读回 Grox 标签\n- `home-mixer/scored_posts_server.rs:41-73` —— `run_pipeline` 调内层 `PhoenixCandidatePipeline`\n\n## 相关页面\n\n- [system-architecture](#system-architecture) —— 五大组件与两层流水线的静态总览\n- [home-mixer-orchestration](#home-mixer-orchestration) —— 读取侧的编排:gRPC 服务、两条嵌套流水线、候选源\n- [candidate-pipeline-framework](#candidate-pipeline-framework) —— 读取侧流水线的十阶段框架\n- [thunder-kafka-ingestion](#thunder-kafka-ingestion) —— 写入侧 ①:Thunder 的 Kafka 摄入细节\n- [thunder-in-network-store](#thunder-in-network-store) —— 写入侧产物 + 读取侧站内候选源\n- [grox-architecture](#grox-architecture) —— 写入侧 ②:Grox 内容理解的旁路管线\n- [phoenix-retrieval](#phoenix-retrieval) —— 读取侧召回:站外双塔模型\n- [scoring-and-ranking](#scoring-and-ranking) —— 读取侧打分:打分器链与最终分\n- [how-it-works](#how-it-works) —— 整套系统的白话入口\n- [how-posts-are-picked](#how-posts-are-picked) —— \"一条帖子如何被选中\"的白话版\n"}, "candidate-pipeline-framework": {"title": "candidate-pipeline 框架与七个组件 trait", "type": "concept", "group": "在线服务(Rust)", "md": "# candidate-pipeline 框架与七个组件 trait\n\n## 这一页回答什么\n\n`candidate-pipeline` 是 X For You 推荐系统里一个**可复用的 Rust 流水线框架**。它本身不知道\"帖子\"\"广告\"\"召回\"是什么 —— 它只定义了一套抽象:一条推荐流水线由哪些**阶段**组成、每个阶段插哪种**组件**、组件之间的**契约**是什么、哪些阶段**并行**哪些**顺序**。具体业务([ForYouCandidatePipeline](#home-mixer-orchestration)、`PhoenixCandidatePipeline`)只负责往这些阶段里填组件。\n\n本页讲框架的**组件生态**:7 个组件 trait(Source、Hydrator、Filter、Scorer、Selector、SideEffect、QueryHydrator)的签名、职责、契约。框架的**执行器**(`CandidatePipeline` trait 本身、`execute()` 编排)单独成页 —— 见 [candidate-pipeline](#candidate-pipeline)。\n\n## 核心结论\n\n1. **7 个组件 trait + 1 个执行器 trait**。组件 trait 各管一类工作;执行器 trait `CandidatePipeline` 把它们串成 10 个阶段。crate 根 `lib.rs` 仅 9 行,导出 9 个模块(`lib.rs:1-9`)。\n2. **每个组件都是 trait,业务实现具体类型**。框架靠 trait object(`Box<dyn Source<Q,C>>` 等)持有组件,因此同一阶段可以挂任意多个异构组件。\n3. **统一的 `enable()` 启用门**。7 个 trait 全部带 `fn enable(&self, query) -> bool`,默认返回 `true`。执行器在跑每个阶段前先按 `enable()` 过滤,实现按 query(实验、用户类型)动态开关组件。\n4. **\"水合不丢候选\"是硬契约**。Hydrator 和 Scorer 返回的 `Vec` 必须与输入**等长且同序**;长度不符整批判 `Err` 跳过。要丢候选只能用 Filter 阶段。\n5. **并行 vs 顺序是刻意设计**。Source / Hydrator / QueryHydrator / SideEffect 并行(彼此独立);Filter / Scorer 顺序(前序结果塑造后序上下文)。\n6. **可观测性内建在 trait 里**。每个组件的 `run()` 方法都带 `#[tracing::instrument]` 和 `#[xai_stats_macro::receive_stats]`,无需业务代码手写埋点。\n\n## 框架在系统里的位置\n\n```mermaid\nflowchart TB\n    subgraph FW[\"candidate-pipeline 框架(本页)\"]\n        EXEC[\"CandidatePipeline 执行器 trait<br/>execute() 编排 10 阶段\"]\n        T1[Source trait] & T2[Hydrator trait] & T3[Filter trait]\n        T4[Scorer trait] & T5[Selector trait] & T6[SideEffect trait]\n        T7[QueryHydrator trait]\n        EXEC -.调度.-> T1 & T2 & T3 & T4 & T5 & T6 & T7\n    end\n    FW --> IMPL1[ForYouCandidatePipeline<br/>外层混排]\n    FW --> IMPL2[PhoenixCandidatePipeline<br/>内层排序]\n```\n\n框架被 [系统的两层流水线](#system-architecture) 共同复用:外层把帖子流和广告混排,内层做真正的召回/过滤/打分。两条流水线只是给同一组 trait 填入了不同的组件实例。\n\n## 泛型参数 Q 与 C\n\n每个组件 trait 都带两个泛型 `Q`(Query)和 `C`(Candidate),并对它们加了约束(`candidate_pipeline.rs:59-65`):\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:59-65\npub trait PipelineQuery: Clone + Send + Sync + 'static {\n    fn params(&self) -> &xai_feature_switches::Params;\n    fn decider(&self) -> Option<&xai_decider::Decider>;\n}\n\npub trait PipelineCandidate: Clone + Send + Sync + 'static {}\nimpl<T> PipelineCandidate for T where T: Clone + Send + Sync + 'static {}\n```\n\n- `Q: PipelineQuery` —— 必须能拿到 `Params`(特征开关)和可选的 `Decider`(实验决策)。这是 `enable()` 能按实验开关组件的基础:组件实现拿 `query.params()` 查开关。\n- `C: PipelineCandidate` —— 是个空 trait,对任何 `Clone + Send + Sync + 'static` 的类型自动实现。也就是说候选类型几乎无约束,框架只要求它可克隆、可跨线程。\n\n`Send + Sync + 'static` 是因为流水线大量用 `tokio` 并发(`join_all`、`tokio::spawn`),候选和 query 要在线程间传递。\n\n## 七个组件 trait\n\n下面逐个讲。每个 trait 的共性:都带默认 `enable()`、都带 `name()`(用 `util::short_type_name` 取类型短名)、`run()` 是带埋点的模板方法、真正的业务逻辑在另一个方法里(`source()` / `hydrate()` / `filter()` / `score()` / `select()` / `side_effect()`)。\n\n### 1. QueryHydrator —— 水合 Query\n\n```rust\n// candidate-pipeline/query_hydrator.rs:8-41\n#[async_trait]\npub trait QueryHydrator<Q>: Any + Send + Sync\nwhere\n    Q: PipelineQuery,\n{\n    fn enable(&self, _query: &Q) -> bool { true }\n\n    #[xai_stats_macro::receive_stats]\n    #[tracing::instrument(skip_all, name = \"query_hydrator\", fields(name = self.name()))]\n    async fn run(&self, query: &Q) -> Result<Q, String> {\n        match self.hydrate(query).await {\n            Ok(hydrated) => Ok(hydrated),\n            Err(err) => {\n                error!(\"Failed: {}\", err);\n                Err(err)\n            }\n        }\n    }\n\n    /// Hydrate the query by performing async operations.\n    async fn hydrate(&self, query: &Q) -> Result<Q, String>;\n\n    /// Update the query with the hydrated fields.\n    /// Only the fields this hydrator is responsible for should be copied.\n    fn update(&self, query: &mut Q, hydrated: Q);\n\n    fn name(&self) -> &'static str { ... }\n}\n```\n\n**职责**:在流水线最开头给 `Query` 补字段。请求进来时 `Query` 往往只有 `user_id`、设备信息;`QueryHydrator` 异步去拉用户的互动历史、关注列表、屏蔽名单、Bloom 过滤器等,塞进 query。后续所有阶段都能读到这些字段。\n\n**唯一的泛型只有 `Q`** —— query 水合发生在还没有候选的时候,所以不涉及 `C`。\n\n**`hydrate` / `update` 两段式**:`hydrate()` 是 async,做 I/O,返回一个\"只填了自己那部分字段的新 query\";`update()` 是同步的纯合并,把那部分字段拷回主 query。为什么分两步?因为多个 QueryHydrator **并行**跑(各自 `hydrate()`),不能让它们同时写一个 `&mut Q`;并行结束后执行器**顺序**逐个调 `update()` 合并,避免数据竞争。详见下文\"并行如何不冲突\"。\n\n**错误处理**:`hydrate()` 失败返回 `Err(String)`,`run()` 记 `error!` 日志后把 `Err` 透传。执行器拿到 `Err` 就**跳过这个水合器的 `update()`**,query 缺这部分字段但流水线继续 —— 单个水合失败不拖垮整条流水线。\n\n> 框架还提供 `dependent_query_hydrators`(依赖型 query 水合器),trait 类型与 `QueryHydrator` 完全相同,只是执行器在第一批 query 水合**之后**才跑它们,因此它们能读到第一批填好的字段。区别只在执行时机,不在 trait 定义。见 [candidate-pipeline](#candidate-pipeline)。\n\n### 2. Source —— 拉候选\n\n```rust\n// candidate-pipeline/source.rs:8-39\n#[async_trait]\npub trait Source<Q, C>: Any + Send + Sync\nwhere\n    Q: PipelineQuery,\n    C: PipelineCandidate,\n{\n    fn enable(&self, _query: &Q) -> bool { true }\n\n    #[xai_stats_macro::receive_stats(size=Bucket500To1000)]\n    #[tracing::instrument(skip_all, name = \"source\", fields(name = self.name()))]\n    async fn run(&self, query: &Q) -> Result<Vec<C>, String> {\n        match self.source(query).await {\n            Ok(candidates) => {\n                info!(\"Fetched {} candidates\", candidates.len());\n                Ok(candidates)\n            }\n            Err(err) => {\n                error!(\"Failed: {}\", err);\n                Err(err)\n            }\n        }\n    }\n\n    async fn source(&self, query: &Q) -> Result<Vec<C>, String>;\n\n    fn name(&self) -> &'static str { ... }\n}\n```\n\n**职责**:产出候选。一个 `Source` 就是一路候选来源 —— [Thunder 站内库](#thunder-in-network-store)、[Phoenix 召回](#phoenix-retrieval)、缓存、TweetMixer 等各是一个 Source 实现。多个 Source **并行**跑,产出的 `Vec<C>` 在执行器里被 `append` 拼成一个总候选池。\n\n**返回 `Result<Vec<C>, String>`**:一路源挂了不影响其它源。执行器对 `results.into_iter().flatten()` —— `Err` 直接被 `flatten` 丢弃,只有 `Ok` 的候选进池。这意味着**某个召回服务超时或报错,流水线照常用其它源的候选出结果**。\n\n**埋点**:`#[receive_stats(size=Bucket500To1000)]` 表示框架自动把每个 source 返回的候选数记进 500~1000 的直方图桶 —— 单源候选规模通常在这个量级。\n\n### 3. Hydrator —— 水合候选\n\n```rust\n// candidate-pipeline/hydrator.rs:10-67\n#[async_trait]\npub trait Hydrator<Q, C>: Any + Send + Sync\nwhere\n    Q: PipelineQuery,\n    C: PipelineCandidate,\n{\n    fn enable(&self, _query: &Q) -> bool { true }\n\n    /// IMPORTANT: The returned vector must have the same candidates in the\n    /// same order as the input. Dropping candidates in a hydrator is not\n    /// allowed - use a filter stage instead.\n    async fn hydrate(&self, query: &Q, candidates: &[C]) -> Vec<Result<C, String>>;\n\n    #[xai_stats_macro::receive_stats(latency=Bucket50To500, size=Bucket500To2500)]\n    #[tracing::instrument(skip_all, name = \"hydrator\", fields(name = self.name()))]\n    async fn run(&self, query: &Q, candidates: &[C]) -> Vec<Result<C, String>> {\n        let hydrated = self.hydrate(query, candidates).await;\n        let expected_len = candidates.len();\n        if hydrated.len() == expected_len {\n            hydrated\n        } else {\n            let message = format!(\n                \"Hydrator length_mismatch expected={} got={}\",\n                expected_len, hydrated.len()\n            );\n            warn!(\"Skipped: length_mismatch expected={} got={}\",\n                expected_len, hydrated.len());\n            vec![Err(message); expected_len]\n        }\n    }\n\n    /// Update a single candidate with the hydrated fields.\n    /// Only the fields this hydrator is responsible for should be copied.\n    fn update(&self, candidate: &mut C, hydrated: C);\n\n    /// Update all successfully hydrated candidates.\n    fn update_all(&self, candidates: &mut [C], hydrated: Vec<Result<C, String>>) {\n        for (candidate, hydrated) in candidates.iter_mut().zip(hydrated) {\n            if let Ok(hydrated) = hydrated {\n                self.update(candidate, hydrated);\n            }\n        }\n    }\n\n    fn name(&self) -> &'static str { ... }\n}\n```\n\n**职责**:给已有的候选补字段。Source 产出的候选往往只有 `post_id`;`Hydrator` 异步去拉帖子正文、作者信息、媒体时长、是否含媒体、是否订阅内容等,填进候选。多个 Hydrator **并行**作用于**同一份**候选集。\n\n**长度不变量(关键契约)**:trait 文档明写 —— `hydrate()` 返回的 `Vec` 必须与输入候选**等长、同序**,不许丢候选。`run()` 是模板方法,会强制校验 `hydrated.len() == expected_len`;一旦不等,**整批替换成 `vec![Err(...); expected_len]`** 并记 `warn!` 日志。这样长度永远对得上,后续 `zip` 不会错位。**要剔除候选必须用 Filter 阶段**,Hydrator 不行。\n\n**逐元素 `Result`**:返回 `Vec<Result<C, String>>` —— 每个候选独立成败。某条帖子的正文拉取失败是 `Err`,`update_all()` 跳过它(`if let Ok`),该候选保留原样进下一阶段;其它候选正常水合。\n\n**`update` / `update_all` 两段式**:同 QueryHydrator 的理由 —— 并行 `hydrate()` 产出结果,顺序 `update_all()` 合并。`update_all()` 有默认实现(`zip` 后逐个 `update`),业务通常只需实现单条的 `update()`。\n\n**埋点**:`latency=Bucket50To500`(单个 hydrator 50~500ms)、`size=Bucket500To2500`(候选规模)。\n\n#### CachedHydrator —— 带缓存的水合器\n\n`hydrator.rs` 里还有一个子机制:`CachedHydrator`(`hydrator.rs:78-115`)。它不是另一个流水线阶段,而是 `Hydrator` 的一种**实现方式**。框架提供了一个 blanket impl:任何实现了 `CachedHydrator` 的类型自动获得 `Hydrator` 实现(`hydrator.rs:117-189`)。\n\n```rust\n// candidate-pipeline/hydrator.rs:78-96(节选)\n#[async_trait]\npub trait CachedHydrator<Q, C>: Any + Send + Sync\nwhere Q: PipelineQuery, C: PipelineCandidate,\n{\n    type CacheKey: Eq + Hash + Send + Sync + 'static;\n    type CacheValue: Clone + Send + Sync + 'static;\n\n    fn cache_store(&self) -> &dyn CacheStore<Self::CacheKey, Self::CacheValue>;\n    fn cache_key(&self, candidate: &C) -> Self::CacheKey;\n    fn cache_value(&self, hydrated: &C) -> Self::CacheValue;\n    fn hydrate_from_cache(&self, value: Self::CacheValue) -> C;\n    async fn hydrate_from_client(&self, query: &Q, candidates: &[C]) -> Vec<Result<C, String>>;\n    fn update(&self, candidate: &mut C, hydrated: C);\n    ...\n}\n```\n\nblanket impl 的 `hydrate()` 逻辑(`hydrator.rs:128-184`):\n\n1. 逐候选算 `cache_key`,查 `cache_store`。命中(`Some`)直接 `hydrate_from_cache`,`cache_hits += 1`;未命中收集到 `missing_*` 三个并行向量,`cache_misses += 1`。\n2. 调 `stat_cache(hits, misses)`,把命中/未命中数发进 `*.cache` 指标(`CACHE_HIT_SCOPE` / `CACHE_MISS_SCOPE`)。\n3. 对未命中的候选批量调 `hydrate_from_client()`(真正的远程拉取)。这里也有长度校验:若 `hydrated_missing.len() != missing_candidates.len()`,**整批返回 `Err`**。\n4. 远程结果里成功的(`Ok`)调 `cache_value` 算缓存值、`insert` 回缓存;按 `missing_indices` 填回结果数组对应位置。\n5. 最终把 `Vec<Option<Result<C,String>>>` 摊平成 `Vec<Result<C,String>>`,空位补 `Err(\"Missing hydration result for candidate\")`。\n\n`CacheStore<K,V>` 自身也是个 trait(`hydrator.rs:72-76`),只有 async 的 `get` / `insert` 两个方法,具体缓存(Redis、内存)由业务实现。这套设计让\"先查缓存、未命中才远程拉、拉到再回填\"成为框架级能力,业务只填 5 个回调即可。\n\n### 4. Filter —— 过滤候选\n\n```rust\n// candidate-pipeline/filter.rs:10-70\npub struct FilterResult<C> {\n    pub kept: Vec<C>,\n    pub removed: Vec<C>,\n}\n\n/// Filters run sequentially and partition candidates into kept and removed sets\npub trait Filter<Q, C>: Any + Send + Sync\nwhere\n    Q: PipelineQuery,\n    C: PipelineCandidate,\n{\n    fn enable(&self, _query: &Q) -> bool { true }\n\n    #[xai_stats_macro::receive_stats(latency=Bucket0To50)]\n    #[tracing::instrument(skip_all, name = \"filter\", fields(\n        name = self.name(),\n        input_count = candidates.len(),\n        kept_count = Empty, removed_count = Empty, filter_rate = Empty,\n    ))]\n    fn run(&self, query: &Q, candidates: Vec<C>) -> FilterResult<C> {\n        let result = self.filter(query, candidates);\n        let total = result.kept.len() + result.removed.len();\n        let rate = if total > 0 {\n            result.removed.len() as f64 / total as f64\n        } else { 0.0 };\n        let span = Span::current();\n        span.record(\"kept_count\", result.kept.len());\n        span.record(\"removed_count\", result.removed.len());\n        span.record(\"filter_rate\", format!(\"{:.3}\", rate).as_str());\n        self.stat(&result);\n        result\n    }\n\n    fn filter(&self, query: &Q, candidates: Vec<C>) -> FilterResult<C>;\n\n    fn name(&self) -> &'static str { ... }\n    fn stat(&self, result: &FilterResult<C>) { ... }\n}\n```\n\n**职责**:剔除不该出现的候选 —— 可见性过滤、去重、社交图规则等。这是框架里**唯一能合法丢候选**的阶段。\n\n**`Filter` 不是 async**。`run()` 和 `filter()` 都是同步方法,trait 不带 `#[async_trait]`。因为过滤判断基于候选**已经水合好的字段**(由前面的 Hydrator 填),纯内存计算,不需要 I/O。\n\n**`FilterResult` 一分为二**:`filter()` 返回 `{ kept, removed }`,候选被显式分进两堆。`kept` 进下一阶段,`removed` 被执行器收集起来(进 `PipelineResult.filtered_candidates`,可用于调试/日志)。没有\"沉默丢弃\"。\n\n**顺序执行**:trait 文档明写 \"Filters run sequentially\"。执行器在 `run_filters` 里把上一个 filter 的 `kept` 当下一个 filter 的输入(`candidate_pipeline.rs:365-372`)。顺序的意义:前序过滤先把候选集缩小,后序过滤在更小的集合上跑;且某些过滤逻辑依赖\"前面已经清过某类候选\"的前提。\n\n**埋点**:`latency=Bucket0To50`(过滤是纯内存,极快);`stat()` 把 `kept` / `removed` 计数发进 `*.run` 指标。\n\n### 5. Scorer —— 给候选打分\n\n```rust\n// candidate-pipeline/scorer.rs:8-65\n#[async_trait]\npub trait Scorer<Q, C>: Send + Sync\nwhere\n    Q: PipelineQuery,\n    C: PipelineCandidate,\n{\n    fn enable(&self, _query: &Q) -> bool { true }\n\n    #[xai_stats_macro::receive_stats]\n    #[tracing::instrument(skip_all, name = \"scorer\", fields(name = self.name()))]\n    async fn run(&self, query: &Q, candidates: &[C]) -> Vec<Result<C, String>> {\n        let scored = self.score(query, candidates).await;\n        let expected_len = candidates.len();\n        if scored.len() == expected_len {\n            scored\n        } else {\n            let message = format!(\n                \"Scorer length_mismatch expected={} got={}\",\n                expected_len, scored.len()\n            );\n            warn!(\"Skipped: length_mismatch expected={} got={}\",\n                expected_len, scored.len());\n            vec![Err(message); expected_len]\n        }\n    }\n\n    /// IMPORTANT: The returned vector must have the same candidates in the\n    /// same order as the input. Dropping candidates in a hydrator is not\n    /// allowed - use a filter stage instead.\n    async fn score(&self, query: &Q, candidates: &[C]) -> Vec<Result<C, String>>;\n\n    fn update(&self, candidate: &mut C, scored: C);\n\n    fn update_all(&self, candidates: &mut [C], scored: Vec<Result<C, String>>) {\n        for (candidate, scored) in candidates.iter_mut().zip(scored) {\n            if let Ok(scored) = scored {\n                self.update(candidate, scored);\n            }\n        }\n    }\n\n    fn name(&self) -> &'static str { ... }\n}\n```\n\n**职责**:更新候选的 score 字段。`PhoenixScorer` 调 [Phoenix 排序模型](#phoenix-ranking) 拿多种互动概率,`RankingScorer` 把它们加权成最终分。详见 [scoring-and-ranking](#scoring-and-ranking)。\n\n**结构和 Hydrator 几乎一模一样** —— 同样 async、同样返回 `Vec<Result<C, String>>`、同样的**等长契约**(`run()` 校验 `scored.len() == expected_len`,不符整批 `Err`)、同样 `update` / `update_all` 两段式。trait 文档甚至复用了 Hydrator 那句 \"Dropping candidates in a hydrator is not allowed\"(注意原文这里写的是 \"hydrator\",应理解为泛指水合/打分类组件)。\n\n**与 Hydrator 的唯一实质区别是执行模型**:Scorer **顺序**执行,Hydrator 并行。原因 —— 打分有链式依赖:`RankingScorer` 的加权要用到 `PhoenixScorer` 已经填好的概率字段。顺序跑才能保证后一个 scorer 看到前一个的输出。\n\n`Scorer` 的约束是 `Send + Sync`(没有 `Any`),`Hydrator` 是 `Any + Send + Sync` —— 细微差别,`Any` 让 trait object 支持向下转型(downcast),Scorer 不需要。\n\n### 6. Selector —— 选择与排序\n\n```rust\n// candidate-pipeline/selector.rs:6-85\npub struct SelectResult<C> {\n    pub selected: Vec<C>,\n    pub non_selected: Vec<C>,\n}\n\npub trait Selector<Q, C>: Send + Sync\nwhere\n    Q: PipelineQuery,\n    C: PipelineCandidate,\n{\n    fn enable(&self, _query: &Q) -> bool { true }\n\n    #[xai_stats_macro::receive_stats(latency=Bucket0To50, size=Bucket0To50)]\n    #[tracing::instrument(skip_all, name = \"selector\", fields(\n        name = self.name(),\n        input_count = candidates.len(),\n        selected_count = Empty, non_selected_count = Empty,\n    ))]\n    fn run(&self, query: &Q, candidates: Vec<C>) -> SelectResult<C> {\n        let result = self.select(query, candidates);\n        let span = Span::current();\n        span.record(\"selected_count\", result.selected.len());\n        span.record(\"non_selected_count\", result.non_selected.len());\n        result\n    }\n\n    // Returns (selected, non_selected).\n    fn select(&self, _query: &Q, candidates: Vec<C>) -> SelectResult<C> {\n        let mut sorted = self.sort(candidates);\n        if let Some(limit) = self.size() {\n            let non_selected = sorted.split_off(limit.min(sorted.len()));\n            SelectResult { selected: sorted, non_selected }\n        } else {\n            SelectResult { selected: sorted, non_selected: vec![] }\n        }\n    }\n\n    /// Extract the score from a candidate to use for sorting.\n    fn score(&self, candidate: &C) -> f64;\n\n    /// Sort candidates by their scores in descending order.\n    fn sort(&self, candidates: Vec<C>) -> Vec<C> {\n        let mut sorted = candidates;\n        sorted.sort_by(|a, b| {\n            self.score(b).partial_cmp(&self.score(a))\n                .unwrap_or(std::cmp::Ordering::Equal)\n        });\n        sorted\n    }\n\n    /// Optionally provide a size to select. Defaults to no truncation.\n    fn size(&self) -> Option<usize> { None }\n\n    fn name(&self) -> &'static str { ... }\n}\n```\n\n**职责**:把打好分的候选**排序 + 截断**,产出最终入选名单。一条流水线**只有一个** Selector(执行器里 `selector()` 返回 `&dyn Selector`,单数,不是切片)。\n\n**最省事的 trait** —— `select()`、`sort()`、`size()` 全有默认实现。业务最少**只需实现 `score()` 一个方法**(从候选里取出分数),框架自动:`sort()` 按分数降序排;`size()` 默认 `None`(不截断),若 override 返回 `Some(limit)` 则 `split_off` 出 `non_selected`。\n\n**`partial_cmp` 兜底**:`sort()` 用 `partial_cmp(...).unwrap_or(Ordering::Equal)` —— 分数是 `f64`,可能出现 `NaN` 导致 `partial_cmp` 返回 `None`,这里兜底成\"相等\"避免 panic。\n\n**同步、非 async**:排序截断是纯计算。\n\n**`SelectResult` 的辅助方法**(`selector.rs:11-19`):`len()` 返回 `selected.len()`;`is_empty()` 要求 `selected` 和 `non_selected` **都空**。\n\n### 7. SideEffect —— 副作用\n\n```rust\n// candidate-pipeline/side_effect.rs:9-37\n#[derive(Clone)]\npub struct SideEffectInput<Q, C> {\n    pub query: Arc<Q>,\n    pub selected_candidates: Vec<C>,\n    pub non_selected_candidates: Vec<C>,\n}\n\n#[async_trait]\npub trait SideEffect<Q, C>: Send + Sync\nwhere\n    Q: PipelineQuery,\n    C: PipelineCandidate,\n{\n    /// Decide if this side-effect should be run\n    fn enable(&self, _query: Arc<Q>) -> bool { true }\n\n    #[xai_stats_macro::receive_stats]\n    async fn run(&self, input: Arc<SideEffectInput<Q, C>>) -> Result<(), String> {\n        self.side_effect(input).await\n    }\n\n    async fn side_effect(&self, input: Arc<SideEffectInput<Q, C>>) -> Result<(), String>;\n\n    fn name(&self) -> &'static str { ... }\n}\n```\n\n**职责**:做\"不影响返回结果\"的事 —— 文件头注释明写 \"A side-effect is an action run that doesn't affect the pipeline result from being returned\"。典型用途:把 seen ids / served candidates 发 Kafka、写 Redis 缓存、更新用户的 served history、发实验日志。\n\n**输入是 `Arc<SideEffectInput>`**:`SideEffectInput` 打包了最终 query、入选候选、落选候选三样。用 `Arc` 包是因为多个 side effect 并行跑、共享同一份输入,`Arc` 避免逐个克隆大向量。\n\n**`enable()` 签名不同**:其它 6 个 trait 的 `enable(&self, &Q)` 收引用,只有 `SideEffect::enable(&self, Arc<Q>)` 收 `Arc` —— 因为 side effect 在 `tokio::spawn` 出去的后台任务里执行,`Arc<Q>` 已经是现成的共享句柄。\n\n**返回值被丢弃**:`run()` 返回 `Result<(), String>`,但执行器对 side effect 的 join 结果是 `let _ = join_all(...)`(`candidate_pipeline.rs:426`)—— side effect 失败既不影响结果也不报错给调用方,符合\"副作用\"语义。\n\n**唯一不带 `#[tracing::instrument]` 的 trait** —— 7 个里其它 6 个的 `run()` 都有 instrument,SideEffect 只有 `#[receive_stats]`。\n\n## 七个 trait 对照表\n\n| trait | async | 执行模型 | 业务必实现 | 丢候选 | 错误处理 |\n|-------|-------|---------|-----------|--------|---------|\n| QueryHydrator | 是 | 并行 | `hydrate` + `update` | 不涉及 | `Err` 则跳过 `update` |\n| Source | 是 | 并行 | `source` | 不涉及 | `Err` 被 `flatten` 丢弃 |\n| Hydrator | 是 | 并行 | `hydrate` + `update` | **禁止**(违反则整批 `Err`) | 逐元素 `Err`,跳过该候选 |\n| Filter | 否 | **顺序** | `filter` | **允许(唯一)** | 无 `Result`,显式 kept/removed |\n| Scorer | 是 | **顺序** | `score` + `update` | **禁止**(违反则整批 `Err`) | 逐元素 `Err`,跳过该候选 |\n| Selector | 否 | 单个 | `score`(其余有默认) | 截断到 `size()` | 无 |\n| SideEffect | 是 | **并行后台** | `side_effect` | 不涉及 | `Err` 被 `let _` 丢弃 |\n\n## enable() 启用门\n\n7 个 trait 全部带:\n\n```rust\nfn enable(&self, _query: &Q) -> bool { true }   // SideEffect 为 Arc<Q>\n```\n\n默认 `true` —— 组件默认全开。业务 override `enable()`,读 `query.params()`(特征开关)或 `query.decider()`(实验决策)来按请求动态开关。例如某个新过滤器只对实验组用户生效:\n\n```rust\nfn enable(&self, query: &Q) -> bool {\n    query.params().get_bool(\"enable_my_new_filter\")\n}\n```\n\n执行器在跑每个阶段**前**先 `record_enabled_components`(把 total / enabled / disabled 记进 tracing span),再 `.filter(|c| c.enable(query))` 只保留启用的组件。所以 `enable()` 返回 `false` 的组件**完全不参与该次请求** —— 不跑、不计延迟。这套机制让一条流水线可以挂着几十个组件,但每次请求只激活其中一个子集,是 X 做实验、灰度、按用户类型分流的核心开关。\n\n## 并行 vs 顺序的执行模型\n\n框架把 7 类组件分成两组:\n\n```mermaid\nflowchart LR\n    subgraph PAR[\"并行(join_all)\"]\n        direction TB\n        P1[QueryHydrator] --- P2[Source] --- P3[Hydrator] --- P4[SideEffect]\n    end\n    subgraph SEQ[\"顺序(for 循环)\"]\n        direction TB\n        S1[Filter] --- S2[Scorer]\n    end\n```\n\n**并行的(QueryHydrator / Source / Hydrator / SideEffect)**:执行器用 `futures::future::join_all` 同时发起所有组件的 `run()`,等全部完成。这些组件**彼此独立** —— 拉用户关注列表和拉互动序列互不依赖,可同时做;两路召回源互不依赖。并行把这一阶段的耗时从\"所有组件之和\"压到\"最慢的那个\"。\n\n并行带来一个问题:多个组件不能同时写一个 `&mut Q` 或 `&mut [C]`。框架的解法是 **`run` / `update` 两段式**:\n\n1. **并行阶段**:每个组件的 `hydrate()` / `source()` 只读 query,各自产出一份独立结果(`Result<Q>` 或 `Vec<Result<C>>`),不碰共享状态。\n2. **顺序合并阶段**:`join_all` 返回后,执行器拿 `hydrators.iter().zip(results)`,**逐个**调 `update()` / `update_all()` 把结果合并进主 query / 主候选集。合并是单线程顺序的,无竞争。\n\n这就是为什么 QueryHydrator、Hydrator、Scorer 都把\"做 I/O\"和\"写字段\"拆成两个方法。\n\n**顺序的(Filter / Scorer)**:执行器用普通 `for` 循环逐个跑,**前一个的输出是后一个的输入**:\n\n- Filter:`candidates = result.kept`(`candidate_pipeline.rs:370`)—— 上个 filter 留下的候选喂给下个 filter。前序过滤塑造后序的输入。\n- Scorer:`scorer.update_all(&mut candidates, scored)` 后 `candidates` 已被改,下个 scorer 的 `score()` 看到的是更新后的候选。`RankingScorer` 才能用上 `PhoenixScorer` 填的概率。\n\n**SideEffect 是\"并行 + 后台\"**:`run_side_effects` 用 `tokio::spawn` 把整批 side effect 丢进后台任务,执行器**不等它们完成**就返回 `PipelineResult`(`candidate_pipeline.rs:419-428`)。所以 side effect 不进入请求的关键路径延迟。\n\n## 具体流水线如何插入组件\n\n一条具体流水线 = 实现 `CandidatePipeline<Q,C>` trait,把每个 getter 方法返回对应组件的 trait object 切片。框架不关心组件从哪来,只调这些 getter:\n\n```rust\n// 概念示意 —— 具体流水线实现 CandidatePipeline 的 getter\nimpl CandidatePipeline<ScoredPostsQuery, PostCandidate> for PhoenixCandidatePipeline {\n    fn query_hydrators(&self) -> &[Box<dyn QueryHydrator<ScoredPostsQuery>>] {\n        &self.query_hydrators   // 15 个\n    }\n    fn sources(&self) -> &[Box<dyn Source<...>>]   { &self.sources }   // 6 个\n    fn hydrators(&self) -> &[Box<dyn Hydrator<...>>] { &self.hydrators } // 10 个\n    fn filters(&self) -> &[Box<dyn Filter<...>>]    { &self.filters }   // 14 个\n    fn scorers(&self) -> &[Box<dyn Scorer<...>>]    { &self.scorers }   // 3 个\n    fn selector(&self) -> &dyn Selector<...>        { &*self.selector } // 1 个\n    fn side_effects(&self) -> Arc<Vec<Box<dyn SideEffect<...>>>> { ... }\n    fn result_size(&self) -> usize { params::RESULT_SIZE }\n    // ...\n}\n```\n\n组件以 `Box<dyn Trait>` 形式存,因此**同一阶段可挂任意多个异构实现**:`sources()` 返回的切片里可以同时有 `ThunderSource`、`PhoenixSource`、`CachedPostsSource` 三个完全不同的类型。空阶段返回 `&[]` 即可 —— 外层 `ForYouCandidatePipeline` 的 `hydrators()` / `filters()` / `scorers()` 就都返回空切片([system-architecture](#system-architecture) 有详述)。\n\n执行器的 `components()` 方法(`candidate_pipeline.rs:140-188`)会遍历所有 getter,产出一份 `Vec<PipelineComponents>`(每个 `PipelineComponents` = 一个 `PipelineStage` + 该阶段所有组件名),用于自检/打印一条流水线的完整组件清单。\n\n`execute()` 如何把这些 getter 串成 10 个阶段的完整走读,见 [candidate-pipeline](#candidate-pipeline)。\n\n## 可观测性\n\n框架把可观测性**焊死在 trait 定义里**,业务实现组件时零额外埋点代码。\n\n**tracing**:7 个 trait 里 6 个的 `run()` 带 `#[tracing::instrument(skip_all, name = \"...\", fields(name = self.name(), ...))]`。每个组件跑一次就产生一个命名 span(`source` / `hydrator` / `filter` / `scorer` / `selector` / `query_hydrator`),span 上记组件名;Filter / Selector 的 span 还记 `input_count` / `kept_count` / `removed_count` / `filter_rate` / `selected_count` 等字段。执行器层另有 `query_hydrators`、`sources`、`hydrators`、`filters`、`scorers` 等阶段级 span,记 `total_count` / `enabled_count` / `disabled` —— `record_enabled_components`(`candidate_pipeline.rs:435-454`)负责写后三个。\n\n**stats(`xai_stats_macro::receive_stats`)**:每个组件 `run()` 带 `#[receive_stats(...)]`,自动把延迟、size 发进指定的直方图桶。各 trait 配的桶不同,反映对该阶段耗时/规模的预期:\n\n| trait | receive_stats 参数 |\n|-------|--------------------|\n| Source | `size=Bucket500To1000` |\n| Hydrator | `latency=Bucket50To500, size=Bucket500To2500` |\n| Filter | `latency=Bucket0To50` |\n| Selector | `latency=Bucket0To50, size=Bucket0To50` |\n| Scorer / QueryHydrator / SideEffect | `#[receive_stats]`(无参,默认桶) |\n| `execute()`(执行器) | `latency=Bucket500To2500` |\n\n**手写的统计**:`CachedHydrator::stat_cache`(`hydrator.rs:104-114`)把缓存命中/未命中发进 `*.cache` 指标;`Filter::stat`(`filter.rs:59-69`)把 kept/removed 发进 `*.run` 指标。两者都先 `global_stats_receiver()` 取全局 receiver,取不到(`None`)就跳过 —— 因此非生产环境没配 receiver 也不会崩。\n\n**`name()` 的实现**:7 个 trait 的 `name()` 都是 `util::short_type_name(type_name_of_val(self))`。`util.rs` 整个文件只有这一个函数:\n\n```rust\n// candidate-pipeline/util.rs:1-3\npub fn short_type_name(full: &'static str) -> &'static str {\n    full.rsplit(\"::\").next().unwrap_or(full)\n}\n```\n\n把 `crate::module::ThunderSource` 这样的全限定名截成最后一段 `ThunderSource`。所有日志、span、指标里的组件名都靠它,业务无需手填名字。\n\n## 设计决策\n\n| 决策点 | 选择 | 理由 |\n|--------|------|------|\n| 组件抽象 | 7 个 trait,业务实现具体类型,以 `Box<dyn Trait>` 持有 | 同一阶段可挂任意多个异构组件;新增一种 source/filter 不动框架 |\n| Query / Candidate | 泛型 `Q: PipelineQuery` / `C: PipelineCandidate` | 框架不绑定具体业务类型;`PipelineCandidate` 用 blanket impl 几乎无约束 |\n| 启用控制 | 每个 trait 带 `enable() -> bool`,默认 `true` | 一条流水线挂几十个组件,每次请求按实验/用户只激活子集 |\n| 水合不丢候选 | Hydrator / Scorer 强制等长契约,违反整批 `Err` | 保证后续 `zip` 不错位;丢候选的职责收敛到 Filter 一处 |\n| run / update 两段式 | I/O(`hydrate`/`score`)与写字段(`update`)分离 | 并行做 I/O,顺序合并结果,规避 `&mut` 数据竞争 |\n| 并行 vs 顺序 | Source/Hydrator/QueryHydrator/SideEffect 并行;Filter/Scorer 顺序 | 独立工作并行提速;链式依赖的工作顺序保正确 |\n| 错误隔离 | Source `Err` 被 flatten 丢;水合逐元素 `Err`;SideEffect `Err` 被 `let _` 丢 | 单个组件/单个候选失败不拖垮整条流水线 |\n| 缓存能力 | `CachedHydrator` + blanket impl 自动获得 `Hydrator` | \"查缓存→未命中远程拉→回填\"成为框架级能力,业务只填 5 个回调 |\n| 可观测性 | trait 的 `run()` 内建 `#[tracing::instrument]` + `#[receive_stats]` | 业务实现组件零埋点代码,日志/指标口径全框架统一 |\n| 组件命名 | `name()` 统一用 `short_type_name(type_name_of_val(self))` | 日志/span/指标里的名字自动取类型短名,业务无需手填 |\n\n## FAQ\n\n**Q:Hydrator 和 Scorer 长得几乎一样,为什么是两个 trait?**\nA:trait 定义确实高度相似(都 async、都返回 `Vec<Result<C,String>>`、都有等长契约和 `update`/`update_all`)。本质区别在**执行模型**:Hydrator 并行(各水合器独立补不同字段),Scorer 顺序(后一个 scorer 依赖前一个填好的分数字段)。分成两个 trait 也让阶段语义清晰 —— \"补数据\"和\"算分\"是流水线里两件不同的事。\n\n**Q:为什么只有 Filter 能丢候选?**\nA:为了让\"候选数量怎么变\"可追溯。Hydrator/Scorer 强制等长,意味着候选集的规模只在 Source(变多)、Filter(变少)、Selector(截断)三处改变。Hydrator 若能丢候选,排查\"候选为什么少了\"就得翻所有水合器。把删除职责收敛到 Filter 一处,且每个 Filter 显式产出 `removed` 列表,数量变化全程可审计。\n\n**Q:`enable()` 返回 `false` 的组件会有性能开销吗?**\nA:几乎没有。执行器先 `.filter(|c| c.enable(query))` 把禁用组件剔掉,只对启用的组件发起 `run()`。禁用组件不跑、不产生 span、不计延迟,仅在 `record_enabled_components` 里被统计进 `disabled` 字段(一次字符串 join)。\n\n## 源码锚点\n\n- `candidate-pipeline/lib.rs:1-9` —— crate 根,导出 9 个模块\n- `candidate-pipeline/candidate_pipeline.rs:59-65` —— `PipelineQuery` / `PipelineCandidate` 约束\n- `candidate-pipeline/query_hydrator.rs:8-41` —— `QueryHydrator` trait\n- `candidate-pipeline/source.rs:8-39` —— `Source` trait\n- `candidate-pipeline/hydrator.rs:10-67` —— `Hydrator` trait\n- `candidate-pipeline/hydrator.rs:72-189` —— `CacheStore` / `CachedHydrator` 与 blanket impl\n- `candidate-pipeline/filter.rs:10-70` —— `Filter` trait 与 `FilterResult`\n- `candidate-pipeline/scorer.rs:8-65` —— `Scorer` trait\n- `candidate-pipeline/selector.rs:6-85` —— `Selector` trait 与 `SelectResult`\n- `candidate-pipeline/side_effect.rs:9-37` —— `SideEffect` trait 与 `SideEffectInput`\n- `candidate-pipeline/util.rs:1-3` —— `short_type_name`\n\n## 相关页面\n\n- [candidate-pipeline](#candidate-pipeline) —— 执行器 `CandidatePipeline` trait 与 `execute()` 十阶段编排的逐步走读\n- [system-architecture](#system-architecture) —— 框架如何被外层/内层两条流水线复用,系统全局视角\n- [home-mixer-orchestration](#home-mixer-orchestration) —— 真实流水线 `ForYouCandidatePipeline` 的组件组装与 gRPC 服务\n- [scoring-and-ranking](#scoring-and-ranking) —— Scorer 阶段的具体实现:Phoenix 打分器链与最终分计算\n- [filtering-pipeline](#filtering-pipeline) —— Filter 阶段的具体实现:预打分与选后两道过滤\n- [candidate-selection](#candidate-selection) —— Selector 阶段的具体实现:TopKScoreSelector 与选后成型\n- [phoenix-retrieval](#phoenix-retrieval) —— Source 阶段背后的双塔召回模型\n- [run-pipeline](#run-pipeline) —— 驱动一条 `CandidatePipeline` 跑起来的入口\n"}, "home-mixer-orchestration": {"title": "home-mixer 编排层", "type": "concept", "group": "在线服务(Rust)", "md": "# home-mixer 编排层\n\n## 这一页回答什么\n\n`home-mixer` 是 For You 信息流的服务进程:它如何启动、暴露什么 gRPC 接口、如何把 [流水线框架](#candidate-pipeline-framework) 组装成两条嵌套流水线、候选从哪些源来、请求与候选用什么数据模型承载。\n\n## 核心结论\n\n1. **一个进程,两个 gRPC 服务**:`ScoredPostsService`(纯帖子打分)与 `ForYouFeedService`(成品信息流)。\n2. **两条嵌套流水线**:外层 `ForYouCandidatePipeline` 把内层 `PhoenixCandidatePipeline` 当作一个候选源(`ScoredPostsSource`)。\n3. **QueryBuilder 是请求入口的统一适配器**:proto 请求 → 抓取 viewer 数据 → 评估 feature switches → 构造 `ScoredPostsQuery`。\n4. **候选源即\"召回\"**:Thunder(站内)、Phoenix 检索(站外)、TweetMixer、缓存等 6 个源并行供给内层流水线。\n\n## 服务启动\n\n入口 `home-mixer/main.rs`,用 `XServiceBuilder` 搭 gRPC 服务:\n\n```rust\n// home-mixer/main.rs:48-62\nXServiceBuilder::new(\"home-mixer\")\n    .grpc_port(args.grpc_port)          // 默认 50051\n    .metrics_port(args.metrics_port)    // 默认 9090\n    .datacenter(args.datacenter)        // 默认 \"atla\"\n    .with_featureswitches(params::FS_PATH, true)\n    .with_decider(params::decider_path(), None)\n    .with_tls(TlsMode::server_mtls_from_env()?)\n    .with_max_connection_age(Duration::from_secs(300))\n    .with_reflection(pb::FILE_DESCRIPTOR_SET)\n    .with_layer(dark_traffic_setup::resolve_layer())\n    .with_layer(RejectDarkTrafficLayer::from_env())\n    .run::<HomeMixerServer>(HomeMixerConfig { shard_coordinate })\n```\n\nCLI 参数(`main.rs:13-28`):`grpc_port`(50051)、`metrics_port`(9090)、`shard_coordinate`(-1 表示不分片)、`shard_total_size`(500)、`datacenter`(\"atla\")。\n\n`HomeMixerServer::build()`(`server.rs:353-395`)是装配中心,依次创建:Gizmoduck 客户端 → `QueryBuilder` → `PhoenixCandidatePipeline::prod()`(内层流水线)→ `ScoredPostsServer` → `ForYouCandidatePipeline::new()`(外层流水线)→ `ForYouFeedServer`。\n\n`register()`(`server.rs:397-420`)挂上两个 gRPC 服务,均启用 gzip/zstd 双向压缩,消息上限 `params::MAX_GRPC_MESSAGE_SIZE`。\n\n## 两个 gRPC 服务\n\n```mermaid\nflowchart TB\n    C([客户端]) -->|ScoredPostsQuery| SPS\n    C -->|ForYouFeedQuery| FYS\n    subgraph HomeMixerServer\n        SPS[ScoredPostsService<br/>get_scored_posts<br/>get_debug_scored_posts]\n        FYS[ForYouFeedService<br/>get_for_you_feed<br/>get_for_you_feed_urt]\n    end\n    SPS --> SPSV[ScoredPostsServer.run_pipeline]\n    FYS --> FYSV[ForYouFeedServer.get_for_you_feed]\n    SPSV --> PXP[PhoenixCandidatePipeline]\n    FYSV --> FYP[ForYouCandidatePipeline]\n    FYP -. ScoredPostsSource .-> SPSV\n```\n\n| 服务 | 实现 | 方法 | 返回 |\n|------|------|------|------|\n| `ScoredPostsService` | `ScoredPostsServer` | `get_scored_posts`、`get_debug_scored_posts` | `ScoredPost` 列表(`server.rs:206-268`) |\n| `ForYouFeedService` | `ForYouFeedServer` | `get_for_you_feed`、`get_for_you_feed_urt` | `FeedItem` 列表 / URT 二进制(`server.rs:271-347`) |\n\n`get_debug_scored_posts` 会 `force_sample()` 强制采样(`server.rs:236-267`),并经 `build_debug_json` 把完整流水线中间结果(retrieved/filtered/selected 候选 + 计数)序列化成 debug JSON(`scored_posts_server.rs:115-132`)。`get_for_you_feed_urt` 额外把 `FeedItem` 列表经 `urt::make_urt_timeline` 转成 X 的 URT(Unified Rich Timeline)Thrift 格式再二进制序列化(`for_you_server.rs:43-74`)。\n\n## QueryBuilder:请求入口适配器\n\n每个 gRPC 入口都先过 `QueryBuilder::build()`(`server.rs:59-136`):\n\n1. 校验 `viewer_id != 0`,否则返回 `invalid_argument`\n2. `fetch_viewer_data()` —— 调 Gizmoduck 拿用户角色/订阅等,**200ms 超时**(`VIEWER_ROLES_TIMEOUT_MS`),超时则用 `ViewerData::default()`\n3. `evaluate_feature_switches()` —— 用 `RecipientBuilder`(含 user_id、国家、语言、账号天龄、是否有手机号、角色)匹配 feature switches,得到 `Params`。feature switches 是 X 的灰度/实验开关系统:按用户画像命中一组配置值,流水线各组件再从 `Params` 读这些值决定行为(开/关、阈值、走哪个集群等)\n4. 构造 `ScoredPostsQuery`\n\n注意 `in_network_only` 的推导:`proto_query.in_network_only || viewer_data.allow_for_you_recommendations == Some(false)`(`server.rs:75-76`)—— 用户若关闭\"为你推荐\",则只走站内。\n\n## 两条嵌套流水线\n\n两条流水线都实现 [CandidatePipeline](#candidate-pipeline) trait,但泛型候选类型不同:\n\n### 外层 ForYouCandidatePipeline\n\n`CandidatePipeline<ScoredPostsQuery, FeedItem>`。`FeedItem` 是 oneof —— 帖子 / 广告 / Who-to-Follow 模块 / Prompt / PushToHome。它只用 4 个阶段(`for_you_candidate_pipeline.rs:155-195`):\n\n- **2 个 query 水合器**:`ServedHistoryQueryHydrator`、`PastRequestTimestampsQueryHydrator`\n- **5 个源**:`ScoredPostsSource`、`AdsSource`、`WhoToFollowSource`、`PromptsSource`、`PushToHomeSource`\n- **选择器**:`BlenderSelector`\n- **8 个 side effect**:广告注入日志、seen ids → Kafka、served candidates → Kafka、客户端事件、响应统计、更新/截断 served history、更新请求时间戳\n\nhydrators / filters / scorers / post-selection 全部返回 `&[]`(`for_you_candidate_pipeline.rs:247-269`)—— 帖子的过滤打分已在内层做完。\n\n### 内层 PhoenixCandidatePipeline\n\n`CandidatePipeline<ScoredPostsQuery, PostCandidate>`。真正执行召回→水合→过滤→打分→选择的流水线,组件清单见 [system-architecture](#system-architecture)。`result_size()` 返回 `params::RESULT_SIZE`。\n\n`ScoredPostsSource`(`sources/scored_posts_source.rs`)是连接两层的桥:\n\n```rust\n// home-mixer/sources/scored_posts_source.rs:13-32\nimpl Source<ScoredPostsQuery, FeedItem> for ScoredPostsSource {\n    async fn source(&self, query: &ScoredPostsQuery) -> Result<Vec<FeedItem>, String> {\n        let output = self.scored_posts_server.run_pipeline(query.clone()).await\n            .map_err(|e| format!(\"ScoredPostsSource: {e}\"))?;\n        let feed_items = output.scored_posts.into_iter()\n            .map(|post| FeedItem { position: 0, item: Some(feed_item::Item::Post(post)) })\n            .collect();\n        Ok(feed_items)\n    }\n}\n```\n\n`ScoredPostsServer::run_pipeline()`(`scored_posts_server.rs:41-73`)先对 `params::TEST_USER_IDS` 短路返回空,再 `phoenix_candidate_pipeline.execute(query)`,最后把 `PostCandidate` 转成 `ScoredPost` proto。\n\n## 候选源\n\n内层流水线的 6 个源(`phoenix_candidate_pipeline.rs:250-257`)并行执行:\n\n| 源 | 内容 | `enable()` 条件(节选) |\n|----|------|------|\n| `ThunderSource` | 站内(关注的人)帖子 | `!has_cached_posts` |\n| `TweetMixerSource` | TweetMixer 召回 | —— |\n| `PhoenixSource` | Phoenix 双塔站外召回 | 非话题请求、非站内限定、`!has_cached_posts` |\n| `PhoenixTopicsSource` | Phoenix 话题召回 | —— |\n| `PhoenixMOESource` | Phoenix MoE 召回 | —— |\n| `CachedPostsSource` | 上次请求缓存的帖子 | —— |\n\n**ThunderSource**(`sources/thunder_source.rs`)调 Thunder gRPC 服务 `InNetworkPostsService.get_in_network_posts`,请求里带 `following_user_ids`(关注列表)、`exclude_tweet_ids`(= `seen_ids`)、`max_results`(`ThunderMaxResults` 参数);返回的帖子按是否站内限定标 `ForYouInNetwork` 或 `RankedFollowing`。\n\n**PhoenixSource**(`sources/phoenix_source.rs`)调 Phoenix 检索服务。`resolve_cluster()` 体现新用户特殊路由:若 `retrieval_sequence` 的动作数 `< PhoenixRetrievalNewUserHistoryThreshold`,改用新用户推理集群;decider 开关还能在 `Lap7` 与 `Fou` 集群间互换。返回候选标 `ForYouPhoenixRetrieval`。\n\n外层流水线另有 `AdsSource` / `WhoToFollowSource` / `PromptsSource` / `PushToHomeSource` 供给非帖子的 `FeedItem`。\n\n## 选择器\n\n| 选择器 | 用于 | 行为 |\n|--------|------|------|\n| `TopKScoreSelector` | 内层 | 按 `candidate.score` 降序,取 `params::TOP_K_CANDIDATES_TO_SELECT` 个(`selectors/top_k_score_selector.rs`) |\n| `BlenderSelector` | 外层 | 把 `FeedItem` 按类型分桶,帖子与广告混排,再插入 Prompt / WTF / PushToHome |\n\n`BlenderSelector`(`home-mixer/selectors/blender_selector.rs:24-75`)按 `AdsBlenderType` 参数二选一广告 blender(`\"safe_gap\"` → `SafeGapAdsBlender`,否则 `PartitionOrganicAdsBlender`,见 [ads-blending](#ads-blending));混排后 `insert_prompts` 插到 `PROMPTS_POSITION`、`insert_who_to_follow` 插到 `WHO_TO_FOLLOW_POSITION`、`pin_push_to_home` 钉在位置 0。\n\n## 数据模型\n\n### ScoredPostsQuery\n\n请求贯穿全流水线的查询对象(`home-mixer/models/query.rs:24-95`),~60 个字段。关键分组:\n\n- **身份/上下文**:`user_id`、`client_app_id`、`country_code`、`language_code`、`request_context`、`cursor`\n- **去重输入**:`seen_ids`、`served_ids`、`bloom_filter_entries`、`impressed_post_ids`\n- **互动序列**:`scoring_sequence`、`retrieval_sequence`(及其 columnar 变体)—— 喂给 Phoenix 模型\n- **用户特征**:`user_features`、`user_demographics`、`subscription_level`、关注话题/starter pack 位图\n- **请求形态**:`in_network_only`、`is_bottom_request`、`is_top_request`、`topic_ids`、`excluded_topic_ids`、`exclude_videos`\n- **配置**:`params`(feature switches)、`decider`\n\n它实现 `PipelineQuery` trait(`query.rs:226-234`),向框架暴露 `params()` 与 `decider()`。便捷判定:`is_topic_request()`、`is_bulk_topic_request()`(topic_ids > 6)、`has_excluded_topics()` 等。\n\n### PostCandidate\n\n内层流水线的候选(`home-mixer/models/candidate.rs:8-55`)。从空壳逐阶段被水合:源阶段只填 `tweet_id`/`author_id`/`served_type`,之后水合器补 `tweet_text`、`phoenix_scores`、`brand_safety_verdict`、`safety_labels`、`visibility_reason`、互动计数等;打分器写入 `weighted_score` 与 `score`。`CandidateHelpers` trait 提供 `get_original_tweet_id()`(转发取源帖)、`as_tweet_info()`(转成喂给模型的 `TweetInfo`)。\n\n### UserFeatures\n\n`muted_keywords`、`blocked_user_ids`、`muted_user_ids`、`followed_user_ids`、`subscribed_user_ids`、`follower_count`(`home-mixer/models/user_features.rs:5-14`)。实现 `MValCodec`,从 Strato 的 Thrift 字节反序列化(各字段有固定 field id)。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 流水线分层 | 外层 FeedItem + 内层 PostCandidate 两条 | 帖子排序与多类型混排关注点分离;内层可独立作为 `ScoredPostsService` 复用 |\n| 请求适配 | 统一 `QueryBuilder` | proto→领域对象、feature switch 评估、viewer 数据抓取集中一处 |\n| viewer 数据 | 200ms 超时 + 默认值兜底 | Gizmoduck 慢调用不拖垮请求 |\n| 测试用户 | `TEST_USER_IDS` 短路返回空 | 避免给测试账号产生真实推荐与副作用 |\n| 候选源 | 6 源并行 | 站内/站外/缓存多路召回,框架层 `join_all` 并发 |\n\n## FAQ\n\n**Q:`get_for_you_feed` 和 `get_for_you_feed_urt` 区别?**\nA:前者返回结构化 `FeedItem` 列表;后者把同样的结果再编码成 X 客户端用的 URT Thrift 二进制(`for_you_server.rs:43-74`),并会解析请求里的 cursor 判断 `is_bottom_request`/`is_top_request`。\n\n**Q:内层流水线能单独用吗?**\nA:能。`ScoredPostsService` 就是直接暴露内层 `PhoenixCandidatePipeline` 的接口,返回纯 `ScoredPost`,不含广告/模块混排。\n\n## 源码锚点\n\n- `home-mixer/main.rs:41-63` —— 服务启动\n- `home-mixer/server.rs:206-347` —— 两个 gRPC 服务的方法实现\n- `home-mixer/server.rs:353-420` —— `HomeMixerServer::build()` 与 `register()`\n- `home-mixer/scored_posts_server.rs:41-113` —— `run_pipeline()` 与候选→proto 转换\n- `home-mixer/selectors/blender_selector.rs:24-75` —— 外层混排选择器\n\n## 相关页面\n\n- [system-architecture](#system-architecture) —— 整体两层流水线与十阶段总览\n- [end-to-end-dataflow](#end-to-end-dataflow) —— 端到端数据流:home-mixer 编排的一次请求从头到尾\n- [your-data](#your-data) —— 算法用了你的哪些数据:`ScoredPostsQuery` 各字段从用户侧的来源\n- [candidate-pipeline-framework](#candidate-pipeline-framework) —— 流水线框架的 trait 设计\n- [candidate-pipeline](#candidate-pipeline) —— `CandidatePipeline` 执行器\n- [filtering-pipeline](#filtering-pipeline) —— 内层流水线的过滤器\n- [scoring-and-ranking](#scoring-and-ranking) —— 内层流水线的打分器\n- [candidate-selection](#candidate-selection) —— 内 / 外两层流水线的选择器与选后成型\n- [ads-blending](#ads-blending) —— `BlenderSelector` 调用的广告混排\n- [thunder-in-network-store](#thunder-in-network-store) —— `ThunderSource` 背后的站内库\n- [phoenix-retrieval](#phoenix-retrieval) —— `PhoenixSource` 背后的召回模型\n"}, "scoring-and-ranking": {"title": "打分与排序", "type": "concept", "group": "在线服务(Rust)", "md": "# 打分与排序\n\n## 这一页回答什么\n\n候选帖子从 Phoenix 模型的原始预测,如何变成一个可排序的最终分。\n\n## 核心结论\n\n1. **流水线里实际只有 3 个打分器**:`PhoenixScorer`、`RankingScorer`、`VMRanker`(`scorers/mod.rs` 只声明这三个)。\n2. **`RankingScorer` 是核心**:加权求和、作者多样性衰减、站外(OON)降权全部内联在它一个打分器里。\n3. **多行为预测 → 加权求和**:Phoenix 预测 ~22 种互动概率,`Final Score = Σ(weight_i × P(action_i))`,负向行为(block/mute/report 等)是负权重。\n4. **`VMRanker` 是可选的二次排序**:仅当 `EnableVMRanker` 参数开启时调用外部价值模型服务。\n\n> 注:`scorers/` 目录下另有 `weighted_scorer.rs`、`author_diversity_scorer.rs`、`oon_scorer.rs` 三个文件,但 `scorers/mod.rs` 未声明它们,**不在编译模块树内**。它们的逻辑(加权、多样性、OON)已被 `RankingScorer` 合并实现。本页以实际生效的 `RankingScorer` 为准。\n\n## 三个打分器\n\n打分器顺序执行(见 [candidate-pipeline-framework](#candidate-pipeline-framework)),装配于 `phoenix_candidate_pipeline.rs:291-300`:\n\n```mermaid\nflowchart LR\n    C[候选 + 互动序列] --> PS[PhoenixScorer<br/>调 Phoenix 模型]\n    PS -->|phoenix_scores<br/>~22 种概率| RS[RankingScorer<br/>加权+多样性+OON]\n    RS -->|score| VM[VMRanker<br/>可选,外部价值模型]\n    VM --> OUT[最终 score]\n```\n\n## PhoenixScorer:取 ML 预测\n\n`PhoenixScorer`(`scorers/phoenix_scorer.rs`)调用 [Phoenix 排序模型](#phoenix-ranking),把预测概率写入候选的 `phoenix_scores` 字段。\n\n- **`enable()`**:`!query.has_cached_posts`(缓存命中时不重新打分)。\n- **集群路由 `resolve_cluster()`**:默认集群来自 `PhoenixInferenceClusterId` 参数;若 `scoring_sequence` 动作数 `< PhoenixRankerNewUserHistoryThreshold`,改用新用户集群 `PhoenixRankerNewUserInferenceClusterId`;decider 开关 `override_qf_use_lap7` / `override_qf_use_fou` 可在两个实验集群间互换。\n- **产品面**:`in_network_only` 时为 `HomeTimelineRankedFollowing`,否则 `HomeTimelineRanking`。\n- **空序列短路**:`scoring_sequence` 为 `None` 时直接返回默认候选(`phoenix_scorer.rs:79-81`)。\n- **Egress 兜底**:`UseEgressSidecar` 参数开启时走 egress 客户端,失败再回退主客户端(`phoenix_scorer.rs:86-98`)。\n\n```rust\n// home-mixer/scorers/phoenix_scorer.rs:107-116\ncandidates.iter().map(|c| PostCandidate {\n    phoenix_scores: predictions.candidate_scores(&c.get_original_tweet_id()),\n    prediction_request_id: Some(query.prediction_id),\n    last_scored_at_ms,\n    ..Default::default()\n}).map(Ok).collect()\n```\n\n## RankingScorer:加权 → 多样性 → OON\n\n`RankingScorer`(`scorers/ranking_scorer.rs`)是真正算出 `score` 的地方,`score()` 分三步(`ranking_scorer.rs:248-284`)。\n\n### 第 1 步:加权求和\n\n`ScoringWeights::from_params()` 从 feature switch 读入 ~22 个权重(`FavoriteWeight`、`ReplyWeight`、`RetweetWeight`、`ClickWeight`、`DwellWeight`、`FollowAuthorWeight`、`NotInterestedWeight`、`BlockAuthorWeight`、`MuteAuthorWeight`、`ReportWeight`、`NotDwelledWeight` 等)。\n\n`compute_weighted_score()`(`ranking_scorer.rs:125-173`)对每个候选求加权和:\n\n```\ncombined = Σ  P(action_i) × weight_i      // ~22 个行为\n```\n\n涵盖的行为包括:favorite、reply、retweet、photo_expand、click、profile_click、vqv(视频质量观看)、share / share_via_dm / share_via_copy_link、dwell、quote、quoted_click、quoted_vqv、连续型 dwell_time / click_dwell_time、follow_author,以及负向的 not_interested、block_author、mute_author、report、not_dwelled。\n\n其中 `negative_sum = -(not_interested + block_author + mute_author + report + not_dwelled)`(`ranking_scorer.rs:83`)—— 这 5 个是负向行为。vqv 与 quoted_vqv 的权重还会按视频时长是否达标动态置 0(`vqv_weight()` / `quoted_vqv_weight()`)。\n\n`offset_score()` 把 combined 偏移到非负区间(`ranking_scorer.rs:175-183`):\n\n```rust\nfn offset_score(combined_score: f64, w: &ScoringWeights) -> f64 {\n    if w.total_sum == 0.0 {\n        combined_score.max(0.0)\n    } else if combined_score < 0.0 {\n        (combined_score + w.negative_sum) / w.total_sum * NEGATIVE_SCORES_OFFSET\n    } else {\n        combined_score + NEGATIVE_SCORES_OFFSET\n    }\n}\n```\n\n结果再经 `normalize_score()` 归一化,得到 `weighted_score`。\n\n### 第 2 步:作者多样性衰减\n\n`apply_author_diversity()`(`ranking_scorer.rs:190-217`)防止同一作者刷屏:\n\n1. 按 `weighted_score` 降序排;\n2. 为每个作者维护一个位置计数 `position`(该作者第几次出现);\n3. 乘衰减因子:\n\n```rust\n// ranking_scorer.rs:186-188\nfn diversity_multiplier(decay_factor: f64, floor: f64, position: usize) -> f64 {\n    (1.0 - floor) * decay_factor.powf(position as f64) + floor\n}\n```\n\n`decay_factor`(`AuthorDiversityDecay`)、`floor`(`AuthorDiversityFloor`)均为参数。同一作者第 0 条乘 `1.0`,第 1 条乘 `decay+floor·(1-decay)`,逐条衰减但不低于 `floor`。\n\n### 第 3 步:站外(OON)降权\n\n`effective_oon_weight()`(`ranking_scorer.rs:220-239`)决定站外内容的降权系数:\n\n- 话题请求 → `TopicOonWeightFactor`\n- 否则 → `OonWeightFactor`;但若是**符合条件的新用户**(账号年龄 < `NewUserAgeThresholdSecs` 且关注数 ≥ `NEW_USER_MIN_FOLLOWING`)→ 用 `NEW_USER_OON_WEIGHT_FACTOR`\n\n最终分:\n\n```rust\n// ranking_scorer.rs:270-275\nlet final_score = match c.in_network {\n    Some(false) => after_diversity * effective_oon,  // 站外:乘 OON 系数降权\n    _            => after_diversity,                  // 站内:不降权\n};\n```\n\n站内(in-network)候选不降权,站外(out-of-network)候选乘 OON 系数 —— 这是站内/站外内容平衡的核心旋钮。\n\n## VMRanker:可选的价值模型重排\n\n`VMRanker`(`scorers/vm_ranker.rs`)在 `EnableVMRanker` 参数开启时,把所有候选(连同 `phoenix_scores`、是否站内、转发/回复标志、作者粉丝数等)打包成 `RankRequest`,调用外部 VM Ranker gRPC 服务重排:\n\n- 支持 **DPP**(行列式点过程)多样性:`VMRankerDppTheta`、`VMRankerDppMaxSelectedRank` 参数非零时传 `DppParams`。\n- 服务返回的分按 `tweet_id` 映射回候选;未返回的候选保留原 `score`(`vm_ranker.rs:46-47`)。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 多行为预测 | 预测 ~22 种行为概率,而非单一相关性 | 不同行为价值不同,可通过权重灵活调节;负向行为给负权重直接压制 |\n| 打分器合并 | 加权/多样性/OON 内联进 `RankingScorer` | 三步强耦合(多样性依赖加权结果、OON 依赖多样性结果),合并避免候选在打分器间反复拷贝 |\n| 权重来自参数 | 全部走 feature switch | 无需发版即可调权重、做实验 |\n| 分数偏移 | `offset_score` 把分推到非负 | 负分候选(强负向行为)仍需有序,偏移后保持单调可比 |\n| OON 降权 | 站外乘系数,新用户/话题单独系数 | 默认偏向站内;新用户站内内容少,放宽站外;话题页本就要站外 |\n| VMRanker 可选 | `enable()` 由参数门控 | 价值模型重排是可灰度的增量层,不影响主打分链 |\n\n## FAQ\n\n**Q:README 里说有 Weighted / Author Diversity / OON 三个独立 Scorer,和这里说的对得上吗?**\nA:README 描述的是**概念阶段**。代码实现里这三段逻辑被合并进 `RankingScorer` 一个打分器(`scorers/mod.rs` 只声明 `phoenix_scorer`/`ranking_scorer`/`vm_ranker`)。仓库里 `weighted_scorer.rs`/`author_diversity_scorer.rs`/`oon_scorer.rs` 文件存在但未加入模块树。\n\n**Q:负向行为概率高的帖子会怎样?**\nA:block/mute/report/not_interested/not_dwelled 的权重为负,加权和会被拉低甚至为负;`offset_score` 对负分走 `(combined + negative_sum)/total_sum × OFFSET` 这一支,使其排到正向帖之后。\n\n## 源码锚点\n\n- `home-mixer/scorers/mod.rs:1-3` —— 仅声明三个打分器\n- `home-mixer/scorers/ranking_scorer.rs:125-183` —— 加权求和与 `offset_score`\n- `home-mixer/scorers/ranking_scorer.rs:186-217` —— 作者多样性衰减\n- `home-mixer/scorers/ranking_scorer.rs:220-239` —— OON 权重决策\n- `home-mixer/scorers/phoenix_scorer.rs:25-58` —— Phoenix 集群路由\n\n## 相关页面\n\n- [phoenix-ranking](#phoenix-ranking) —— `PhoenixScorer` 调用的排序模型,产出 `phoenix_scores`\n- [candidate-selection](#candidate-selection) —— 打分之后:按分数排序、截断、选后处理\n- [operating-myths](#operating-myths) —— 运营迷思 vs 源码真相:加权/多样性/OON 如何打穿流行说法\n- [posting-guide](#posting-guide) —— 发帖指南:基于打分机制,创作者能怎么做\n- [new-account-cold-start](#new-account-cold-start) —— 新号与冷启动:打分侧对新用户的特殊 OON 系数\n- [home-mixer-orchestration](#home-mixer-orchestration) —— 打分器在内层流水线中的位置\n- [candidate-pipeline-framework](#candidate-pipeline-framework) —— `Scorer` trait 与顺序执行\n- [filtering-pipeline](#filtering-pipeline) —— 打分前的候选过滤\n- [system-architecture](#system-architecture) —— 打分在十阶段流水线中的位置\n"}, "candidate-selection": {"title": "候选选择与成型", "type": "concept", "group": "在线服务(Rust)", "md": "# 候选选择与成型\n\n## 这一页回答什么\n\n候选打完分之后,系统怎么从一大堆带分候选里选出最终展示的几十条 —— 即流水线的**选择阶段**及其之后的成型步骤。打分见 [scoring-and-ranking](#scoring-and-ranking),本页接着往下走。\n\n## 核心结论\n\n1. **选择 = 排序 + 截断**。`Selector` trait 的默认 `select()` 就是\"按分降序排 → 截断到 `size()`\"。\n2. **两个选择器**:内层 `TopKScoreSelector`(按 `score` 取 top-K);外层 `BlenderSelector`(把 `FeedItem` 组装成最终信息流)。\n3. **选择不是终点**:选完还有选后水合 → 选后过滤 → 截断到 `RESULT_SIZE`。所以内层\"选 top-K\"刻意选得**比最终条数多**,留出余量给选后过滤删。\n4. **落选候选不丢弃**:进入 `non_selected`,供 side effect 与调试使用。\n\n## Selector:排序 + 截断的骨架\n\n`Selector` trait(`candidate-pipeline/selector.rs:21-85`)把\"选择\"抽象成可复用骨架,默认 `select()` 已实现:\n\n```rust\n// candidate-pipeline/selector.rs:47-61\nfn select(&self, _query: &Q, candidates: Vec<C>) -> SelectResult<C> {\n    let mut sorted = self.sort(candidates);          // 按分降序\n    if let Some(limit) = self.size() {\n        let non_selected = sorted.split_off(limit.min(sorted.len()));  // 截断\n        SelectResult { selected: sorted, non_selected }\n    } else {\n        SelectResult { selected: sorted, non_selected: vec![] }\n    }\n}\n```\n\n- `sort()`(`:67-75`):按 `score()` 降序,`partial_cmp` 失败(`NaN`)兜底为相等。\n- `score()`:抽象方法,业务实现 —— 从候选里取出用于排序的分。\n- `size()`(`:78-80`):默认 `None`(不截断);override 返回 `Some(limit)` 则 `split_off` 出落选部分。\n- 结果 `SelectResult { selected, non_selected }`(`:6-9`):选中的进下一阶段,落选的单独留存。\n\n业务**最少只需实现 `score()` 一个方法**,排序与截断由框架包办。详见 [candidate-pipeline-framework](#candidate-pipeline-framework)。\n\n## TopKScoreSelector:内层选择器\n\n内层 `PhoenixCandidatePipeline` 的选择器,实现极简(`home-mixer/selectors/top_k_score_selector.rs`):\n\n```rust\n// home-mixer/selectors/top_k_score_selector.rs:8-15\nimpl Selector<ScoredPostsQuery, PostCandidate> for TopKScoreSelector {\n    fn score(&self, candidate: &PostCandidate) -> f64 {\n        candidate.score.unwrap_or(f64::NEG_INFINITY)\n    }\n    fn size(&self) -> Option<usize> {\n        Some(params::TOP_K_CANDIDATES_TO_SELECT)\n    }\n}\n```\n\n它只 override `score()`(取候选的最终分 `score` —— 由 [RankingScorer](#scoring-and-ranking) 写入;无分的候选取负无穷,排到最后)和 `size()`(`params::TOP_K_CANDIDATES_TO_SELECT`)。`select()` 用默认实现 —— 于是行为就是:**按最终分降序排,取前 `TOP_K_CANDIDATES_TO_SELECT` 个**。\n\n## 选完之后:水合 → 过滤 → 截断\n\n选择只是流水线第 ⑦ 阶段。`execute()` 在它之后还有三步(`candidate-pipeline/candidate_pipeline.rs:102-119`):\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:102-119(节选)\nlet SelectResult { selected, non_selected } = self.select(&query, scored);\nlet post_hydrated = self.hydrate_post_selection(&query, selected).await;   // ⑧\nlet (mut final_candidates, post_filtered) =\n    self.filter_post_selection(&query, post_hydrated);                      // ⑨\nlet truncated = final_candidates.split_off(self.result_size().min(final_candidates.len()));\nnon_selected.extend(truncated);                                             // 截断\nself.finalize(&query, &mut final_candidates);\n```\n\n| 步骤 | 内容 | 为什么放选择之后 |\n|------|------|------|\n| **选后水合** | 6 个 hydrator:`VFCandidateHydrator`、`AdsBrandSafetyHydrator`、`AdsBrandSafetyVfHydrator`、`TweetTypeMetricsHydrator`、`FollowingRepliedUsersHydrator`、`MutualFollowJaccardHydrator`(`phoenix_candidate_pipeline.rs:304-315`) | 可见性、品牌安全等数据获取昂贵,**只对会展示的入选候选**做,省成本 |\n| **选后过滤** | 3 个 filter:`VFFilter`、`AncillaryVFFilter`、`DedupConversationFilter`(`:317-321`) | 依赖选后水合刚拿到的可见性数据;会话去重也要在最终集合上做。详见 [filtering-pipeline](#filtering-pipeline) |\n| **截断** | `split_off(result_size())` —— 砍到 `params::RESULT_SIZE`,多出的并入 `non_selected` | 选后过滤删掉一些后,再砍到最终条数 |\n| **finalize** | `finalize()` 钩子(默认空) | 给业务对最终列表做最后调整的口子 |\n\n### 为什么有两个数量上限\n\n选择阶段取 `TOP_K_CANDIDATES_TO_SELECT` 个,最后又截断到 `RESULT_SIZE` —— 两个限制刻意不同:\n\n```mermaid\nflowchart LR\n    A[打分后的全部候选] -->|TopKScoreSelector<br/>取 TOP_K_CANDIDATES_TO_SELECT| B[入选候选<br/>略多于最终]\n    B --> C[选后水合]\n    C --> D[选后过滤<br/>删掉一部分]\n    D -->|截断到 RESULT_SIZE| E[最终候选]\n```\n\n内层先选**略多**的 top-K,留出余量;经选后过滤删掉一些不可见/重复的之后,再砍到最终的 `RESULT_SIZE`。若一开始就只选 `RESULT_SIZE` 个,选后过滤一删就不够数了。\n\n## BlenderSelector:外层选择器与最终成型\n\n外层 [ForYouCandidatePipeline](#home-mixer-orchestration) 的选择器是 `BlenderSelector`(`home-mixer/selectors/blender_selector.rs:24-75`)。它的候选类型是 `FeedItem`(帖子 / 广告 / Who-to-Follow / Prompt / PushToHome 的 oneof),做的不是\"按分截断\"而是**组装**:\n\n1. `partition_feed_items` 把 `FeedItem` 按类型分桶(`:141-164`)\n2. 按 `AdsBlenderType` 参数选广告 blender,`blend()` 把帖子与广告混排\n3. `insert_prompts` 插到 `PROMPTS_POSITION`、`insert_who_to_follow` 插到 `WHO_TO_FOLLOW_POSITION`、`pin_push_to_home` 钉在位置 0\n\n广告混排的细节见 [ads-blending](#ads-blending)。外层的结果规模是 `params::FOR_YOU_MAX_RESULT_SIZE`。\n\n> 注意 `BlenderSelector::score()` 直接返回 `0.0` —— 它不靠分数排序,帖子的顺序在内层 `TopKScoreSelector` 时就定了,外层只负责把广告 / 模块编排进去。\n\n## 完整选择链\n\n```mermaid\nflowchart TB\n    S[打分后的候选] --> T[\"TopKScoreSelector<br/>按 score 降序,取 TOP_K\"]\n    T --> SEL[入选候选]\n    T --> NS1[落选 → non_selected]\n    SEL --> PH[选后水合 ×6<br/>可见性 / 品牌安全…]\n    PH --> PF[选后过滤 ×3<br/>VF / 附属VF / 会话去重]\n    PF --> TR[\"截断到 RESULT_SIZE\"]\n    TR --> FIN[finalize]\n    FIN --> POSTS[内层产出:排好的帖子]\n    POSTS --> BL[\"外层 BlenderSelector<br/>帖子 + 广告 + 模块 组装\"]\n    BL --> FEED([最终 For You 信息流])\n```\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 选择抽象 | `Selector` trait + 默认 `select()` | 排序 + 截断是通用逻辑,业务通常只填 `score()` |\n| 内层选择器 | `TopKScoreSelector` 纯按最终分 | 帖子顺序只由相关性分决定,简单可预期 |\n| 三段式收尾 | 选 top-K(多)→ 选后过滤 → 截断到 `RESULT_SIZE` | 留余量:过滤会删人,先多选才不会最后不够数 |\n| 昂贵水合后置 | 可见性 / 品牌安全水合放选择之后 | 只对会展示的入选候选做,不为落选候选白花成本 |\n| 落选不丢 | 进 `non_selected` | 可供 side effect 记录、调试归因 |\n| 内外选择器分工 | 内层按分截断,外层只组装 | 相关性排序与广告 / 模块编排是两件事,分开 |\n\n## FAQ\n\n**Q:`TopKScoreSelector` 的 `TOP_K_CANDIDATES_TO_SELECT` 和最终 `RESULT_SIZE` 哪个大?**\nA:`TOP_K_CANDIDATES_TO_SELECT` ≥ `RESULT_SIZE`。先选略多,经选后过滤删减后再截断到 `RESULT_SIZE`。两者都是 feature switch 参数。\n\n**Q:选后过滤为什么不直接在打分前那道过滤里做?**\nA:`VFFilter` 等依赖 `VFCandidateHydrator` 在**选择之后**才获取的可见性数据;而这类数据获取昂贵,只值得对入选候选做。`DedupConversationFilter`(会话去重)也需要在接近最终的集合上做才有意义。\n\n**Q:落选的候选去哪了?**\nA:进入 `SelectResult.non_selected`,以及被截断的部分也并入 `non_selected`。它们最终进 `PipelineResult.filtered_candidates` / 传给 side effect,不展示但保留,用于日志与调试。\n\n## 源码锚点\n\n- `candidate-pipeline/selector.rs:21-85` —— `Selector` trait 与默认 `select()`/`sort()`\n- `candidate-pipeline/selector.rs:6-19` —— `SelectResult`\n- `candidate-pipeline/candidate_pipeline.rs:102-119` —— `execute()` 中选择 + 选后 + 截断\n- `home-mixer/selectors/top_k_score_selector.rs:8-15` —— `TopKScoreSelector`\n- `home-mixer/selectors/blender_selector.rs:24-75` —— `BlenderSelector`\n- `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:302-321` —— 选择器、选后水合、选后过滤的装配\n\n## 相关页面\n\n- [scoring-and-ranking](#scoring-and-ranking) —— 上游:候选的最终分怎么算出来\n- [filtering-pipeline](#filtering-pipeline) —— 选后过滤的 3 个过滤器细节\n- [ads-blending](#ads-blending) —— 外层 `BlenderSelector` 的广告混排细节\n- [candidate-pipeline](#candidate-pipeline) —— `execute()` 十阶段编排,选择是第 ⑦ 阶段\n- [candidate-pipeline-framework](#candidate-pipeline-framework) —— `Selector` trait 在框架中的位置\n- [home-mixer-orchestration](#home-mixer-orchestration) —— 内 / 外两条流水线各自的选择器\n- [how-posts-are-picked](#how-posts-are-picked) —— 本页的白话版\n- [system-architecture](#system-architecture) —— 选择在整体流水线中的位置\n"}, "filtering-pipeline": {"title": "过滤流水线", "type": "concept", "group": "在线服务(Rust)", "md": "# 过滤流水线\n\n## 这一页回答什么\n\n`PhoenixCandidatePipeline` 在哪两个阶段过滤候选、各有哪些过滤器、每个过滤器的判定逻辑。\n\n## 核心结论\n\n1. **两道过滤**:打分前 14 个过滤器(剔除不合格候选),选择后 3 个过滤器(最终可见性与会话去重)。\n2. **顺序执行**:过滤器逐个跑,前序的 `kept` 是后序的输入(见 [candidate-pipeline-framework](#candidate-pipeline-framework))。\n3. **不丢候选,只分流**:每个过滤器返回 `FilterResult { kept, removed }`,被剔除的候选进入 `non_selected`,可用于日志与统计。\n4. **多数过滤器无条件启用,少数靠 `enable()` 门控**:如 `VideoFilter` 仅当 `exclude_videos`、`TopicIdsFilter` 仅当话题请求时才跑。\n\n## 两道过滤的位置\n\n```mermaid\nflowchart LR\n    SRC[候选源] --> HYD[候选水合]\n    HYD --> PRE[预打分过滤<br/>14 个]\n    PRE --> SCORE[打分]\n    SCORE --> SEL[TopK 选择]\n    SEL --> POSTHYD[选后水合]\n    POSTHYD --> POST[选后过滤<br/>3 个]\n    POST --> OUT[结果]\n```\n\n过滤器统一实现 `Filter<ScoredPostsQuery, PostCandidate>` trait,核心方法:\n\n```rust\nfn filter(&self, query: &ScoredPostsQuery, candidates: Vec<PostCandidate>)\n    -> FilterResult<PostCandidate>;   // { kept, removed }\nfn enable(&self, query: &ScoredPostsQuery) -> bool;  // 默认 true\n```\n\n## 预打分过滤(14 个)\n\n按 `phoenix_candidate_pipeline.rs:274-289` 的顺序。\n\n### 去重类\n\n**DropDuplicatesFilter** —— 用 `HashSet` 按 `tweet_id` 去重,首次出现保留:\n\n```rust\n// home-mixer/filters/drop_duplicates_filter.rs:18-24\nfor candidate in candidates {\n    if seen_ids.insert(candidate.tweet_id) { kept.push(candidate); }\n    else { removed.push(candidate); }\n}\n```\n\n**RetweetDeduplicationFilter** —— 按 `retweeted_tweet_id.unwrap_or(tweet_id)` 去重:同一条帖子无论以原帖还是转发形式出现,只保留第一次(`retweet_deduplication_filter.rs:20-27`)。\n\n### 数据完整性 / 时效\n\n**CoreDataHydrationFilter** —— `kept = author_id != 0`。核心数据水合失败的候选 `author_id` 仍为 0,在此剔除(`core_data_hydration_filter.rs:13`)。\n\n**AgeFilter** —— 剔除超过 `max_age` 的帖子。年龄由 `duration_since_creation_opt(tweet_id)` 从雪花 ID 解析得到;`max_age` 在流水线组装时设为 `Duration::from_secs(params::MAX_POST_AGE)`(`age_filter.rs:17-21`)。\n\n### 作者关系\n\n**SelfTweetFilter** —— 剔除 `author_id == query.user_id` 的帖子(`self_tweet_filter.rs:14-17`),不给用户看自己的帖。\n\n**AuthorSocialgraphFilter** —— 剔除与社交图冲突的候选。命中任一即移除(`author_socialgraph_filter.rs:46-52`):\n\n- 作者被 viewer 静音(`muted_user_ids`)或拉黑(`blocked_user_ids`)\n- 作者拉黑了 viewer(`author_blocks_viewer`)\n- 引用帖作者拉黑了 viewer / viewer 拉黑了引用帖作者\n- viewer 拉黑了被转发的作者\n\n### 内容偏好\n\n**MutedKeywordFilter** —— 用 `TweetTokenizer` 把用户的 `muted_keywords` 与帖子正文都分词,经 `MatchTweetGroup` 匹配则剔除。无静音词时直接全部放行;匹配在 `tokio::task::block_in_place` 中执行以避免阻塞异步运行时(`muted_keyword_filter.rs:28-55`)。\n\n**IneligibleSubscriptionFilter** —— 若候选是订阅专属帖(`subscription_author_id` 为 `Some`),只有当 viewer 订阅了该作者(在 `subscribed_user_ids` 中)才保留;非订阅帖一律保留(`ineligible_subscription_filter.rs:24-28`)。\n\n**VideoFilter** —— `enable()` 仅当 `query.exclude_videos`;启用时剔除含视频的帖(`kept = min_video_duration_ms.is_none()`,`video_filter.rs:8-21`)。\n\n### 已看 / 已服务去重\n\n三个过滤器从不同来源剔除\"用户已经见过\"的帖,都用 `get_related_post_ids()` 把帖子及其关联 ID 一起检查:\n\n| 过滤器 | 数据来源 | 说明 |\n|--------|----------|------|\n| `PreviouslySeenPostsFilter` | `seen_ids` + 客户端传来的 Bloom 过滤器 | Bloom 由 `bloom_filter_entries`(size_cap、false_positive_rate)重建,`may_contain` 判定(`previously_seen_posts_filter.rs:17-30`) |\n| `PreviouslySeenPostsBackupFilter` | `impressed_post_ids` | 曝光帖兜底;`impressed_post_ids` 为空则跳过(`previously_seen_posts_backup_filter.rs:14-19`) |\n| `PreviouslyServedPostsFilter` | `served_ids` | `enable()` 条件:`EnableServedFilterAllRequests` 参数为真,或 `is_bottom_request` 且请求上下文非 `ForegroundTruncate`(`previously_served_posts_filter.rs:13-18`) |\n\n### 话题过滤\n\n**TopicIdsFilter** —— `enable()`:话题请求或有排除话题。逻辑分两支(`topic_ids_filter.rs:20-106`):\n\n- **话题请求**:按 `query.topic_ids` 经 `TopicIdExpansion` 展开(分类→子话题、超话题层级)匹配候选的 `filtered_topic_ids` / `unfiltered_topic_ids`;批量话题请求(>6 个话题)走\"排除补集\"逻辑。\n- **排除话题**:把 `excluded_topic_ids` 展开后,剔除命中排除话题的候选。\n\n`TopicIdExpansion`(`topic_ids_filter.rs:109-515`)内置完整话题分类法 —— 如 `SPORTS` 展开为 NBA/NFL/MLB/足球各联赛等数十个子话题,`supertopic()` 反向把子话题归并到超话题。\n\n**NewUserTopicIdsFilter** —— `enable()`:`EnableNewUserTopicFiltering` 参数 + 有 `new_user_topic_ids` + 非话题请求。保留站内帖或命中新用户话题的候选(`new_user_topic_ids_filter.rs:10-30`),用于冷启动用户的兴趣聚焦。\n\n## 选后过滤(3 个)\n\n在 TopK 选择与选后水合之后运行(`phoenix_candidate_pipeline.rs:317-321`)。\n\n**VFFilter** —— 按可见性过滤结果剔除。`should_drop` 判定(`vf_filter.rs:22-30`):\n\n```rust\nfn should_drop(reason: &Option<FilteredReason>) -> bool {\n    match reason {\n        Some(FilteredReason::SafetyResult(r)) => matches!(r.action, Action::Drop(_)),\n        Some(_) => true,   // 其它任何 FilteredReason 一律丢弃\n        None => false,\n    }\n}\n```\n\n删除帖、垃圾、暴力血腥等由可见性过滤(Visibility Filtering)服务判定,结果挂在候选的 `visibility_reason` 上。\n\n**AncillaryVFFilter** —— 剔除 `drop_ancillary_posts == Some(true)` 的候选(`ancillary_vf_filter.rs:13-15`),即可见性服务标记需连带丢弃的附属帖。\n\n**DedupConversationFilter** —— 同一会话线程只保留得分最高的一条。会话 ID 取候选 `ancestors` 的最小值(无祖先则用 `tweet_id` 自身);遇到同会话更高分候选则替换,被替换者进 `removed`(`dedup_conversation_filter.rs:18-48`)。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 过滤分两道 | 打分前 + 选择后 | 打分前剔除不合格候选省下打分开销;可见性/会话去重依赖打分结果与选后水合,只能放后面 |\n| 顺序执行 | 过滤器串行 | 前序过滤缩小集合、塑造后序输入,且每个过滤器的统计独立可观测 |\n| 不真正删除 | `removed` 单独收集 | 被剔除候选用于 debug JSON、统计与日志归因 |\n| 已看去重三件套 | seen_ids / Bloom / impressed / served 多源 | 客户端能力不一,Bloom 压缩历史、impressed 兜底、served 防同会话重复服务 |\n| 话题展开 | 内置层级分类法 | 客户端只传顶层话题,服务端展开成细粒度子话题做精确匹配 |\n\n## FAQ\n\n**Q:为什么 `DropDuplicatesFilter` 和 `RetweetDeduplicationFilter` 都做去重?**\nA:前者按 `tweet_id` 去精确重复;后者按\"原帖 ID\"去重 —— 同一原帖的多个转发、以及原帖本身,只留一个。两者维度不同。\n\n**Q:`enable()` 返回 false 的过滤器会怎样?**\nA:框架在 `run_filters` 里 `filter(|f| f.enable(query))` 直接跳过,并在 tracing span 记录被禁用的组件名(见 [candidate-pipeline-framework](#candidate-pipeline-framework))。\n\n## 源码锚点\n\n- `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:274-289` —— 14 个预打分过滤器装配\n- `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:317-321` —— 3 个选后过滤器装配\n- `home-mixer/filters/topic_ids_filter.rs:109-515` —— `TopicIdExpansion` 话题分类法\n- `home-mixer/filters/author_socialgraph_filter.rs:28-57` —— 社交图六类剔除判定\n\n## 相关页面\n\n- [candidate-pipeline-framework](#candidate-pipeline-framework) —— `Filter` trait 与顺序执行模型\n- [home-mixer-orchestration](#home-mixer-orchestration) —— 过滤器在内层流水线中的装配位置\n- [scoring-and-ranking](#scoring-and-ranking) —— 过滤之后的打分阶段\n- [candidate-selection](#candidate-selection) —— 选后两道过滤所在的选择阶段\n- [visibility-and-shadowban](#visibility-and-shadowban) —— 限流与 shadowban:这些过滤器从\"压制创作者\"角度怎么解读\n- [system-architecture](#system-architecture) —— 过滤在十阶段流水线中的位置\n"}, "ads-blending": {"title": "广告混排", "type": "concept", "group": "在线服务(Rust)", "md": "# 广告混排\n\n## 这一页回答什么\n\n广告如何被插进 For You 信息流、插在哪、以及\"品牌安全\"如何约束广告与帖子的相邻关系。\n\n## 核心结论\n\n1. **广告混排发生在外层流水线的选择器**:`BlenderSelector` 按 `AdsBlenderType` 参数二选一广告 blender。\n2. **两种策略**:`SafeGapAdsBlender`(把广告塞进\"安全间隙\")与 `PartitionOrganicAdsBlender`(安全/不安全分桶 + 三元组插入)。\n3. **品牌安全是硬约束**:`BrandSafetyVerdict` 四档;广告不与高风险帖相邻,低容忍广告还会回避与之冲突的帖子(风险等级 / 作者 handle / 关键词)。\n4. **广告数量受限**:不足 5 条帖子不插广告;`PartitionOrganic` 下广告数 ≤ 安全帖数的一半。\n\n## 在哪里发生\n\n外层 [ForYouCandidatePipeline](#home-mixer-orchestration) 的 `BlenderSelector` 把 `FeedItem` 按类型分桶后,选一个 blender 混排帖子与广告(`home-mixer/selectors/blender_selector.rs:41-47`):\n\n```rust\nlet blender: &dyn AdsBlender = match query.params.get(AdsBlenderType).as_str() {\n    \"safe_gap\" => &self.safe_gap_blender,\n    _          => &self.partition_organic_blender,   // 默认\n};\nlet mut blended = blender.blend(posts, ads);\n```\n\n混排完再插入 Prompt、Who-to-Follow、PushToHome(见 [home-mixer-orchestration](#home-mixer-orchestration))。\n\n`AdsBlender` trait(`ads/mod.rs`)用模板方法:`blend()` 先记录帖子品牌安全裁定 / 广告风险统计,再调各实现的 `blend_inner()`。\n\n## 品牌安全裁定\n\n`BrandSafetyVerdict` 四档(`home-mixer/models/brand_safety.rs:5-12`):\n\n| 档位 | 值 | 含义 |\n|------|----|----|\n| `Unspecified` | 0 | 未裁定 |\n| `Safe` | 1 | 安全 |\n| `LowRisk` | 2 | 低风险 |\n| `MediumRisk` | 3 | 中风险(广告需回避) |\n\n`compute_verdict()`(`brand_safety.rs:39-62`)由安全标签推导:\n\n```mermaid\nflowchart TB\n    A[安全标签集合] --> B{含中风险标签?}\n    B -->|是| MR[MediumRisk]\n    B -->|否| C{被 Grok 打过分?<br/>GROK_SFA / GROK_NSFA_LIMITED}\n    C -->|否| MR\n    C -->|是| D{tweet_id ≥ PTOS 截止<br/>且无 PTOS_REVIEWED?}\n    D -->|是| MR\n    D -->|否| E{含低风险标签?}\n    E -->|是| LR[LowRisk]\n    E -->|否| SF[Safe]\n```\n\n`MEDIUM_RISK_LABELS` 14 个(NSFW/NSFA 各档、暴力血腥、`DO_NOT_AMPLIFY`、`PDNA`、`EGREGIOUS_NSFW` 等),`LOW_RISK_LABELS` 3 个。`worst_verdict()` 取两个裁定中较差者(枚举值大者)。\n\n图中 `tweet_id ≥ PTOS_CUTOFF_TWEET_ID`(一个固定常量 `2_054_275_414_225_846_272`)实为一个时间判断 —— X 的 tweet_id 是雪花 ID、随发布时间单调递增,所以\"id 大于某常量\"等价于\"在某时刻之后发布\";即截止点之后的新帖若未经 PTOS 复审(无 `PTOS_REVIEWED` 标签),保守地裁为 `MediumRisk`。\n\n`has_avoid(post)`(`home-mixer/ads/util.rs:25-27`)就是 `brand_safety_verdict() == MediumRisk` —— blender 据此判断一个帖子是否\"广告需回避\"。\n\n## 策略一:SafeGapAdsBlender\n\n把广告塞进\"安全间隙\"——间隙两侧的帖子都不是 MediumRisk。\n\n```mermaid\nflowchart LR\n    A[帖子序列] --> B[find_safe_gaps<br/>两侧都非中风险的间隙]\n    B --> C[compute_spacing<br/>从广告 insert_position 推间距]\n    C --> D[assign_ads_to_gaps<br/>按理想/最小间距择优]\n    D --> E[interleave_and_finalize]\n```\n\n- **`find_safe_gaps`**(`util.rs:29-42`):间隙 `g`(在 `posts[g-1]` 与 `posts[g]` 之间)安全的条件是两侧帖子都非 `MediumRisk`。\n- **`compute_spacing`**(`util.rs:44-65`):取前 4 条广告的 `insert_position` 差值最小值作为 `requested` 间距(≥ `MIN_REQUESTED_GAP=3`),否则用 `DEFAULT_SPACING {requested:3, min:2}`。\n- **`assign_ads_to_gaps`**(`safe_gap_blender.rs:33-70`):逐条广告找最接近\"理想位置\"且不违反最小间距的安全间隙(`find_best_gap` 用 `partition_point` 二分)。\n- 前置条件:广告非空且帖子数 ≥ `MIN_POSTS_FOR_ADS=5`,否则只返回帖子(`safe_gap_blender.rs:21-23`)。\n\n## 策略二:PartitionOrganicAdsBlender(默认)\n\n把帖子按品牌安全分桶,再以\"帖-广告-帖\"三元组插入。\n\n```mermaid\nflowchart TB\n    A[帖子序列] --> B[按 has_avoid 分桶]\n    B --> S[safe 安全帖]\n    B --> U[unsafe 中风险帖]\n    S --> C[actual_ads = min 广告数,间距期望,safe数/2]\n    C --> D[按 group_size 分组<br/>每组取 above/below 两条安全帖]\n    D --> E{品牌安全三查}\n    E -->|通过| F[组成 ad,above,below 三元组]\n    E -->|命中| G[丢弃该广告]\n    F --> H[三元组 + filler 帖交错<br/>截断 RESULT_SIZE]\n```\n\n关键步骤(`partition_organic_blender.rs:18-164`):\n\n1. **分桶**:`has_avoid` 为真进 `unsafe_posts`,否则进 `safe`。\n2. **限量**:`max_from_safe = safe_count / 2`;`actual_ads = min(广告数, 按间距估算的期望数, max_from_safe)` —— 广告最多占安全帖的一半。\n3. **分组取帖**:`group_size = num_safe / actual_ads`,每个广告在其组首取 `above`、`below` 两条安全帖夹着。\n4. **品牌安全三查**(命中任一则丢弃该广告):\n   - `should_drop_bsr_low` —— 低容忍广告(风险 `BsrLow`/`BsrIas`)若紧邻 `LowRisk` 帖则丢\n   - `should_drop_handle` —— 广告的 `ad_adjacency_control.handles` 含相邻帖作者\n   - `should_drop_keyword` —— 广告的 `keywords` 经分词匹配相邻帖正文\n5. **交错**:把 `(ad, above, below)` 三元组与剩余 filler 帖(其余安全帖 + 不安全帖,按分降序)交错排布。\n6. **收尾**:`truncate(RESULT_SIZE)`,若末尾是广告则弹出,重排 `position`。\n\n被丢弃的广告会记 `PartitionOrganic.enforcement` 指标(`action` 标签取 `drop`/`handle_drop`/`keyword_drop`,分别对应三类丢弃,`partition_organic_blender.rs:166-190`)。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 混排放选择器 | `BlenderSelector` 内做广告混排 | 帖子已排好序,混排是\"成品组装\"的一部分 |\n| 双策略 | safe_gap 与 partition_organic 由参数切换 | 可灰度对比两种混排哲学 |\n| 品牌安全四档 | 由安全标签 + Grok 评分 + PTOS 推导 | 未被 Grok 评分或 PTOS 未审的新帖默认 MediumRisk,保守优先 |\n| 广告数上限 | `≤ 安全帖数 / 2` | 防止广告过载,且保证每个广告都有安全帖夹着 |\n| 三类相邻丢弃 | 风险等级 / handle / 关键词 | 广告主可声明回避的内容,违反则宁可不投 |\n| 末尾去广告 | 截断后若末位是广告则弹出 | 信息流不以广告收尾 |\n\n## FAQ\n\n**Q:为什么帖子不足 5 条就不插广告?**\nA:`MIN_POSTS_FOR_ADS = 5`。内容太少时插广告会让广告占比过高、体验差,直接只返回帖子(两个 blender 都有此前置判断)。\n\n**Q:`should_drop_bsr_low` 为什么是\"广告低风险、帖子低风险\"才丢?**\nA:这里\"广告低风险\"指广告主设了**低容忍度**的相邻控制(`BsrLow`/`BsrIas`)。这类广告即使紧邻 `LowRisk`(而非 Safe)帖子也不能接受,故丢弃。容忍度高的广告不受此限。\n\n## 源码锚点\n\n- `home-mixer/ads/mod.rs:12-20` —— `AdsBlender` trait 模板方法\n- `home-mixer/ads/util.rs:25-65` —— `has_avoid`、`find_safe_gaps`、`compute_spacing`\n- `home-mixer/ads/util.rs:79-151` —— 三类品牌安全相邻丢弃判定\n- `home-mixer/ads/partition_organic_blender.rs:18-164` —— 默认混排策略\n- `home-mixer/models/brand_safety.rs:39-62` —— `compute_verdict` 裁定逻辑\n\n## 相关页面\n\n- [home-mixer-orchestration](#home-mixer-orchestration) —— `BlenderSelector` 与外层流水线\n- [filtering-pipeline](#filtering-pipeline) —— 帖子侧的可见性过滤(与品牌安全裁定不同)\n- [grox-classifiers](#grox-classifiers) —— 安全标签的上游产出方\n- [system-architecture](#system-architecture) —— 广告在整体数据流中的位置\n"}, "thunder-in-network-store": {"title": "Thunder 站内帖子内存库", "type": "concept", "group": "站内库(Thunder)", "md": "# Thunder 站内帖子内存库\n\n## 这一页回答什么\n\nX \"For You\" 信息流里\"关注的人发的帖\"这一路候选(in-network)从哪来。答案是 **Thunder** —— 一个用 Rust 写的进程内内存库,从 Kafka 实时消费帖子事件,把最近若干天的帖子按作者组织在内存里,对外用 gRPC 暴露一个查询:\"给我这批用户最近发的帖\"。它是 [候选流水线](#candidate-pipeline-framework) 内层 `ThunderSource` 背后的服务。\n\n这一页讲 **服务一侧**:内存数据结构、查询路径、时效打分、限流。实时摄入(Kafka 两个 listener、反序列化、保留期 trim)见 [thunder-kafka-ingestion](#thunder-kafka-ingestion);`PostStore` 结构体本身的字段与方法清单见 [post-store](#post-store)。\n\n## 核心结论\n\n1. **三套时间线 + 一份正文**:每个用户的帖子被拆进三个独立的 per-user 队列 —— 原创帖、回复/转发、视频帖;帖子正文只存一份(`posts: DashMap<i64, LightPost>`),三个队列里只放 `TinyPost`(id + 时间戳)引用。一条视频原创帖会同时出现在原创队列和视频队列。\n2. **按关注列表服务候选**:`get_in_network_posts` gRPC 收到 `(请求者 user_id, 关注的 user_ids, 排除的 tweet_ids)`,对每个被关注用户取其队列尾部(最新)若干条,做 light-doc 回查得到完整 `LightPost`,过滤已删除/已见,再合并。\n3. **按时效打分**:Thunder 不做 ML,排序逻辑只有一条 —— `score_recent`,按 `created_at` 降序取 top-K。真正的 ML 排序在下游 [Phoenix](#phoenix-ranking)。\n4. **全内存、亚毫秒**:数据结构是 `DashMap`(分片并发哈希表)+ `VecDeque`。查询走 `spawn_blocking` 进 CPU 线程池,不阻塞 tokio 异步运行时。\n5. **信号量硬限流**:gRPC 入口用 `try_acquire` 抢信号量许可,抢不到立即返回 `RESOURCE_EXHAUSTED`,不排队。\n6. **保留期内的滑动窗口**:只保留最近 `retention_seconds`(默认 2 天)的帖子,后台任务每 2 分钟 trim 一次过期帖。Thunder 因此是一个\"近期帖子的滑动窗口\",不是全量历史库。\n\n## Thunder 在系统中的位置\n\n```mermaid\nflowchart LR\n    KAFKA[(Kafka<br/>帖子事件流)] -->|tweet_events_listener_v2| TH\n    subgraph TH[Thunder 进程]\n        PS[PostStore<br/>内存库]\n        SVC[ThunderServiceImpl<br/>gRPC]\n        PS --- SVC\n    end\n    HM[home-mixer<br/>ThunderSource] -->|GetInNetworkPosts gRPC| SVC\n    SVC -->|关注者最近帖| HM\n    HM --> PIPE[PhoenixCandidatePipeline<br/>过滤 / 打分 / 选择]\n```\n\nThunder 在请求路径上,但只承担\"取站内候选\"这一步。它产出的帖子进入 [home-mixer](#home-mixer-orchestration) 流水线,与 [Phoenix 召回](#phoenix-retrieval)的站外候选合并后统一排序。\n\n## 进程启动:main.rs\n\n`thunder/main.rs:16-100` 的 `main()` 是整个服务的入口,顺序如下:\n\n```rust\n// thunder/main.rs:21-46(节选)\nlet post_store = Arc::new(PostStore::new(\n    args.post_retention_seconds,\n    args.request_timeout_ms,\n));\nlet strato_client = Arc::new(StratoClient::new());\nlet thunder_service = ThunderServiceImpl::new(\n    Arc::clone(&post_store),\n    Arc::clone(&strato_client),\n    args.max_concurrent_requests,\n);\nlet routes = Routes::new(thunder_service.server());\n```\n\n随后用 `xai_http_server::HttpServer` 把 gRPC routes 挂上,HTTP/gRPC 共用一个端口栈(`main.rs:49-60`)。关键的一段是 **Kafka catchup 门控**(`main.rs:67-90`):\n\n```rust\n// thunder/main.rs:67-93(节选)\nlet (tx, mut rx) = tokio::sync::mpsc::channel::<i64>(args.kafka_num_threads);\nkafka_utils::start_kafka(&args, post_store.clone(), \"\", tx).await?;\n\nif args.is_serving {\n    // Wait for Kafka catchup signal\n    let start = Instant::now();\n    for _ in 0..args.kafka_num_threads {\n        rx.recv().await;\n    }\n    info!(\"Kafka init took {:?}\", start.elapsed());\n\n    post_store.finalize_init().await?;\n\n    Arc::clone(&post_store).start_stats_logger();\n    Arc::clone(&post_store).start_auto_trim(2); // Run every 2 minutes\n}\nhttp_server.set_readiness(true);\n```\n\n含义:在 `is_serving` 模式下,服务**不会立刻就绪**。每个 Kafka 线程在追平历史 lag 后往 `tx` 发一个信号,`main` 收齐 `kafka_num_threads` 个信号才继续。这保证了一上线就有一份完整的近期帖子快照,而不是冷启动空库对外服务。`finalize_init` 之后才打开 readiness(`set_readiness(true)`)。catchup 信号怎么产生见 [thunder-kafka-ingestion](#thunder-kafka-ingestion)。\n\n## 三套内存时间线\n\n`PostStore`
