<script>
const PAGES={"how-it-works": {"title": "白话总览 —— For You 是怎么工作的", "type": "guide", "group": "白话导览(Guide)", "md": "# 白话总览 —— For You 是怎么工作的\n\n> 这是一页\"大白话\"。不放代码、不放公式,只讲清楚这套系统到底在干什么。\n> 想看技术细节,每节末尾都有链接通往对应的技术页。\n\n## 一句话\n\n你打开 X、看到 \"For You\" 信息流的那零点几秒里,这套系统从**全网海量帖子**里挑出**几十条**最可能让你感兴趣的,排好序递给你。\n\n## 最关键的一点:没有人写\"规则\"\n\n老式推荐系统靠人工规则:\"带图的排前面\"\"粉丝多的加权\"……这套系统几乎把这些规则**全删了**。\n\n取而代之的是一个 AI 模型(基于 X 自家的 Grok 改造)。它看你**最近的行为** —— 你点了什么赞、回复了谁、转发了什么、在哪条帖子上停留了很久 —— 然后自己学出\"你大概会喜欢什么\"。\n\n> 打个比方:不是给你配一本《用户偏好说明书》,而是配一个**观察力极强的朋友**,他盯着你最近刷手机的样子,就知道下一条该给你看什么。\n\n## 一条帖子怎么走进你的 For You\n\n```mermaid\nflowchart TB\n    A[\"① 凑一批候选<br/>关注的人发的 + 全网海选的\"] --> B[\"② 补全资料<br/>查正文 / 作者 / 有没有视频\"]\n    B --> C[\"③ 筛掉不该看的<br/>拉黑的 / 看过的 / 太旧的\"]\n    C --> D[\"④ AI 打分排序<br/>预测你会点赞还是划走\"]\n    D --> E[\"⑤ 挑高分的 + 插广告<br/>递给你\"]\n```\n\n### ① 凑候选 —— 先把\"可能的帖子\"捞进来\n\n系统先凑一大批\"候选帖子\",来自**两个篮子**:\n\n- **你关注的人刚发的**(站内)—— 由一个叫 [Thunder](#thunder-in-network-store) 的\"速记本\"提供,它把全网最近两天的帖子都记在内存里,你关注谁、谁发了什么,它瞬间能答。\n- **你没关注、但可能喜欢的**(站外)—— 由 [Phoenix 召回](#phoenix-retrieval)从全网\"海选\"出来。这就是你为什么会刷到陌生人的帖子。\n\n### ② 补资料 —— 候选这时只是一串号码\n\n捞上来的候选其实只有个帖子编号,什么都不知道。这一步去把正文、作者是谁、有没有视频、安不安全等等**查全**。技术上叫\"水合\"(hydration),想象成给一张白卡片填上信息。\n\n### ③ 筛掉不该看的\n\n把明显不该给你看的踢掉:你拉黑/静音的人、你已经看过的、太旧的、命中你屏蔽词的、你看不到的付费内容……详见 [过滤流水线](#filtering-pipeline)。\n\n### ④ 打分排序 —— 系统的大脑\n\n留下的每条候选,交给 [Phoenix 排序模型](#phoenix-ranking)(那个 Grok 改的 AI)。它不是只打一个\"喜欢分\",而是**同时预测你对这条帖子会做很多种动作**:点赞的概率?回复的概率?转发?默默划走?甚至举报?\n\n然后把这些概率**加权加起来**算总分 —— 正面动作(点赞、转发)加分,负面动作(举报、拉黑)减分。详见 [打分与排序](#scoring-and-ranking)。\n\n### ⑤ 选 + 混广告\n\n按总分从高到低,挑出几十条。再把广告插进合适的\"空隙\"(不会紧挨着不安全的内容),最后递给你。详见 [广告混排](#ads-blending)。\n\n## 为什么要分\"召回\"和\"排序\"两步\n\n全网每时每刻有海量新帖子。让 AI 大模型给**每一条**都精算一遍?算不过来,也太贵。\n\n所以分两步:\n\n| 步骤 | 干什么 | 像什么 |\n|------|--------|--------|\n| **召回** | 用\"便宜\"的方法,从几百万条里粗粗筛出几百条 | 招聘海选:几千份简历快速过一遍,挑出几十份 |\n| **排序** | 用\"贵\"的 AI 模型,给这几百条精细打分 | 面试:对挑出来的几十人认真考察、排名 |\n\n先粗筛、再精选 —— 这是几乎所有大型推荐系统的标准套路。\n\n## 一个聪明的小设计:每条帖子单独判分\n\n排序时,虽然几百条候选是一起喂进 AI 的,但系统用了个特殊技巧,让**每条候选互相\"看不见\"对方**。\n\n> 像考试单独判卷:你的卷子得几分,只取决于你自己答得怎样,不受同考场其他人影响。\n\n好处:同一条帖子,不管和哪些帖子放在一起,算出来的分都一样 —— 稳定、还能缓存复用。详见 [候选隔离](#candidate-isolation-masking)。\n\n## 还有一个\"幕后\"系统:Grox\n\n上面讲的是你点开 App 那一刻发生的事。还有一个叫 [Grox](#grox-architecture) 的系统在**后台默默干活** —— 它不停地分析新帖子:这条是不是垃圾?安不安全?质量高不高?把这些\"标签\"提前贴好,等你刷信息流时直接用。\n\n> 像超市的后厨和验货区:你在货架前挑东西(刷信息流)时,验货、贴价签早就在后台做完了。\n\n## 想再深入?\n\n- 系统全貌(技术版):[system-architecture](#system-architecture)\n- 五大组件分别是干嘛的(还是白话):[the-five-components](#the-five-components)\n- 看不懂某个词:[glossary](#glossary)\n- 具体疑问:[faq](#faq)\n\n## 出处\n\n本页是对技术页的白话综合,不引入技术页之外的新结论。核心结论的依据如下(精确行号见对应技术页的「源码锚点」):\n\n| 核心结论 | 技术页 | 主要源码 |\n|----------|--------|----------|\n| 候选来自站内 + 站外两路 | [system-architecture](#system-architecture) | `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:250-257` |\n| 几乎删除人工特征 / 规则,靠模型从行为学习 | [system-architecture](#system-architecture) | `README.md:55,325` |\n| 五阶段流水线(召回→水合→过滤→打分→选择) | [candidate-pipeline](#candidate-pipeline) | `candidate-pipeline/candidate_pipeline.rs:88-137` |\n| 先召回(粗筛)后排序(精排)两阶段 | [phoenix-retrieval](#phoenix-retrieval)、[phoenix-ranking](#phoenix-ranking) | `phoenix/README.md` |\n| 排序模型预测多种互动概率,再加权求和 | [scoring-and-ranking](#scoring-and-ranking) | `home-mixer/scorers/ranking_scorer.rs:125-239` |\n| 候选隔离:每条候选单独打分、互不影响 | [candidate-isolation-masking](#candidate-isolation-masking) | `phoenix/grok.py:39-71` |\n| 广告插在品牌安全的\"空隙\",不挨着风险内容 | [ads-blending](#ads-blending) | `home-mixer/ads/safe_gap_blender.rs`、`partition_organic_blender.rs` |\n| Grox 在后台产出安全 / 质量标签 | [grox-architecture](#grox-architecture) | `grox/plans/plan_master.py`、`grox/engine.py` |\n\n## 相关页面\n\n- [the-five-components](#the-five-components) —— 五大组件白话速览\n- [how-posts-are-picked](#how-posts-are-picked) —— 选帖收尾过程的白话版\n- [operating-myths](#operating-myths) —— 运营迷思 vs 源码真相:九个流行说法逐条对源码\n- [posting-guide](#posting-guide) —— 发帖指南:从算法机制反推发帖技巧\n- [visibility-and-shadowban](#visibility-and-shadowban) —— 限流与 shadowban:算法里到底有哪些\"不展示你\"的机制\n- [your-data](#your-data) —— 算法到底用了你的哪些数据\n- [end-to-end-dataflow](#end-to-end-dataflow) —— 端到端数据流:一条帖子从发布到被推荐\n- [glossary](#glossary) —— 术语速查表\n- [faq](#faq) —— 常见疑问\n- [system-architecture](#system-architecture) —— 技术版系统架构总览\n"}, "the-five-components": {"title": "白话 —— 五大组件速览", "type": "guide", "group": "白话导览(Guide)", "md": "# 白话 —— 五大组件速览\n\n> 这套系统由五个部分组成。这一页用大白话说清**每个是干嘛的、为什么需要它**。\n> 想看技术细节,跟着每节的链接走。\n\n## 一张表先看全\n\n| 组件 | 一句话 | 类比 |\n|------|--------|------|\n| **home-mixer** | 总指挥,把所有步骤串起来 | 厨房总管 |\n| **candidate-pipeline** | 流水线的标准模板 | 菜谱的固定格式 |\n| **Thunder** | 站内帖子的速记本 | 随身记事本 |\n| **Phoenix** | AI 大脑:海选 + 精排 | 招聘的 HR + 面试官 |\n| **Grox** | 后台的安检与贴标签 | 超市验货区 |\n\n```mermaid\nflowchart TB\n    REQ([你打开 For You]) --> HM\n    HM[\"home-mixer 总指挥\"] -->|按模板执行| CP[\"candidate-pipeline 模板\"]\n    HM -->|要站内帖| TH[\"Thunder 速记本\"]\n    HM -->|要站外帖 + 打分| PH[\"Phoenix AI 大脑\"]\n    GROX[\"Grox 后台安检\"] -.提前贴好标签.-> TH\n    GROX -.-> PH\n    HM --> FEED([排好的信息流])\n```\n\n---\n\n## 1. home-mixer —— 总指挥\n\n**定位**:整个 For You 流程的\"总指挥\",对外提供\"给我一份 For You\"的接口。\n\n你点开 App,请求先到 home-mixer。它负责**按顺序把活派下去**:让 Thunder 出站内帖、让 Phoenix 海选站外帖、安排补资料、过滤、打分、最后插广告递出去。它自己不\"干苦活\",只负责调度。\n\n> 像餐厅的厨房总管:不亲自炒菜,但喊\"备料组上!\"\"炒锅组上!\"\"摆盘!\" —— 保证一道菜按流程走完。\n\n技术版:[home-mixer-orchestration](#home-mixer-orchestration)\n\n---\n\n## 2. candidate-pipeline —— 流水线的标准模板\n\n**定位**:一套可复用的\"流水线模板\",规定推荐流程长什么样。\n\n它本身**不知道**什么是帖子、什么是广告。它只定义一套骨架:一条推荐流水线分哪些阶段(出候选 → 补资料 → 过滤 → 打分 → 选择 → 收尾)、哪些阶段能同时做、哪些必须排队做。home-mixer 就是往这个模板的每个阶段里\"填空\"。\n\n> 像一张标准菜谱格式:\"备料 → 主料处理 → 调味 → 装盘\"。格式是固定的,具体填\"番茄\"还是\"鸡蛋\"由厨师定。\n\n为什么单独抽出来?因为系统里不止一条流水线(主信息流、广告混排各一条),用同一个模板省去重复、不容易出错。\n\n技术版:[candidate-pipeline-framework](#candidate-pipeline-framework)、[candidate-pipeline](#candidate-pipeline)\n\n---\n\n## 3. Thunder —— 站内帖子的速记本\n\n**定位**:一个全内存的小型库,专门快速回答\"我关注的这些人,最近发了什么\"。\n\n它从 X 的实时数据流里不停接收新帖子,把**全网最近约两天**的帖子按作者记在内存里。你关注了几百上千人,它能在**一毫秒内**把这些人的近期帖子全捞出来 —— 不查数据库,因为查库太慢。\n\n> 像一本随身速记本:常用的、最近的信息记在手边,翻一下就有,不用每次跑去档案室。\n\n它只保证\"新\",不做相关性排序 —— 那是 Phoenix 的活。超过保留期的旧帖会被自动清掉。\n\n技术版:[thunder-in-network-store](#thunder-in-network-store)、[thunder-kafka-ingestion](#thunder-kafka-ingestion)、[post-store](#post-store)\n\n---\n\n## 4. Phoenix —— AI 大脑\n\n**定位**:这套系统的\"智能\"所在,基于 X 的 Grok 模型。它干**两件事**:\n\n- **召回**:从全网几百万条帖子里,海选出几百条你可能感兴趣的(包括你没关注的人)。用的是\"双塔\"办法 —— 把\"你\"和\"每条帖子\"各自压成一串数字,谁和你最接近就选谁。\n- **排序**:对召回来的候选精细打分,预测你会点赞、回复、转发、还是划走、举报。\n\n> 像招聘:召回是 HR 海选简历(快、粗),排序是面试官逐个深谈打分(慢、准)。\n\n它的核心是一个移植自 Grok 的 transformer 模型 —— 你可以理解成\"和 ChatGPT 同源的那种 AI\",只不过这里不是用来聊天,而是用来读懂你的兴趣。\n\n技术版:[phoenix-retrieval](#phoenix-retrieval)、[phoenix-ranking](#phoenix-ranking)、[grok-transformer](#grok-transformer)、[recsys-model](#recsys-model)、[recsys-retrieval-model](#recsys-retrieval-model)\n\n---\n\n## 5. Grox —— 后台的安检与贴标签\n\n**定位**:一个**不在你请求路径上**的后台服务。它默默地理解每一条新帖子。\n\n它用视觉语言模型(能同时看文字和图片的 AI)给帖子做判断:这是不是垃圾评论?有没有不安全内容?质量高不高(是不是\"banger\")?并把帖子转成一串数字(嵌入),供召回用。\n\n这些活为什么不在你点开 App 时做?因为太慢。所以提前在后台做好,把\"标签\"存起来,你刷信息流时直接取用。\n\n> 像超市:你在货架前挑东西时,验货、贴价签、分类上架早在后台做完了。\n\n技术版:[grox-architecture](#grox-architecture)、[grox-classifiers](#grox-classifiers)、[multimodal-embedders](#multimodal-embedders)\n\n---\n\n## 它们怎么配合(一句话串起来)\n\n你点开 For You → **home-mixer** 按 **candidate-pipeline** 模板执行 → 找 **Thunder** 要站内帖、找 **Phoenix** 海选站外帖并打分 → 而 **Grox** 早已在后台把每条帖子的安全/质量标签备好 → 最后 home-mixer 选高分的、插广告,递给你。\n\n## 出处\n\n每个组件的关键源码如下(精确行号、结构体 / 函数名见对应技术页的「源码锚点」):\n\n| 组件 | 技术页 | 关键源码 |\n|------|--------|----------|\n| home-mixer | [home-mixer-orchestration](#home-mixer-orchestration) | `home-mixer/server.rs`、`home-mixer/main.rs` |\n| candidate-pipeline | [candidate-pipeline-framework](#candidate-pipeline-framework)、[candidate-pipeline](#candidate-pipeline) | `candidate-pipeline/candidate_pipeline.rs`、`candidate-pipeline/lib.rs` |\n| Thunder | [thunder-in-network-store](#thunder-in-network-store)、[post-store](#post-store) | `thunder/posts/post_store.rs`、`thunder/thunder_service.rs` |\n| Phoenix | [phoenix-retrieval](#phoenix-retrieval)、[phoenix-ranking](#phoenix-ranking)、[grok-transformer](#grok-transformer) | `phoenix/recsys_retrieval_model.py`、`phoenix/recsys_model.py`、`phoenix/grok.py` |\n| Grox | [grox-architecture](#grox-architecture) | `grox/engine.py`、`grox/dispatcher.py`、`grox/plans/plan_master.py` |\n\n## 相关页面\n\n- [how-it-works](#how-it-works) —— 端到端白话总览\n- [how-posts-are-picked](#how-posts-are-picked) —— 白话:帖子是怎么被选中的\n- [operating-myths](#operating-myths) —— 运营迷思 vs 源码真相:逐条对源码行号\n- [posting-guide](#posting-guide) —— 发帖指南:从算法机制反推发帖技巧\n- [end-to-end-dataflow](#end-to-end-dataflow) —— 端到端数据流:五大组件串起来,一条帖子从发布到被推荐\n- [glossary](#glossary) —— 术语速查表\n- [faq](#faq) —— 常见疑问\n- [system-architecture](#system-architecture) —— 技术版系统架构\n"}, "glossary": {"title": "术语速查表", "type": "guide", "group": "白话导览(Guide)", "md": "# 术语速查表\n\n> 看技术页时遇到不懂的词,查这里。每个词一句大白话,需要深入就点\"详见\"。\n\n## 推荐流程类\n\n| 术语 | 大白话 | 详见 |\n|------|--------|------|\n| **召回**(retrieval) | 第一步粗筛:从全网几百万条里快速挑出几百条候选。求快不求精。 | [phoenix-retrieval](#phoenix-retrieval) |\n| **排序**(ranking) | 第二步精选:给召回来的几百条候选认真打分、排名次。 | [phoenix-ranking](#phoenix-ranking) |\n| **候选**(candidate) | 一条\"可能会展示给你\"的帖子。还没定下来,要经过过滤和打分。 | [home-mixer-orchestration](#home-mixer-orchestration) |\n| **站内 / 站外** | 站内 = 你关注的人发的;站外 = 你没关注但系统觉得你可能喜欢的。 | [thunder-in-network-store](#thunder-in-network-store) |\n| **两阶段** | \"先召回再排序\"这套路。因为帖子太多,不能每条都精算。 | [system-architecture](#system-architecture) |\n| **水合**(hydration) | 给只有编号的候选\"填资料\":查正文、作者、媒体等。 | [home-mixer-orchestration](#home-mixer-orchestration) |\n| **过滤器**(filter) | 把不该给你看的候选踢掉的一道道关卡(拉黑、看过、太旧…)。 | [filtering-pipeline](#filtering-pipeline) |\n| **流水线**(pipeline) | 把\"召回→水合→过滤→打分→选择\"这串步骤串起来的标准流程。 | [candidate-pipeline-framework](#candidate-pipeline-framework) |\n\n## 打分类\n\n| 术语 | 大白话 | 详见 |\n|------|--------|------|\n| **多行为预测** | 模型不只猜\"你喜不喜欢\",而是同时猜你会点赞、回复、转发、划走、举报…各自的概率。 | [phoenix-ranking](#phoenix-ranking) |\n| **加权打分** | 把各种行为概率乘上权重再加起来,得一个总分。点赞加分,举报减分。 | [scoring-and-ranking](#scoring-and-ranking) |\n| **负反馈** | 你的\"不喜欢\"信号 —— 点不感兴趣、拉黑、举报、快速划走。会拉低帖子的分。 | [scoring-and-ranking](#scoring-and-ranking) |\n| **作者多样性** | 同一个作者的帖子在你信息流里出现越多次,后面的越降分,防刷屏。 | [scoring-and-ranking](#scoring-and-ranking) |\n| **OON 降权** | OON = Out-Of-Network(站外)。站外帖子的分会乘一个小于 1 的系数,略微让步给站内。 | [scoring-and-ranking](#scoring-and-ranking) |\n| **候选隔离** | 打分时让每条候选互相\"看不见\",保证一条帖子的分只取决于它自己,稳定可缓存。 | [candidate-isolation-masking](#candidate-isolation-masking) |\n\n## 模型与 AI 类\n\n| 术语 | 大白话 | 详见 |\n|------|--------|------|\n| **Grok** | xAI 自家的大模型。这套推荐系统的核心模型就是从 Grok 改造来的。 | [grok-transformer](#grok-transformer) |\n| **transformer** | 一种 AI 模型结构,和 ChatGPT 同源。这里用来\"读懂\"你的兴趣序列。 | [grok-transformer](#grok-transformer) |\n| **双塔模型** | 召回用的办法:一座\"塔\"把你压成一串数字,另一座塔把每条帖子压成数字,比谁最接近。 | [phoenix-retrieval](#phoenix-retrieval) |\n| **嵌入**(embedding) | 把一个东西(用户、帖子、词)变成一串数字,方便计算机比较\"像不像\"。 | [hash-based-embeddings](#hash-based-embeddings) |\n| **哈希嵌入** | 用户/帖子数量太多,用哈希把它们的编号塞进固定大小的\"格子\"再取嵌入。 | [hash-based-embeddings](#hash-based-embeddings) |\n| **互动序列** | 你最近一连串的操作记录(点了什么赞、回了谁…),是模型判断你兴趣的主要依据。 | [phoenix-ranking](#phoenix-ranking) |\n| **注意力 / attention** | transformer 内部的机制:让模型决定\"看你的历史时,重点看哪几条\"。 | [grok-transformer](#grok-transformer) |\n| **MoE** | Mixture-of-Experts,完整 Grok 用的\"多专家\"结构。本开源版**没有**用,是简化版。 | [grok-transformer](#grok-transformer) |\n\n## 内容理解与广告类\n\n| 术语 | 大白话 | 详见 |\n|------|--------|------|\n| **VLM** | 视觉语言模型 —— 能同时看文字和图片的 AI。Grox 的分类器都用它。 | [grox-classifiers](#grox-classifiers) |\n| **PTOS** | 一套内容安全策略。Grox 用 AI 判断帖子有没有违反(暴力、成人、仇恨等类别)。 | [grox-classifiers](#grox-classifiers) |\n| **banger** | \"爆款潜质\"。Grox 给帖子打一个质量分,判断它是不是高质量内容。 | [grox-classifiers](#grox-classifiers) |\n| **多模态嵌入** | 把帖子的文字 + 图片 + 视频一起转成一串数字。 | [multimodal-embedders](#multimodal-embedders) |\n| **品牌安全** | 判断一条帖子\"广告主敢不敢挨着它投广告\"。分安全/低风险/中风险几档。 | [ads-blending](#ads-blending) |\n| **广告混排** | 把广告插进排好序的帖子流里,且避开不安全的\"邻居\"。 | [ads-blending](#ads-blending) |\n\n## 工程基础设施类\n\n| 术语 | 大白话 | 详见 |\n|------|--------|------|\n| **gRPC** | 服务之间互相调用的一种通信方式。home-mixer、Thunder 都靠它对外提供接口。 | [home-mixer-orchestration](#home-mixer-orchestration) |\n| **Kafka** | 一条\"消息流水线\"。新帖子事件源源不断从 Kafka 流出,Thunder、Grox 在它下游接收。 | [thunder-kafka-ingestion](#thunder-kafka-ingestion) |\n| **保留期**(retention) | Thunder 只在内存里留最近一段时间(约两天)的帖子,过期自动清掉。 | [thunder-kafka-ingestion](#thunder-kafka-ingestion) |\n| **side effect** | 流水线的\"收尾杂活\":写缓存、发日志等。不影响给你的结果,在后台做。 | [candidate-pipeline-framework](#candidate-pipeline-framework) |\n\n## 出处\n\n本表术语提炼自各技术页,不引入新定义。**每条「详见」的技术页都附 `文件:行号` 源码锚点** —— 顺着「详见」即可一路追到源码。术语的精确语义以技术页与源码为准。\n\n## 相关页面\n\n- [how-it-works](#how-it-works) —— 端到端白话总览\n- [the-five-components](#the-five-components) —— 五大组件速览\n- [operating-myths](#operating-myths) —— 运营迷思 vs 源码真相:逐条对源码行号\n- [posting-guide](#posting-guide) —— 发帖指南:从算法机制反推发帖技巧\n- [faq](#faq) —— 常见疑问\n- [system-architecture](#system-architecture) —— 技术版系统架构\n"}, "faq": {"title": "常见疑问 FAQ", "type": "guide", "group": "白话导览(Guide)", "md": "# 常见疑问 FAQ\n\n> 读者最常问的问题,用大白话回答。每条答案都依据技术页,关键处链接到对应技术页 —— 顺链接即可追到源码。\n\n## 关于推荐结果\n\n**Q:为什么我会刷到没关注的人的帖子?**\n因为 For You 不只给你看关注的人。系统有一路叫[站外召回](#phoenix-retrieval)的机制,会从全网帖子里\"海选\"出它觉得你可能感兴趣的 —— 哪怕你没关注那个人。这正是 For You 和 Following 的核心区别。\n\n**Q:系统到底怎么知道我喜欢什么?**\n主要看你**最近的行为**:点了什么赞、回复了谁、转发/引用了什么、在哪条帖子上停留了很久。这串\"互动序列\"喂给 AI 模型,模型据此判断你的兴趣。它**不靠**你填的兴趣标签。详见 [phoenix-ranking](#phoenix-ranking)。\n\n**Q:关注的人发的帖,一定会出现在我的 For You 里吗?**\n不一定。站内帖也要和站外帖**一起排序竞争**,分不够高也可能排不进来。不过站内帖有优势:它不会被\"站外降权\"打折(站外帖的分会乘一个小于 1 的系数)。想全看关注的人,用 Following 标签。详见 [scoring-and-ranking](#scoring-and-ranking)。\n\n**Q:为什么有时刷到挺旧的帖子?**\n一般不会太旧 —— 有一道\"时效过滤\"会把超过阈值的旧帖踢掉,站内库 [Thunder](#thunder-in-network-store) 也只保留最近约两天的帖子。站外召回的帖子可能稍旧一点,但仍在系统设定的范围内。详见 [filtering-pipeline](#filtering-pipeline)。\n\n**Q:系统会不会把我困在\"信息茧房\"里?**\n系统里有两个相关设计:一是[作者多样性衰减](#scoring-and-ranking) —— 同一个作者的帖子在你这次信息流里出现越多,后面的越降分,防止一个人刷屏;二是站外召回本身就会带来你没主动关注的内容。但这套系统的目标是\"你会感兴趣\",多样性是约束、不是首要目标。\n\n## 关于你的信号\n\n**Q:点\"不感兴趣\"有用吗?**\n有用。系统的 AI 会预测你对一条帖子做各种动作的概率,其中包括\"点不感兴趣\"\"拉黑\"\"举报\"这些**负面动作**。负面动作在算总分时是**负权重** —— 也就是说,模型一旦觉得某帖你可能会\"不感兴趣\",这条以及类似的帖子分数都会被压低。详见 [scoring-and-ranking](#scoring-and-ranking)。\n\n**Q:有人恶意刷我帖子的\"不感兴趣\",会害到我吗?**\n靠这份开源代码,基本不会。关键区别:打分用的\"不感兴趣\"是**模型对每个浏览者现算的预测**(\"模型觉得**这个人**会不会点不感兴趣\"),**不是**\"这条帖被点了多少次\"的计数 —— 打分器 `RankingScorer` 里没有\"按某帖的负反馈次数扣它分\"这条路径(举报、拉黑同理)。所以别人刷你的\"不感兴趣\",改变不了你的帖给**第三方**看时的分:那只取决于第三方自己的兴趣历史。每次\"不感兴趣\"最直接的作用,是调整**点的人自己**之后的 feed。**边界**:模型是离线训练的,持续的协同刷量理论上会进训练信号,但训练管线、平台对刷量的处理都不在开源仓库里,这一层无法定论。详见 [scoring-and-ranking](#scoring-and-ranking)。\n\n**Q:我划走、不点赞,系统知道吗?**\n知道。\"停留时间\"(在一条帖子上停了多久)、\"是否没停留就划走\"都是模型的输入信号,也是它要预测的目标之一。你不需要点任何按钮,刷的动作本身就是信号。详见 [phoenix-ranking](#phoenix-ranking)。\n\n**Q:拉黑或静音一个人,会怎样?**\n他的内容会被**直接过滤掉** —— 不只是他自己发的帖,还包括他转发的、引用他的帖子,都不会进你的信息流。这一步在打分之前就做了。详见 [filtering-pipeline](#filtering-pipeline)。\n\n**Q:举报一个帖子,系统会压制它吗?**\n两条路径:一是排序模型会预测每个浏览者的\"举报概率\"并给它负权重 —— 这同样是**模型的预测**,不是\"被举报多少次\"的计数;二是后台的 [Grox](#grox-classifiers) 有独立的内容安全审查。所以单次、甚至刷量的举报,都不会直接变成对一条帖的实时扣分 —— 举报是模型训练与安全审查的输入信号之一,不是一个计数器。\n\n## 关于广告与安全\n\n**Q:广告是怎么插进我的信息流的?**\n帖子排好序之后,系统在帖子之间的\"空隙\"里插广告。规则上有讲究:广告数量有上限,而且会避开\"不安全的邻居\" —— 不会让广告紧挨着风险内容,以保护广告主的品牌安全。详见 [ads-blending](#ads-blending)。\n\n**Q:谁来判断内容\"安不安全\"?**\n后台的 [Grox](#grox-classifiers) 服务。它用能看图文的 AI(视觉语言模型)给帖子判类别:垃圾评论、暴力、成人内容、仇恨言论等。判好的标签提前存起来,供过滤和广告混排使用。\n\n## 关于这个开源项目\n\n**Q:这就是 X 线上跑的真实代码吗?**\n是 `xai-org/x-algorithm` 的开源版,代表性很强,但是**简化快照**:比如公开的模型更小、去掉了完整 Grok 的 MoE(多专家)结构、是某个时间点的冻结版本。架构和线上一致,具体规模和优化有删减。详见 [grok-transformer](#grok-transformer)。\n\n**Q:我想自己跑一下,可以吗?**\nML 部分(Phoenix)可以 —— 仓库带一个端到端推理脚本和一个迷你模型,能在示例语料上跑通\"召回 → 排序\"。但在线服务(home-mixer、Thunder、Grox)依赖大量 X 内部基础设施,无法独立运行,主要供阅读架构。详见 [run-pipeline](#run-pipeline)。\n\n**Q:这套系统最特别的地方是什么?**\n\"几乎没有人工规则\"。老式推荐系统靠人写一条条规则,这套系统几乎全删了,改由一个 Grok 改造的 AI 模型从你的行为里直接学。详见 [how-it-works](#how-it-works)。\n\n## 出处\n\n每条答案只复述技术页中已核验的结论,不引入技术页之外的新说法。答案正文已用「详见」或内联链接标注依据,顺链接进入技术页即可看到 `文件:行号` 源码锚点。本页主要依据:[scoring-and-ranking](#scoring-and-ranking)、[filtering-pipeline](#filtering-pipeline)、[phoenix-retrieval](#phoenix-retrieval)、[ads-blending](#ads-blending)、[grox-classifiers](#grox-classifiers)。\n\n## 相关页面\n\n- [how-it-works](#how-it-works) —— 端到端白话总览\n- [the-five-components](#the-five-components) —— 五大组件速览\n- [how-posts-are-picked](#how-posts-are-picked) —— 白话:帖子是怎么被选中的\n- [operating-myths](#operating-myths) —— 运营迷思 vs 源码真相:逐条对源码行号\n- [posting-guide](#posting-guide) —— 发帖指南:从算法机制反推发帖技巧\n- [visibility-and-shadowban](#visibility-and-shadowban) —— 限流与 shadowban:民间说法逐条对源码对质\n- [your-data](#your-data) —— 算法到底用了你的哪些数据\n- [open-source-vs-production](#open-source-vs-production) —— 开源版 vs 线上真实算法:已知差异清单\n- [glossary](#glossary) —— 术语速查表\n- [system-architecture](#system-architecture) —— 技术版系统架构\n"}, "how-posts-are-picked": {"title": "白话 —— 帖子是怎么被选中的", "type": "guide", "group": "白话导览(Guide)", "md": "# 白话 —— 帖子是怎么被选中的\n\n> 接着 [how-it-works](#how-it-works) 的第 ④ 步往下讲:每条候选都打完分了,然后呢?\n> 系统怎么从一大堆带分的候选里,定下最终递给你的那几十条。零代码 —— 想看技术细节走 [candidate-selection](#candidate-selection)。\n\n## 一句话\n\n打完分之后,系统**按分排好队、圈出靠前的一批,再做几道收尾筛查和编排**,才定下你看到的信息流。\n\n## 把它想成一场选秀的收尾\n\n前面 [召回 + 打分](#how-it-works) 相当于海选和评委打分。打完分,进入收尾环节:\n\n```mermaid\nflowchart TB\n    A[\"所有候选都有分了\"] --> B[\"① 排座次,圈入围<br/>(圈的比最终名额多一点)\"]\n    B --> C[\"② 给入围的做背景调查\"]\n    C --> D[\"③ 终审淘汰\"]\n    D --> E[\"④ 砍到最终名额\"]\n    E --> F[\"⑤ 编排上桌:帖子 + 广告 + 模块\"]\n    F --> G([你看到的信息流])\n```\n\n## ① 排座次,圈入围\n\n把所有候选**按最终分从高到低排队**,圈出靠前的一批。\n\n关键细节:**圈的比最终名额多一点**。比如最终要给你 20 条,这一步可能先圈 30 条。\n\n> 为什么多圈?因为后面还有淘汰。先留点余量,免得淘汰完不够数。\n\n## ② 给入围的做\"背景调查\"\n\n对圈中的这批候选,系统才去查那些**\"贵\"的信息**:这条帖子现在还可见吗(没被删、没被判违规)?广告主敢不敢挨着它投广告?\n\n> 为什么只对入围的查?查这些既慢又费资源。对那些根本没圈进来的候选查了也是白查 —— 所以放到圈定之后,只查这一小批。\n\n## ③ 终审淘汰\n\n背景调查完,有些候选**虽然分高,但出了问题**,直接淘汰:\n\n- 帖子已经被删除、或被判定不该展示;\n- 它和某条已经入选的帖子,是**同一条对话串里的重复内容**(同一个讨论,留一条就够)。\n\n## ④ 砍到最终名额\n\n淘汰之后,再从高分往下**砍到最终条数**。\n\n这就回答了第 ① 步的伏笔 —— 因为先多圈了一些,淘汰几个之后,剩下的还够铺满你的信息流。\n\n## ⑤ 编排上桌\n\n最后一步,把选定的帖子和**广告、\"推荐关注\"模块、提示卡**等编排在一起,排成你刷到的样子。广告怎么找位置插进去,见 [广告混排](#ads-blending)。\n\n## 落选的候选去哪了?\n\n不会凭空消失。系统留了一份\"落选名单\"(技术上叫 `non_selected`)—— 不展示给你,但会留作记录和分析。\n\n## 一句话回顾\n\n排座次 → 圈入围(略多)→ 背景调查 → 终审淘汰 → 砍到名额 → 编排上桌。这一串就是\"选帖过程\"。\n\n## 出处\n\n本页是对技术页的白话综合,不引入新结论。核心结论的依据(精确行号见对应技术页的「源码锚点」):\n\n| 核心结论 | 技术页 | 主要源码 |\n|----------|--------|----------|\n| 选择 = 按分排序 + 截断 | [candidate-selection](#candidate-selection) | `candidate-pipeline/selector.rs:21-85` |\n| 内层按最终分取 top-K | [candidate-selection](#candidate-selection) | `home-mixer/selectors/top_k_score_selector.rs:8-15` |\n| 先圈较多、选后过滤后再砍到最终条数 | [candidate-selection](#candidate-selection) | `candidate-pipeline/candidate_pipeline.rs:102-119` |\n| \"背景调查 / 终审\"只对入选候选做 | [filtering-pipeline](#filtering-pipeline) | `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:304-321` |\n| 编排上桌:帖子与广告 / 模块组装 | [ads-blending](#ads-blending) | `home-mixer/selectors/blender_selector.rs:24-75` |\n\n## 相关页面\n\n- [candidate-selection](#candidate-selection) —— 本页的技术版:选择阶段完整细节\n- [how-it-works](#how-it-works) —— 端到端白话总览(本页是其第 ④-⑤ 步的放大)\n- [glossary](#glossary) —— 术语速查表\n- [faq](#faq) —— 常见疑问\n"}, "operating-myths": {"title": "运营迷思 vs 源码真相", "type": "guide", "group": "白话导览(Guide)", "md": "# 运营迷思 vs 源码真相\n\n> X 算法开源后,\"涨号攻略\"满天飞。这一页只做一件事:把最流行的几条运营说法,逐条拉到 `xai-org/x-algorithm` 源码前对质。\n> 规矩:**每条结论都给 `文件:行号`**。给不出来的,就是没读过源码。\n\n## 先打地基:这套系统到底怎么给帖子打分\n\n一条帖子进你的 For You,要过两阶段:**召回**(从全网粗筛)→ **排序**(精细打分)。排序的核心是一个 Grok 改造来的 transformer,它对每条候选**预测 22 种行为概率**(点赞、回复、转发、点击、停留……以及\"不感兴趣\"\"举报\"等负向行为)。`RankingScorer` 把这 22 个概率**加权求和**成最终分,再做两步调整:作者多样性衰减、站外降权。\n\n一个定调的事实:README 第一段就写明 ——「我们删除了系统里**每一个**手工特征和**大部分**启发式规则」(`README.md:55`),\"无手工特征\"还是 Key Design Decision 第一条(`README.md:324-325`)。**打分/排序侧没有人工规则**,模型直接从用户的行为序列里学。这一条会反复用到。\n\n> 想先看整体怎么运转:[how-it-works](#how-it-works);打分细节:[scoring-and-ranking](#scoring-and-ranking)。\n\n## 九个流行迷思,逐条对源码\n\n### 迷思一|「多发帖 = 多曝光」\n\n**流行说法**:号要勤更新,一天多发几条,曝光自然涨。\n\n**源码怎么说**:`RankingScorer` 第二步是**作者多样性衰减**(`ranking_scorer.rs:190-217`)。它先把候选按加权分降序排,再给每个作者记一个出现计数 `position`;同一作者第 N 次出现的帖子,分数乘 `diversity_multiplier = (1-floor)·decay^position + floor`(`ranking_scorer.rs:186-188`)。衰减因子 `decay`(`AuthorDiversityDecay`)小于 1 —— position 越大,乘数越小。第 0 条 ×1.0,第 1 条起就打折,越往后压得越狠,直到地板 `floor`。\n\n**所以**:在同一次 For You 计算里,你发的内容里第一条机会最大,后面每一条都在被你自己的前一条压分。刷屏不是多曝光,是自我稀释。(注意边界:这是\"单次信息流计算内\"的衰减,不是账号级永久惩罚 —— 但方向很明确。)\n\n### 迷思二|「互动量越高越好」\n\n**流行说法**:想办法冲互动数据,点赞评论转发越多权重越高。\n\n**源码怎么说**:最终分是 22 种**预测行为概率**的加权和(`ranking_scorer.rs:125-170`)。其中 5 个是负向行为 —— `not_interested`(点了\"不感兴趣\")、`block_author`、`mute_author`、`report`、`not_dwelled`(刷到没停留就划走),权重为负,汇成 `negative_sum = -(...)`(`ranking_scorer.rs:83`)。README 自己也写:负向行为「have negative weights, pushing down content the user would likely dislike」(`README.md:292`)。\n\n**所以**:算法算的是\"正向行为概率 − 负向行为概率\"的加权结果,不是\"互动总量\"。靠标题党、骗点击换来的互动,如果同时招来大量\"划走\"\"不感兴趣\"\"举报\",加权分会被直接拉低甚至变负。反直觉的一点:**\"没人理\"不是最差的;\"很多人划走/举报\"才是最差的** —— `not_dwelled`(\"划走没停留\")被显式建模成一个扣分项。\n\n**关键澄清:扣的是\"预测\",不是\"计数\"。** 这里被负权重乘的 `not_interested`、`report` 等,是模型**预测的概率**(模型估计\"这位浏览者会不会做这个动作\"),不是\"这条帖被多少人实际点过\"的计数 —— `RankingScorer` 读的是模型预测,源码里没有\"按某帖负反馈次数扣它分\"的入口。所以负反馈反映的是\"内容本身招不招人烦\"的预测,**不是一个能被别人恶意刷的计数器**。详见 [faq](#faq)。\n\n### 迷思三|「做泛内容就能轻松破圈」\n\n**流行说法**:内容做\"大众\"一点、覆盖面广一点,算法自然把你推给全网陌生人。\n\n**源码怎么说**:破圈要过**两道关**,多数解读只看到第二道。\n\n**第一道关 —— 召回,真正的闸门。** 你的帖子要进一个陌生人的 For You,前提是先被**召回**进他的候选池。站外内容的召回靠**双塔模型**:一座塔把用户编码成向量、一座塔把每条帖子编码成向量,检索就是算 `用户向量 · 帖子向量` 的相似度、取 top-K(`phoenix/recsys_retrieval_model.py:381-388`;演示脚本从约 53 万条语料里取 200 条)。**没进这个 top-K,你压根不是候选 —— 后面的一切都不会发生。**\n\n**第二道关 —— 排序的 OON 折扣。** 就算被召回了,排序最后一步还会给站外候选乘一个小于 1 的 OON 系数,站内不乘:`Some(false) => after_diversity * effective_oon`(`ranking_scorer.rs:272-275, 220-239`)。\n\n**所以**:破圈是「**窄门 + 折扣**」—— 先靠相似度挤进陌生人的召回 top-K,再带着 <1 的乘数和他关注流里的内容拼分。\n\n而\"做泛内容\"这个前提,**在第一道关就反了**。召回按相似度排 top-K:一条什么都聊一点的\"泛\"帖,向量指向一个\"平均\"方向 —— 对谁都有点像、对谁都不够像;对任何一个具体的人,总有更专更准的帖把 top-K 名额抢走。**破圈靠的不是\"泛\",恰恰是\"锐\"** —— 对某一个兴趣簇足够强、足够独特,双塔才能把你高相似地匹配给那一簇人。泛而浅的内容,结构性地哪扇窄门都进不去。\n\n(召回\"相似度 top-K\"对泛内容的影响是该机制的直接推论;边界:OON 系数的具体数值是线上参数,不在开源仓库 —— 能确定\"机制是降权\",不能说\"降到几折\"。)\n\n### 迷思四|「套爆款模板 / 加特定关键词能骗算法」\n\n**流行说法**:有一套\"算法喜欢的\"格式、词、结构,套上就涨。\n\n**源码怎么说**:README 开宗明义删掉了打分侧**每一个**手工特征(`README.md:55, 324-325`)。排序靠 Grok transformer 直接读用户的行为序列学相关性 —— 打分模型里**没有**\"这帖带没带某关键词\"\"是不是某种格式\"这类人工特征。系统里关键词唯一的角色,是**用户自己设的屏蔽词**(`MutedKeywordFilter`,命中即剔除,纯负向),不是创作者堆词的加分位。\n\n**所以**:不存在\"算法喜欢的格式\"可被你套用,因为打分侧根本没有识别格式/关键词的特征。能\"骗\"的不是算法,是真实用户的行为 —— 模型预测的是\"像这个用户,看到这类内容,会不会产生正向行为\"。(精确澄清:README 说的是删除手工特征 + 大部分启发式,指**打分/排序侧**;**过滤侧**仍是明确规则 —— 见 [filtering-pipeline](#filtering-pipeline) 的 17 个过滤器。准确说法:**打分靠学习,过滤靠规则**。)\n\n### 迷思五|「我的帖子会被同批的大 V 挤掉」\n\n**流行说法**:和大号同时段发会被压,要错开大 V 发帖。\n\n**源码怎么说**:排序 transformer 用了**候选隔离注意力掩码**。`make_recsys_attn_mask`(`phoenix/grok.py:39-71`)先给整条序列建因果掩码(`jnp.tril`,`grok.py:62`),再把\"候选区 → 候选区\"的注意力整块置 0(`grok.py:65`),只在对角线放开每条候选对自己(`grok.py:69`)。效果:每条候选只能\"看到\"用户上下文和它自己,看不见同批其他候选。README Key Design Decision #2 明说「the score for a post doesn't depend on which other posts are in the batch」(`README.md:327-328`)。\n\n**所以**:你的帖子得几分,只取决于(你的帖子 × 这个用户),和同批有没有大 V、大 V 多强**完全无关**。打分阶段是\"单独判卷\",不是\"同场打擂\"。真正的高低比拼发生在之后的[选择阶段](#candidate-selection) —— 按分排序取 top-K,那是分数排名,不是互相干扰。\n\n### 迷思六|「存在一套人人适用的涨号攻略」\n\n**流行说法**:跟着某套通用攻略做就能涨。\n\n**源码怎么说**:模型的核心输入是**这个用户的行为历史**,打分是 per-(用户, 候选) 的预测(`README.md:55, 230`)。所有权重 —— 22 个行为权重、多样性 `decay`、OON 系数 —— 都来自 feature switch 参数(`ScoringWeights::from_params`,`ranking_scorer.rs:42-66`),X 不发版就能随时改、还能跑 A/B。系统里甚至还有一个可选的二次重排器 `VMRanker`,由 `EnableVMRanker` 开关控制(`vm_ranker.rs:18-20`)。\n\n**所以**:不存在一张固定的\"权重表\"。同一条内容对不同用户分数不同(各自行为历史不同);今天和下个月的权重也可能不同(参数可调,还在实验)。任何\"算法就吃这一套\"的通用攻略,在一个 per-user、参数化、还在 A/B 的系统面前,都是刻舟求剑。\n\n### 迷思七|「带外链的帖子会被降权」\n\n**流行说法**:贴了外部链接的帖子,算法会压低它的曝光。\n\n**源码怎么说**:翻打分、过滤、内容理解三侧,**没有任何针对\"帖子带不带外链\"的机制**。打分侧 —— `RankingScorer` 的 22 个行为权重(`ranking_scorer.rs:12-39`)无一与链接有关,打分模型\"无手工特征\"(`README.md:55`),连\"这帖有无链接\"都不是它的输入;过滤侧 —— 17 个过滤器(见 [filtering-pipeline](#filtering-pipeline))没有\"外链过滤器\",候选水合也不水合\"有无外链\"这种属性;内容理解侧 —— Grox 的分类器是 spam / 安全 / 质量 / 回复打分(见 [grox-classifiers](#grox-classifiers)),没有\"链接分类器\"。\n\n**所以**:在这份开源代码里,\"带外链 → 降权\"这个机制**不存在**。带链接和不带链接的帖子走同一套召回 / 过滤 / 打分。唯一沾边的间接情形:一条帖子若整体被 Grox 判成 spam,会因\"是垃圾\"被处理 —— 那是判垃圾,不是判链接。\n\n### 迷思八|「Premium / 蓝V 花钱能买曝光」\n\n**流行说法**:开会员(Premium / 蓝V)能直接买到更高的排序权重。\n\n**源码怎么说**:`RankingScorer` 的 22 个行为权重(`ranking_scorer.rs:12-39`)里没有\"订阅 / 会员 / verified\"这一项,打分侧也不把\"作者是不是会员\"喂给模型。订阅在源码里只有两个角色:① `IneligibleSubscriptionFilter`(`ineligible_subscription_filter.rs:6`)过滤\"订阅专属帖\" —— 非订阅者看不到某作者的订阅专属内容;这是一道**可见性门槛**,方向是**收窄**触达、不是加权。② 广告注入日志里记录用户的订阅档位(`ads_injection_logging_side_effect.rs:129-130`)—— 记日志,不是排序。\n\n**所以**:在这份开源代码里,**没有\"会员 → 排序加分\"这条路径**。会员买到的是订阅专属内容等产品功能,不是源码层面的一个曝光乘数。\n\n### 迷思九|「算法给某些大账号(比如老板)开后门」\n\n**流行说法**:算法里藏着对特定账号(最常见的猜测就是 Elon 本人)的硬编码加权。\n\n**源码怎么说**:对整个 `x-algorithm` 仓库 grep `elon` / `musk` —— **零命中**。`RankingScorer` 的输入是 22 种行为预测概率 + 作者多样性位置计数 + 是否站内,没有\"作者 ID 白名单\"这种东西。唯一的作者级机制是**作者多样性衰减**,它对所有作者用同一个公式,且方向是\"同一作者出现多了就降分\"(`ranking_scorer.rs:186-217`)—— 对称的,甚至对高频账号更不利。再加上\"删光每一个手工特征\"(`README.md:55, 324-325`):一个 author-specific 的加权,正是典型的手工特征,结构上没有它的位置。\n\n**所以**:在这份开源代码里,**没有针对特定账号的硬编码后门**。(可对照:2023 年 X 上一次开源算法时,代码里曾被发现有按个别账号区分的标记、引发广泛讨论;这次的 `x-algorithm`,grep 遍全仓找不到任何这类东西。边界:线上 feature switch 配置不在仓库,但代码\"无手工特征\"的结构,决定了没有放这种后门的常规位置。)\n\n## 那些真正在起作用、却很少被提的机制\n\n大多数解读连这套系统真正的\"关键词\"都没提到 —— 七个机制,各配一个例子:\n\n| 机制 | 一句话 | 一个例子 | 详见 |\n|------|--------|----------|------|\n| **候选隔离注意力掩码** | 每条候选打分时互相看不见,分数只取决于自己 + 用户 | 对**同一个用户**,你的帖子是和一批爆帖一起打分、还是和一批冷帖一起打分,分**完全一样** —— 只取决于「帖子 × 用户」,与同批是谁无关,因此可缓存 | [candidate-isolation-masking](#candidate-isolation-masking) |\n| **双塔召回** | 你被推给陌生人的真实路径:用户塔 × 候选塔,比向量相似度 | 一条很专的 Rust 异步运行时帖,没有任何人转发,也能靠向量相似被召回到某个陌生 Rust 开发者面前 | [phoenix-retrieval](#phoenix-retrieval) |\n| **哈希嵌入** | 用户/帖子太多,用多个哈希函数把 ID 压进固定大小的嵌入表 | 几十亿帖子 ID 装不下逐个嵌入 —— 用 2 个哈希函数把任意 ID 映射进同一张固定大小的表 | [hash-based-embeddings](#hash-based-embeddings) |\n| **`not_dwelled` 负信号** | \"划走没停留\"是一个被显式建模、给负权重的预测目标 | 模型预测\"这个用户多半扫一眼就划走你这条标题党\" → 这个概率直接作为负分,压低它对该用户的总分 | [scoring-and-ranking](#scoring-and-ranking) |\n| **作者多样性衰减** | 同一作者在你这屏里出现越多,后面越降分 | 你连发的 3 条恰好都被某用户这次刷新选为候选 → 按出现顺序逐条打折,第 1 条满分、后两条递减 | [scoring-and-ranking](#scoring-and-ranking) |\n| **Grox 后台内容理解** | 一条独立的异步旁路管线,产出 spam / 安全 / 质量(banger)等内容标签,不在 feed 请求路径上 | 你刷 For You 时,系统不会现场判每条帖安不安全 —— Grox 早已作为独立管线流式处理过、把标签写进下游存储,feed 只是查表 | [grox-architecture](#grox-architecture) |\n| **几乎删光人工特征** | 工业级推荐系统,打分侧没有人工特征 —— 这本身最反常识 | 老式系统会写\"带图 +1 分\"\"粉丝过万 +1 分\"这类人工规则;这套系统把它们全删,只留模型从行为里学 | [system-architecture](#system-architecture) |\n\n## 边界:开源仓库给了什么、没给什么\n\n**给了**:算法机制代码(Rust 服务 + Python ML)、一个 mini 演示模型(256 维嵌入、4 注意力头、2 层,`README.md:32`)、一条端到端推理脚本。\n\n**没给**:线上 feature switch 的真实数值(所有权重/系数)、生产级训练模型、训练数据、Grok 的完整行为。\n\n所以本页所有结论都是**机制层面**的(\"方向是降权\"\"这是负权重\"),不是**数值层面**的(\"降到几折\"\"涨多少\")。承认这条边界,本身就是和那 95% 的区别。\n\n## 总结:九个迷思,错在同一处\n\n**逐条对照:**\n\n| 流行说法 | 源码真相 |\n|----------|----------|\n| 多发帖 = 多曝光 | 作者多样性衰减:同一屏里,你后发的帖子被自己前一条压分 |\n| 互动量越高越好 | 算的是\"正向 − 负向\";招来划走、举报是净亏 |\n| 做泛内容轻松破圈 | 召回按相似度取 top-K,\"泛\"内容进不了任何一扇窄门 |\n| 套模板 / 堆关键词骗算法 | 打分侧删光了手工特征 —— 没有规则可套 |\n| 被同批大 V 挤掉 | 候选隔离:你的分只取决于\"你的帖子 × 这个用户\" |\n| 有一套万能涨号攻略 | 打分是 per-user 的、权重是可变参数 —— 没有固定打法 |\n| 带外链的帖子被降权 | 打分 / 过滤 / Grox 三侧都没有针对\"外链\"的机制 |\n| Premium 花钱买曝光 | 22 个权重无订阅项;订阅只做\"专属帖可见性门槛\",不加权 |\n| 算法给大账号开后门 | 全仓 grep 无 elon/musk;打分输入无作者身份特例 |\n\n**结论:**\n\n九个迷思,错在同一处 —— 它们都把算法想象成**一个可以靠技巧去迎合、去绕过、或暗中开后门的守门人**。\n\n源码给的答案正相反:\n\n1. **打分侧没有规则可套**。手工特征被删光了(迷思四、六),所谓\"算法喜欢的格式\"根本不存在。\n2. **你能影响的\"正向信号\",全是模型对真实用户行为的预测**(迷思二)。你面对的从来不是算法,是人 —— 算法只是把人的反应转译成分数。\n3. **结构性机制不是给你设的关卡**。作者多样性衰减(迷思一)、OON 折扣(迷思三)、候选隔离(迷思五)各有各的系统目的 —— 防刷屏、平衡站内外、保证打分稳定可缓存;它们不针对你,但你逆着它们走,就会白白丢分。\n\n所以这套系统真正的样子:**它不是一个守门人,而是一根传导线** —— 把\"真实的人看到你的内容会有什么反应\",如实地、放大地,传导成分发量。\n\n能被\"运营\"的从来不是算法,是内容、以及它面对的人。算法这一侧,你唯一能做的是**别被结构性机制白白扣分**;真正决定上限的,是算法替代不了的那部分 —— 内容本身。想把这份理解落成\"具体该怎么发\",见 [posting-guide](#posting-guide)。\n\n## 出处\n\n| 核心结论 | 源码 |\n|----------|------|\n| 打分/排序侧删除每一个手工特征 | `README.md:55, 324-325` |\n| 22 种行为预测 → 加权求和 | `ranking_scorer.rs:125-170`、`README.md:265-292` |\n| 5 个负向行为,权重为负 | `ranking_scorer.rs:83`、`README.md:292` |\n| 作者多样性衰减 `(1-floor)·decay^N+floor` | `ranking_scorer.rs:186-217` |\n| 破圈第一关:召回靠双塔相似度 top-K | `phoenix/recsys_retrieval_model.py:381-388` |\n| 破圈第二关:站外候选乘 OON 系数降权 | `ranking_scorer.rs:220-239, 272-275` |\n| 候选隔离:因果掩码 + 候选间互不可见 | `phoenix/grok.py:39-71`、`README.md:327-328` |\n| 权重全部来自 feature switch 参数 | `ranking_scorer.rs:42-66` |\n| `VMRanker` 由 `EnableVMRanker` 门控 | `vm_ranker.rs:18-20` |\n| 外链:打分 / 过滤 / Grox 三侧均无\"外链\"机制 | `ranking_scorer.rs:12-39`、[filtering-pipeline](#filtering-pipeline)、[grox-classifiers](#grox-classifiers) |\n| Premium:无订阅打分加权,订阅只做可见性门槛 | `home-mixer/filters/ineligible_subscription_filter.rs:6` |\n| 无特定账号硬编码后门:全仓 grep 无 elon/musk | `home-mixer/scorers/ranking_scorer.rs:12-39` |\n\n精确语义以技术页与源码为准;每条「详见」的技术页都附 `文件:行号` 锚点。\n\n## 相关页面\n\n- [posting-guide](#posting-guide) —— 配对页:把这些机制反过来用 —— 发帖到底该怎么做\n- [how-it-works](#how-it-works) —— 端到端白话总览\n- [scoring-and-ranking](#scoring-and-ranking) —— 打分三步:加权求和 / 多样性衰减 / OON 降权\n- [phoenix-retrieval](#phoenix-retrieval) —— 双塔召回:破圈的第一道关\n- [candidate-isolation-masking](#candidate-isolation-masking) —— 候选隔离掩码的技术细节\n- [filtering-pipeline](#filtering-pipeline) —— 17 个过滤器:打分靠学习、过滤靠规则\n- [visibility-and-shadowban](#visibility-and-shadowban) —— 限流与 shadowban:民间\"shadowban\"说法逐条对源码\n- [open-source-vs-production](#open-source-vs-production) —— 开源版 vs 线上真实算法:本页边界的完整清单\n- [faq](#faq) —— 常见疑问\n- [system-architecture](#system-architecture) —— 技术版系统架构总览\n"}, "posting-guide": {"title": "发帖指南 —— 从算法机制反推", "type": "guide", "group": "白话导览(Guide)", "md": "# 发帖指南 —— 从算法机制反推\n\n> 这是一份发帖指南,但它不是\"运营攻略\"。\n> 区别只有一条:这里的每一项,都从 `xai-org/x-algorithm` 的一个**源码机制**反推而来,并标注行号。不来自机制的,不写。\n> 配套:[operating-myths](#operating-myths) 告诉你哪些流行说法是错的;本页告诉你机制到底意味着什么、你能怎么做。\n\n## 一条总纲\n\n算法删光了打分侧的**每一个手工特征**(`README.md:55, 324-325`)。这意味着:**没有\"格式\"\"关键词\"\"结构\"这类技巧可以套** —— 打分模型根本不看这些。\n\n它只量一件事:**像你受众这样的人,看到这条帖子,会不会产生正向行为**(点赞、回复、转发、停留……)。\n\n所以下面所有\"技巧\",本质都是同一句话的推论 —— 要么帮你的好内容拿到它应得的分,要么避免被某个结构性机制白白扣分。**这里没有\"骗算法\",因为没什么可骗的。**\n\n## 你的帖子要过的几道关\n\n```mermaid\nflowchart LR\n    A[发帖] --> B[召回<br/>进候选池] --> C[过滤<br/>踢掉不合格] --> D[排序打分] --> E[选择<br/>取高分] --> F([进入某人的 For You])\n```\n\n一条帖子要先**被召回**、**不被过滤**、再在**排序**里拿到够高的分,才会出现在某个人的信息流里。下面按这几关来。\n\n## 召回关:先让帖子进得了候选池\n\n### 主题聚焦 —— 让模型能把你\"放进对的篮子\"\n\n站外触达靠**双塔召回**:一个塔把用户编码成向量,一个塔把帖子编码成向量,比相似度取 top-K(`README.md:191-195`)。一条主题聚焦的帖子,语义向量信号清晰,更容易被匹配给真正感兴趣的人;一条什么都聊一点的帖子,信号是糊的。\n\n> ❌「今天好累……顺便说下我对 RAG 的看法,对了周末有人爬山吗」—— 三个主题挤一条,向量糊成一团。\n> ✅ 一条只讲一件事。想讲三件,发三条(注意下面的\"节奏\")。\n\n(这是从\"召回靠 embedding 相似度\"得出的合理推断,不是源码里的硬规则。)\n\n### 趁新鲜 —— 帖子的分发有时间窗\n\n`AgeFilter` 会把**超过最大帖龄**的帖子直接过滤掉,进不了候选池(见 [filtering-pipeline](#filtering-pipeline))。帖子不是永久在分发池里,它有一个新鲜窗口,过了就基本不再被推。\n\n推论:别指望旧帖被\"算法重新翻红\";要让一条帖子在它还新鲜时,尽量多地遇到活跃的受众。\n\n## 排序关:算法在量的正向信号\n\n排序模型对每条候选预测约 **22 种行为概率**,`RankingScorer` 加权求和成最终分(`ranking_scorer.rs:12-39, 125-170`)。你没法直接操纵 22 个,但它们归结成几类\"你的内容该做到的事\":\n\n| 算法在量的正向行为 | 你的内容要做到 |\n|---|---|\n| 停留 `dwell` / `dwell_time` | 让人停下来看完 —— 开头有钩子、信息密度高、排版可读 |\n| 回复 `reply` | 留出讨论空间 —— 抛观点、提真问题、有可接的话茬 |\n| 转发 / 引用 `retweet` / `quote` | 值得\"我也要让别人看到\" —— 有信息增量、有转发的理由 |\n| 点赞 `favorite` | 说出别人想说没说的 —— 观点清晰、有共鸣 |\n| 点击 / 展开 `click` / `photo_expand` | 首句、首图给**真实**信息钩子(不是夸张标题) |\n| 主页点击 / 关注 `profile_click` / `follow_author` | 让人想点进你主页、想长期追你 |\n| 视频质量观看 `vqv` | 视频够长、前几秒留住人 |\n\n几个值得展开的:\n\n**停留(dwell)**是最该重视的信号之一 —— 它是正向加权项,而它的反面 `not_dwelled`(划走没停留)是负向项(`ranking_scorer.rs:83`)。一条帖子的开头几秒决定它是被读还是被划走。\n\n> ❌ 开头铺垫三行才进正题。✅ 第一句就给最硬的那个信息或判断。\n\n**回复(reply)**奖励\"没把话说死\"的内容。一条结论完整、无可补充的帖子,没有回复的入口;一条留了一个真问题、或一个可被反驳的判断的帖子,有。\n\n**关注(follow_author)**:模型会预测\"看到这条会不会关注作者\"。所以每条帖子顺带回答一句\"你是谁、为什么值得追\"是有价值的 —— 这也是把一次性曝光转成长期受众的机制入口。\n\n**视频**:`vqv`(视频质量观看)是加权项,但它的权重会**按视频时长动态置 0** —— 太短的视频,连 `vqv` 这一项的分都拿不到(`home-mixer/scorers/vm_ranker.rs:103` 的 `vqv_ineligible`)。发视频,要够长到能产生一次\"质量观看\"。\n\n## 扣分关:别白白丢分\n\n### 五个负向行为 —— 标题党的代价写死在源码里\n\n22 个行为里有 5 个是**负权重**:`not_interested`、`block_author`、`mute_author`、`report`、`not_dwelled`,汇成 `negative_sum`(`ranking_scorer.rs:83`)。最终分算的是**正向减负向**。\n\n最反直觉、也最重要的一条:**\"招黑\"比\"没人理\"更糟。** 一条无人问津的帖子,负向信号也低;一条靠夸张标题骗来点击、却让人点进来就划走/反感的帖子,是**净亏**的。\n\n> ❌「不看后悔!这个方法太炸了!!!」→ 骗到 `click`,但点进来发现内容空 → `not_dwelled` 拉满 → 倒扣。\n> ✅ 标题就把价值说清楚 → 点进来的人是真想看 → 停留、读完。\n\n### 作者多样性衰减 —— 别在一次刷新里自我刷屏\n\n`RankingScorer` 有一步作者多样性衰减:同一作者在一次信息流计算里,排在后面的帖子,分数乘一个递减系数 `(1-floor)·decay^N+floor`(`ranking_scorer.rs:186-217`)。同时处于\"新鲜窗口\"的帖子越多,越容易在同一次计算里撞上,触发衰减。\n\n> ❌ 十分钟内连发 4 条 → 它们很可能在同一次 feed 计算里相遇,第 2、3、4 条被逐级压分。\n> ✅ 把帖子在时间上摊开,让每条都尽量以\"该作者第一次出现\"的满乘数被打分。\n\n这不是\"少发帖\",是\"别让自己的帖子在同一屏里互相踩\"。\n\n### 安全红线 —— 触发就直接出局\n\n选后过滤的 `VFFilter` 会按可见性服务的判定,剔除删帖、spam、暴力血腥等内容(`phoenix_candidate_pipeline.rs:317-321`);后台的 [Grox](#grox-classifiers) 还会跑 spam 检测与 PTOS 安全策略判定。这些是**过滤**,不是扣分 —— 命中就是从候选里被拿掉,分数再高也没用。\n\n推论:别让内容长得像 spam(纯链接、群发感、重复刷);合规是地基,不是加分项。\n\n## 破圈:站外触达的真相\n\n破圈要过**两道关**:\n\n**第一道是召回。** 你的帖子要进一个陌生人的候选池,得先被双塔召回模型按相似度选中(见上文「召回关 · 主题聚焦」)—— 这一关淘汰\"泛而糊\"的内容,奖励\"锐而准\"的内容。没被召回,后面这一切都不发生。\n\n**第二道才是 OON 折扣。** 就算被召回了,`RankingScorer` 最后一步还会给**站外**候选乘一个小于 1 的 OON 系数,**站内**(你的粉丝)不乘(`ranking_scorer.rs:220-239, 272-275`)。\n\n三个推论:\n\n1. **关注你的人是基本盘。** 你的内容对他们默认\"全价\"分发,不打折 —— 先把关注你的人服务好,这是回报最确定的地方。\n2. **破圈是\"窄门 + 折扣\"。** 先靠内容的\"锐度\"挤进陌生人的召回 top-K(窄门),再靠\"强度\"扛住 OON 折扣。两者缺一不可 —— 这也是\"做泛内容轻松破圈\"为什么错:泛内容连第一道窄门都进不去。\n3. **涨粉的真实价值**,不是一个数字,而是把\"默认全价分发\"的受众池做大。\n\n## 发帖节奏:由机制决定,不由玄学决定\n\n源码里**没有**\"最佳发帖时间\"这种东西。但几个机制合起来,有明确推论:\n\n- **频率**:受作者多样性衰减约束 —— 不是\"别多发\",是\"别让多条挤在同一个新鲜窗口里互相压分\"。把好内容摊开。\n- **时效**:受 `AgeFilter` 约束 —— 帖子有新鲜窗口,在受众活跃时发,让它在窗口内多遇到人。\n- **一次性**:`PreviouslySeenPostsFilter` 会过滤用户已看过的帖(见 [filtering-pipeline](#filtering-pipeline))—— 同一个人基本不会反复刷到你同一条。**一条帖子对单个用户,机会基本只有一次**,所以第一句和首图格外关键。\n\n## 不要做的事(反面清单)\n\n每一条都对应 [operating-myths](#operating-myths) 里被源码打穿的迷思:\n\n- ❌ 堆关键词、套\"爆款模板\" —— 打分侧没有识别这些的特征。\n- ❌ 标题党骗点击 —— `not_dwelled` 直接扣分。\n- ❌ 短时间刷屏 —— 作者多样性衰减。\n- ❌ 买假互动 —— 招来的\"划走/不感兴趣\"是净亏,且对真实受众契合毫无帮助。\n- ❌ 迷信一套\"万能打法\" —— 打分是 per-user 的,权重还是随时可调的参数。\n\n## 把指南用在一条帖子上\n\n同一个内容,两种发法:\n\n**踩坑版**\n\n> 【爆】AI 又变天了!!!这个工具我不允许还有人不知道!!速看 👇\n> [一个纯链接]\n\n问题逐条对:标题党 → `not_dwelled`;纯链接无正文 → 像 spam,过 Grox spam 判定有风险;零信息密度 → 没有 `dwell` 价值;没有讨论缺口 → 没有 `reply` 入口;主题靠喊不靠内容 → 召回向量糊。\n\n**顺着机制版**\n\n> 用了三周某 AI 代码审查工具,说个反直觉的结论:它最大的价值不是找 bug,是逼我把 PR 拆小。\n> 因为它对超过 400 行的 diff 基本给不出有用意见 —— 这反而成了团队里\"PR 该多大\"的硬约束。\n> [一张相关截图]\n> 你们是把 AI 审查当\"多一双眼睛\",还是当\"卡门槛的规则\"?我越来越倾向后者。\n\n逐条对:首句\"反直觉的结论\" = 钩子(`click` + `dwell`);\"三周\"\"400 行\"等具体信息 = 信息密度(`dwell`);一个非共识判断 = 可引用的观点(`quote` / `retweet`);结尾一个真问题 = 讨论缺口(`reply`);全程聚焦\"AI 代码审查\"一个主题 = 召回向量清晰;无标题党、无纯链接、不刷屏 = 不踩扣分项。\n\n注意:\"顺着机制版\"也**不保证**爆 —— 它只保证你的内容没有被结构性机制白白坑掉。剩下的,看内容本身。\n\n## 别忘了边界\n\n- **机制 ≠ 数值**:源码给的是方向(这是正信号、那是负信号、这里有衰减),不含线上真实权重值。本页只说方向,不说\"值多少分\"。\n- **算法只分发,不创作**:算法把内容匹配给可能喜欢的人,它不会把平庸内容变好。所有\"正向行为\"最终由真实的人决定 —— 这份指南帮你不被机制坑掉,但替代不了\"内容本身值得被看\"。\n- **权重会变**:22 个行为权重、多样性 `decay`、OON 系数都是 feature switch 参数(`ranking_scorer.rs:42-66`),X 随时可调。别把任何具体打法当永恒。\n\n## 出处\n\n| 建议 | 机制依据 |\n|------|----------|\n| 主题聚焦利于召回 | 双塔召回 `README.md:191-195`、[phoenix-retrieval](#phoenix-retrieval) |\n| 帖子有新鲜窗口 / 一次性曝光 | `AgeFilter`、`PreviouslySeenPostsFilter`,[filtering-pipeline](#filtering-pipeline) |\n| 22 种行为加权,围绕正向信号创作 | `ranking_scorer.rs:12-39, 125-170` |\n| 避开 5 个负向行为,标题党招 `not_dwelled` | `ranking_scorer.rs:83` |\n| 别在一次刷新里自我刷屏 | 作者多样性衰减 `ranking_scorer.rs:186-217` |\n| 安全/spam 触发即出局 | `VFFilter`(`phoenix_candidate_pipeline.rs:317-321`)、[grox-classifiers](#grox-classifiers) |\n| 站内是基本盘,破圈要更强 | OON 降权 `ranking_scorer.rs:220-239, 272-275` |\n| 打分侧无手工特征,无模板可套 | `README.md:55, 324-325` |\n\n每条「详见」的技术页都附 `文件:行号` 锚点,可逐条核对。\n\n## 相关页面\n\n- [operating-myths](#operating-myths) —— 配对页:九个流行运营迷思,逐条对源码\n- [how-it-works](#how-it-works) —— 端到端白话总览:帖子怎么走进 For You\n- [scoring-and-ranking](#scoring-and-ranking) —— 打分三步:加权求和 / 多样性衰减 / OON 降权\n- [filtering-pipeline](#filtering-pipeline) —— 17 个过滤器:哪些帖子会被直接踢掉\n- [phoenix-retrieval](#phoenix-retrieval) —— 双塔召回:站外触达的技术通道\n- [visibility-and-shadowban](#visibility-and-shadowban) —— 限流与 shadowban:别把召回不力误判成\"被限流\"\n- [new-account-cold-start](#new-account-cold-start) —— 新号与冷启动:算法怎么区别对待新账号\n- [system-architecture](#system-architecture) —— 技术版系统架构总览\n"}, "visibility-and-shadowban": {"title": "限流与 shadowban：源码级真相", "type": "guide", "group": "白话导览(Guide)", "md": "# 限流与 shadowban：源码级真相\n\n> 创作者最焦虑的问题：「我是不是被限流了？被 shadowban 了？」\n> 这一页只做一件事：把 `xai-org/x-algorithm` 开源源码翻一遍，看清算法里**到底有哪些\"不展示你\"的机制**，再把民间\"shadowban\"的说法逐条拉到源码前对质 —— 哪些是真的，哪些是误解。\n> 规矩同 [operating-myths](#operating-myths)：每条结论的精确 `文件:行号` 锚点见末尾「出处」与对应技术页。\n\n## 一句话先说结论\n\n源码里**确实有**会让你的帖子\"不被展示\"的机制，但它们分三类，没有一类是民间想象的那个\"账号级限流开关\"：\n\n1. **可见性过滤**：违规内容（删帖、垃圾、暴力血腥等）会被整条剔除 —— 这是真的\"压制\"，但它针对**内容**，由一个**不在开源仓库里**的可见性服务判定。\n2. **过滤器踢人**：拉黑、静音、帖子太旧、各种去重 —— 这些是确定的规则，命中即出局，但每一条都有明确的、与\"惩罚\"无关的系统理由。\n3. **排序降权**：作者多样性衰减、站外（OON）降权 —— 这是**降分**，不是封禁，而且不针对任何特定账号。\n\n下面逐类拆开。\n\n## 算法里真实存在的\"压制\"机制\n\n帖子要进某人的 For You，先经过滤、再排序、再选择（见 [how-it-works](#how-it-works)）。\"压制\"可能发生在两处：过滤阶段被**整条踢掉**，或排序阶段被**降分**。\n\n```mermaid\nflowchart LR\n    A[候选帖] --> B[预打分过滤<br/>14 个过滤器]\n    B --> C[排序打分<br/>加权 + 降权]\n    C --> D[选择 TopK]\n    D --> E[选后过滤<br/>VFFilter 等 3 个]\n    E --> F([进入 For You])\n    B -. 踢掉 .-> X[出局]\n    E -. 踢掉 .-> X\n    C -. 降分 .-> C\n```\n\n### 机制一：选后可见性过滤 —— 违规内容确实会被压制\n\n这是民间\"shadowban\"里**唯一对得上**的硬机制。\n\n在 TopK 选择之后，流水线跑三个选后过滤器（`phoenix_candidate_pipeline.rs:317-321`），其中两个专门做可见性剔除：\n\n- **`VFFilter`** —— 每个候选身上挂着一个\"可见性原因\"`visibility_reason`。`VFFilter` 按这个原因判断要不要丢弃：如果原因是一个\"安全结果\"且其 `action` 是 `Drop`，丢弃；如果是**其它任何**可见性原因，也一律丢弃；没有原因才保留（`vf_filter.rs:22-30`）。删帖、垃圾、暴力血腥等内容就是在这里被整条剔除的。\n- **`AncillaryVFFilter`** —— 处理\"附属帖\"：如果一条候选引用、转发、或回复了一条被判定要丢弃的帖子，这条候选会被标记 `drop_ancillary_posts`，然后被 `AncillaryVFFilter` 连带剔除（`ancillary_vf_filter.rs:13-15`）。也就是说，你转发/引用一条违规帖，可能把自己这条也搭进去。\n\n这个\"可见性原因\"是怎么来的？由上游一个 `VFCandidateHydrator` 调用**可见性过滤服务**得到的（`vf_candidate_hydrator.rs:36-39`）。它对站内帖用一个安全等级、对站外帖用另一个安全等级分别查询（`vf_candidate_hydrator.rs:76-90`）。\n\n**所以**：如果你的帖子内容触发了平台的安全/合规判定，它会在进入任何人 For You 的最后一关被**整条拿掉** —— 这不是\"降权\"，是\"不展示\"。这一条，民间说的\"违规会被压\"是对的。\n\n> ⚠️ 重要边界，下面「诚实边界」一节会专门讲：开源仓库里有 `VFFilter` 这个**消费端**，但**产生**可见性标签的那个服务本身不在仓库里。所以\"哪些内容会被判违规、判多严\"——源码无法回答。\n\n### 机制二：14 个预打分过滤器里，会\"踢掉你\"的那几个\n\n打分之前，流水线先跑 14 个过滤器筛掉不合格候选（`phoenix_candidate_pipeline.rs:274-289`，逐个逻辑见 [filtering-pipeline](#filtering-pipeline)）。其中和\"我的帖子没被看到\"直接相关的：\n\n| 过滤器 | 什么情况下踢掉你的帖子 | 这是\"针对你\"吗 |\n|--------|------------------------|----------------|\n| `AuthorSocialgraphFilter` | 看的人**拉黑或静音**了你；或**你拉黑了**看的人 | 不是。是这一对用户的私人关系，不是平台对你的判定 |\n| `AgeFilter` | 你的帖子**太旧**了（超过最大帖龄） | 不是。是时效规则，对所有帖子一视同仁 |\n| `DropDuplicatesFilter` / `RetweetDeduplicationFilter` | 同一条帖子在候选里出现多次，只留一条 | 不是。是去重 |\n| `PreviouslySeenPostsFilter` 等三件套 | 这个用户**已经刷到过**你这条 | 不是。是\"别给同一个人重复看\" |\n| `MutedKeywordFilter` | 帖子命中了**用户自己设的**屏蔽词 | 不是。是用户的个人偏好设置 |\n\n重点看 `AuthorSocialgraphFilter`，它最容易被误解成\"被限流\"。它的判定很直白（`author_socialgraph_filter.rs:46-52`）：命中以下任一即剔除 —— 作者被该用户静音、作者被该用户拉黑、作者拉黑了该用户、引用帖作者与该用户互相拉黑、该用户拉黑了被转发的作者。\n\n**所以**：如果 A 拉黑了你，你的帖子永远进不了 A 的 For You。但这是 **A 和你之间**的事，由 A 的拉黑/静音名单决定 —— 换一个没拉黑你的用户 B，这个过滤器对你毫无影响。它不是一个挂在你账号上的全局开关。`AgeFilter` 同理：它踢的是\"旧帖\"，不是\"你\"，新帖完全不受影响（这也是 [posting-guide](#posting-guide) 强调\"趁新鲜发\"的原因）。\n\n### 机制三：排序里的\"降权\" —— 是降分，不是封禁\n\n就算过了所有过滤器，排序阶段 `RankingScorer` 还会做两步可能拉低你分数的调整（机制细节见 [scoring-and-ranking](#scoring-and-ranking)）：\n\n- **作者多样性衰减**：在**同一次** For You 计算里，把候选按分降序排，同一个作者第 N 次出现的帖子，分数乘一个随 N 递减的系数（`ranking_scorer.rs:186-217`）。你在同一屏里出现越多次，靠后的那几条被压得越狠。\n- **站外（OON）降权**：如果一条候选对当前用户是\"站外\"的（不是他关注的人），最终分会乘一个小于 1 的 OON 系数；\"站内\"的则不乘（`ranking_scorer.rs:272-275`）。\n\n**所以**：这两步是**降分**，不是**剔除**。被降分的帖子还在候选池里、还参与排序，只是分数低了、排名靠后了。它和\"封禁/不展示\"是两回事。而且关键在于 —— 它们**不针对特定账号**：多样性衰减对所有作者用同一个公式，OON 降权对所有\"站外\"内容用同一个系数。这是下一节要逐条澄清的重点。\n\n## 民间\"shadowban\"逐条对质\n\n把流传最广的几条\"shadowban\"说法，逐条拉到源码前。\n\n### 「平台给我账号挂了个限流标记」—— 源码里找不到\n\n**流行说法**：被 shadowban 的账号会被打上一个标记，所有帖子的曝光被悄悄全局压低。\n\n**源码怎么说**：翻遍 `home-mixer` 的 14 个预打分过滤器和 3 个选后过滤器，**没有任何一个**过滤器读取\"这个作者是否被限流\"这类账号级标志。会踢人的过滤器，判据全是别的东西：拉黑/静音名单（`AuthorSocialgraphFilter`）、帖龄（`AgeFilter`）、是否重复、用户是否看过、用户的屏蔽词。排序侧的 `RankingScorer` 也一样 —— 它的输入是 22 种行为预测概率、作者多样性位置计数、是否站内（`ranking_scorer.rs`），没有一个\"账号限流系数\"。\n\n**判定**：在**这个开源仓库**里，**没有**一个\"你被限流了\"的账号级总开关。压制要么是内容触发可见性过滤（机制一）、要么是某个具体过滤器的具体规则（机制二）、要么是不针对账号的排序降权（机制三）。\n\n> 严谨边界：这只能说\"开源出来的 home-mixer 推荐链路里没有这个开关\"。可见性过滤**服务**内部有没有账号维度的逻辑，不在仓库、无法定论 —— 见「诚实边界」。\n\n### 「违规内容会被压」—— 这条是真的\n\n**流行说法**：发了平台不喜欢的内容，帖子会被悄悄压住没人看到。\n\n**源码怎么说**：对得上机制一。`VFFilter` 会按可见性服务给出的原因，把判定为应丢弃的帖子在选后阶段整条剔除（`vf_filter.rs:22-30`）。`AncillaryVFFilter` 还会连带处理引用/转发了违规帖的附属帖。这确实是一种\"你看不到、别人也看不到\"的压制。\n\n**判定**：**真的**。违规内容会被可见性过滤压制 —— 这是 17 个过滤器里实打实的一环。区别只在于：它针对的是**这条内容**，不是给你账号挂标记；判定违规与否的逻辑在仓库外的服务里。\n\n### 「我的帖子推不出去 = 被限流了」—— 多半是召回这道窄门\n\n**流行说法**：帖子没几个陌生人看到，一定是被限流了。\n\n**源码怎么说**：你的帖子要进一个陌生人的 For You，**第一关是召回**，不是过滤、也不是排序。站外内容靠双塔模型按向量相似度取 top-K（见 [phoenix-retrieval](#phoenix-retrieval)、[operating-myths](#operating-myths) 迷思三）——**没被召回进候选池，后面的过滤、排序、压制根本都不会发生**。一条\"泛而糊\"的内容进不了任何兴趣簇的召回 top-K，看起来就像\"推不出去\"，但这不是\"被限流\"，是它在召回这道窄门外就落选了。\n\n**判定**：**常见误解**。\"推不出去\"绝大多数情况是**没被召回**或**排序分不够高**，而不是某个压制开关被打开。把召回不力误判成\"被限流\"，会让人去找根本不存在的\"申诉解封\"路径，而不是去改内容。\n\n### 「站外降权是平台在惩罚我」—— 误解，它是系统平衡旋钮\n\n**流行说法**：我的帖子在陌生人那儿被打了折，是算法在惩罚我、限制我破圈。\n\n**源码怎么说**：OON 降权的代码是 `Some(false) => after_diversity * effective_oon`（`ranking_scorer.rs:272-275`）—— 它的判据是 `in_network`：这条帖对**当前这个用户**是不是站内（他关注的人）。对你的粉丝，你的帖子是\"站内\"，不打折；对陌生人，是\"站外\"，乘 OON 系数。这个系数对**所有人的所有站外内容**都一样，是站内/站外内容比例的一个全局平衡旋钮（[scoring-and-ranking](#scoring-and-ranking) 称之为\"站内/站外平衡的核心旋钮\"）。\n\n**判定**：**误解**。OON 降权不是针对你的惩罚 —— 它对全平台每一条站外候选一视同仁，连大 V 也一样。它存在的目的是让 For You 不至于全是陌生人内容、保留一定比例的关注流。你不在任何\"惩罚名单\"上，你只是在那个用户的视角里恰好是\"站外\"。\n\n### 「同一作者的帖子被衰减 = 该作者被限流」—— 误解，它防的是刷屏\n\n**流行说法**：我连发的帖子后面几条没量，是我被算法盯上了。\n\n**源码怎么说**：作者多样性衰减（`ranking_scorer.rs:186-217`）的作用域是**单次 For You 计算**：在某一个用户的某一次刷新里，把候选按分排序，同一作者出现第 0 次乘 1.0、第 1 次起逐条乘递减系数。它衰减的是\"同一作者在**这一屏**里的第 2、3、4 条\"，**不是**\"这个账号的所有帖子\"。换一次刷新、换一个用户，计数从头开始。\n\n**判定**：**误解**。这是个**反刷屏**机制，防的是单屏被一个作者刷满，不是账号级惩罚。[operating-myths](#operating-myths) 迷思一说得很直接：刷屏不是多曝光，是\"自我稀释\"——你后发的帖子被自己前一条压分，而不是被平台压。\n\n### 「掉粉/没量是因为账号被降权」—— 源码里没有这个变量\n\n**流行说法**：最近数据差，是账号权重被下调了。\n\n**源码怎么说**：`RankingScorer` 算最终分时，没有任何\"账号权重\"\"作者信誉分\"这类输入。它算的是 22 种**行为预测概率**的加权和（`ranking_scorer.rs:146-170`），其中 5 个是负向行为（`not_interested`、`block_author`、`mute_author`、`report`、`not_dwelled`），权重为负（`ranking_scorer.rs:83`）。也就是说：如果你的内容让很多人\"划走没停留\"\"点不感兴趣\"\"举报\"，分数会被这些**负向预测**实实在在地拉低 —— 但这是模型对**这条内容**的真实用户反应的预测，不是挂在账号上的一个降权乘数。\n\n**判定**：**误解**（机制存在，归因错了）。数据下滑可能真实发生，但源码里它的成因是\"模型预测这条内容会招来更多负向行为\"或\"召回/排序竞争中落败\"，不是一个\"账号降权\"变量被调低。详见 [operating-myths](#operating-myths) 迷思二、[posting-guide](#posting-guide)「扣分关」。\n\n## 诚实边界：开源仓库给了什么、没给什么\n\n这是本页最重要的一节 —— 不说清楚，前面所有结论都会被误读。\n\n**仓库里有的（可核验）**：\n\n- 可见性过滤的**消费端**：`VFFilter` / `AncillaryVFFilter` 怎么按 `visibility_reason` 剔除候选（`vf_filter.rs`、`ancillary_vf_filter.rs`），`VFCandidateHydrator` 怎么去**调用**可见性服务取回这个原因（`vf_candidate_hydrator.rs`）。\n- 全部 17 个过滤器、排序 `RankingScorer` 的完整逻辑 —— 所以\"home-mixer 推荐链路里有没有账号级限流开关\"这个问题，**能**回答：没有。\n\n**仓库里没有的（无法定论）**：\n\n- **产生可见性标签的可见性过滤服务本身**。`VFFilter` 用到的 `FilteredReason`、`Action`、安全等级 `SafetyLevel` 这些类型，都来自一个外部 crate `xai_visibility_filtering`，它的实现不在 `x-algorithm` 的目录树里。所以\"一条内容会不会被判违规、判得多严、有没有账号维度的考量\"——**源码里看不到，不能下结论**。\n- **线上 feature switch 的真实数值**：OON 系数、多样性衰减因子、最大帖龄、22 个行为权重 —— 全是可调参数，开源仓库不含生产数值。所以本页只能说\"机制是降权\"\"这是负权重\"，不能说\"降到几折\"\"旧帖几小时后失效\"。\n- 生产级训练模型、训练数据、A/B 实验配置。\n\n**一句话**：本页能负责任地说的，是**机制层面**的真相 —— 推荐链路里有哪些压制机制、它们各自的触发条件和系统目的。本页**不能**说的，是可见性服务内部如何运作、线上参数是多少。把\"我看不到这个服务\"老实说出来，本身就是和那些言之凿凿的\"shadowban 攻略\"的根本区别。\n\n## 总结：焦虑的真正出口\n\n| 民间\"shadowban\"说法 | 源码判定 |\n|---|---|\n| 账号被挂了个全局限流标记 | 开源推荐链路里**没有**这个开关 |\n| 违规内容会被压住不展示 | **真的** —— `VFFilter` 按可见性服务判定整条剔除 |\n| 帖子推不出去 = 被限流 | **多半是误解** —— 通常是没被召回 / 排序分不够 |\n| 站外降权是平台惩罚我 | **误解** —— 对全平台站外内容一视同仁的平衡旋钮 |\n| 同作者帖子被衰减 = 账号被盯上 | **误解** —— 单次刷新内的反刷屏机制 |\n| 掉量是账号权重被下调 | **误解** —— 源码里没有\"账号权重\"这个变量 |\n\n把六条合起来看，民间\"shadowban\"概念错在同一处：它把分散在算法各处、各有系统目的的机制（内容可见性过滤、拉黑去重、排序降权），想象成**一个挂在你账号上、可以被平台一键打开的总开关**。\n\n源码给的答案是：\n\n1. **真正会\"不展示你\"的，是内容可见性过滤** —— 它针对内容、不针对账号，判定逻辑在仓库外。守住内容合规这条线，是唯一对得上\"shadowban\"的实在动作。\n2. **过滤器踢人，每一条都有别的理由** —— 拉黑是用户私人关系、`AgeFilter` 是时效、去重是去重。没有一个是\"因为你是你\"。\n3. **排序降权是降分不是封禁，且不认人** —— 多样性衰减防刷屏、OON 降权平衡站内外，对所有人同一套公式。你逆着它们走会白丢分（别刷屏、别只指望站外），但它们不是针对你的惩罚。\n\n所以，与其找一个并不存在的\"解除限流\"按钮，不如把精力放回 [posting-guide](#posting-guide) 给出的、从机制反推的真问题上：内容能不能被召回（够不够\"锐\"）、能不能拿到正向行为预测、有没有踩中负向信号或合规红线。算法这一侧能做的，就这些。\n\n## 出处\n\n| 核心结论 | 源码 / 技术页 |\n|----------|---------------|\n| 选后 3 个过滤器装配位置 | `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:317-321` |\n| `VFFilter` 按 `visibility_reason` 剔除（违规内容压制） | `home-mixer/filters/vf_filter.rs:22-30`、[filtering-pipeline](#filtering-pipeline) |\n| `AncillaryVFFilter` 连带剔除附属帖 | `home-mixer/filters/ancillary_vf_filter.rs:13-15` |\n| `visibility_reason` 由外部可见性服务经 `VFCandidateHydrator` 取回 | `home-mixer/candidate_hydrators/vf_candidate_hydrator.rs:11-14, 36-39, 76-90` |\n| 14 个预打分过滤器装配位置 | `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:274-289`、[filtering-pipeline](#filtering-pipeline) |\n| `AuthorSocialgraphFilter`：拉黑/静音才踢，是用户对关系 | `home-mixer/filters/author_socialgraph_filter.rs:46-52` |\n| `AgeFilter`：踢的是旧帖、不是账号 | `home-mixer/filters/age_filter.rs:17-21` |\n| 作者多样性衰减作用于单次计算、不针对账号 | `home-mixer/scorers/ranking_scorer.rs:186-217`、[scoring-and-ranking](#scoring-and-ranking) |\n| OON 降权按 `in_network` 判定、对全平台站外内容一致 | `home-mixer/scorers/ranking_scorer.rs:272-275`、[scoring-and-ranking](#scoring-and-ranking) |\n| 5 个负向行为权重为负（掉量的真实成因之一） | `home-mixer/scorers/ranking_scorer.rs:83`、[operating-myths](#operating-myths) |\n| 推荐链路里无账号级\"限流开关\" | 全部过滤器 + `RankingScorer` 输入中均无此变量 |\n| 可见性过滤**服务**本身不在仓库（边界） | `xai_visibility_filtering` 为外部 crate，仓库目录树内无其实现 |\n\n精确语义以技术页与源码为准；每条机制的精确行号见对应技术页的「源码锚点」。\n\n## 相关页面\n\n- [filtering-pipeline](#filtering-pipeline) —— 17 个过滤器的完整技术细节：`VFFilter` / `AncillaryVFFilter` / `AuthorSocialgraphFilter` 等\n- [scoring-and-ranking](#scoring-and-ranking) —— 排序三步：加权求和 / 作者多样性衰减 / OON 降权\n- [operating-myths](#operating-myths) —— 运营迷思 vs 源码真相：九个流行说法逐条对质\n- [posting-guide](#posting-guide) —— 发帖指南：从算法机制反推创作者能做什么\n- [phoenix-retrieval](#phoenix-retrieval) —— 双塔召回：帖子\"推不出去\"的真正第一关\n- [how-it-works](#how-it-works) —— 端到端白话总览：帖子怎么走进 For You\n- [system-architecture](#system-architecture) —— 技术版系统架构总览\n"}, "new-account-cold-start": {"title": "新号与冷启动:算法怎么区别对待新账号", "type": "guide", "group": "白话导览(Guide)", "md": "# 新号与冷启动:算法怎么区别对待新账号\n\n> \"新号有没有流量扶持\"\"新号是不是被压\"\"养号要养多久\"—— 这些问题,源码里有一部分能直接回答。\n> `xai-org/x-algorithm` 里**确实有**几条只对新用户走的代码路径。这一页把它们逐条摆出来:它们是什么、为什么存在、又**没有**承诺什么。\n> 规矩同 [operating-myths](#operating-myths):每条结论都给 `文件:行号`,给不出的不写。\n\n## 一句话结论\n\n新账号的特殊待遇,**不是\"红利\"也不是\"惩罚\",而是\"补偿\"**。\n\n新号的麻烦在于:它**几乎没有历史信号**。这套系统的召回和排序都重度依赖\"这个用户过去看过/互动过什么\"(行为序列),而新号的序列是空的或极短的。源码里那几条新用户路径,做的都是同一件事 —— 在历史信号稀薄时,给模型一个**能用的替代输入**或**不同的默认值**,让推荐不至于因为\"没数据\"而垮掉。\n\n还有一个容易被忽略的点:源码里**没有**一个统一的\"新用户\"标签。\"新\"是被**好几个互相独立的阈值**分别定义的 —— 有的看账号年龄,有的看关注数,有的看行为序列长度。一个账号可能对某条路径算\"新\"、对另一条不算。下面逐条看。\n\n## 四条新用户路径\n\n```mermaid\nflowchart TB\n    Q[一次 For You 请求] --> R{召回}\n    Q --> S{排序}\n    R --> R1[\"召回模型集群<br/>看行为序列长度\"]\n    R --> R2[\"话题召回<br/>看账号年龄\"]\n    S --> S1[\"排序模型集群<br/>看行为序列长度\"]\n    S --> S2[\"站外降权系数<br/>看账号年龄 + 关注数\"]\n    R2 -.话题命中过滤.-> F[\"新用户话题过滤器\"]\n```\n\n四条路径分属\"召回\"和\"排序\"两个阶段,触发条件各不相同。先看排序侧两条,再看召回侧两条。\n\n### 路径一|排序模型:新用户专属推理集群\n\n排序阶段要调 Phoenix 排序模型给候选打分。源码在选\"调哪个模型集群\"时,先查一道新用户阈值。\n\n`PhoenixScorer` 的 `resolve_cluster()`(`home-mixer/scorers/phoenix_scorer.rs:25-58`):它先取默认集群,然后看你这次打分序列里的**动作数**;如果动作数**低于** `PhoenixRankerNewUserHistoryThreshold` 这个阈值,就改用**新用户推理集群** `PhoenixRankerNewUserInferenceClusterId`(`phoenix_scorer.rs:29-43`)。\n\n通俗说:行为历史太短的用户,被路由到一个**单独的排序模型**上打分,而不是和老用户共用同一个。为什么要这样 —— 一个在\"信号充足的老用户\"上调好的模型,直接套到\"几乎没有信号的新用户\"身上未必合适;给新用户一个专门的模型(很可能是用更适合冷启动的方式训练/配置的),是更稳妥的做法。\n\n注意这里的判定口径是**行为序列长度**,不是账号注册了多久。一个注册很久但很少互动的\"僵尸号\",序列照样短,照样可能走这条新用户集群。\n\n### 路径二|站外降权:对新用户放宽\n\n排序的最后一步会给**站外内容**(out-of-network,你没关注的人发的)乘一个小于 1 的降权系数,站内不乘 —— 这是 [scoring-and-ranking](#scoring-and-ranking) 讲的 OON 降权。而这个系数,对符合条件的新用户**会放宽**。\n\n`RankingScorer` 的 `effective_oon_weight()`(`home-mixer/scorers/ranking_scorer.rs:220-239`):正常情况用常规系数 `OonWeightFactor`;但如果判定为**符合条件的新用户**,就改用一个单独的系数 `NEW_USER_OON_WEIGHT_FACTOR`(`ranking_scorer.rs:225-238`)。\n\n这里的\"符合条件的新用户\"口径,和路径一**不一样**,要同时满足两条(`ranking_scorer.rs:227-232`):\n\n1. **账号年龄** 小于阈值 `NewUserAgeThresholdSecs`;\n2. **关注数** 不低于一个下限 `NEW_USER_MIN_FOLLOWING`。\n\n为什么要放宽站外降权?逻辑很直接:**新号关注的人少,站内(关注流)内容本来就没几条**。如果还按老用户的力度压制站外内容,新号的信息流会非常空。所以对新号,把站外内容的折扣调得温和一些,让信息流先填得满。\n\n为什么还要加\"关注数不低于下限\"这个第二条件?可以理解为一道**质量/真实性门槛** —— 一个刚注册、还一个人都没关注的账号,放宽它的站外内容意义不大(它连\"想看什么\"的信号都没给);要求至少关注了若干人,既说明这是个真在用的账号,也给了召回一点可依据的兴趣信号。\n\n> 同样要强调:这是**对新用户放宽**站外降权,不是\"给新用户的内容加权\"。它影响的是\"**新用户自己刷到的**信息流里站外内容占多少\",**不是**\"新用户发的帖子更容易被推给别人\"。方向别搞反。\n\n### 路径三|召回模型:新用户专属推理集群\n\n和路径一对称 —— 召回阶段也有一个新用户集群开关。\n\n`PhoenixSource` 的 `resolve_cluster()`(`home-mixer/sources/phoenix_source.rs:21-58`)与排序侧几乎是同一套逻辑:取默认召回集群,再看**召回序列**的动作数;低于 `PhoenixRetrievalNewUserHistoryThreshold` 阈值,就改用新用户召回集群 `PhoenixRetrievalNewUserInferenceClusterId`(`phoenix_source.rs:25-39`)。\n\n意思是:历史太短的用户,**召回**这一步也会被切到一个单独的双塔模型上 —— 道理同路径一,只是发生在更早的\"从全网粗筛候选\"阶段。这条路径在 [home-mixer-orchestration](#home-mixer-orchestration) 里也有提及。\n\n留意:路径一(排序)看的是 `scoring_sequence`,路径三(召回)看的是 `retrieval_sequence`,**两个序列、两个阈值,各判各的**。\n\n### 路径四|冷启动话题:从\"关注的话题\"召回 + 过滤\n\n前三条路径都是\"换一个模型/换一个数值\"。第四条不一样,它给新号引入了一种**额外的信号来源**:用户**关注的 Grok 话题**。\n\n新号没有行为历史,但它在引导流程里可能选过自己感兴趣的话题。源码用这个来兜底冷启动。链路分三段:\n\n**第一段 —— 把\"关注的话题\"读进请求。** `FollowedGrokTopicsQueryHydrator`(`home-mixer/query_hydrators/followed_grok_topics_query_hydrator.rs`)在 `hydrate()` 里:当新用户话题相关开关启用、且**账号年龄**小于阈值 `NewUserTopicAgeThresholdSecs` 时,把用户关注的话题写进请求字段 `new_user_topic_ids`(`followed_grok_topics_query_hydrator.rs:44-60`)。注意这里又是一个**独立的\"新\"判定** —— 只看账号年龄,不看关注数、不看序列长度。\n\n**第二段 —— 用话题来召回。** `PhoenixTopicsSource`(`home-mixer/sources/phoenix_topics_source.rs`)在新用户话题召回开启、且请求里有 `new_user_topic_ids` 时被激活,直接拿这些话题去做**话题定向召回**(`phoenix_topics_source.rs:26-48`)。与此同时,常规的通用站外召回源 `PhoenixSource` 在这种情况下会被**关掉**(`phoenix_source.rs:63-68` 的 `enable()` 条件)—— 也就是说:对触发了这条路径的新号,站外召回从\"通用双塔\"**整体切换**成\"按你关注的话题来召回\"。这很合理:通用双塔靠行为向量工作,新号没有行为,不如直接用它明确给出的话题。\n\n**第三段 —— 话题过滤。** `NewUserTopicIdsFilter`(`home-mixer/filters/new_user_topic_ids_filter.rs`)是一个过滤器:开关 `EnableNewUserTopicFiltering` 启用、请求里有 `new_user_topic_ids`、且不是话题页请求时生效(`new_user_topic_ids_filter.rs:9-14`)。它的 `filter()` 把候选分成两拨 —— **保留**站内候选,以及话题命中 `new_user_topic_ids`(经话题层级展开后)的候选;其余**剔除**(`new_user_topic_ids_filter.rs:16-30`)。\n\n合起来看第四条路径:对一个够新、又选过话题的账号,系统**用它关注的话题代替它不存在的行为历史** —— 既靠话题去召回内容,又用话题过滤掉跑题的候选,让新号的第一波信息流尽量贴着它自己声明的兴趣。\n\n## \"新\"到底怎么定义:四个阈值,各判各的\n\n把上面四条路径的触发条件并排,就能看清:**源码里没有一个统一的\"新用户\"概念**。\n\n| 路径 | 判定依据 | 阈值参数 |\n|------|----------|----------|\n| 排序模型集群 | 打分行为序列的动作数 | `PhoenixRankerNewUserHistoryThreshold` |\n| 站外降权放宽 | 账号年龄 **且** 关注数 | `NewUserAgeThresholdSecs` + `NEW_USER_MIN_FOLLOWING` |\n| 召回模型集群 | 召回行为序列的动作数 | `PhoenixRetrievalNewUserHistoryThreshold` |\n| 冷启动话题 | 账号年龄 | `NewUserTopicAgeThresholdSecs` |\n\n几个推论:\n\n- **\"新号\"不是一个状态,而是四个维度上的四把尺子。** 一个账号可能在\"行为序列短\"上算新(走新用户排序集群)、却在\"账号年龄\"上不算新(不放宽 OON)。它们各判各的。\n- **行为序列长度,可能比\"注册多久\"更关键。** 四条里有两条(排序集群、召回集群)看的是行为序列,不看注册时长。这意味着:**一个注册很久但极少互动的账号,在召回和排序侧仍可能被当作\"新用户\"对待** —— 因为它确实没给模型留下多少信号。\"养号\"养的若只是时间、不产生真实互动,在这两条路径上不改变什么。\n- **这些阈值的具体数值,不在开源仓库里**(见下一节)。所以\"序列要多长才不算新\"\"账号要满多少天\",源码回答不了。\n\n## 边界:机制看得见,数值看不见\n\n这一页最该说清的一条:**上述四条路径的\"机制\"在源码里清清楚楚,但触发它们的\"数值\"几乎全部不在开源快照里。**\n\n具体说:\n\n- 四个阈值参数(`PhoenixRankerNewUserHistoryThreshold` 等)都是 **feature switch 参数**。feature switch 是 X 的线上灰度/实验配置系统(见 [home-mixer-orchestration](#home-mixer-orchestration)),参数的**实际取值不在代码仓库**,由线上配置下发,X 不发版就能改、还能对不同人群下发不同值、还能跑 A/B。\n- `NEW_USER_OON_WEIGHT_FACTOR`、`NEW_USER_MIN_FOLLOWING` 这两个看似\"写死的常量\",以及判断账号年龄的工具函数 `duration_since_creation_opt`,在开源快照里**只有引用、没有定义文件** —— 它们来自仓库未包含的内部模块。所以连这两个\"常量\"的值也看不到。\n\n能确定的,只是**方向与结构**:\n\n- 新用户**有**专属的排序集群和召回集群 —— 但具体是哪个集群、那集群和默认集群差在哪,看不到。\n- 新用户的站外降权**会被放宽** —— 但放宽到什么程度,看不到。\n- 冷启动**会用关注的话题**来召回和过滤 —— 但触发它的账号年龄门槛是多少,看不到。\n\n任何\"新号前 X 天有 Y 倍流量\"这种**带数字**的说法,都不可能从这个开源仓库推出来。这个仓库给的是\"有这么一档机制\",不是\"这档机制的刻度\"。\n\n## 给新账号的几条务实结论\n\n不吹不黑,从上面四条路径能落到实处的:\n\n1. **真正稀缺的是\"行为信号\",不是\"时间\"。** 召回和排序的新用户判定都盯着行为序列长度。让账号脱离\"新用户冷启动态\"的,是产生真实的浏览、互动 —— 不是干等注册时长。\n2. **去关注、去选话题,是在主动喂信号。** 站外降权放宽要求\"关注数达标\";冷启动话题路径直接吃\"你关注的话题\"。一个什么都不关注、不选兴趣的新号,等于把这两条对自己有利的路径都关掉了。\n3. **这些机制改善的是\"新号自己刷到的体验\",不是\"新号发帖的传播\"。** 站外放宽、话题召回,作用对象都是**该新用户的信息流**。新号发的**内容**怎么被分发,走的是和所有人一样的召回+排序+过滤(见 [posting-guide](#posting-guide)),源码里**没有**\"新作者内容加权\"这种路径。别把\"新用户体验补偿\"误读成\"新号发帖红利\"。\n4. **没有\"新号红利\",也没有\"新号被压\"。** 四条路径都是中性的补偿机制:历史信号薄,就换个模型、放宽个系数、借用话题来兜底。它们不偏袒新号,也不打压新号 —— 只是不让\"没数据\"把推荐拖垮。\n\n## 出处\n\n| 核心结论 | 源码 |\n|----------|------|\n| 行为序列短 → 走新用户**排序**集群 | `home-mixer/scorers/phoenix_scorer.rs:25-58` |\n| 新用户(账号年龄 + 关注数)→ 放宽 OON 降权系数 | `home-mixer/scorers/ranking_scorer.rs:220-239` |\n| 行为序列短 → 走新用户**召回**集群 | `home-mixer/sources/phoenix_source.rs:21-58` |\n| 新号(账号年龄)→ 把关注的话题写入 `new_user_topic_ids` | `home-mixer/query_hydrators/followed_grok_topics_query_hydrator.rs:44-60` |\n| 新号话题召回开启时,用话题召回、并关掉通用 `PhoenixSource` | `home-mixer/sources/phoenix_topics_source.rs:26-48`、`home-mixer/sources/phoenix_source.rs:63-68` |\n| 新用户话题过滤:保留站内 + 话题命中的候选 | `home-mixer/filters/new_user_topic_ids_filter.rs:9-30` |\n| 阈值/常量是线上参数,不在开源仓库 | feature switch 机制见 [home-mixer-orchestration](#home-mixer-orchestration) |\n\n精确语义以技术页与源码为准;feature switch 与候选源装配的细节见 [home-mixer-orchestration](#home-mixer-orchestration) 的「源码锚点」。\n\n## 相关页面\n\n- [scoring-and-ranking](#scoring-and-ranking) —— OON 降权的完整三步打分,新用户系数在 `effective_oon_weight()`\n- [home-mixer-orchestration](#home-mixer-orchestration) —— 召回集群路由、feature switch 系统、候选源如何装配\n- [phoenix-retrieval](#phoenix-retrieval) —— 双塔召回:为什么它重度依赖用户行为序列,新号为何需要兜底\n- [phoenix-ranking](#phoenix-ranking) —— 排序模型:`PhoenixScorer` 调用的对象\n- [operating-myths](#operating-myths) —— 运营迷思 vs 源码真相:用同样的\"对源码\"方法论打穿流行说法\n- [posting-guide](#posting-guide) —— 发帖指南:新号发的内容怎么被分发,走的是通用链路\n- [filtering-pipeline](#filtering-pipeline) —— 过滤阶段总览,`NewUserTopicIdsFilter` 是其中一环\n"}, "your-data": {"title": "算法用了你的哪些数据", "type": "guide", "group": "白话导览(Guide)", "md": "# 算法用了你的哪些数据\n\n> 这一页只回答一个问题:**`xai-org/x-algorithm` 这个开源仓库里,For You 推荐算法实际读取了你的哪些数据?**\n> 规矩照旧:每条都对得上源码。源码里看得到的才写,看不到的不写、不猜。\n> 这是一份**\"开源代码所展示的算法输入清单\"** —— 它忠实回答\"这套代码用了什么\",不回答\"X 公司还收集了什么\"。仓库外的数据收集不在本页范围。\n\n## 先理解一件事:数据是\"现查\"的\n\n你打开 X、刷出 For You 的那一刻,`home-mixer` 服务收到一个请求。请求本身只带了很少的东西(你的用户 ID、国家、语言、客户端信息、你刚看过哪些帖子……)。其余关于\"你是谁\"的数据,是算法在这一刻**现去各个存储里查的**。\n\n干这件\"查数据\"活儿的组件,源码里叫 **query hydrator**(查询水合器)—— 把一个信息稀少的请求,补全成一个信息完整的查询对象。每个 hydrator 负责查一类数据。所以\"算法用了你哪些数据\",等价于一个很具体的问题:**有哪些 query hydrator、各自去查了什么。**\n\n```mermaid\nflowchart LR\n    REQ[\"你的请求<br/>(用户ID + 上下文)\"] --> H[\"一批 query hydrator<br/>各查一类你的数据\"]\n    H --> Q[\"补全后的查询对象<br/>带上你的完整画像\"]\n    Q --> PIPE[\"召回 → 过滤 → 打分\"]\n```\n\n下面就逐类列出。**注意:本页只列与\"你这个人\"相关的数据;关于候选帖子本身的资料补全(正文、作者、有没有视频等)不算用户数据,见 [filtering-pipeline](#filtering-pipeline)。**\n\n## 一、你的社交图与设置\n\n这一类数据,源码里集中放在一个叫 `UserFeatures` 的结构里。它一共**只有 6 个字段**(`home-mixer/models/user_features.rs:7-14`),逐个列清:\n\n| 数据 | 源码字段 | 算法拿它做什么 |\n|------|----------|----------------|\n| **关注名单** | `followed_user_ids` | 决定哪些是\"站内\"帖子。也是给 [Thunder](#thunder-in-network-store) 拉关注流的输入 |\n| **拉黑名单** | `blocked_user_ids` | 你拉黑的人发的帖,直接从候选里剔除 |\n| **静音名单** | `muted_user_ids` | 你静音的人发的帖,直接剔除 |\n| **订阅名单** | `subscribed_user_ids` | 用于付费订阅内容的可见性判定 |\n| **屏蔽词** | `muted_keywords` | 帖子正文命中你设的屏蔽词,直接剔除 |\n| **粉丝数** | `follower_count` | 你自己的粉丝数 |\n\n关于这一类,有几点要讲清楚:\n\n- **拉黑 / 静音 / 屏蔽词,是\"剔除\",不是\"降权\"。** 命中即从候选里拿掉,不参与后面打分。拉黑名单还会顺带检查:被引用的人、被转发的人有没有被你拉黑(`author_socialgraph_filter.rs:33-52`、`muted_keyword_filter.rs:45-52`)。\n- **屏蔽词是系统里关键词唯一的角色** —— 它是**你自己设的过滤器**,不是别人用来给内容加分的工具。详见 [operating-myths](#operating-myths) 迷思四。\n- **关注名单是多用途的**:除了划分站内/站外,你\"关注了多少人\"还会参与一个新用户判定 —— 新账号且关注数达到阈值,排序时站外内容的降权系数会不一样(`ranking_scorer.rs:229-238`)。\n- 这一类数据的查询,由社交图谱服务相关的几个 hydrator 完成(`phoenix_candidate_pipeline.rs:192-203`)。\n\n## 二、你最近的互动行为序列(算法的核心输入)\n\n这是整套算法**最重要**的一类数据,也是它\"懂你\"的根据。\n\n打分用的 AI 模型(那个 Grok 改的 transformer)不靠\"你填的兴趣标签\"工作。它读的是一条**你最近的真实行为序列** —— 你最近点了哪些赞、回复了谁、转发了什么、点开了什么、在哪条帖子上停留了多久。模型从这条序列里**自己学**出\"你大概会喜欢什么\"。\n\n> 打个比方:不是看你的简历自我介绍,而是看你最近一段时间的\"行为录像\"。\n\n源码里,这条序列由 **`ScoringSequenceQueryHydrator`** 去拉(`home-mixer/query_hydrators/scoring_sequence_query_hydrator.rs`)—— 它向一个\"用户行为聚合服务\"请求你的聚合行为序列。另有一条**给召回用的**序列,由 `RetrievalSequenceQueryHydrator` 拉(`retrieval_sequence_query_hydrator.rs`),内容同源、参数不同。两者都挂在生效的流水线上(`phoenix_candidate_pipeline.rs:186-191`)。\n\n序列里每个帖子,都带着\"你对它做过哪些动作\"和\"停留多久\"。模型会把\"做了\"和\"没做\"都当信号 —— 它既知道你点赞了什么,也知道你刷到却没停留(`not_dwelled`)的是什么。技术细节见 [phoenix-ranking](#phoenix-ranking) 的\"动作嵌入\"和\"历史动作\"部分。\n\n**一句话**:算法对你的判断,几乎全部建立在\"你最近实际做了什么\"上。不是你说你喜欢什么,是你的手指投了什么票。\n\n> 边界说明:源码里还有两个文件 `user_action_seq_query_hydrator.rs` 和 `user_features_query_hydrator.rs`,但它们**没有**被登记进模块树(`query_hydrators/mod.rs`),也没有挂进任何流水线 —— 属于未生效的旧代码。当前真正生效的行为序列拉取器是上面说的 `ScoringSequence` / `RetrievalSequence` 两个。\n\n## 三、这次请求的上下文\n\n每次请求,你的客户端会带上一批\"此刻的上下文\"信息。源码里它们进入查询对象 `ScoredPostsQuery`(`home-mixer/models/query.rs:24-95`),由请求入口 `QueryBuilder` 从 proto 请求直接填入(`home-mixer/server.rs:89-121`):\n\n| 数据 | 源码字段 | 说明 |\n|------|----------|------|\n| 用户 ID | `user_id` | 你的账号标识,一切查询的钥匙 |\n| 国家 | `country_code` | 请求所在国家 |\n| 语言 | `language_code` | 请求语言 |\n| 客户端 | `client_app_id` / `client_version` | 哪个 App、哪个版本 |\n| 设备信息 | `device_id` / `mobile_device_id` / `mobile_device_ad_id` / `user_agent` | 设备与广告标识 |\n| 网络 / 时区 | `device_network_type` / `time_zone` | 网络类型、时区 |\n| IP 地址 | `ip_address` | 见下方\"可开关项\" |\n| 翻页位置 | `cursor` / `is_bottom_request` / `is_top_request` | 你在信息流里翻到哪了 |\n\n这些大多是\"让推荐适配你当前所处环境\"的常规上下文(给你看本国本语言的内容、适配你的客户端)。\n\n## 四、去重记录:你看过 / 被推过什么\n\n为了不把同一条帖子反复推给你,算法会查几份\"你已经见过什么\"的记录。这些记录也都进入 `ScoredPostsQuery`(`query.rs` 第 29-30、36、93 行):\n\n| 记录 | 源码字段 | 含义 | 谁来查 |\n|------|----------|------|--------|\n| 已看 ID | `seen_ids` | 你刚刷过的帖子(客户端随请求直接带上) | 请求自带 |\n| 已服务 ID | `served_ids` | 系统过去递给过你的帖子 | `ServedHistoryQueryHydrator` |\n| 服务历史 | `served_history` | 过去若干次 For You 递了什么的完整记录 | `ServedHistoryQueryHydrator` |\n| 曝光布隆过滤器 | `bloom_filter_entries` | 一种压缩的\"看过集合\",空间换效率 | `ImpressionBloomFilterQueryHydrator` |\n| 已曝光帖 ID | `impressed_post_ids` | 又一份曝光记录(见下方边界说明) | —— |\n\n`seen_ids` 和布隆过滤器一起,被 `PreviouslySeenPostsFilter` 用来踢掉你已看过的候选(`previously_seen_posts_filter.rs:23-30`);`served_ids` 被 `PreviouslyServedPostsFilter` 用(`previously_served_posts_filter.rs:25-29`)。服务历史还顺带决定 \"Who to follow\" 模块的疲劳度(隔多久才再给你看一次,`served_history_query_hydrator.rs:91-109`)。\n\n此外 `seen_ids` 还会被一个 side effect 写进 Kafka(`publish_seen_ids_to_kafka_side_effect.rs`,受开关 `EnablePublishSeenIdsToKafka` 控制)—— 也就是说,\"你看过什么\"既用于本次去重,也会作为曝光数据流向下游。\n\n> 边界说明:`impressed_post_ids` 这个字段,确实有一个过滤器 `PreviouslySeenPostsBackupFilter` 会读它(`previously_seen_posts_backup_filter.rs:14`)。但在当前这版代码里,负责填它的 `ImpressedPostsQueryHydrator` 被构造成了一个**未挂载的局部变量**(`phoenix_candidate_pipeline.rs:234-236`,变量名带下划线前缀),没有进流水线。所以该字段当前不被任何生效的 hydrator 填充 —— 这是源码现状,如实记下。\n\n## 五、可开关的画像数据\n\n除了上面那些\"基本盘\",源码里还有一批 hydrator 查的是更细的画像数据。它们的共同点是:**都带 `enable()` 开关**,由 feature switch(灰度/实验开关)控制,不一定每次请求都生效。逐个列出(均在 `phoenix_candidate_pipeline.rs:185-232` 挂载):\n\n| 数据 | hydrator | 开关(节选) |\n|------|----------|--------------|\n| 关注的 Grok 话题 | `FollowedGrokTopicsQueryHydrator` | `EnableContextFeatures` 等 |\n| 关注的 Starter Pack | `FollowedStarterPacksQueryHydrator` | `EnableContextFeatures` |\n| 推断的 Grok 话题 | `InferredGrokTopicsQueryHydrator` | `EnableGrokTopicsHydration` |\n| 用户画像(demographics) | `UserDemographicsQueryHydrator` | `EnableContextFeatures` |\n| 推断性别 | `UserInferredGenderQueryHydrator` | `EnableInferredGenderHydration` |\n| IP 推断的地理位置 | `IpQueryHydrator` | `EnableIpFeature` + IP 非空 |\n| 互关 minhash | `MutualFollowQueryHydrator` | `EnableMutualFollowJaccardHydration` |\n| 上次请求时间戳 | `PastRequestTimestampsQueryHydrator` | `EnableUrtMigrationComponents` |\n\n关于这一类:\n\n- **\"关注的话题 / Starter Pack\"是你主动选的;\"推断的话题 / 推断性别\"是算法估的** —— 注意区分。推断类是模型对你的猜测,不是你填的。\n- **新账号会触发额外推断**:比如推断性别,若存储里查不到、且判断你是新用户,会现场调一个预测服务算一个(`user_inferred_gender_query_hydrator.rs:35-39`)。\n- **带 `enable()` 开关意味着\"用不用是可调的\"**。某次请求到底查没查这些,取决于你这个用户命中了哪组 feature switch 配置。开源仓库给了机制(有这些 hydrator),但**没给**线上开关的真实状态。所以诚实的说法是:这些是算法**有能力**读取的数据,具体某次读没读,不在开源仓库能确定的范围。\n\n## 把它收成一句话\n\n把开源代码里\"算法读你哪些数据\"摊开,大致是四块:\n\n1. **你的社交图与设置** —— 关注/拉黑/静音/订阅名单、屏蔽词、粉丝数。其中拉黑/静音/屏蔽词是你给自己设的\"剔除规则\"。\n2. **你最近的真实互动行为** —— 这是核心。模型从你点赞、回复、转发、停留的行为序列里学你的偏好,而不是读你填的标签。\n3. **这次请求的上下文** —— 国家、语言、设备、客户端、翻到第几页。\n4. **去重与画像** —— 你看过/被推过什么(防重复);以及一批可开关的细粒度画像(话题、地理、推断属性)。\n\n最该记住的一点:**算法对你的判断,主力来自\"你实际做了什么\"**(第 2 块)。这也是为什么 [operating-myths](#operating-myths) 反复强调\"你面对的不是算法,是你自己行为的回声\"。\n\n> 再说一次边界:本页是对**开源仓库 `xai-org/x-algorithm`** 的忠实清点 —— 列的是这套代码里看得见的 query hydrator 和它们查的字段。它不声称这是 X 公司收集数据的全集,也不推测仓库之外的事。能追溯到 `文件:行号` 的才写进来了。\n\n## 出处\n\n| 核心结论 | 技术页 / 源码 |\n|----------|----------------|\n| `UserFeatures` 共 6 字段:关注/拉黑/静音/订阅/屏蔽词/粉丝数 | `home-mixer/models/user_features.rs:7-14` |\n| 拉黑/静音的作者被剔除候选 | `home-mixer/filters/author_socialgraph_filter.rs:33-52` |\n| 屏蔽词命中正文即剔除候选 | `home-mixer/filters/muted_keyword_filter.rs:45-52` |\n| 关注名单参与站内判定 + 新用户判定 | `home-mixer/candidate_hydrators/in_network_candidate_hydrator.rs:21-33`、`scorers/ranking_scorer.rs:229-238` |\n| 互动行为序列由 `ScoringSequence`/`RetrievalSequence` hydrator 拉取 | `home-mixer/query_hydrators/scoring_sequence_query_hydrator.rs`、`retrieval_sequence_query_hydrator.rs`;模型如何用见 [phoenix-ranking](#phoenix-ranking) |\n| 行为序列是模型核心输入,含动作与停留 | [phoenix-ranking](#phoenix-ranking);`phoenix/recsys_model.py` |\n| 请求上下文(user_id/国家/语言/设备/cursor)由 QueryBuilder 从 proto 填入 | `home-mixer/models/query.rs:24-95`、`home-mixer/server.rs:89-121` |\n| `seen_ids`/布隆过滤器用于去重过滤 | `home-mixer/filters/previously_seen_posts_filter.rs:23-30` |\n| `served_ids`/服务历史由 `ServedHistoryQueryHydrator` 查 | `home-mixer/query_hydrators/served_history_query_hydrator.rs` |\n| 15 个内层 query hydrator 的完整挂载清单 | `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:185-232` |\n| 可开关画像数据各带 `enable()`,由 feature switch 控制 | 各 hydrator 文件的 `enable()` 方法 |\n| `impressed_post_ids` 的 hydrator 当前未挂载 | `home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:234-236` |\n\n精确语义与行号以技术页的「源码锚点」为准。\n\n## 相关页面\n\n- [how-it-works](#how-it-works) —— 白话总览:For You 端到端怎么运转\n- [operating-myths](#operating-myths) —— 运营迷思 vs 源码真相:为什么\"你面对的是自己行为的回声\"\n- [phoenix-ranking](#phoenix-ranking) —— 排序模型如何用你的互动行为序列\n- [home-mixer-orchestration](#home-mixer-orchestration) —— query hydrator 在编排层的位置\n- [filtering-pipeline](#filtering-pipeline) —— 拉黑/静音/屏蔽词/去重在过滤流水线里的细节\n- [thunder-in-network-store](#thunder-in-network-store) —— 关注名单如何用于拉取站内帖子\n- [glossary](#glossary) —— 术语速查表\n"}, "open-source-vs-production": {"title": "开源版 vs 线上真实算法:已知差异清单", "type": "guide", "group": "白话导览(Guide)", "md": "# 开源版 vs 线上真实算法:已知差异清单\n\n> 这一页只回答一个问题:`xai-org/x-algorithm` 这份开源代码,和 X 线上真实跑的 For You 算法,**已知的差距有哪些**?\n> 规矩和别的 guide 页一样 —— 只写有依据的:要么是 README / 源码自己说的,要么是本 wiki 逐行核验过、并在 [faq](#faq) 里记下来的。**仓库没说、代码里看不出来的,就写\"无法从仓库得知\",不臆测线上长什么样。**\n>\n> 它是 [operating-myths](#operating-myths) 末尾「边界」一节和 [faq](#faq)「这就是 X 线上跑的真实代码吗」那一条的展开版。\n\n## 一句话定位:有代表性的简化快照\n\n仓库自己的定性是 \"representative simplified snapshot\" —— **架构有代表性,但是一份简化的、冻结的快照**。\n\n`phoenix/README.md:5` 的原话:这份代码 \"is **representative of** the model used internally **with the exception of specific scaling optimizations**\"(代表了内部使用的模型,但省略了特定的扩展优化)。配合 `phoenix/README.md:28-31` 的 \"About This Release\" 一节:公开的是 mini 版模型、是持续训练过程中的一个**冻结 checkpoint**、配的是一份演示用的体育语料。\n\n所以读这份代码的正确姿势:**学的是机制和架构,不是线上的具体规模与数值。** 这条贯穿整页。\n\n## 简化与省略:仓库明确说了\"这里删过\"\n\n下面每一条,要么 README 自己点名,要么本 wiki 的技术页逐行核验过。\n\n### 1|模型是 mini 版,不是生产规模\n\n`phoenix/README.md:29` 写得很直接:这是 \"a **mini version** of the Phoenix model\",而 \"Production uses a **larger model** with more layers and wider embeddings\"(线上用的是更大的模型,层更多、嵌入更宽)。\n\n公开 mini 模型有多小,看 `phoenix/README.md:254-268` 的配置表:嵌入维度 128、4 层 transformer、4 个注意力头。线上具体大到什么程度 —— **仓库没给数字,无法得知**,只知道方向是\"更大、更宽、更深\"。\n\n> 注:关于 mini 模型尺寸,仓库内部有一处自相矛盾,见下面「源码与文档的 3 处出入」第①条。\n\n### 2|完整 Grok 的 MoE 被拿掉了,换成稠密 FFN\n\n线上排序用的是 Grok 改造的 transformer。完整的 Grok-1 是 **MoE(Mixture-of-Experts,多专家)** 架构 —— 多个专家子网络 + 一个路由器决定每个 token 走哪个专家。\n\n开源版**没有 MoE**:它的前馈层是一个普通的稠密块 `DenseBlock`,没有专家、没有路由。这是开源版与完整 Grok-1 最显著的一处差异。详见 [grok-transformer](#grok-transformer)(该页确认 `grok.py` 全文搜不到任何 expert / router / gating 代码)。`phoenix/README.md:5` 把这类删减归在 \"specific scaling optimizations\" 名下。\n\n### 3|\"特定扩展优化\"被省略\n\n承上,`phoenix/README.md:5` 明说省略了 \"specific scaling optimizations\" —— 那些让模型能在生产规模上高效训练 / 推理的工程优化。MoE 是其中一类。**这句话本身是个口袋**:仓库没有逐条列出省了哪些优化,所以\"线上还多做了什么\"这一层,**只能确定有、无法确定具体是什么**。\n\n### 4|没有线上 feature switch 的真实数值\n\n这是对运营 / 创作者最关键的一条。系统里**所有**可调的权重和系数 —— 22 个行为权重、作者多样性的衰减因子、站外(OON)降权系数 —— 都不是写死在代码里的常量,而是从 feature switch 参数读进来的(`ScoringWeights::from_params`,`ranking_scorer.rs:42-66`)。\n\n开源仓库给的是**读参数的代码**,不是**参数的线上取值**。也就是说:\n\n- 你能从代码确认\"负向行为是负权重\"\"站外候选会乘一个小于 1 的系数\"——**机制是确定的**;\n- 你**无法**得知\"点赞权重到底是几\"\"OON 系数是 0.5 还是 0.8\"——**数值不在仓库里**。\n\n而且这些参数 X 不发版就能随时改、还能跑 A/B(`operating-myths` 迷思六已展开)。所以即便某天泄露了一组数值,它也只是某一刻、某一组用户的快照。\n\n### 5|不含训练数据与训练管线\n\n仓库带的是**一个预训练好的 mini 模型 + 一条推理脚本**,不是训练系统。\n\n- 模型以导出的 `.npz` checkpoint 形式分发,`run_pipeline.py` 只做加载和前向推理(详见 [run-pipeline](#run-pipeline))。\n- `phoenix/README.md:30` 点明这是 \"a **frozen checkpoint**\" —— 线上 Phoenix 是 \"trained **continuously** on real-time data\"(在实时数据上持续训练),开源的只是这个持续过程中\"某一时刻的快照\"。\n- 配套语料 `sports_corpus.npz` 是约 53.7 万条体育帖、取自一个 6 小时窗口、按 \"Sports\" 话题筛出来的 **demo 语料**(`phoenix/README.md:31`),不是线上真实候选库。\n\n所以:训练用什么数据、损失函数怎么设计、持续训练怎么调度 —— **这些都不在仓库里,无法得知**。\n\n### 6|在线服务依赖 X 内部基础设施,无法独立跑起来\n\n仓库分 ML 部分和在线服务部分,可运行性不一样:\n\n- **能跑**:Phoenix(ML 部分)。带 mini 模型和 `run_pipeline.py`,能在示例语料上完整跑通\"召回 → 排序\"。\n- **不能独立跑**:在线服务 —— home-mixer(编排)、Thunder(站内库)、Grox(内容理解)。它们依赖大量 X 内部基础设施(gRPC 服务、Kafka 流、Strato 等),仓库**主要供阅读架构**,不能脱离 X 环境运行。\n\n这一点 [faq](#faq)「我想自己跑一下,可以吗」已说明,[run-pipeline](#run-pipeline) 是能跑的那条路径的入口。\n\n## 源码与官方文档的 3 处出入\n\n本 wiki 在初次逐行核验时,发现仓库**自己内部**有 3 处对不上 —— 不是\"开源 vs 线上\"的差异,而是\"README 怎么说 vs 代码怎么写\"的出入。处理原则统一:**以代码为准**。这 3 条全部经过亲自打开源码核对。\n\n### ① mini 模型尺寸:两个 README 数字不一致\n\n| 出处 | 说法 |\n|------|------|\n| 仓库根 `README.md:32` | \"256-dim embeddings, **4** attention heads, **2** transformer layers\" |\n| `phoenix/README.md:29` | \"**128-dim, 4-layer** transformer\" |\n| `phoenix/README.md:254-268` 配置表 | 嵌入维度 **128**、**4** 层、**4** 头、key_size 32 |\n\n两处对不上:根 README 说 256 维 / 2 层,phoenix README 说 128 维 / 4 层。\n\n**裁定**:`phoenix/README.md` 的配置表与代码导出的真实配置一致,wiki 以 128 维 / 4 层为准。技术细节见 [phoenix-ranking](#phoenix-ranking) 与 [grok-transformer](#grok-transformer)。\n\n### ② 打分器数量:README 说 4 个独立 Scorer,代码只编译 3 个\n\n仓库根 `README.md` 在架构图、Pipeline Stages、Scoring 三处都把打分描述成几个**独立的 Scorer**:Phoenix Scorer、Weighted Scorer、Author Diversity Scorer、OON Scorer(见 `README.md:107-122, 251-256, 286`)。\n\n但实际编译进系统的只有 3 个。模块声明文件 `home-mixer/scorers/mod.rs` 全文只有三行,声明的是 `phoenix_scorer`、`ranking_scorer`、`vm_ranker` —— 仅此三个。\n\n`scorers/` 目录里**确实有** `weighted_scorer.rs`、`author_diversity_scorer.rs`、`oon_scorer.rs` 这三个文件 —— 但 `mod.rs` 没有声明它们,**它们不在编译模块树内**。加权求和、作者多样性衰减、站外降权这三段逻辑,实际是**合并实现在 `RankingScorer` 一个打分器内部**的(`ranking_scorer.rs` 的 `score()` 分三步做完)。\n\n**裁定**:README 描述的是**概念阶段**;代码实现里三段逻辑合并进了 `RankingScorer`。以代码为准,详见 [scoring-and-ranking](#scoring-and-ranking)。\n\n> 这条出入有实际意义:看 README 容易以为\"加权\"\"多样性\"\"OON\"是三个能独立开关、独立替换的部件;代码里它们是强耦合的三步(多样性依赖加权结果、OON 依赖多样性结果),合在一个打分器里。\n\n### ③ 候选隔离掩码:README 图说\"双向\",代码是\"因果\"\n\n[候选隔离掩码](#candidate-isolation-masking)把\"用户 + 历史 + 候选\"拼成一条序列。问题出在\"用户段和历史段之间怎么注意\":\n\n- `phoenix/README.md:158` 的掩码示意图,图例写 \"User + History: Full **bidirectional** attention among themselves\"(用户和历史段彼此**完全双向**注意力)。\n- 但代码 `make_recsys_attn_mask`(`grok.py:62`)是从一个 **`jnp.tril`(下三角)** 因果掩码起步的;`grok.py:47` 的函数注释也明写 \"Positions 0 to candidate_start_offset-1 (user+history): **causal** attention\"。\n\n下三角 = 因果:位置 `i` 只能注意 `≤ i` 的位置。代码是**因果注意力**,README 图例说**双向** —— 两者不符。\n\n**裁定**:以代码为准,用户 + 历史段是因果注意力。详见 [candidate-isolation-masking](#candidate-isolation-masking)。\n\n## 怎么用这份理解\n\n把上面汇总成一条可操作的判断准则:\n\n**本 wiki 的所有结论,都是\"机制层面\"的,不是\"线上数值层面\"的。**\n\n- ✅ 可以说:\"负向行为是负权重\"\"站外候选会被乘一个小于 1 的系数降权\"\"每条候选打分时互相看不见\"——这些是**代码里写死的机制**,开源版和线上一致(架构有代表性)。\n- ❌ 不能说:\"点赞权重是 X\"\"OON 降权降到几折\"\"线上模型有多少层\"——这些是**线上参数 / 规模**,不在仓库里。\n\n所以你会看到 [operating-myths](#operating-myths) 反复强调\"方向是降权\"\"这是负权重\",而从不给一个具体倍数 —— 这不是含糊,是**严格停在仓库能支撑的边界上**。一个判断别人解读靠不靠谱的简单标准:**凡是给出\"线上具体数值\"的算法解读,要么来自仓库之外的渠道,要么是编的** —— 因为这份开源仓库里根本没有那些数。\n\n## 一页速查\n\n| 维度 | 开源仓库给了什么 | 线上是什么 / 能否得知 |\n|------|------------------|------------------------|\n| 整体定位 | representative simplified snapshot(`phoenix/README.md:5`) | 架构代表性强,但实现有简化 |\n| 模型规模 | mini 版:128 维 / 4 层 / 4 头(`phoenix/README.md:254-268`) | 更大、更宽、更深;**具体数字无法得知** |\n| Grok 结构 | 稠密 `DenseBlock` FFN,无 MoE([grok-transformer](#grok-transformer)) | 完整 Grok-1 是 MoE |\n| 扩展优化 | 明确省略 \"specific scaling optimizations\"(`phoenix/README.md:5`) | 省了哪些**未逐条列出** |\n| 权重 / 系数 | 读 feature switch 参数的代码(`ranking_scorer.rs:42-66`) | 真实数值**不在仓库**,且可随时改 + A/B |\n| 训练 | 一个冻结的预训练 mini checkpoint(`phoenix/README.md:30`) | 线上持续训练;训练数据 / 管线**不在仓库** |\n| 语料 | demo 体育语料 ~53.7 万条(`phoenix/README.md:31`) | 非线上真实候选库 |\n| 可运行性 | Phoenix 能跑;home-mixer / Thunder / Grox 不能独立跑 | 在线服务依赖 X 内部基础设施 |\n| README 内部出入 | 3 处:模型尺寸 / 打分器数量 / 掩码\"双向 vs 因果\" | 统一以代码为准(见上一节) |\n\n## 出处\n\n| 核心结论 | 出处 |\n|----------|------|\n| \"representative... with the exception of specific scaling optimizations\" | `phoenix/README.md:5` |\n| mini 版 vs 线上更大模型 | `phoenix/README.md:29` |\n| mini 模型配置 128 维 / 4 层 / 4 头 | `phoenix/README.md:254-268` |\n| 冻结 checkpoint / 持续训练 | `phoenix/README.md:30` |\n| demo 体育语料 ~53.7 万条、6 小时窗口 | `phoenix/README.md:31` |\n| MoE 被去掉、改用稠密 `DenseBlock` | [grok-transformer](#grok-transformer);`phoenix/README.md:5` |\n| 权重 / 系数来自 feature switch 参数 | `home-mixer/scorers/ranking_scorer.rs:42-66` |\n| 出入②:`mod.rs` 只声明 3 个打分器 | `home-mixer/scorers/mod.rs:1-3`;`README.md:107-122, 251-256, 286` |\n| 出入③:掩码代码用 `jnp.tril`(因果),注释写 \"causal\" | `phoenix/grok.py:47, 62`;`phoenix/README.md:158` |\n| 在线服务依赖内部基础设施、无法独立运行 | [run-pipeline](#run-pipeline);[faq](#faq) |\n\n三处「源码与文档出入」的逐行核验记录,见 `changelog/2026-05-16-initial-creation.md`。精确语义以技术页与源码为准。\n\n## 相关页面\n\n- [operating-myths](#operating-myths) —— 运营迷思 vs 源码真相;本页是其末尾「边界」一节的展开\n- [faq](#faq) —— 「这就是 X 线上跑的真实代码吗」一条的展开\n- [grok-transformer](#grok-transformer) —— Grok transformer 骨架:MoE 为何被去掉、改成什么\n- [phoenix-ranking](#phoenix-ranking) —— 排序模型:mini 配置的尺寸细节\n- [scoring-and-ranking](#scoring-and-ranking) —— 打分器为何只有 3 个、权重为何全是参数\n- [candidate-isolation-masking](#candidate-isolation-masking) —— 候选隔离掩码:因果 vs 双向的代码真相\n- [run-pipeline](#run-pipeline) —— 能跑起来的那条路径:Phoenix 端到端推理脚本\n- [how-it-works](#how-it-works) —— 端到端白话总览\n"}, "system-architecture": {"title": "系统架构总览", "type": "concept", "group": "总览", "md": "# 系统架构总览\n\n## 这一页回答什么\n\nX \"For You\" 信息流推荐系统从一个请求到一份排序结果,中间经过哪些组件、按什么顺序、谁调用谁。这是整个 wiki 的入口页,其它页面是对各子系统的深入。\n\n## 核心结论\n\n1. **两个内容来源**:站内(Thunder,关注的人发的帖)+ 站外(Phoenix 召回,从全局语料里 ML 检索)。两路候选合并后统一排序。\n2. **一个排序模型**:Phoenix —— 一个基于 Grok 的 transformer,预测每条帖子的多种互动概率,加权成最终分。\n3. **零手工特征**:系统几乎删除了所有手工特征和启发式规则,由 transformer 从用户互动序列直接学习相关性(`README.md:55`)。\n4. **两层流水线嵌套**:外层 [ForYouCandidatePipeline](#home-mixer-orchestration) 负责把帖子流与广告、Who-to-Follow、Prompts 混排;内层 `PhoenixCandidatePipeline` 负责真正的召回、过滤、打分、选择。\n5. **统一框架**:两条流水线都构建在 [candidate-pipeline](#candidate-pipeline-framework) 框架之上,阶段、并行性、错误处理由框架统一保证。\n\n## 五大组件\n\n| 组件 | 语言 | 角色 | 详见 |\n|------|------|------|------|\n| **home-mixer** | Rust | 编排层:组装 For You 流水线,暴露 gRPC | [home-mixer-orchestration](#home-mixer-orchestration) |\n| **candidate-pipeline** | Rust | 可复用流水线框架(7 个 trait + 执行器) | [candidate-pipeline-framework](#candidate-pipeline-framework)、[candidate-pipeline](#candidate-pipeline) |\n| **thunder** | Rust | 站内帖子内存库,亚毫秒级查询 | [thunder-in-network-store](#thunder-in-network-store) |\n| **phoenix** | Python/JAX | ML 核心:双塔召回 + Grok transformer 排序 | [phoenix-retrieval](#phoenix-retrieval)、[phoenix-ranking](#phoenix-ranking) |\n| **grox** | Python | 内容理解服务(离线/流式,产出安全标签、嵌入) | [grox-architecture](#grox-architecture) |\n\nGrox 不在请求路径上 —— 它是独立的流式服务,产出的信号(安全标签、内容嵌入、质量分)反哺其它组件。详见 [grox-architecture](#grox-architecture)。\n\n## 端到端数据流\n\n```mermaid\nflowchart TB\n    REQ([For You 请求]) --> FY\n    subgraph FY[ForYouCandidatePipeline 外层]\n        FYQ[Query 水合<br/>served history / 历史时间戳] --> FYS\n        FYS[5 个源:ScoredPosts / Ads<br/>WhoToFollow / Prompts / PushToHome] --> BLEND\n        BLEND[BlenderSelector<br/>帖子 + 广告混排]\n    end\n    FYS -. ScoredPostsSource 内含 .-> PX\n    subgraph PX[PhoenixCandidatePipeline 内层]\n        PXQ[15 个 Query 水合器<br/>互动序列 / 关注 / 屏蔽 / Bloom] --> PXS\n        PXS[6 个候选源] --> PXH[10 个候选水合器]\n        PXH --> PXF[14 个预打分过滤器]\n        PXF --> PXSC[3 个打分器]\n        PXSC --> PXSEL[TopKScoreSelector]\n        PXSEL --> PXPH[6 个选后水合器]\n        PXPH --> PXPF[3 个选后过滤器]\n    end\n    PXS -. 站内 .-> TH[(Thunder)]\n    PXS -. 站外 .-> PHR[Phoenix 召回]\n    PXSC --- PHRANK[Phoenix 排序]\n    BLEND --> RESP([排序后的信息流])\n```\n\n## 两层流水线嵌套\n\nhome-mixer 实际跑的是**两条** `CandidatePipeline`,外层把内层当成一个候选源:\n\n### 外层:ForYouCandidatePipeline\n\n`home-mixer/candidate_pipeline/for_you_candidate_pipeline.rs:48` 定义。泛型为 `CandidatePipeline<ScoredPostsQuery, FeedItem>` —— 候选类型是 `FeedItem`(可以是帖子、广告、模块)。\n\n它只用到框架的 4 个阶段(`for_you_candidate_pipeline.rs:155-195`),其余阶段返回空切片:\n\n- **2 个 query 水合器**:`ServedHistoryQueryHydrator`、`PastRequestTimestampsQueryHydrator`\n- **5 个源**(`for_you_candidate_pipeline.rs:164-177`):\n  - `ScoredPostsSource` —— 持有 `ScoredPostsServer`,内部执行 `PhoenixCandidatePipeline`\n  - `AdsSource`、`WhoToFollowSource`、`PromptsSource`、`PushToHomeSource`\n- **选择器**:`BlenderSelector` —— 把帖子和广告等混排\n- **8 个 side effect**:广告注入日志、seen ids 发 Kafka、served candidates 发 Kafka、客户端事件、响应统计、更新历史时间戳、更新/截断 served history\n\n外层没有 hydrator / filter / scorer(`for_you_candidate_pipeline.rs:247-269` 均返回 `&[]`)。结果规模 `params::FOR_YOU_MAX_RESULT_SIZE`。\n\n### 内层:PhoenixCandidatePipeline\n\n`home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs:143` 定义。泛型为 `CandidatePipeline<ScoredPostsQuery, PostCandidate>` —— 候选类型是 `PostCandidate`(纯帖子)。这是真正干活的流水线:\n\n| 阶段 | 数量 | 内容(节选) |\n|------|------|------|\n| Query 水合器 | 15 | `ScoringSequenceQueryHydrator`、`RetrievalSequenceQueryHydrator`、屏蔽/静音/关注/订阅用户、互关、用户画像、关注话题、Bloom 过滤器…(`phoenix_candidate_pipeline.rs:185-232`) |\n| 源 | 6 | `ThunderSource`、`TweetMixerSource`、`PhoenixSource`、`PhoenixTopicsSource`、`PhoenixMOESource`、`CachedPostsSource`(`:250-257`) |\n| 候选水合器 | 10 | `InNetworkCandidateHydrator`、`CoreDataCandidateHydrator`、`QuoteHydrator`、`VideoDurationCandidateHydrator`、`HasMediaHydrator`、`SubscriptionHydrator`、`GizmoduckCandidateHydrator`、`BlockedByHydrator`、`FilteredTopicsHydrator`、`LanguageCodeHydrator`(`:259-272`) |\n| 过滤器 | 14 | 见 [filtering-pipeline](#filtering-pipeline)(`:274-289`) |\n| 打分器 | 3 | `PhoenixScorer`、`RankingScorer`、`VMRanker`(`:291-300`) |\n| 选择器 | 1 | `TopKScoreSelector`(`:302`) |\n| 选后水合器 | 6 | `VFCandidateHydrator`、`AdsBrandSafetyHydrator`、`AdsBrandSafetyVfHydrator`、`TweetTypeMetricsHydrator`、`FollowingRepliedUsersHydrator`、`MutualFollowJaccardHydrator`(`:304-315`) |\n| 选后过滤器 | 3 | `VFFilter`、`AncillaryVFFilter`、`DedupConversationFilter`(`:317-321`) |\n| Side effect | 6 | Phoenix 实验、reranking Kafka、Redis 缓存、统计、互关统计、Phoenix 请求缓存(`:323-338`) |\n\n结果规模 `params::RESULT_SIZE`。\n\n## 流水线十阶段\n\n无论外层内层,执行顺序由框架的 `CandidatePipeline::execute()` 统一定义(`candidate-pipeline/candidate_pipeline.rs:88-137`)。`PipelineStage` 枚举共 10 个阶段(`candidate_pipeline.rs:21-33`):\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:89-137(节选)\nasync fn execute(&self, query: Q) -> PipelineResult<Q, C> {\n    let hydrated_query = self.hydrate_query(query).await;            // 1\n    let hydrated_query = self.hydrate_dependent_query(hydrated_query).await; // 2\n    let candidates = self.fetch_candidates(&hydrated_query).await;   // 3\n    let hydrated_candidates = self.hydrate(&hydrated_query, candidates).await; // 4\n    let (kept_candidates, mut filtered_candidates) =\n        self.filter(&hydrated_query, hydrated_candidates.clone());   // 5\n    let scored_candidates = self.score(&hydrated_query, kept_candidates).await; // 6\n    let SelectResult { selected, non_selected } =\n        self.select(&hydrated_query, scored_candidates);             // 7\n    let post_hydrated = self.hydrate_post_selection(..).await;       // 8\n    let (mut final_candidates, post_filtered) =\n        self.filter_post_selection(..);                              // 9\n    // 截断到 result_size,运行 side effects                          // 10\n    self.run_side_effects(input);\n    ...\n}\n```\n\n| # | 阶段 | 并行性 | 说明 |\n|---|------|--------|------|\n| 1 | Query 水合 | **并行** | `join_all` 跑所有水合器,合并进 query(`:202-218`) |\n| 2 | 依赖型 Query 水合 | **并行** | 在阶段 1 之后,可用前序结果(`:229-248`) |\n| 3 | 候选源 | **并行** | `join_all` 跑所有源,候选汇成一个 `Vec`(`:257-272`) |\n| 4 | 候选水合 | **并行** | 多个水合器并行作用于同一候选集(`:302-319`) |\n| 5 | 过滤 | **顺序** | 每个过滤器把候选切成 kept/removed,前序结果喂给后序(`:355-386`) |\n| 6 | 打分 | **顺序** | 每个打分器依次更新候选分数(`:394-404`) |\n| 7 | 选择 | 单次 | 排序 + 截断 |\n| 8 | 选后水合 | **并行** | 只作用于已选中的候选 |\n| 9 | 选后过滤 | **顺序** | 最终可见性 / 去重检查 |\n| 10 | Side effect | **并行后台** | `tokio::spawn` 异步执行,不阻塞响应(`:419-428`) |\n\n并行/顺序的取舍是刻意的:水合彼此独立故并行;过滤要让前序过滤塑造后序上下文故顺序。详见 [candidate-pipeline-framework](#candidate-pipeline-framework)。\n\n## 两阶段推荐:召回 + 排序\n\nPhoenix 在概念上是**召回 → 排序**两段(`phoenix/README.md`),映射到 home-mixer 流水线里是两个不同阶段:\n\n```mermaid\nflowchart LR\n    A[全局语料<br/>数百万] -->|阶段1 召回<br/>双塔点积 top-K| B[候选<br/>数百~上千]\n    B -->|阶段2 排序<br/>Grok transformer| C[排序结果]\n```\n\n- **召回** = 流水线的**源**。`PhoenixSource` / `PhoenixTopicsSource` / `PhoenixMOESource` 调用 Phoenix 召回服务,用 [双塔模型](#phoenix-retrieval) 做近似最近邻检索。\n- **排序** = 流水线的**打分器**。`PhoenixScorer` 调用 [Phoenix 排序模型](#phoenix-ranking),输出多种互动概率;`RankingScorer` 把它们加权成最终分。\n\n两段共用 [Grok transformer](#grok-transformer) 骨架与 [哈希嵌入](#hash-based-embeddings)。\n\n## 候选从哪来,信号到哪去\n\n```mermaid\nflowchart TB\n    subgraph 候选源\n        TH[Thunder<br/>站内] \n        PH[Phoenix 召回<br/>站外]\n        TM[TweetMixer]\n        CA[缓存帖子]\n    end\n    TH & PH & TM & CA --> POOL[候选池]\n    POOL --> RANK[Phoenix 排序打分]\n    GROX[Grox 内容理解] -. 安全标签/嵌入/质量分 .-> TH\n    GROX -. .-> PH\n```\n\nThunder 从 Kafka 实时消费帖子事件维护内存库(见 [thunder-kafka-in
