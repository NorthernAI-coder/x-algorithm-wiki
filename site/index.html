 的核心是四个 `DashMap`(`thunder/posts/post_store.rs:39-53`):\n\n```rust\n// thunder/posts/post_store.rs:38-53\n#[derive(Clone)]\npub struct PostStore {\n    /// Full post data indexed by post_id\n    posts: Arc<DashMap<i64, LightPost>>,\n    /// Maps user_id to a deque of TinyPost references for original posts (non-reply, non-retweet)\n    original_posts_by_user: Arc<DashMap<i64, VecDeque<TinyPost>>>,\n    /// Maps user_id to a deque of TinyPost references for replies and retweets\n    secondary_posts_by_user: Arc<DashMap<i64, VecDeque<TinyPost>>>,\n    /// Maps user_id to a deque of TinyPost references for video posts\n    video_posts_by_user: Arc<DashMap<i64, VecDeque<TinyPost>>>,\n    deleted_posts: Arc<DashMap<i64, bool>>,\n    /// Retention period for posts in seconds\n    retention_seconds: u64,\n    /// Request timeout for get_posts_by_users iteration (0 = no timeout)\n    request_timeout: Duration,\n}\n```\n\n| 结构 | 键 | 值 | 作用 |\n|------|----|----|------|\n| `posts` | `post_id` | `LightPost` | 唯一一份帖子正文,三套时间线共享 |\n| `original_posts_by_user` | `author_id` | `VecDeque<TinyPost>` | 该作者的**原创帖**(非回复、非转发) |\n| `secondary_posts_by_user` | `author_id` | `VecDeque<TinyPost>` | 该作者的**回复 + 转发** |\n| `video_posts_by_user` | `author_id` | `VecDeque<TinyPost>` | 该作者的**视频帖**(原创视频或转发了带视频的原创) |\n| `deleted_posts` | `post_id` | `bool` | 删除墓碑集合(用途见 [thunder-kafka-ingestion](#thunder-kafka-ingestion)) |\n\n**为什么拆三套**:不同候选请求要的内容不同。普通 For You 请求要原创 + 回复/转发,视频请求(`is_video_request`)只要视频帖。把视频帖单独建一份队列,视频请求就不必扫全部帖子再过滤。代价是一条视频原创帖在内存里被两个队列引用 —— 但引用的是轻量的 `TinyPost`,正文 `LightPost` 仍只有一份。\n\n`TinyPost` 是 16 字节级别的极小结构(`post_store.rs:20-24`):\n\n```rust\n// thunder/posts/post_store.rs:19-24\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub struct TinyPost {\n    pub post_id: i64,\n    pub created_at: i64,\n}\n```\n\n把\"时间线\"和\"正文\"分离的好处:时间线按时间排序、按用户分组、频繁尾部追加和头部 trim,只需移动 16 字节;正文按 `post_id` 随机访问,只在回查时碰一次。`LightPost` 字段定义见 [post-store](#post-store)。\n\n### 入队时一条帖子归到哪些队列\n\n`insert_posts_internal`(`post_store.rs:115-168`)对每条新帖判定:\n\n```rust\n// thunder/posts/post_store.rs:118-166(节选)\nlet is_original = !post.is_reply && !post.is_retweet;\n// ... 去重后 ...\nif is_original {\n    self.original_posts_by_user.entry(author_id).or_default().push_back(tiny_post.clone());\n} else {\n    self.secondary_posts_by_user.entry(author_id).or_default().push_back(tiny_post.clone());\n}\n\nlet mut video_eligible = post.has_video;\n// 转发了一条带视频的原创 -> 也算视频帖\nif !video_eligible && post.is_retweet\n    && let Some(source_post_id) = post.source_post_id\n    && let Some(source_post) = self.posts.get(&source_post_id)\n{\n    video_eligible = !source_post.is_reply && source_post.has_video;\n}\nif post.is_reply {\n    video_eligible = false;   // 回复永远不进视频队列\n}\nif video_eligible {\n    self.video_posts_by_user.entry(author_id).or_default().push_back(tiny_post);\n}\n```\n\n三条规则值得记:\n1. **原创 vs secondary 二选一**:`is_original` 为真进 `original_posts_by_user`,否则进 `secondary_posts_by_user`,互斥。\n2. **视频队列是叠加的**:`video_posts_by_user` 与上面两个并列,不互斥 —— 视频原创帖会同时在原创队列和视频队列。\n3. **转发带视频的原创也算视频帖**:转发本身没有 `has_video`,但若它转的源帖是带视频的原创,这条转发也进视频队列;而**回复一律不算视频帖**。\n\n## gRPC 服务:ThunderServiceImpl\n\n`thunder_service.rs:29-36` 定义服务:\n\n```rust\n// thunder/thunder_service.rs:29-36\npub struct ThunderServiceImpl {\n    /// PostStore for retrieving posts by user ID\n    post_store: Arc<PostStore>,\n    /// StratoClient for fetching following lists when not provided\n    strato_client: Arc<StratoClient>,\n    /// Semaphore to limit concurrent requests and prevent overload\n    request_semaphore: Arc<Semaphore>,\n}\n```\n\n它实现 proto 生成的 `InNetworkPostsService` trait,只有一个 RPC:`get_in_network_posts`。`server()` 方法启用 Zstd 压缩(`thunder_service.rs:56-60`):\n\n```rust\n// thunder/thunder_service.rs:56-60\npub fn server(self) -> InNetworkPostsServiceServer<Self> {\n    InNetworkPostsServiceServer::new(self)\n        .accept_compressed(tonic::codec::CompressionEncoding::Zstd)\n        .send_compressed(tonic::codec::CompressionEncoding::Zstd)\n}\n```\n\n请求/响应 proto 类型来自 `xai_thunder_proto`。`GetInNetworkPostsRequest` 的字段从调用方 `home-mixer/sources/thunder_source.rs:35-43` 可完整还原:`user_id`、`following_user_ids`、`max_results`、`exclude_tweet_ids`、`algorithm`、`debug`、`is_video_request`。\n\n## 一次 get_in_network_posts 的完整路径\n\n```mermaid\nflowchart TD\n    A[gRPC 请求到达] --> B{try_acquire<br/>信号量许可?}\n    B -- 抢不到 --> R[返回 RESOURCE_EXHAUSTED]\n    B -- 抢到 --> C[IN_FLIGHT_REQUESTS.inc<br/>建 InFlightGuard]\n    C --> D{following_user_ids<br/>为空且 debug?}\n    D -- 是 --> E[StratoClient<br/>拉关注列表]\n    D -- 否 --> F[用请求里的列表]\n    E --> G\n    F --> G[确定 max_results]\n    G --> H[following / exclude<br/>各截断到 MAX_INPUT_LIST_SIZE]\n    H --> I[spawn_blocking 进 CPU 线程池]\n    I --> J{is_video_request?}\n    J -- 是 --> K[get_videos_by_users]\n    J -- 否 --> L[get_all_posts_by_users]\n    K --> M[score_recent<br/>按 created_at 降序取 top-K]\n    L --> M\n    M --> N[GetInNetworkPostsResponse]\n    N --> O[InFlightGuard drop<br/>IN_FLIGHT_REQUESTS.dec]\n```\n\n### 第 1 步:信号量限流\n\n`thunder_service.rs:160-180`:\n\n```rust\n// thunder/thunder_service.rs:158-180(节选)\nlet _permit = match self.request_semaphore.try_acquire() {\n    Ok(permit) => {\n        IN_FLIGHT_REQUESTS.inc();\n        permit\n    }\n    Err(_) => {\n        REJECTED_REQUESTS.inc();\n        return Err(Status::resource_exhausted(\"Server at capacity, please retry\"));\n    }\n};\n// 用 guard 在请求结束时递减 in-flight 计数\nstruct InFlightGuard;\nimpl Drop for InFlightGuard {\n    fn drop(&mut self) { IN_FLIGHT_REQUESTS.dec(); }\n}\nlet _in_flight_guard = InFlightGuard;\n```\n\n关键是 `try_acquire` 而非 `acquire` —— **不排队**。在线推荐对尾延迟极敏感,排队意味着请求在队列里等到超时还是失败,不如立刻 `RESOURCE_EXHAUSTED` 让调用方走降级或重试。许可数是 `max_concurrent_requests`(构造时传入)。`InFlightGuard` 的 `Drop` 保证不论成功、出错还是 panic,`IN_FLIGHT_REQUESTS` gauge 都会准确递减。\n\n### 第 2 步:关注列表回退\n\n正常情况下 `following_user_ids` 由调用方([home-mixer](#home-mixer-orchestration) 已经水合好关注图)直接带在请求里。只有当列表为空 **且** `debug` 为真时,Thunder 才自己去 `StratoClient` 拉(`thunder_service.rs:197-229`)。这是一条调试/兜底路径,生产路径不会触发 —— 多花一次 Strato RTT(`GET_IN_NETWORK_POSTS_DURATION` 与 `..._WITHOUT_STRATO` 两个计时器就是为了把这次 RTT 摘出来单独观测,`thunder_service.rs:183,236`)。\n\n### 第 3 步:输入截断\n\n`following_user_ids` 和 `exclude_tweet_ids` 都被截断到前 `MAX_INPUT_LIST_SIZE` 条(`thunder_service.rs:256-272`),超出会打 `warn`。这是防御性上限:一个关注了几十万人的账号不应让单次查询无限扫下去。\n\n### 第 4 步:阻塞任务里取候选\n\n真正的取数在 `spawn_blocking` 里(`thunder_service.rs:279-314`):\n\n```rust\n// thunder/thunder_service.rs:279-312(节选)\nlet proto_posts = tokio::task::spawn_blocking(move || {\n    let exclude_tweet_ids: HashSet<i64> =\n        exclude_tweet_ids.iter().map(|&id| id as i64).collect();\n    let start_time = Instant::now();\n\n    let all_posts: Vec<LightPost> = if req.is_video_request {\n        post_store.get_videos_by_users(&following_user_ids, &exclude_tweet_ids, start_time, request_user_id)\n    } else {\n        post_store.get_all_posts_by_users(&following_user_ids, &exclude_tweet_ids, start_time, request_user_id)\n    };\n    ThunderServiceImpl::analyze_and_report_post_statistics(&all_posts, \"retrieved\");\n    let scored_posts = score_recent(all_posts, max_results);\n    ThunderServiceImpl::analyze_and_report_post_statistics(&scored_posts, \"scored\");\n    scored_posts\n}).await ...;\n```\n\n**为什么 spawn_blocking**:取候选是纯 CPU、可能扫上千个用户队列的同步循环。直接在 tokio async 任务里跑会饿死同一 worker 线程上的其它异步任务(网络 IO、其它请求)。`spawn_blocking` 把它丢到专门的阻塞线程池。`start_time` 在这里取,用于下面的 per-request 超时。`exclude_tweet_ids` 在此从 `Vec` 转成 `HashSet` 以便 O(1) 过滤。\n\n## 服务站内候选:两条取数路径\n\n### get_all_posts_by_users —— 普通请求\n\n`post_store.rs:193-225`:对同一批关注用户分别查原创队列和 secondary 队列,合并:\n\n```rust\n// thunder/posts/post_store.rs:193-225(节选)\npub fn get_all_posts_by_users(&self, user_ids: &[i64], ...) -> Vec<LightPost> {\n    let following_users_set: HashSet<i64> = user_ids.iter().copied().collect();\n\n    let mut all_posts = self.get_posts_from_map(\n        &self.original_posts_by_user, user_ids,\n        MAX_ORIGINAL_POSTS_PER_AUTHOR,\n        exclude_tweet_ids, &HashSet::new(),       // 原创:不传 following set\n        start_time, request_user_id,\n    );\n    let secondary_posts = self.get_posts_from_map(\n        &self.secondary_posts_by_user, user_ids,\n        MAX_REPLY_POSTS_PER_AUTHOR,\n        exclude_tweet_ids, &following_users_set,  // secondary:传 following set\n        start_time, request_user_id,\n    );\n    all_posts.extend(secondary_posts);\n    POST_STORE_POSTS_RETURNED.observe(all_posts.len() as f64);\n    all_posts\n}\n```\n\n注意两次调用的差异:\n- 原创队列用 `MAX_ORIGINAL_POSTS_PER_AUTHOR` 做每作者上限,`following_users` 传**空集**。\n- secondary 队列用 `MAX_REPLY_POSTS_PER_AUTHOR`,`following_users` 传**实际关注集** —— 这个集合非空会触发 `get_posts_from_map` 里一段额外的回复可见性过滤(见下)。\n\n### get_videos_by_users —— 视频请求\n\n`post_store.rs:171-190`:只查 `video_posts_by_user` 一个队列,每作者上限 `MAX_VIDEO_POSTS_PER_AUTHOR`,`following_users` 传空集(视频帖不做回复过滤)。\n\n### get_posts_from_map —— 共用的取数核心\n\n三套队列的取数都汇到 `get_posts_from_map`(`post_store.rs:227-328`)。它对每个 `user_id` 做这条管线:\n\n```mermaid\nflowchart LR\n    A[user 的 VecDeque] -->|.rev 从最新| B[排除 exclude_tweet_ids]\n    B -->|take MAX_TINY_POSTS_PER_USER_SCAN| C[posts 表回查<br/>得 LightPost]\n    C --> D[过滤 deleted_posts]\n    D --> E[过滤 自己转自己]\n    E --> F[回复可见性过滤<br/>仅 secondary]\n    F -->|take max_per_user| G[累加进结果]\n```\n\n逐段对应源码(`post_store.rs:260-318`):\n\n```rust\n// thunder/posts/post_store.rs:264-317(节选)\n// 从最新往旧扫(reverse),先排掉已见的,再上扫描上限\nlet tiny_posts_iter = user_posts.iter().rev()\n    .filter(|post| !exclude_tweet_ids.contains(&post.post_id))\n    .take(MAX_TINY_POSTS_PER_USER_SCAN);\n\n// light-doc 回查:TinyPost -> LightPost。立刻 *value() 拷出来释放读锁\nlet light_post_iter_1 = tiny_posts_iter\n    .filter_map(|tiny_post| self.posts.get(&tiny_post.post_id).map(|r| *r.value()));\n\n// 过滤已删除\nlet light_post_iter = light_post_iter_1.filter(|post| {\n    if self.deleted_posts.get(&post.post_id).is_some() {\n        POST_STORE_DELETED_POSTS_FILTERED.inc(); false\n    } else { true }\n});\n\n// 过滤\"请求者自己的帖被自己转发\"\nlet light_post_iter = light_post_iter.filter(|post| {\n    !(post.is_retweet && post.source_user_id == Some(request_user_id))\n});\n// ... 回复可见性过滤 ...\nlight_posts.extend(filtered_post_iter.take(max_per_user));\n```\n\n几个要点:\n\n**(a) 从最新往旧扫**。`VecDeque` 尾部是最新帖(入队 `push_back`),`.iter().rev()` 即从最新开始。`MAX_TINY_POSTS_PER_USER_SCAN` 是扫描上限 —— 注释说\"防止一直回溯到用户不活跃的远古时期\"(`post_store.rs:265-266`)。对一个发帖很多的活跃账号,只看最近这一段就够。\n\n**(b) 回查时立刻拷贝**。`self.posts.get(...).map(|r| *r.value())` 把 `LightPost`(`Copy` 类型)立刻解引用拷出。注释明确写了原因(`post_store.rs:273-274`):**立刻释放读锁,避免在持有一个读锁时再去拿嵌套读锁,而写者正在等待 —— 这会死锁**。`DashMap` 是分片读写锁,这是必须的纪律。\n\n**(c) 自转自过滤**。`post.is_retweet && post.source_user_id == Some(request_user_id)` —— 请求者自己的原帖被别人转发后又出现在自己的 For You 里,过滤掉。\n\n### 回复可见性过滤\n\n`following_users` 非空(即 secondary 队列那次调用)时,多一段过滤(`post_store.rs:291-315`):\n\n```rust\n// thunder/posts/post_store.rs:291-315\nlet filtered_post_iter = light_post_iter.filter(|post| {\n    if following_users.is_empty() { return true; }\n    post.in_reply_to_post_id.is_none_or(|reply_to_post_id| {\n        if let Some(replied_to_post) = self.posts.get(&reply_to_post_id) {\n            // 回复的是一条原创帖(非转发非回复)-> 直接放行\n            if !replied_to_post.is_retweet && !replied_to_post.is_reply {\n                return true;\n            }\n            // 回复的是\"回复\"-> 要求:被回复的回复直接挂在会话根上,\n            //                  且本回复 @ 的用户在关注列表里\n            return post.conversation_id.is_some_and(|convo_id| {\n                let reply_to_reply_to_original =\n                    replied_to_post.in_reply_to_post_id == Some(convo_id);\n                let reply_to_followed_user = post.in_reply_to_user_id\n                    .map(|uid| following_users.contains(&uid))\n                    .unwrap_or(false);\n                reply_to_reply_to_original && reply_to_followed_user\n            });\n        }\n        false   // 被回复的帖子不在库里 -> 丢弃\n    })\n});\n```\n\n这段决定\"一条回复要不要给请求者看\",规则:\n\n| 这条 secondary 帖 | 处理 |\n|--------------------|------|\n| 不是回复(纯转发) | `in_reply_to_post_id` 为 `None` → 放行 |\n| 回复的是一条**原创帖** | 放行 |\n| 回复的是另一条**回复** | 仅当(被回复的回复直接挂会话根)且(本回复 @ 的用户被请求者关注)才放行 |\n| 被回复的帖子不在内存库 | 丢弃 |\n\n直觉:关注者对话第一层(回复原创帖)总是有意义的;深层嵌套回复只有在涉及你关注的人时才保留,避免把陌生人之间的长对话塞进信息流。\n\n## 按时效打分:score_recent\n\nThunder 的\"打分\"极简(`thunder_service.rs:333-339`):\n\n```rust\n// thunder/thunder_service.rs:333-339\n/// Score posts by recency (created_at timestamp, newer posts first)\nfn score_recent(mut light_posts: Vec<LightPost>, max_results: usize) -> Vec<LightPost> {\n    light_posts.sort_unstable_by_key(|post| Reverse(post.created_at));\n    light_posts.into_iter().take(max_results).collect()\n}\n```\n\n就是\"按创建时间降序、取前 `max_results` 条\"。**Thunder 不做相关性排序** —— 它只负责把站内最新的一批帖子拿出来,真正的多行为 ML 排序由下游 [RankingScorer](#scoring-and-ranking) / [Phoenix](#phoenix-ranking) 完成。Thunder 这层只保证\"新\"。\n\n`max_results` 的确定逻辑(`thunder_service.rs:239-245`):请求显式给了就用请求的;否则视频请求用 `MAX_VIDEOS_TO_RETURN`,普通请求用 `MAX_POSTS_TO_RETURN`。\n\n## freshness 与可观测性\n\nThunder 对自己产出的\"新鲜度\"做了细致埋点。`analyze_and_report_post_statistics`(`thunder_service.rs:64-148`)在**两个阶段**各跑一次,`stage` 标签分别为 `\"retrieved\"`(刚从 PostStore 取出)和 `\"scored\"`(score_recent 之后):\n\n```rust\n// thunder/thunder_service.rs:76-87(节选)\n// 距最新帖多久(freshness)\nlet time_since_most_recent = posts.iter().map(|p| p.created_at).max()\n    .map(|most_recent| now - most_recent);\n// 距最旧帖多久\nlet time_since_oldest = posts.iter().map(|p| p.created_at).min()\n    .map(|oldest| now - oldest);\n```\n\n它产出的指标(带 `stage` 标签):\n\n| 指标 | 含义 |\n|------|------|\n| `GET_IN_NETWORK_POSTS_FOUND_FRESHNESS_SECONDS` | 最新一条帖距今多少秒 —— 核心 freshness 指标 |\n| `GET_IN_NETWORK_POSTS_FOUND_TIME_RANGE_SECONDS` | 最旧到最新的时间跨度 |\n| `GET_IN_NETWORK_POSTS_FOUND_REPLY_RATIO` | 回复占比 |\n| `GET_IN_NETWORK_POSTS_FOUND_UNIQUE_AUTHORS` | 去重作者数 |\n| `GET_IN_NETWORK_POSTS_FOUND_POSTS_PER_AUTHOR` | 平均每作者帖数 |\n\nfreshness 偏高(最新帖也很旧)通常意味着 Kafka 摄入有 lag 或这批关注用户近期不活跃。还有一组服务级指标:`GET_IN_NETWORK_POSTS_COUNT`(返回数)、`IN_FLIGHT_REQUESTS`、`REJECTED_REQUESTS`、`GET_IN_NETWORK_POSTS_DURATION` / `..._WITHOUT_STRATO`(总延迟 / 摘掉 Strato 的延迟)。`PostStore` 侧的容量指标见 [post-store](#post-store)。\n\n## 并发模型小结\n\n| 机制 | 用在哪 | 目的 |\n|------|--------|------|\n| `DashMap` | 全部内存表 | 分片锁并发哈希表,摄入写 + 查询读并行 |\n| `Arc` | `PostStore`、各 `DashMap` | 摄入线程与服务线程共享同一份库 |\n| `Semaphore` + `try_acquire` | gRPC 入口 | 硬并发上限,过载立即拒绝不排队 |\n| `spawn_blocking` | 取候选(查询)、trim、sort | 把 CPU 密集同步循环移出 async 运行时 |\n| 即查即拷(`*r.value()`) | `get_posts_from_map` 回查 | 立刻释放读锁,防嵌套锁死锁 |\n| per-request 超时 | `get_posts_from_map` 用户循环 | `request_timeout` 到了就 break,防慢查询拖垮 |\n\nper-request 超时这一条:`get_posts_from_map` 在遍历用户列表时,每个用户开头检查 `start_time.elapsed() >= self.request_timeout`,超时就记 `POST_STORE_REQUEST_TIMEOUTS` 并 `break`(`post_store.rs:244-258`)。`request_timeout` 为 0 表示不启用。这是\"宁可少返回也别超时\"的取舍。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 存储介质 | 纯内存(`DashMap` + `VecDeque`) | 站内候选对延迟极敏感,内存查询亚毫秒;只存近期帖,内存可控 |\n| 时间线拆分 | 原创 / secondary / 视频 三套队列 | 不同请求(普通 / 视频)取不同子集,避免取全量再过滤 |\n| 正文与引用分离 | 队列存 `TinyPost`,正文单存 `LightPost` | 时间线只动 16 字节,排序/trim 廉价;正文不重复 |\n| 限流 | `Semaphore::try_acquire`,不排队 | 在线推荐怕尾延迟,过载立即 `RESOURCE_EXHAUSTED` 优于排队 |\n| 查询执行 | `spawn_blocking` 进阻塞线程池 | CPU 密集同步循环不能占用 tokio async worker |\n| 取数时拷贝 | 回查后立刻 `*value()` | `DashMap` 分片读写锁,持锁取嵌套锁会死锁 |\n| 排序 | 只按 `created_at` 取 top-K | Thunder 只保证\"新\",相关性排序交给下游 Phoenix |\n| 启动门控 | 等 Kafka 追平 lag 才 readiness | 避免冷启动空库对外服务 |\n\n## FAQ\n\n**Q:Thunder 会返回过期帖子吗?**\nA:基本不会。两道防线:摄入时 `insert_posts` 就丢掉早于 `retention_seconds` 的帖(见 [thunder-kafka-ingestion](#thunder-kafka-ingestion));后台 `start_auto_trim` 每 2 分钟从队列头部清过期帖。查询本身按\"最新优先\"扫,过期帖也排在队列头早被 trim。\n\n**Q:为什么一条帖子能在内存里被多个队列引用?**\nA:视频原创帖同时进 `original_posts_by_user` 和 `video_posts_by_user`。但两个队列里放的都是 `TinyPost`(16 字节),正文 `LightPost` 在 `posts` 表里只有一份。重复的只是引用。\n\n**Q:Thunder 和 Phoenix 召回是什么关系?**\nA:互补的两路候选源。Thunder 给\"你关注的人最近发的帖\"(in-network),Phoenix 召回从全局语料 ML 检索\"你可能感兴趣但没关注的\"(out-of-network)。两路在 [home-mixer](#home-mixer-orchestration) 流水线合并后统一排序。详见 [system-architecture](#system-architecture)。\n\n**Q:`get_in_network_posts` 抢不到信号量会怎样?**\nA:立即返回 gRPC `RESOURCE_EXHAUSTED`,不排队、不阻塞。调用方 `ThunderSource` 收到错误后由 [流水线](#candidate-pipeline-framework)按源失败处理(站内这一路为空,其它源照常)。\n\n## 源码锚点\n\n- `thunder/main.rs:16-100` —— 进程入口,PostStore/Service 初始化、Kafka catchup 门控\n- `thunder/thunder_service.rs:29-60` —— `ThunderServiceImpl` 结构与 gRPC server 构造\n- `thunder/thunder_service.rs:154-330` —— `get_in_network_posts` RPC 全流程\n- `thunder/thunder_service.rs:64-148` —— `analyze_and_report_post_statistics` freshness 埋点\n- `thunder/thunder_service.rs:333-339` —— `score_recent` 时效打分\n- `thunder/posts/post_store.rs:38-53` —— `PostStore` 四个 `DashMap`\n- `thunder/posts/post_store.rs:171-225` —— `get_videos_by_users` / `get_all_posts_by_users`\n- `thunder/posts/post_store.rs:227-328` —— `get_posts_from_map` 取数核心与回复可见性过滤\n- `home-mixer/sources/thunder_source.rs:17-102` —— 调用方 `ThunderSource`,`GetInNetworkPostsRequest` 字段\n\n## 相关页面\n\n- [thunder-kafka-ingestion](#thunder-kafka-ingestion) —— Thunder 的另一半:Kafka 实时摄入、反序列化、保留期 trim\n- [post-store](#post-store) —— `PostStore` 结构体本身:字段、方法签名、`TinyPost` / `LightPost` 类型\n- [system-architecture](#system-architecture) —— Thunder 在 For You 推荐系统全局中的位置\n- [home-mixer-orchestration](#home-mixer-orchestration) —— `ThunderSource` 所在的 home-mixer 编排层\n- [candidate-pipeline-framework](#candidate-pipeline-framework) —— `ThunderSource` 作为\"源\"被框架并行调度\n- [phoenix-retrieval](#phoenix-retrieval) —— 与 Thunder 互补的站外召回路径\n- [scoring-and-ranking](#scoring-and-ranking) —— Thunder 只按时效取数,真正的相关性排序在这里\n"}, "thunder-kafka-ingestion": {"title": "Thunder Kafka 摄入", "type": "concept", "group": "站内库(Thunder)", "md": "# Thunder Kafka 摄入\n\n## 这一页回答什么\n\nThunder 如何从 Kafka 实时摄入帖子创建/删除事件、两个 listener 版本的分工、事件如何反序列化、以及旧帖的保留与裁剪。\n\n## 核心结论\n\n1. **两个 listener 对应两种角色**:v1 是 **feeder**(把原始 Thrift `TweetEvent` 转成精简 proto `InNetworkEvent` 再发出),v2 是 **serving 实例**(消费 `InNetworkEvent` 直接灌进内存库)。\n2. **角色由 `is_serving` 参数切换**:`is_serving=true` 启动 v2,`false` 启动 v1 + 一个 Kafka producer。\n3. **摄入后台多线程**:每个 listener 起 `kafka_num_threads` 个线程,Kafka 分区在线程间轮流分配。\n4. **保留期裁剪**:serving 实例每 2 分钟裁剪一次超过保留期的旧帖。\n\n## 两个 listener 的分工\n\n```mermaid\nflowchart LR\n    RAW[原始帖子事件<br/>Thrift TweetEvent topic] -->|v1 feeder<br/>!is_serving| FEED[tweet_events_listener]\n    FEED -->|转码 + 重发<br/>proto InNetworkEvent| INE[InNetworkEvent topic]\n    INE -->|v2 serving<br/>is_serving| SRV[tweet_events_listener_v2]\n    SRV --> STORE[(PostStore 内存库)]\n```\n\n`kafka_utils.rs::start_kafka` 按 `is_serving` 分流(`kafka_utils.rs:35-112`):\n\n| 角色 | `is_serving` | 消费 topic | listener | 输出 |\n|------|-------------|-----------|----------|------|\n| **feeder** | `false` | `TweetEvent`(Thrift) | v1 `start_tweet_event_processing` | 转码后 proto `InNetworkEvent` 发到下游 topic |\n| **serving** | `true` | `InNetworkEvent`(proto) | v2 `start_tweet_event_processing_v2` | 写入 `PostStore` |\n\n这样设计把\"解析臃肿的原始事件 + 计算视频时长资格\"等重活放在 feeder,serving 实例只需消费已精简的 `InNetworkEvent`,反序列化更轻。\n\n## 反序列化\n\n`deserializer.rs` 提供两套(`deserializer.rs:8-26`):\n\n```rust\n// Thrift 二进制 → TweetEvent(v1 用)\npub fn deserialize_tweet_event(payload: &[u8]) -> Result<TweetEvent> {\n    let mut cursor = std::io::Cursor::new(payload);\n    let mut protocol = TBinaryInputProtocol::new(&mut cursor, true);\n    TweetEvent::read_from_in_protocol(&mut protocol)...\n}\n\n// proto 二进制 → InNetworkEvent(v2 用)\npub fn deserialize_tweet_event_v2(payload: &[u8]) -> Result<InNetworkEvent> {\n    InNetworkEvent::decode(payload)...\n}\n```\n\n`kafka/utils.rs::deserialize_kafka_messages` 是通用批量反序列化器,接受一个 deserializer 函数;单条解析失败只记 `KAFKA_MESSAGES_FAILED_PARSE` 指标并跳过,不中断整批。\n\n## v1:feeder 的转码\n\n`tweet_events_listener.rs` 的 `process_message_batch`(`tweet_events_listener.rs:193-346`)把 Thrift `TweetEvent` 转成 `LightPost`:\n\n- **TweetCreateEvent** → `LightPost`:取 `tweet.id`、`author_id`、`created_at_secs`、回复/转发关系、`conversation_id`;`has_video` 由 `is_eligible_video()` 判定(首个媒体是视频且 `duration_millis >= MIN_VIDEO_DURATION_MS`);`nullcast`(定向广告帖)直接跳过。\n- **TweetDeleteEvent / QuotedTweetDeleteEvent** → 收集待删 post_id;删除事件若帖龄已超 `post_retention_sec` 则忽略。\n\n然后把每个 `LightPost` 重新包成 proto `InNetworkEvent`(`TweetCreateEvent` / `TweetDeleteEvent` 变体),逐条 `spawn` 发到 producer(`tweet_events_listener.rs:274-330`)。feeder **不持有 PostStore**,是纯转发器。\n\n## v2:serving 的内存库写入\n\n`tweet_events_listener_v2.rs` 的 `deserialize_batch`(`tweet_events_listener_v2.rs:119-167`)把 proto `InNetworkEvent` 拆成两个列表:\n\n```rust\nfor tweet_event in results {\n    match tweet_event.event_variant.unwrap() {\n        in_network_event::EventVariant::TweetCreateEvent(create_event) => {\n            create_tweets.push(LightPost { post_id, author_id, created_at, ... });\n        }\n        in_network_event::EventVariant::TweetDeleteEvent(delete_event) => {\n            delete_tweets.push(delete_event);\n        }\n    }\n}\n```\n\n`process_tweet_events_v2` 攒够 `batch_size` 后,在阻塞线程池里执行(`tweet_events_listener_v2.rs:222-232`):\n\n```rust\npost_store_clone.insert_posts(light_posts);\npost_store_clone.mark_as_deleted(delete_posts);\n```\n\n注意 `is_reply` 的兜底:`create_event.is_reply || in_reply_to_post_id.is_some() || in_reply_to_user_id.is_some()` —— 任一回复信号都算回复。\n\n### 信号量与启动追赶\n\nv2 用 `Semaphore::new(3)` 限流(`tweet_events_listener_v2.rs:56`)。**仅在启动追赶完成后**,每个批处理才需先 `acquire` 一个许可(`tweet_events_listener_v2.rs:215-219`)—— 这样稳态时摄入最多占 3 个并发,给请求服务留 CPU;而追赶期不限流,尽快灌满内存库。\n\n追赶完成的判定:某线程的 `总 lag < 分区数 × batch_size` 时,认为该分区已基本追上,通过 `tx` 发信号(`tweet_events_listener_v2.rs:189-204`)。这里 lag 是消费者还落后多少条未消费的消息;当总落后量已经小于\"再 poll 一轮能取的量\"(每分区一批 × 分区数)时,就视作追平了。`main.rs` 等齐 `kafka_num_threads` 个信号后才 `finalize_init()` 并对外就绪(`main.rs:70-92`)。\n\n## 多线程与分区\n\n两个 listener 都按 `kafka_num_threads` 起线程,分区轮流切给各线程(`partitions_per_thread = num_partitions.div_ceil(kafka_num_threads)`)。每线程一个 `KafkaConsumer`,并起一个分区 lag 监控任务(`monitor_partition_lag`,周期 `lag_monitor_interval_secs`)。处理线程若意外退出会 `panic` —— \"feeder 没有 tweet 事件处理就无法工作\"。\n\n## 保留与裁剪\n\n`PostStore` 按保留期管理生命周期:\n\n- **写入时过滤**:`insert_posts` 只保留 `created_at` 在过去 `retention_seconds` 内、且不在未来的帖(`post_store.rs:92-95`)。\n- **启动裁剪**:`finalize_init()` 先 `sort_all_user_posts()` 再 `trim_old_posts()`,并把 `deleted_posts` 里的帖从主表清掉(处理 feeder 中创建/删除事件顺序丢失的竞态,`post_store.rs:103-113`)。\n- **周期裁剪**:`start_auto_trim(2)` —— serving 实例每 **2 分钟**跑一次 `trim_old_posts()`(`main.rs:85`)。\n- **裁剪逻辑**:`trim_old_posts()` 在 `spawn_blocking` 中,对三个 per-user 队列从队首(最旧)弹出 `current_time - created_at > retention_seconds` 的帖,同步从主表删除;队列容量过剩时 `shrink_to`;空用户移除(`post_store.rs:409-476`)。\n- 默认保留期 2 天(`PostStore::default()`,`post_store.rs:521-526`)。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 双 listener | feeder(v1)+ serving(v2)分离 | 重活(Thrift 解析、视频资格)集中在 feeder;serving 只消费精简事件,反序列化更快 |\n| v2 反序列化 | proto 而非 Thrift | proto 解码比 Thrift 快,且 `InNetworkEvent` 字段已精简 |\n| 信号量限流 | 稳态摄入限 3 并发,追赶期不限 | 启动尽快灌满库;就绪后把 CPU 让给请求服务 |\n| 启动追赶门控 | 等 lag 追上才对外就绪 | 避免半空的内存库返回不完整的站内候选 |\n| 解析容错 | 单条失败跳过 + 计数 | 个别坏消息不该中断整批摄入 |\n| 处理线程崩溃即 panic | 不静默重启 | 摄入停摆等于数据腐烂,宁可整进程退出被编排系统重启 |\n\n## FAQ\n\n**Q:为什么删除事件可能早于创建事件到达?**\nA:feeder 把创建/删除拆成独立 `InNetworkEvent` 分别发送,跨分区后顺序不保证。`PostStore` 用 `deleted_posts` 墓碑表化解:`insert_posts_internal` 遇到已在墓碑表的 post_id 直接跳过(`post_store.rs:122`),`finalize_init` 再兜底清一遍。\n\n**Q:feeder 和 serving 是同一个二进制吗?**\nA:是,`thunder` 一个二进制,靠 `is_serving` 参数决定扮演哪个角色(`kafka_utils.rs:35,70`)。\n\n## 源码锚点\n\n- `thunder/kafka_utils.rs:35-112` —— `is_serving` 分流与两套 Kafka 配置\n- `thunder/kafka/tweet_events_listener.rs:193-346` —— v1 转码与重发\n- `thunder/kafka/tweet_events_listener_v2.rs:119-249` —— v2 反序列化与写库\n- `thunder/posts/post_store.rs:409-476` —— `trim_old_posts` 裁剪逻辑\n- `thunder/main.rs:67-90` —— 启动追赶与后台任务\n\n## 相关页面\n\n- [thunder-in-network-store](#thunder-in-network-store) —— Thunder 的内存库与站内候选服务\n- [post-store](#post-store) —— `PostStore` 结构体细节\n- [system-architecture](#system-architecture) —— Thunder 作为站内候选源的角色\n- [home-mixer-orchestration](#home-mixer-orchestration) —— `ThunderSource` 如何调用 Thunder\n- [end-to-end-dataflow](#end-to-end-dataflow) —— 端到端数据流:Kafka 摄入是一条帖子\"被推荐\"链路的起点\n"}, "phoenix-retrieval": {"title": "Phoenix 召回:双塔检索架构", "type": "concept", "group": "ML — Phoenix", "md": "# Phoenix 召回:双塔检索架构\n\n## 这一页回答什么\n\nX \"For You\" 信息流在排序之前,先得从**数百万**全局候选里筛出**数百到上千**条值得精排的帖子。这一步叫**召回**(retrieval)。Phoenix 的召回用**双塔架构**(two-tower)实现:一座塔编码用户,一座塔编码帖子,两边都产出 L2 归一化向量,检索退化成一次点积 + top-K。\n\n本页讲召回的**架构与机制**——为什么双塔能在百万级语料上高效检索、用户塔/候选塔各自怎么编码、点积相似度怎么取 top-K。代码构件层面的逐方法拆解见实体页 [recsys-retrieval-model](#recsys-retrieval-model);本页与之不重复。\n\n## 核心结论\n\n1. **双塔分离是效率的根本**。用户塔依赖请求时才知道的用户历史,必须在线算;候选塔只依赖帖子自身特征,可以**离线**对整个语料预计算好。检索时只需把一个用户向量和一张预算好的语料矩阵做矩阵乘法。\n2. **用户塔复用 Grok transformer**。它和 [排序模型](#phoenix-ranking) 用的是同一个 [grok-transformer](#grok-transformer) 骨架(`PhoenixRetrievalModelConfig` 持有一个 `TransformerConfig`),区别只在输入序列里**没有候选段**——只有 `[用户 | 历史]`。\n3. **候选塔很轻**。它不是 transformer,而是一个两层 MLP(SiLU 激活)或干脆是均值池化,把帖子的多哈希嵌入投影到共享空间。`enable_linear_proj` 开关二选一。\n4. **两边都 L2 归一化**。归一化后点积等价于余弦相似度,使得近似最近邻(ANN)检索成立。\n5. **检索 = 点积 + `jax.lax.top_k`**。`user_representation @ corpus_embeddings.T` 得 `[B, N]` 分数矩阵,直接取 top-K。mini 版在 ~537K 的 sports 语料上演示这一步。\n\n## 双塔架构总览\n\n```mermaid\nflowchart TB\n    subgraph UT[用户塔 User Tower · 在线]\n        UH[用户哈希嵌入] --> UR1[block_user_reduce]\n        HH[历史:帖子+作者+动作+产品面] --> HR1[block_history_reduce]\n        UR1 & HR1 --> CAT1[\"拼接 [用户 | 历史]\"]\n        CAT1 --> TF[Grok Transformer]\n        TF --> POOL[掩码平均池化]\n        POOL --> NORM1[L2 归一化]\n    end\n    subgraph CT[候选塔 Candidate Tower · 可离线]\n        CPE[候选帖子+作者哈希嵌入] --> PROJ[\"两层 MLP(SiLU)<br/>或均值池化\"]\n        PROJ --> NORM2[L2 归一化]\n    end\n    NORM1 -->|\"用户向量 [B, D]\"| DOT[点积相似度]\n    NORM2 -->|\"语料矩阵 [N, D]\"| DOT\n    DOT --> TOPK[\"jax.lax.top_k → [B, K]\"]\n```\n\n候选塔的输出就是\"语料矩阵\"的来源:线上把整个语料的帖子离线喂过候选塔,得到 `[N, D]` 矩阵存起来;请求来时只算用户塔。\n\n## 为什么双塔能在百万级高效检索\n\n朴素做法是把每个 (用户, 候选) 对一起喂进模型打分,代价是 `O(N)` 次完整前向。双塔把这件事拆成**可分解**的两半:\n\n```\nscore(user, item) = user_vec(user) · item_vec(item)\n```\n\n- `item_vec(item)` 只依赖帖子本身 → 整个语料可以**离线批量**算好,存成一张 `[N, D]` 矩阵。\n- `user_vec(user)` 每个请求算**一次**。\n- 检索退化为一次 `[1, D] × [D, N]` 矩阵乘法 + top-K,GPU 上是单个 kernel,而不是 N 次 transformer 前向。\n\n代价是表达力受限:用户和候选在打分前**不能交叉**(没有交叉注意力),只能各自压成一个向量再点积。这正是两阶段设计的分工——召回用廉价的双塔把百万缩到上千,把昂贵的交叉建模留给 [排序阶段](#phoenix-ranking)。\n\n## 用户塔:把用户 + 历史编码成一个向量\n\n用户塔是 `PhoenixRetrievalModel.build_user_representation()`(`phoenix/recsys_retrieval_model.py:221-291`)。它和排序模型的 `build_inputs` 几乎一样,唯一区别是**输入序列没有候选段**。\n\n### 第一步:历史的产品面与动作嵌入\n\n```python\n# phoenix/recsys_retrieval_model.py:242-249\nhistory_product_surface_embeddings = self._single_hot_to_embeddings(\n    batch.history_product_surface,\n    config.product_surface_vocab_size,   # 默认 16\n    config.emb_size,\n    \"product_surface_embedding_table\",\n)\nhistory_actions_embeddings = self._get_action_embeddings(batch.history_actions)\n```\n\n- **产品面**(product surface)是单热索引(帖子被看到的界面位置),走一张 `[16, D]` 查找表。\n- **动作**是多热向量(用户在这条历史帖上做过哪些互动)。`_get_action_embeddings`(`:176-199`)把 0/1 向量转成有符号 `(2*actions-1)`,过一个 `[num_actions, D]` 投影矩阵;全零(无动作)的位置用 `valid_mask` 清零。\n\n### 第二步:block_user_reduce 与 block_history_reduce\n\n这两个 reduce 函数定义在 `phoenix/recsys_model.py`,被召回与排序**共享**:\n\n```python\n# phoenix/recsys_retrieval_model.py:251-268\nuser_embeddings, user_padding_mask = block_user_reduce(\n    batch.user_hashes,\n    recsys_embeddings.user_embeddings,\n    hash_config.num_user_hashes,         # 默认 2\n    config.emb_size,\n    1.0,\n)\nhistory_embeddings, history_padding_mask = block_history_reduce(\n    batch.history_post_hashes,\n    recsys_embeddings.history_post_embeddings,\n    recsys_embeddings.history_author_embeddings,\n    history_product_surface_embeddings,\n    history_actions_embeddings,\n    hash_config.num_item_hashes,         # 默认 2\n    hash_config.num_author_hashes,       # 默认 2\n    1.0,\n)\n```\n\n- `block_user_reduce`(`recsys_model.py:147-197`):每个用户由 `num_user_hashes` 个哈希嵌入表示([hash-based-embeddings](#hash-based-embeddings)),reshape 成 `[B, 1, num_user_hashes*D]` 后过投影矩阵 `proj_mat_1` 压回 `[B, 1, D]`。\n- `block_history_reduce`(`recsys_model.py:200-268`):把历史每个位置的「帖子哈希嵌入 + 作者哈希嵌入 + 动作嵌入 + 产品面嵌入」沿最后一维拼接,过投影矩阵 `proj_mat_3` 压回 `[B, S, D]`。\n- 两个函数都返回 **padding mask**:哈希值为 0 表示该位置无效(padding),mask 标记有效位。\n\n### 第三步:拼接 → transformer → 池化 → 归一化\n\n```python\n# phoenix/recsys_retrieval_model.py:270-291\nembeddings = jnp.concatenate([user_embeddings, history_embeddings], axis=1)\npadding_mask = jnp.concatenate([user_padding_mask, history_padding_mask], axis=1)\n\nmodel_output = self.model(\n    embeddings.astype(self.fprop_dtype),\n    padding_mask,\n    candidate_start_offset=None,         # 没有候选段\n)\nuser_outputs = model_output.embeddings\n\nmask_float = padding_mask.astype(jnp.float32)[:, :, None]   # [B, T, 1]\nuser_embeddings_masked = user_outputs * mask_float\nuser_embedding_sum = jnp.sum(user_embeddings_masked, axis=1) # [B, D]\nmask_sum = jnp.sum(mask_float, axis=1)                       # [B, 1]\nuser_representation = user_embedding_sum / jnp.maximum(mask_sum, 1.0)\n\nuser_norm_sq = jnp.sum(user_representation**2, axis=-1, keepdims=True)\nuser_norm = jnp.sqrt(jnp.maximum(user_norm_sq, EPS))         # EPS = 1e-12\nuser_representation = user_representation / user_norm\n```\n\n关键点:\n\n- 序列只有 `[用户 | 历史]`,所以传给 transformer 的 `candidate_start_offset=None`——**不需要候选隔离掩码**([candidate-isolation-masking](#candidate-isolation-masking) 只在排序阶段用)。\n- transformer 输出后做**掩码平均池化**:把所有有效位置的输出向量求和,除以有效位置数,得单个 `[B, D]` 向量。padding 位置被 `mask_float` 清零、不计入分母。\n- 最后 L2 归一化。`user_norm` 也作为第二个返回值传出(`build_user_representation` 返回 `(user_representation, user_norm)`),归一化前的范数可用于温度缩放等。\n\n`test_user_representation_normalized`(`test_recsys_retrieval_model.py:205-222`)验证输出范数恒为 1。\n\n## 候选塔:把帖子投影到共享空间\n\n候选塔是独立的 `CandidateTower` 模块(`phoenix/recsys_retrieval_model.py:46-112`),**不是 transformer**。它接收帖子嵌入和作者嵌入拼起来的张量,产出归一化的候选向量。\n\n### 入口:build_candidate_representation\n\n```python\n# phoenix/recsys_retrieval_model.py:293-328\ncandidate_post_embeddings = recsys_embeddings.candidate_post_embeddings\ncandidate_author_embeddings = recsys_embeddings.candidate_author_embeddings\n\npost_author_embedding = jnp.concatenate(\n    [candidate_post_embeddings, candidate_author_embeddings], axis=2\n)\n\ncandidate_tower = CandidateTower(\n    emb_size=config.emb_size,\n    enable_linear_proj=config.enable_linear_proj,\n)\ncandidate_representation = candidate_tower(post_author_embedding)\n\ncandidate_padding_mask = (batch.candidate_post_hashes[:, :, 0] != 0).astype(jnp.bool_)\n```\n\n帖子和作者的多哈希嵌入沿 `axis=2`(哈希维)拼接,形状 `[B, C, num_hashes, D]`(`num_hashes` 是帖子哈希数 + 作者哈希数)。\n\n### 两种模式:线性投影 vs 均值池化\n\n`CandidateTower.__call__`(`:63-112`)由 `enable_linear_proj` 二选一:\n\n**模式 A — 两层 MLP 投影**(`enable_linear_proj=True`,默认):\n\n```python\n# phoenix/recsys_retrieval_model.py:81-112\nif len(post_author_embedding.shape) == 4:\n    B, C, _, _ = post_author_embedding.shape\n    post_author_embedding = jnp.reshape(post_author_embedding, (B, C, -1))\n# ...\nproj_1 = hk.get_parameter(\"candidate_tower_projection_1\",\n    [post_author_embedding.shape[-1], self.emb_size * 2], ...)\nproj_2 = hk.get_parameter(\"candidate_tower_projection_2\",\n    [self.emb_size * 2, self.emb_size], ...)\n\nhidden = jnp.dot(post_author_embedding.astype(proj_1.dtype), proj_1)\nhidden = jax.nn.silu(hidden)\ncandidate_embeddings = jnp.dot(hidden.astype(proj_2.dtype), proj_2)\n\ncandidate_norm_sq = jnp.sum(candidate_embeddings**2, axis=-1, keepdims=True)\ncandidate_norm = jnp.sqrt(jnp.maximum(candidate_norm_sq, EPS))\ncandidate_representation = candidate_embeddings / candidate_norm\n```\n\n先把所有哈希嵌入展平(`reshape(B, C, -1)`),过 `D→2D→D` 的两层全连接,中间 SiLU 激活,最后 L2 归一化。表达力强,但有学习参数。\n\n**模式 B — 均值池化**(`enable_linear_proj=False`):\n\n```python\n# phoenix/recsys_retrieval_model.py:74-79\nif not self.enable_linear_proj:\n    candidate_representation = jnp.mean(post_author_embedding, axis=-2)\n    candidate_norm_sq = jnp.sum(candidate_representation**2, axis=-1, keepdims=True)\n    candidate_norm = jnp.sqrt(jnp.maximum(candidate_norm_sq, EPS))\n    candidate_representation = candidate_representation / candidate_norm\n    return candidate_representation.astype(post_author_embedding.dtype)\n```\n\n直接对哈希维(`axis=-2`)求均值再归一化。**没有任何学习参数**(`test_mean_pooling_has_no_params` 在 `test_recsys_retrieval_model.py:108-127` 验证 `total_params == 0`),更省参数但表达力弱。\n\n两种模式输出形状都是 `[B, C, D]`,都 L2 归一化(`test_candidate_tower_normalized`、`test_candidate_tower_mean_pooling` 验证范数为 1)。\n\n## top-K 检索:点积 + jax.lax.top_k\n\n模型的 `__call__`(`phoenix/recsys_retrieval_model.py:330-360`)是召回的总入口:\n\n```python\ndef __call__(self, batch, recsys_embeddings, corpus_embeddings, top_k, corpus_mask=None):\n    user_representation, _ = self.build_user_representation(batch, recsys_embeddings)\n    top_k_indices, top_k_scores = self._retrieve_top_k(\n        user_representation, corpus_embeddings, top_k, corpus_mask\n    )\n    return RetrievalOutput(\n        user_representation=user_representation,\n        top_k_indices=top_k_indices,\n        top_k_scores=top_k_scores,\n    )\n```\n\n注意:`__call__` 只调用了**用户塔**。候选塔在这里没被调用——它的产物 `corpus_embeddings`(`[N, D]`)是**外部预计算**好后作为参数传进来的,这正体现了\"候选可离线\"。检索本身在 `_retrieve_top_k`(`:362-388`):\n\n```python\n# phoenix/recsys_retrieval_model.py:381-388\nscores = jnp.matmul(user_representation, corpus_embeddings.T)   # [B, N]\n\nif corpus_mask is not None:\n    scores = jnp.where(corpus_mask[None, :], scores, -INF)       # INF = 1e12\n\ntop_k_scores, top_k_indices = jax.lax.top_k(scores, top_k)\nreturn top_k_indices, top_k_scores\n```\n\n- `user_representation [B, D]` 乘 `corpus_embeddings.T [D, N]` 得 `[B, N]` 分数矩阵。两边都已归一化,所以这就是余弦相似度。\n- `corpus_mask`(可选 `[N]`)用来屏蔽无效语料项:被屏蔽位的分数被设成 `-INF`,确保不会进 top-K。\n- `jax.lax.top_k` 一次取出每个用户的 top-K 索引与分数。`test_retrieve_top_k`(`test_recsys_retrieval_model.py:245-269`)验证索引落在 `[0, corpus_size)`、分数降序。\n\n### RetrievalOutput\n\n召回模型的输出是一个 `NamedTuple`(`phoenix/recsys_retrieval_model.py:38-43`):\n\n| 字段 | 形状 | 含义 |\n|------|------|------|\n| `user_representation` | `[B, D]` | L2 归一化用户向量 |\n| `top_k_indices` | `[B, K]` | 检索到的语料项索引 |\n| `top_k_scores` | `[B, K]` | 对应相似度分数(降序) |\n\n## 端到端:run_pipeline 里召回怎么跑\n\n`phoenix/run_pipeline.py` 演示了真实流程。值得注意的是 pipeline **没有调用** `_retrieve_top_k`,而是用 numpy 在 CPU 上做检索——但语义完全一致:\n\n```python\n# phoenix/run_pipeline.py:299-310\nuser_repr = ret_fn.apply(ret_params, batch, emb_batch, dummy_gn, dummy_gn)\n# ...\nTOP_K = min(args.top_k_retrieval, len(corpus_post_ids))   # 默认 200\nscores = corpus_repr @ np.asarray(user_repr[0])           # 语料矩阵 · 用户向量\ntop_idx = np.argpartition(scores, -TOP_K)[-TOP_K:]\ntop_idx = top_idx[np.argsort(-scores[top_idx])]\n```\n\n- `corpus_repr` 来自 `sports_corpus.npz` 里的 `candidate_representations` 字段——这正是候选塔的**预计算输出**,~537K 条 sports 主题帖。\n- 默认 `--top_k_retrieval 200`:从 537K 召回 200 条,交给 [排序模型](#phoenix-ranking)。\n- 检索深度可调:`--top_k_retrieval 500` 召回更多。\n\nmini 配置(`phoenix/README.md`)下召回相关维度:`emb_size=128`、`history_seq_len=127`、`candidate_seq_len=64`、4 层 transformer、user/item/author 词表各 1,000,000、每实体 2 个哈希。注意 `PhoenixRetrievalModelConfig` 源码里 `history_seq_len` 默认 `128`、`candidate_seq_len` 默认 `32`(`recsys_retrieval_model.py:125-126`),实际值由导出的 `config.json` 覆盖。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 整体架构 | 双塔(用户塔 + 候选塔)分离 | 候选塔输出可离线预计算成 `[N, D]` 矩阵,在线只算用户塔,检索退化成一次矩阵乘法 |\n| 用户塔骨架 | 复用 Grok transformer | 与排序模型共享架构与代码,用户侧序列建模能力强;`PhoenixRetrievalModelConfig` 直接持有 `TransformerConfig` |\n| 用户塔输出 | 掩码平均池化所有有效位置 | 把变长 `[用户\\|历史]` 序列压成单个向量,padding 位不计入 |\n| 候选塔结构 | 两层 MLP(SiLU)/ 均值池化二选一 | `enable_linear_proj` 开关:MLP 表达力强,均值池化零参数更省 |\n| 相似度度量 | 两塔输出都 L2 归一化后点积 | 归一化后点积 = 余弦相似度,使 ANN 检索成立 |\n| 检索算子 | `jax.lax.top_k` 一次取 top-K | 单 kernel 完成,GPU 友好 |\n| 无效语料屏蔽 | `corpus_mask` 把分数置 `-INF` | 保证被屏蔽项绝不进 top-K |\n| 候选段缺席 | 用户塔传 `candidate_start_offset=None` | 召回序列无候选,不需要 [候选隔离掩码](#candidate-isolation-masking) |\n\n## FAQ\n\n**Q:候选塔为什么不也用 transformer?**\nA:候选塔的输入只是单条帖子的几个哈希嵌入,没有序列结构可建模;而且它要对**整个语料**(数十万条)跑,必须足够轻才能离线批量预计算。两层 MLP 甚至均值池化就够,transformer 反而是浪费。\n\n**Q:用户塔和排序模型是同一个模型吗?**\nA:不是同一个**实例**,但用同一个 [grok-transformer](#grok-transformer) **架构**。召回有自己的 `PhoenixRetrievalModelConfig` 和独立 checkpoint(`artifacts/retrieval/`),排序有自己的(`artifacts/ranker/`)。最大区别:召回的输入序列是 `[用户 | 历史]`,排序是 `[用户 | 历史 | 候选]`。\n\n**Q:为什么 `__call__` 里看不到候选塔被调用?**\nA:因为候选塔的产物 `corpus_embeddings` 是**离线算好后当参数传进来**的。`__call__` 在线只跑用户塔。`build_candidate_representation` 是独立方法,供离线建语料矩阵时调用。\n\n**Q:`top_k` 检索多少条合适?**\nA:由调用方决定。`run_pipeline.py` 默认 200。召回得越多,排序阶段精度上限越高,但排序代价也越大——这是两阶段系统的经典权衡。\n\n## 源码锚点\n\n- `phoenix/recsys_retrieval_model.py:38-43` —— `RetrievalOutput` 输出三元组\n- `phoenix/recsys_retrieval_model.py:46-112` —— `CandidateTower` 模块(MLP / 均值池化两模式)\n- `phoenix/recsys_retrieval_model.py:115-156` —— `PhoenixRetrievalModelConfig` 配置与 `make()`\n- `phoenix/recsys_retrieval_model.py:221-291` —— `build_user_representation` 用户塔\n- `phoenix/recsys_retrieval_model.py:293-328` —— `build_candidate_representation` 候选塔入口\n- `phoenix/recsys_retrieval_model.py:330-388` —— `__call__` 与 `_retrieve_top_k` 检索\n- `phoenix/recsys_model.py:147-268` —— 共享的 `block_user_reduce` / `block_history_reduce`\n- `phoenix/run_pipeline.py:245-310` —— 端到端召回阶段\n- `phoenix/test_recsys_retrieval_model.py:38-127` —— 候选塔形状/归一化/零参数测试\n\n## 相关页面\n\n- [recsys-retrieval-model](#recsys-retrieval-model) —— 召回模型的代码构件:配置 dataclass、两塔类、各方法逐个拆解\n- [phoenix-ranking](#phoenix-ranking) —— 召回的下游:排序阶段对召回结果做多行为精排\n- [grok-transformer](#grok-transformer) —— 用户塔复用的 transformer 骨架\n- [hash-based-embeddings](#hash-based-embeddings) —— 用户/帖子/作者的多哈希嵌入查找\n- [candidate-isolation-masking](#candidate-isolation-masking) —— 排序阶段才用的注意力掩码,召回阶段不需要\n- [new-account-cold-start](#new-account-cold-start) —— 新号与冷启动:新用户的召回历史不足时如何特殊路由\n- [run-pipeline](#run-pipeline) —— 端到端脚本:召回 → 排序串起来跑\n- [system-architecture](#system-architecture) —— 召回在整个 For You 流水线里作为\"候选源\"的位置\n- [candidate-pipeline](#candidate-pipeline) —— 召回服务被 home-mixer 当作 `PhoenixSource` 调用\n"}, "phoenix-ranking": {"title": "Phoenix 排序模型", "type": "concept", "group": "ML — Phoenix", "md": "# Phoenix 排序模型\n\n## 这一页回答什么\n\nPhoenix 排序模型如何把\"用户 + 互动历史 + 候选帖\"编码成一条序列、过 Grok transformer、再为每条候选输出多种互动概率。\n\n## 核心结论\n\n1. **一条序列编码三段**:`[用户(1) | 历史(S) | 候选(C)]` 拼成单一 transformer 输入。\n2. **候选互相隔离**:特殊注意力掩码让候选只能注意用户与历史,不能注意彼此 —— 详见 [candidate-isolation-masking](#candidate-isolation-masking)。\n3. **多行为预测**:每条候选输出 `num_actions` 个离散互动 logit + `num_continuous_actions` 个连续值预测(默认 8)。\n4. **历史是带动作的序列**:历史里每个帖子都附带\"用户对它做了哪些动作\"和停留时长,这是模型学相关性的信号源。\n\n## 输入:三段拼成一条序列\n\n`PhoenixModel.build_inputs()`(`recsys_model.py:520-626`)构造长度为 `1 + S + C` 的序列:\n\n```mermaid\nflowchart LR\n    U[\"用户段 ×1<br/>user hashes\"] --> SEQ\n    H[\"历史段 ×S<br/>帖+作者+动作+产品面+停留\"] --> SEQ\n    C[\"候选段 ×C<br/>帖+作者+产品面+帖龄\"] --> SEQ\n    SEQ[\"拼接 → embeddings [B, 1+S+C, D]\"]\n```\n\n三段各自先经一个 `block_*_reduce` 把多哈希嵌入压成 D 维(见 [hash-based-embeddings](#hash-based-embeddings)):\n\n| 段 | reduce 函数 | 拼接的成分 |\n|----|------------|-----------|\n| 用户 | `block_user_reduce` | 用户哈希嵌入(+ 可选 IP) |\n| 历史 | `block_history_reduce` | 帖嵌入 + 作者嵌入 + **动作嵌入** + 产品面嵌入 + 停留时长嵌入 |\n| 候选 | `block_candidate_reduce` | 帖嵌入 + 作者嵌入 + 产品面嵌入 + **帖龄嵌入** |\n\n`candidate_start_offset = 1 + S` —— 候选段的起始位置,后面注意力掩码与输出抽取都靠它。\n\n### 动作嵌入:历史的核心信号\n\n历史里每个帖子附一个多热(multi-hot)动作向量 —— 长度为动作种类数,用户对这条帖做过的每种动作对应位置置 1,可同时多个为 1(既点赞又转发);经 `_get_action_embeddings()`(`recsys_model.py:404-432`)编码:\n\n```python\nactions_signed = (2 * actions - 1).astype(jnp.float32)   # {0,1} → {-1,+1}\naction_emb = jnp.dot(actions_signed, action_projection)   # [num_actions, D] 投影\n```\n\n把 0/1 映射成 ±1 再投影 —— 模型既知道用户\"做了什么\"也知道\"没做什么\"。这是\"零手工特征\"理念的落点:相关性不靠人工特征,靠这条带动作的互动序列学出来。\n\n### 帖龄分桶\n\n候选帖按曝光时间与创建时间的差做分桶(`compute_post_age_bucket`,`recsys_model.py:36-55`):粒度 `post_age_granularity_mins`(默认 60 分钟),上限 `POST_AGE_MAX_MINUTES = 4800`,加溢出桶与缺失桶,共 `post_age_vocab_size = 4800/60 + 2 = 82` 个桶。\n\n## transformer 与输出\n\n`PhoenixModel.__call__()`(`recsys_model.py:628-680`):\n\n```python\nembeddings, padding_mask, candidate_start_offset = self.build_inputs(batch, recsys_embeddings)\nmodel_output = self.model(embeddings, padding_mask,\n                          candidate_start_offset=candidate_start_offset, positions=positions)\nout_embeddings = layer_norm(model_output.embeddings)\ncandidate_embeddings = out_embeddings[:, candidate_start_offset:, :]   # 只取候选段\nlogits = candidate_embeddings @ unembeddings                           # [B, C, num_actions]\ncontinuous_preds = sigmoid(candidate_embeddings @ continuous_unembeddings)  # [B, C, num_continuous]\n```\n\n要点:\n\n- transformer 是移植自 Grok-1 的 [grok-transformer](#grok-transformer),`candidate_start_offset` 传进去用于构造 [候选隔离掩码](#candidate-isolation-masking)。\n- 输出只抽取**候选段**的位置(`out_embeddings[:, candidate_start_offset:, :]`)—— 用户段、历史段的输出不直接用。\n- 两个输出头:\n  - **离散头** `unembeddings` [D, num_actions] → `logits` [B, C, num_actions],对应点赞/回复/转发/点击等离散互动。\n  - **连续头** `continuous_unembeddings` [D, num_continuous_actions] → sigmoid → `continuous_preds` [B, C, num_continuous],默认 `num_continuous_actions = 8`(如停留时长)。\n- 若 `right_anchored_rope` 开启,用 `right_anchored_rope_positions` 把最新历史 token 锚定到固定位置(见 [grok-transformer](#grok-transformer))。\n\n`num_actions` 是配置项,不写死。据 `phoenix/README.md` 的 mini 模型配置表,公开 checkpoint 的动作类型数为 **19**。\n\n## 配置(mini checkpoint)\n\n`PhoenixModelConfig`(`recsys_model.py:335-392`)的 dataclass 默认值与公开 mini checkpoint 实配:\n\n| 项 | dataclass 默认 | mini checkpoint(README) |\n|----|--------------|------|\n| `emb_size` | (无默认) | 128 |\n| transformer 层数 | —— | 4 |\n| 注意力头数 | —— | 4 |\n| `history_seq_len` | 128 | 127 |\n| `candidate_seq_len` | 32 | 64 |\n| `num_actions` | (无默认) | 19 |\n| `num_continuous_actions` | 8 | —— |\n| `product_surface_vocab_size` | 16 | —— |\n| 每实体哈希数 | `HashConfig`:user/item/author 各 2 | 2 |\n\n> 注:顶层 `README.md` 与 `phoenix/README.md` 对 mini 模型尺寸描述不一致(前者写 256-dim/2-layer,后者写 128-dim/4-layer)。`phoenix/README.md` 的配置表与代码默认更接近,本页以其为准。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 三段拼一条序列 | user / history / candidate 同一 transformer | 候选能直接注意用户与历史,无需双塔交互层 |\n| 候选隔离 | 掩码禁止候选互相注意 | 单条候选得分不依赖同批其它候选 → 分数稳定、可缓存(见 [candidate-isolation-masking](#candidate-isolation-masking)) |\n| 动作 ±1 编码 | `2*actions-1` 而非 0/1 | 让\"未发生的动作\"也成为负向信号,而非被零掩没 |\n| 双输出头 | 离散 logits + 连续 sigmoid | 点赞/转发是二元事件,停留时长是连续量,分头建模 |\n| 只取候选段输出 | `out[:, candidate_start_offset:]` | 用户/历史段只作上下文,预测目标是候选 |\n\n## FAQ\n\n**Q:排序模型和召回模型什么关系?**\nA:[召回模型](#phoenix-retrieval)的用户塔复用同一套 Grok transformer 与 `block_user_reduce`/`block_history_reduce`。区别:召回只编码 user+history 再 mean-pool 成一个向量做近邻搜索;排序把候选也拼进序列,逐候选出多行为 logit。\n\n**Q:logits 怎么变成最终排序分?**\nA:排序模型只输出每条候选的多行为 logit;`home-mixer` 的 `RankingScorer` 再对这些概率加权求和,见 [scoring-and-ranking](#scoring-and-ranking)。\n\n## 源码锚点\n\n- `phoenix/recsys_model.py:520-626` —— `build_inputs` 构造三段序列\n- `phoenix/recsys_model.py:628-680` —— `__call__` transformer 前向与双头输出\n- `phoenix/recsys_model.py:404-432` —— `_get_action_embeddings` 动作编码\n- `phoenix/recsys_model.py:335-392` —— `PhoenixModelConfig`\n\n## 相关页面\n\n- [recsys-model](#recsys-model) —— 排序模型的代码构件细节\n- [candidate-isolation-masking](#candidate-isolation-masking) —— 候选隔离注意力掩码\n- [grok-transformer](#grok-transformer) —— 底层 transformer 骨架\n- [hash-based-embeddings](#hash-based-embeddings) —— 三段输入的哈希嵌入\n- [phoenix-retrieval](#phoenix-retrieval) —— 召回模型(共用 transformer)\n- [scoring-and-ranking](#scoring-and-ranking) —— logits 如何加权成最终分\n"}, "candidate-isolation-masking": {"title": "候选隔离注意力掩码", "type": "concept", "group": "ML — Phoenix", "md": "# 候选隔离注意力掩码\n\n## 这一页回答什么\n\nPhoenix 排序模型把多条候选拼进同一序列后,如何用一个特殊注意力掩码保证\"每条候选独立打分\"。\n\n## 核心结论\n\n1. **候选之间互相看不见**:掩码禁止候选 token 注意其它候选 token,只保留自注意。\n2. **候选能注意上下文**:候选可以注意用户段与历史段。\n3. **效果是分数独立**:一条候选的得分不依赖同批里有哪些别的候选 → 分数稳定、可缓存。\n4. **由 `candidate_start_offset` 驱动**:掩码靠这个偏移量切出\"候选区\"。\n\n## 为什么需要它\n\n[排序模型](#phoenix-ranking)把 `[用户(1) | 历史(S) | 候选(C)]` 拼成一条序列喂给同一个 transformer。若用普通注意力,候选 token 会互相注意 —— 那么一条帖子的得分就取决于\"这一批里还有哪些帖子\",同样的帖子换一批候选会得到不同分,既不稳定也无法缓存。\n\n候选隔离掩码解决这个问题:**候选只能注意用户与历史,以及它自己**。\n\n## 掩码构造\n\n`make_recsys_attn_mask`(`grok.py:39-71`):\n\n```python\ndef make_recsys_attn_mask(seq_len, candidate_start_offset, dtype=jnp.float32):\n    # 1. 整条序列先建因果掩码(下三角)\n    causal_mask = jnp.tril(jnp.ones((1, 1, seq_len, seq_len), dtype=dtype))\n    # 2. 把\"候选→候选\"块整体清零(右下角方块)\n    attn_mask = causal_mask.at[:, :, candidate_start_offset:, candidate_start_offset:].set(0)\n    # 3. 把候选块的对角线恢复为 1(候选自注意)\n    candidate_indices = jnp.arange(candidate_start_offset, seq_len)\n    attn_mask = attn_mask.at[:, :, candidate_indices, candidate_indices].set(1)\n    return attn_mask   # [1, 1, seq_len, seq_len],1 表示\"可注意\"\n```\n\n三步:\n\n```mermaid\nflowchart LR\n    A[\"1. 全序列因果掩码<br/>jnp.tril 下三角\"] --> B[\"2. 候选×候选块清零<br/>.set(0)\"]\n    B --> C[\"3. 候选对角线置 1<br/>恢复自注意\"]\n    C --> D[\"最终掩码 [1,1,L,L]\"]\n```\n\n## 掩码长什么样\n\n设 `U` = 用户段,`H` = 历史段,`C` = 候选段(`candidate_start_offset` = `1 + S`)。`✓` 可注意,`✗` 不可:\n\n```\n                 被注意的 key →\n              │ U │  H ...  │  C0  C1  C2 ... │\n        ┌─────┼───┼─────────┼─────────────────┤\n   U    │  U  │ ✓ │ ✗ ✗ ✗   │  ✗  ✗  ✗        │\n        ├─────┼───┼─────────┼─────────────────┤\n   H    │ H0  │ ✓ │ ✓ ✗ ✗   │  ✗  ✗  ✗        │   ← 用户+历史:因果(下三角)\n        │ H1  │ ✓ │ ✓ ✓ ✗   │  ✗  ✗  ✗        │\n        ├─────┼───┼─────────┼─────────────────┤\n   C    │ C0  │ ✓ │ ✓ ✓ ✓   │  ✓  ✗  ✗        │   ← 候选:看 U+H + 自己\n        │ C1  │ ✓ │ ✓ ✓ ✓   │  ✗  ✓  ✗        │\n        │ C2  │ ✓ │ ✓ ✓ ✓   │  ✗  ✗  ✓        │\n        └─────┴───┴─────────┴─────────────────┘\n```\n\n候选区(右下 `C×C` 方块)只剩对角线 —— 候选彼此隔离,各自只注意 `U+H` 与自身。\n\n> **与 README 图示的出入**:`phoenix/README.md` 的掩码示意把\"用户+历史\"段描述为彼此\"完全双向注意力\"。但代码用 `jnp.tril`(下三角),实际是**因果注意力** —— 位置 `i` 只能注意 `≤ i` 的位置。本页以代码为准。\n\n## 在哪里被启用\n\n`Transformer.__call__`(`grok.py:543-616`)按是否传 `candidate_start_offset` 二选一:\n\n```python\nif candidate_start_offset is not None:\n    attn_mask = make_recsys_attn_mask(seq_len, candidate_start_offset, fprop_dtype)\n    mask = mask * attn_mask                       # 候选隔离掩码\nelse:\n    causal_mask = jnp.tril(jnp.ones((1, 1, seq_len, seq_len)))\n    mask = mask * causal_mask                     # 标准因果掩码\n```\n\n掩码与 padding 掩码相乘后传入每个 `DecoderLayer`。在 `MultiHeadAttention` 里,掩码为 0 处的注意力 logit 被置为 `-1e30`,softmax 后权重≈0(`grok.py:378`)。\n\n- [排序模型](#phoenix-ranking) `PhoenixModel.__call__` 传入 `candidate_start_offset = 1 + S` → 启用候选隔离。\n- [召回模型](#phoenix-retrieval) `build_user_representation` 传 `candidate_start_offset=None` → 用标准因果掩码(序列里本就没有候选段)。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 候选互不可见 | 清零候选×候选块 | 单候选得分不依赖同批其它候选 → 一致、可缓存 |\n| 保留候选自注意 | 对角线置回 1 | 候选 token 至少要能注意自己,否则该位置无信息聚合 |\n| 候选可注意 U+H | 因果掩码下三角天然保留 | 候选必须基于用户与历史上下文打分 |\n| 复用同一掩码函数 | offset 为 `None` 时退化为标准因果 | 召回(无候选段)与排序共用一个 `Transformer` 实现 |\n| 掩码值用 `-1e30` | 而非直接乘 0 | 在 softmax 前屏蔽,数值上更干净 |\n\n## FAQ\n\n**Q:候选隔离和\"批内打分一致性\"有什么关系?**\nA:若候选能互相注意,把同一条帖子放进不同候选批会算出不同分,排序与缓存都失效。隔离后,给定相同的用户+历史,一条候选的分是确定的 —— 可跨请求缓存。\n\n**Q:用户段和历史段为什么不也\"完全双向\"?**\nA:代码用 `jnp.tril`,U+H 段实际是因果注意力。README 图示称\"双向\"与代码不符;以 `grok.py:62` 的 `jnp.tril` 为准。\n\n## 源码锚点\n\n- `phoenix/grok.py:39-71` —— `make_recsys_attn_mask`\n- `phoenix/grok.py:571-581` —— `Transformer.__call__` 中掩码的二选一\n- `phoenix/grok.py:370-379` —— `MultiHeadAttention` 中掩码屏蔽 logit\n- `phoenix/recsys_model.py:644-662` —— 排序模型传入 `candidate_start_offset`\n\n## 相关页面\n\n- [phoenix-ranking](#phoenix-ranking) —— 使用候选隔离掩码的排序模型\n- [grok-transformer](#grok-transformer) —— 掩码作用的 transformer 骨架\n- [phoenix-retrieval](#phoenix-retrieval) —— 不使用候选隔离的召回模型\n- [recsys-model](#recsys-model) —— `PhoenixModel` 如何传入 offset\n- [operating-myths](#operating-myths) —— 运营迷思 vs 源码真相:候选隔离打穿\"被大V挤掉\"的说法\n- [open-source-vs-production](#open-source-vs-production) —— 开源版 vs 线上真实算法:本掩码等机制在开源与线上的差异\n"}, "grok-transformer": {"title": "Grok Transformer 骨架", "type": "concept", "group": "ML — Phoenix", "md": "# Grok Transformer 骨架\n\n## 这一页回答什么\n\nPhoenix 的召回用户塔和排序模型共用同一个 transformer 骨架。这个骨架不是为推荐从零写的,而是**从 xAI 的 Grok-1 开源版移植过来**,改造为推荐系统用途(`phoenix/README.md:5`)。本页讲清这个 `Transformer` 类的内部构造:decoder 层怎么堆、注意力怎么算、RoPE/RMSNorm/GLU-FFN 各自做什么、分组查询注意力(GQA)与注意力软封顶的细节,以及哪些 Grok-1 特性在本次发布里**被去掉了**。\n\n源码全部集中在一个文件:`phoenix/grok.py`(617 行)。\n\n## 核心结论\n\n1. **一个文件、一个骨架**:`phoenix/grok.py` 定义了完整的 transformer。召回([phoenix-retrieval](#phoenix-retrieval))和排序([phoenix-ranking](#phoenix-ranking))都通过 `TransformerConfig.make()` 构造同一个 `Transformer` 类(`grok.py:125-133`),只是配置不同。\n2. **不含 MoE**:完整的 Grok-1 是 Mixture-of-Experts 架构,但本次发布的 FFN 是**普通稠密块** `DenseBlock`,没有专家路由、没有 gating network。这是与完整 Grok-1 最显著的差异。\n3. **Pre-Norm + 双 RMSNorm 残差**:每个 `DecoderLayer` 在子层前归一化,子层输出后**再归一化一次**才加回残差流 —— 这是 Grok-1 的特殊设计,与标准 Pre-Norm transformer 不同。\n4. **分组查询注意力(GQA)**:Q 头数与 KV 头数可以不同,KV 头被多个 Q 头共享(`grok.py:346,357`)。mini 配置里两者相等,等价于标准 MHA。\n5. **RoPE 旋转位置编码**:位置信息通过旋转 Q/K 注入,不用可学习位置嵌入。支持自定义位置数组,服务于 right-anchored 历史对齐。\n6. **注意力 logit 软封顶**:attention logits 经过 `30 · tanh(x/30)` 压缩,防止极端值,这是 Grok-1 的稳定性技巧(`grok.py:367-368`)。\n7. **掩码可切换**:`Transformer` 既能跑标准因果掩码(自回归),也能跑推荐专用的候选隔离掩码 —— 由 `candidate_start_offset` 参数决定,详见 [candidate-isolation-masking](#candidate-isolation-masking)。\n\n## 整体结构\n\n```mermaid\nflowchart TB\n    IN[输入嵌入 B,T,D] --> T\n    subgraph T[Transformer]\n        L0[DecoderLayer 0] --> L1[DecoderLayer 1]\n        L1 --> LN[... 共 num_layers 层]\n        LN --> LK[DecoderLayer N-1]\n    end\n    LK --> OUT[输出嵌入 B,T,D]\n\n    subgraph DL[每个 DecoderLayer 内部]\n        H0[残差流 h] --> RN1[RMSNorm]\n        RN1 --> MHA[MHABlock 注意力]\n        MHA --> RN2[RMSNorm]\n        RN2 --> ADD1[h += attn]\n        ADD1 --> RN3[RMSNorm]\n        RN3 --> FFN[DenseBlock GLU-FFN]\n        FFN --> RN4[RMSNorm]\n        RN4 --> ADD2[h += dense]\n    end\n```\n\n注意 decoder 层里出现了 **4 次 RMSNorm**:子层前 2 次、子层后 2 次。这点下面详述。\n\n## TransformerConfig:配置入口\n\n`Transformer` 不直接构造,而是通过 `TransformerConfig` 这个 dataclass 的 `make()` 工厂方法:\n\n```python\n# phoenix/grok.py:112-133\n@dataclass\nclass TransformerConfig:\n    emb_size: int\n    key_size: int\n    num_q_heads: int\n    num_kv_heads: int\n    num_layers: int\n    widening_factor: float = 4.0\n\n    attn_output_multiplier: float = 1.0\n\n    name: Optional[str] = None\n\n    def make(self) -> \"Transformer\":\n        return Transformer(\n            num_q_heads=self.num_q_heads,\n            num_kv_heads=self.num_kv_heads,\n            widening_factor=self.widening_factor,\n            key_size=self.key_size,\n            attn_output_multiplier=self.attn_output_multiplier,\n            num_layers=self.num_layers,\n        )\n```\n\n| 字段 | 含义 | mini 配置取值 |\n|------|------|---------------|\n| `emb_size` | 模型维度 D | 128 |\n| `key_size` | 每个注意力头的 K/Q/V 维度 | 32(`run_pipeline.py` 路径)/ 64(`run_ranker.py` demo) |\n| `num_q_heads` | 查询头数 | 4 |\n| `num_kv_heads` | 键值头数(GQA) | 4 |\n| `num_layers` | decoder 层数 | 4 |\n| `widening_factor` | FFN 隐层放大系数 | 2.0 |\n| `attn_output_multiplier` | 注意力 logit 缩放 | 0.125 |\n\n> mini 配置的官方表格(`phoenix/README.md:254-268`)给出 128 维、4 层、4 头、key_size=32。`run_pipeline.py` 从 `config.json` 读取真实导出配置,`build_model_config()` 把 `num_heads` 同时填给 `num_q_heads` 和 `num_kv_heads`,并硬编码 `widening_factor=2.0`、`attn_output_multiplier=0.125`(`run_pipeline.py:144-152`)。`run_ranker.py` / `run_retrieval.py` 是另一套独立的 2 层 demo 配置(`key_size=64`),不要与 pipeline 配置混淆。\n\n## Transformer:堆叠 decoder 层\n\n`Transformer.__call__` 把输入嵌入逐层过 `DecoderLayer`,层数由 `num_layers` 决定:\n\n```python\n# phoenix/grok.py:543-616(节选)\ndef __call__(\n    self,\n    embeddings: jax.Array,  # [B, T, D]\n    mask: jax.Array,  # [B, T]\n    candidate_start_offset: Optional[int] = None,\n    positions: Optional[jax.Array] = None,\n) -> TransformerOutput:\n    fprop_dtype = embeddings.dtype\n    _, seq_len, _ = embeddings.shape\n    padding_mask = mask.copy()\n    mask = mask[:, None, None, :]  # [B, H=1, T'=1, T]\n\n    if candidate_start_offset is not None:\n        # 推荐系统:候选隔离掩码\n        attn_mask = make_recsys_attn_mask(seq_len, candidate_start_offset, fprop_dtype)\n        mask = mask * attn_mask\n    else:\n        # 标准自回归因果掩码\n        causal_mask = jnp.tril(jnp.ones((1, 1, seq_len, seq_len))).astype(fprop_dtype)\n        mask = mask * causal_mask\n\n    h = embeddings\n    for i in range(self.num_layers):\n        decoder_output = block(h, mask, padding_mask, layer_index=i, name=f\"decoder_layer_{i}\")\n        h = decoder_output.embeddings\n\n    return TransformerOutput(embeddings=h)\n```\n\n要点:\n\n- **掩码二选一**:`candidate_start_offset` 非空走候选隔离掩码(`make_recsys_attn_mask`),否则走标准下三角因果掩码。推荐推理总是传 offset(由 `PhoenixModel.build_inputs` 计算,见 `recsys_model.py:624`)。掩码细节见 [candidate-isolation-masking](#candidate-isolation-masking)。\n- **padding mask 与注意力 mask 相乘**:`mask[:, None, None, :]` 是 `[B,1,1,T]` 的 padding mask(标记哪些位置是真实 token),与 `[1,1,T,T]` 的注意力结构掩码逐元素相乘,合成最终的 `[B,1,T,T]` 掩码。\n- **逐层命名**:每层 `name=f\"decoder_layer_{i}\"`,checkpoint 里的参数路径据此组织(见 [run-pipeline](#run-pipeline) 的 `load_model_params`)。\n- **没有最终归一化**:`Transformer` 自身不在堆叠末尾做 LayerNorm;最终归一化由调用方负责(`recsys_model.py:666` 的 `out_embeddings = layer_norm(out_embeddings)`)。\n- **没有 unembedding / 输出头**:`Transformer` 只输出隐藏态 `[B,T,D]`。投影到 action logits 由 [phoenix-ranking](#phoenix-ranking) 完成。\n\n## DecoderLayer:Pre-Norm + 双 RMSNorm 残差\n\n单层的结构是这个骨架最值得注意的地方 —— 它在每个子层**前后各做一次** RMSNorm:\n\n```python\n# phoenix/grok.py:469-524(节选)\n@dataclass\nclass DecoderLayer(hk.Module):\n    \"\"\"A transformer stack.\"\"\"\n\n    num_q_heads: int\n    num_kv_heads: int\n    key_size: int\n    num_layers: int\n    layer_index: Optional[int] = None\n    widening_factor: float = 4.0\n    name: Optional[str] = None\n    attn_output_multiplier: float = 1.0\n\n    def __call__(self, inputs, mask, padding_mask, positions=None) -> DecoderOutput:\n        del padding_mask  # Unused.\n\n        def layer_norm(x):\n            return hk_rms_norm(x)\n\n        h = inputs\n\n        # --- 注意力子层 ---\n        attn_output = MHABlock(...)(layer_norm(h), mask, positions=positions)\n        h_attn = attn_output.embeddings\n        h_attn = layer_norm(h_attn)   # 子层输出再归一化\n        h += h_attn                   # 残差相加\n\n        # --- FFN 子层 ---\n        h_dense = base_dense_block(layer_norm(h))\n        h_dense = layer_norm(h_dense)  # 子层输出再归一化\n        h += h_dense                   # 残差相加\n\n        return DecoderOutput(embeddings=h)\n```\n\n对比标准 Pre-Norm transformer `h += SubLayer(LN(h))`,Grok-1 的形式是:\n\n```\nh += LN( SubLayer( LN(h) ) )\n```\n\n也就是**子层输入和子层输出都过一次 RMSNorm**。这是从 Grok-1 原样移植的设计,目的是稳定残差流的尺度。注意 `padding_mask` 参数在 `DecoderLayer` 里被显式 `del` 掉 —— 它不参与单层计算,padding 信息已经合并进了传入的 4 维 `mask`。\n\n`MHABlock`(`grok.py:403-437`)是对 `MultiHeadAttention` 的薄封装:它把同一个 `inputs` 同时当作 query / key / value(自注意力),`side_input = inputs`:\n\n```python\n# phoenix/grok.py:434\nattn_output = attn_block(inputs, side_input, side_input, mask)\n```\n\n## MultiHeadAttention:GQA + RoPE + 软封顶\n\n注意力是骨架里最复杂的模块。`MultiHeadAttention.__call__`(`grok.py:310-388`)按顺序做这几件事:\n\n### 1. 投影到多头 Q/K/V\n\n```python\n# phoenix/grok.py:346-349\nassert self.num_q_heads % self.num_kv_heads == 0\nquery_heads = projection(query, self.key_size, self.num_q_heads, name=\"query\")\nkey_heads = projection(key, self.key_size, self.num_kv_heads, name=\"key\")\nvalue_heads = projection(value, self.value_size, self.num_kv_heads, name=\"value\")\n```\n\n`num_q_heads` 必须是 `num_kv_heads` 的整数倍 —— 这是**分组查询注意力(GQA)** 的前提:多个查询头共享一组键值头,减少 KV cache 内存。投影用 `Linear`(`with_bias=False`)实现,reshape 成 `[..., num_heads, head_size]`。\n\n### 2. 对 Q/K 施加 RoPE\n\n```python\n# phoenix/grok.py:351-353\nrotate = RotaryEmbedding(dim=self.key_size, base_exponent=int(1e4))\nkey_heads = rotate(key_heads, seq_dim=1, offset=0, t=positions)\nquery_heads = rotate(query_heads, seq_dim=1, offset=0, t=positions)\n```\n\n位置信息通过旋转 Q 和 K 注入(不旋转 V)。`t=positions` 允许传入自定义位置数组(默认 `None` 时用顺序位置),这是 right-anchored RoPE 的接入点(下文详述)。\n\n### 3. 计算注意力 logits + 软封顶\n\n```python\n# phoenix/grok.py:359-368\nquery_heads = jnp.reshape(query_heads, (b, t, kv_h, h // kv_h, d))\n\n# Attention softmax is always carried out in fp32.\nattn_logits = jnp.einsum(\"...thHd,...Thd->...hHtT\", query_heads, key_heads).astype(jnp.float32)\nattn_logits *= self.attn_output_multiplier\nmax_attn_val = jnp.array(30.0, dtype=attn_logits.dtype)\nattn_logits = max_attn_val * jnp.tanh(attn_logits / max_attn_val)\n```\n\n三个细节:\n\n- **GQA 的 reshape**:`query_heads` 被 reshape 成 `(b, t, kv_h, h//kv_h, d)` —— 把 `h` 个查询头分成 `kv_h` 组,每组 `h//kv_h` 个头共享同一个 KV 头。einsum 下标 `hH` 即 (KV组, 组内查询头)。\n- **`attn_output_multiplier` 缩放**:logits 先乘配置项(mini 配置 = 0.125)。注意这**替代了** transformer 里常见的 `1/√d` 缩放 —— Grok-1 把缩放因子做成可配置常量。\n- **软封顶(soft cap)**:`30 · tanh(logits/30)` 把 attention logits 平滑地压进 ±30,防止个别极大值主导 softmax。这是 Grok-1 的数值稳定技巧。softmax 始终在 fp32 下做(`grok.py:362` 的注释明确指出)。\n\n### 4. 应用掩码并 softmax\n\n```python\n# phoenix/grok.py:370-388(节选)\nmask = mask[:, :, None, :, :]\nif mask is not None:\n    attn_logits = jnp.where(mask, attn_logits, -1e30)\nattn_weights = jax.nn.softmax(attn_logits).astype(query.dtype)\n\nattn = jnp.einsum(\"...hHtT,...Thd->...thHd\", attn_weights, value_heads)\nleading_dims = attn.shape[:2]\nattn = jnp.reshape(attn, (*leading_dims, -1))  # [T', H*V]\n\nfinal_projection = Linear(self.model_size, with_bias=False)\nreturn MHAOutput(final_projection(attn))\n```\n\n被掩掉的位置 logit 设为 `-1e30`(softmax 后约等于 0)。注意力权重加权 V 后,展平多头,再过一个无偏置 `Linear` 投影回 `model_size`(= D)。\n\n## RotaryEmbedding(RoPE)\n\n`RotaryEmbedding`(`grok.py:229-285`)实现 RoPE(论文 arXiv:2104.09864)。核心是对特征向量做位置相关的旋转:把每个位置的 Q/K 向量按\"位置 × 频率\"决定的角度转一下 —— 两个 token 做注意力点积时,结果只取决于它们的**旋转角之差**,也就是相对距离。位置信息因此被自然编码进点积,不需要额外的位置嵌入向量。\n\n```python\n# phoenix/grok.py:221-227\ndef rotate_half(x: jax.Array) -> jax.Array:\n    \"\"\"Obtain the rotated counterpart of each feature\"\"\"\n    x1, x2 = jnp.split(x, 2, axis=-1)\n    return jnp.concatenate((-x2, x1), axis=-1)\n```\n\n```python\n# phoenix/grok.py:257-285(节选)\nexponents = jnp.arange(0, self.dim, 2, dtype=jnp.float32)\ninv_freq = jnp.asarray(1.0 / (self.base_exponent ** (exponents / self.dim)), dtype=jnp.float32)\n...\nelif t is None:\n    t = jnp.arange(x.shape[seq_dim], dtype=jnp.float32) + jnp.expand_dims(offset, -1)\nphase = jnp.einsum(\"bi,j->bij\", t, inv_freq)\nphase = jnp.tile(phase, reps=(1, 2))[:, :, None, :]\n\nx = x * jnp.cos(phase) + rotate_half(x) * jnp.sin(phase)\n```\n\n- `base_exponent` 默认 10000,`MultiHeadAttention` 调用时显式传 `int(1e4)`。\n- `dim` 必须是偶数(`grok.py:247` 的 `assert`)。\n- 位置 `t` 来源三选一:`const_position`(所有位置同值)、显式 `t`、或顺序位置 `arange + offset`。\n\n### Right-anchored RoPE 位置\n\n`recsys_model.py` 里有个可选项 `right_anchored_rope`:开启时,RoPE 位置不再是简单的 `0..T-1`,而由 `right_anchored_rope_positions` 计算:\n\n```python\n# phoenix/grok.py:88-109\ndef right_anchored_rope_positions(\n    padding_mask: jax.Array,\n    history_seq_len: int,\n    num_user_prefix_tokens: int,\n) -> jax.Array:\n    \"\"\"Compute RoPE positions where the newest history token always gets a fixed position.\"\"\"\n    history_start = num_user_prefix_tokens\n    history_end = num_user_prefix_tokens + history_seq_len\n\n    idx = jnp.arange(padding_mask.shape[1], dtype=jnp.int32)[None, :]\n    history_len = padding_mask[:, history_start:history_end].sum(axis=1, dtype=jnp.int32)\n\n    positions = jnp.where(\n        (history_start <= idx) & (idx < history_end),\n        history_end - history_len[:, None] + idx - history_start,\n        idx,\n    )\n    positions = jnp.where(idx >= history_end, history_end, positions)\n    positions = jnp.where(padding_mask, positions, 0).astype(jnp.float32)\n    return positions\n```\n\n含义:用户历史长度不一,但**最新的历史 token 永远落在固定位置**(`history_end`)。短历史被\"右对齐\"到历史区段末尾。这样模型对\"最近一次互动\"的位置感知是一致的,与历史是否填满无关。该选项在 `PhoenixModel.__call__` 里启用(`recsys_model.py:649-654`)。\n\n## RMSNorm\n\n骨架用 RMSNorm 而非 LayerNorm:\n\n```python\n# phoenix/grok.py:196-218(节选)\ndef __call__(self, inputs: jax.Array):\n    fprop_dtype = inputs.dtype\n    param_shape = (inputs.shape[-1],)\n    if self.create_scale:\n        scale = hk.get_parameter(\"scale\", param_shape, dtype=jnp.float32,\n                                 init=hk.initializers.Constant(0))\n        scale = jnp.broadcast_to(scale.astype(jnp.float32), inputs.shape)\n    else:\n        scale = 1.0\n    inputs = inputs.astype(jnp.float32)\n    mean_squared = jnp.mean(jnp.square(inputs), axis=[-1], keepdims=True)\n    normed_inputs = inputs * jax.lax.rsqrt(mean_squared + self.eps)\n    outputs = scale * normed_inputs\n    return outputs.astype(fprop_dtype)\n```\n\n- 只按均方根归一,**不减均值**(这是 RMSNorm 与 LayerNorm 的区别)。\n- `eps = 1e-5`。\n- 计算在 fp32 下做,输出转回原 dtype(`fprop_dtype`,推理时是 `bfloat16`,见 `recsys_model.py:346`)。\n- 模块级 `hk_rms_norm`(`grok.py:136-142`)是便捷封装,`DecoderLayer` 内部用的就是它。\n\n## DenseBlock:GLU 门控 FFN(不含 MoE)\n\nFFN 子层是 **GLU(Gated Linear Unit)风格的门控前馈网络**,即 `DenseBlock`:\n\n```python\n# phoenix/grok.py:440-466\n@dataclass\nclass DenseBlock(hk.Module):\n    num_q_heads: int\n    num_kv_heads: int\n    key_size: int\n    widening_factor: float = 4.0\n\n    @hk.transparent\n    def __call__(self, inputs: jax.Array) -> jax.Array:  # [B, T, D] -> [B, T, D]\n        _, _, model_size = inputs.shape\n        h_v = Linear(ffn_size(model_size, self.widening_factor), with_bias=False, name=\"linear_v\")(inputs)\n        h_w1 = jax.nn.gelu(\n            Linear(ffn_size(model_size, self.widening_factor), with_bias=False)(inputs)\n        )\n        h_dense = Linear(model_size, with_bias=False)(h_w1 * h_v)\n        return h_dense\n```\n\n结构:`out = Linear( gelu(Linear_w1(x)) ⊙ Linear_v(x) )`。两个并行的上投影,一个过 GELU 作\"门\",逐元素乘另一个,再下投影。这是 Grok-1 / 现代 LLM 普遍采用的 GeGLU 变体。\n\n隐层维度由 `ffn_size` 算:\n\n```python\n# phoenix/grok.py:32-36\ndef ffn_size(emb_size, widening_factor):\n    _ffn_size = int(widening_factor * emb_size) * 2 // 3\n    _ffn_size = _ffn_size + (8 - _ffn_size) % 8  # ensure it's a multiple of 8\n    return _ffn_size\n```\n\n`* 2 // 3` 是 GLU-FFN 的标准修正(GLU 多一个矩阵,缩小隐层保持参数量相当);再向上取整到 8 的倍数(对齐硬件)。以 mini 配置 `emb_size=128, widening_factor=2` 算:`int(2*128)*2//3 = 170`,`170 + (8-170)%8 = 176`。\n\n> **关键:本次发布的 FFN 没有 MoE。** 完整的 Grok-1 在这里是 Mixture-of-Experts —— 多个专家 FFN + 路由 gating。本仓库的 `DenseBlock` 是单个稠密 GLU-FFN,无专家、无路由。`phoenix/README.md:5` 说明本仓库的 transformer \"ported from the Grok-1 open source release ... with the exception of specific scaling optimizations\",MoE 即被省略的部分之一。`grok.py` 全文搜不到任何 expert / router / gating 相关代码。\n\n## Linear:全连接层\n\n骨架自带一个 `Linear`(继承 `hk.Linear`,`grok.py:145-183`),与标准 Haiku Linear 的区别:权重 `w` 和偏置 `b` 都用 `Constant(0)` 初始化 —— 因为推理时参数从 checkpoint 加载,初始值无所谓;计算时把 `w` 转成输入的 dtype(`fprop_dtype`)以支持 bf16 推理。注意力和 FFN 里的投影矩阵全部 `with_bias=False`。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 骨架来源 | 直接移植 Grok-1 而非自研 | 复用 xAI 成熟的 LLM transformer,推荐侧只改输入嵌入和注意力掩码(`phoenix/README.md:5`) |\n| MoE | 本次发布去掉,改用稠密 `DenseBlock` | mini 版无需专家容量;省去路由复杂度,checkpoint 更小(`phoenix/README.md:5` 提到省略了 scaling optimizations) |\n| 归一化 | RMSNorm,不减均值 | 比 LayerNorm 省一次均值计算,现代 LLM 标准做法 |\n| 残差形式 | `h += LN(SubLayer(LN(h)))`,子层前后各归一一次 | Grok-1 原始设计,双重归一稳定残差流尺度 |\n| 注意力缩放 | 可配置 `attn_output_multiplier` 替代 `1/√d` | 缩放因子作为超参可调 |\n| logit 软封顶 | `30·tanh(x/30)` | 平滑限幅,防止极端 logit 主导 softmax,提升数值稳定 |\n| 注意力 | GQA(Q/KV 头数解耦) | KV 头可少于 Q 头,减少 KV cache;mini 配置取相等即退化为 MHA |\n| 位置编码 | RoPE,支持自定义位置 | 无需可学习位置嵌入;自定义位置数组支撑 right-anchored 历史对齐 |\n| FFN | GeGLU 门控,隐层 `*2//3` 后对齐 8 | 门控 FFN 表达力更强,`*2//3` 补偿 GLU 多出的矩阵 |\n\n## FAQ\n\n**Q:这个 transformer 和完整的 Grok-1 差在哪?**\nA:最大差异是**没有 MoE** —— 本仓库 FFN 是单个稠密 `DenseBlock`,完整 Grok-1 是专家混合。其次 `phoenix/README.md:5` 提到省略了\"specific scaling optimizations\"。注意力、RoPE、RMSNorm、软封顶、双归一残差这些核心结构都原样保留。\n\n**Q:为什么 decoder 层里 RMSNorm 出现 4 次?**\nA:Grok-1 的残差形式是 `h += LN(SubLayer(LN(h)))`。注意力子层用 2 次(输入归一 + 输出归一),FFN 子层再用 2 次,合计 4 次。标准 Pre-Norm 只在子层输入归一,这里多了输出侧的归一。\n\n**Q:`candidate_start_offset` 不传会怎样?**\nA:`Transformer` 退回标准下三角因果掩码,变成普通自回归 transformer。推荐推理总是传 offset 走候选隔离掩码;不传的分支是为通用自回归场景保留的。详见 [candidate-isolation-masking](#candidate-isolation-masking)。\n\n**Q:GQA 在 mini 配置里有用吗?**\nA:mini 配置 `num_q_heads == num_kv_heads == 4`,此时 GQA 退化为标准 MHA,每个查询头独享一个 KV 头。GQA 的省内存收益要在 KV 头数小于 Q 头数时才体现 —— 生产大模型可能这样配。\n\n**Q:为什么 softmax 强制 fp32?**\nA:`grok.py:362` 注释明确\"Attention softmax is always carried out in fp32\"。推理整体跑 bf16,但 attention logits 和 softmax 用 fp32 避免精度损失导致的权重塌缩。\n\n## 源码锚点\n\n- `phoenix/grok.py:32-36` —— `ffn_size`,GLU-FFN 隐层维度计算\n- `phoenix/grok.py:88-109` —— `right_anchored_rope_positions`,历史右对齐位置\n- `phoenix/grok.py:112-133` —— `TransformerConfig` 及 `make()` 工厂\n- `phoenix/grok.py:145-183` —— `Linear` 全连接层\n- `phoenix/grok.py:186-218` —— `RMSNorm`\n- `phoenix/grok.py:221-285` —— `rotate_half` 与 `RotaryEmbedding`(RoPE)\n- `phoenix/grok.py:288-388` —— `MultiHeadAttention`(GQA + 软封顶)\n- `phoenix/grok.py:403-437` —— `MHABlock` 自注意力封装\n- `phoenix/grok.py:440-466` —— `DenseBlock`(GeGLU FFN,无 MoE)\n- `phoenix/grok.py:469-524` —— `DecoderLayer`(双归一残差)\n- `phoenix/grok.py:531-616` —— `Transformer` 主类\n- `phoenix/recsys_model.py:644-666` —— 排序模型如何调用 `Transformer` 并做最终归一\n\n## 相关页面\n\n- [candidate-isolation-masking](#candidate-isolation-masking) —— 候选隔离注意力掩码,决定 `Transformer` 走哪种掩码\n- [hash-based-embeddings](#hash-based-embeddings) —— 喂给 transformer 的输入嵌入怎么从哈希表查出来\n- [phoenix-ranking](#phoenix-ranking) —— 排序模型,用本骨架 + unembedding 头预测多种互动概率\n- [phoenix-retrieval](#phoenix-retrieval) —— 召回模型,用户塔复用同一个 transformer 骨架\n- [recsys-model](#recsys-model) —— `PhoenixModel` 实体,把哈希嵌入、本骨架、输出头串成排序模型\n- [run-pipeline](#run-pipeline) —— 端到端运行器,从 `config.json` 构造 `TransformerConfig`\n- [open-source-vs-production](#open-source-vs-production) —— 开源版 vs 线上真实算法:本骨架去掉 MoE 等差异的完整清单\n- [system-architecture](#system-architecture) —— Phoenix 在整个 For You 系统中的位置\n"}, "hash-based-embeddings": {"title": "哈希嵌入", "type": "concept", "group": "ML — Phoenix", "md": "# 哈希嵌入\n\n## 这一页回答什么\n\nPhoenix 模型如何用哈希把任意用户/帖子/作者 ID 映射进固定大小的嵌入表,以及多个哈希值如何合并成一个 D 维表示。\n\n## 核心结论\n\n1. **ID 不直接做嵌入索引**:每个 ID 经多个哈希函数(默认 2 个)映射进固定容量的桶。\n2. **三类实体共用一张大表**:用户/帖/作者嵌入按偏移区段拼在一张单一嵌入表里。\n3. **哈希值 0 保留给 padding**:无效/填充位的哈希恒为 0。\n4. **多哈希结果靠投影合并**:`block_*_reduce` 把 `num_hashes` 个嵌入拼接后投影回 D 维。\n\n## 为什么用哈希\n\n用户、帖子、作者的 ID 空间是开放且巨大的(数十亿且持续增长)。给每个 ID 一行嵌入不现实。哈希嵌入把无界 ID 空间压进固定容量的嵌入表(`user_vocab_size` / `item_vocab_size` / `author_vocab_size`,mini 版各 100 万)。\n\n代价是**哈希碰撞** —— 不同 ID 可能落进同一桶。缓解办法是**每个实体用多个独立哈希函数**:两个 ID 同时在所有哈希函数上都碰撞的概率极低,合并多个哈希嵌入后,单次碰撞的影响被摊薄。\n\n## 哈希函数\n\n`_hash_ids`(`run_pipeline.py:76-90`)是线性同余哈希 —— 即\"ID 乘一个常数、加一个常数、再取模\",一种极快的整数散列方式:\n\n```python\ndef _hash_ids(ids, scales, biases, modulus, num_buckets):\n    ids = np.asarray(ids, dtype=np.int64).ravel()\n    out = np.empty((len(ids), len(scales)), dtype=np.int32)\n    for i in range(len(ids)):\n        for j in range(len(scales)):           # j 遍历每个哈希函数\n            raw = (ids[i] * scales[j] + biases[j]) % np.int64(modulus)\n            out[i, j] = 0 if ids[i] == 0 else int((int(raw) % (num_buckets - 1)) + 1)\n    return out\n```\n\n- 每个实体类型有一组 `scales` / `biases`(数组长度 = 哈希函数个数)和一个 `modulus`,来自导出的 `config.json` 的 `hash_params`。\n- `ids[i] == 0` → 哈希恒为 **0**,这是 padding/无效位的保留值。\n- 否则结果落在 `[1, num_buckets-1]`。\n- 用 numpy int64 回绕算术,与训练时一致。\n\n## 统一嵌入表\n\n`build_hash_functions`(`run_pipeline.py:93-115`)把三类实体哈希到同一张大表的不同区段。`pad = 65`:\n\n```python\ndef hash_user(user_ids):   # 用户区段\n    h = _hash_ids(user_ids, ..., uv)\n    return np.where(h == 0, 0, h + pad)\ndef hash_item(item_ids):   # 帖子区段\n    h = _hash_ids(item_ids, ..., iv)\n    return np.where(h == 0, 0, h + pad + uv)\ndef hash_author(author_ids):  # 作者区段\n    h = _hash_ids(author_ids, ..., av)\n    return np.where(h == 0, 0, h + pad + uv + iv)\n```\n\n`build_unified_emb_table`(`run_pipeline.py:118-129`)拼出形状 `[pad + uv + iv + av, emb_size]` 的单表:\n\n```\n索引区段:\n┌──────────┬─────────────┬─────────────┬──────────────┐\n│ [0, 65)  │ [65, 65+uv) │ ...item...  │ ...author... │\n│  pad     │  用户嵌入    │  帖子嵌入    │  作者嵌入     │\n└──────────┴─────────────┴─────────────┴──────────────┘\n```\n\n`pad` 段在最前,哈希 0 落在这里 —— 因此 padding 位查到的是 pad 区的嵌入,并在掩码中被标为无效。\n\n## 多少个哈希\n\n`HashConfig`(`recsys_model.py:93-101`):\n\n```python\n@dataclass\nclass HashConfig:\n    num_user_hashes: int = 2\n    num_item_hashes: int = 2\n    num_author_hashes: int = 2\n    num_ip_hashes: int = 0\n```\n\n每个用户/帖/作者默认用 **2** 个哈希函数;IP 默认关闭。一个 ID 因此查到 `num_hashes` 个嵌入,形状 `[..., num_hashes, D]`。\n\n## 多哈希嵌入如何合并\n\n查表后的多哈希嵌入由 `block_*_reduce` 合并(`recsys_model.py:147-332`)。以用户为例(`block_user_reduce`):\n\n```python\n# user_embeddings: [B, num_user_hashes, D]\nuser_embedding = user_embeddings.reshape((B, 1, num_user_hashes * D))   # 拼接\nproj_mat_1 = hk.get_parameter(\"proj_mat_1\", [num_user_hashes * D, D], ...)\nuser_embedding = jnp.dot(user_embedding, proj_mat_1)                     # 投影回 D\n```\n\n`num_hashes` 个嵌入沿特征维拼成 `num_hashes*D`,再经一个学习的投影矩阵压回 `D`。历史段 `block_history_reduce` 与候选段 `block_candidate_reduce` 同理,只是拼接的成分更多(帖+作者+动作+产品面等,见 [phoenix-ranking](#phoenix-ranking))。\n\npadding 掩码统一由\"首个哈希是否为 0\"决定(`recsys_model.py:195,266,330`):\n\n```python\nuser_padding_mask = (user_hashes[:, 0] != 0).reshape(B, 1)\n```\n\n## 数据流\n\n```mermaid\nflowchart TB\n    ID[\"原始 ID<br/>user/post/author\"] -->|num_hashes 个<br/>线性同余哈希| H[\"哈希值 [num_hashes]<br/>0 = padding\"]\n    H -->|+ 区段偏移| IDX[\"统一表索引\"]\n    IDX -->|查表| EMB[\"嵌入 [num_hashes, D]\"]\n    EMB -->|reshape + 投影矩阵| RED[\"合并嵌入 [D]\"]\n    H -.首哈希==0.-> MASK[\"padding 掩码\"]\n```\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 哈希而非直接索引 | 无界 ID → 固定容量桶 | 用户/帖 ID 无上界且持续增长,直接嵌入表不可行 |\n| 每实体多哈希 | 默认 2 个独立哈希函数 | 摊薄单次碰撞影响 —— 两 ID 在所有哈希上都撞的概率极低 |\n| 统一大表 + 区段偏移 | 用户/帖/作者拼一张表 | 单次查表即可,省去多表管理;`pad` 段隔离 padding |\n| 哈希 0 保留 | `id==0 → hash 0` | 用同一值统一表示 padding/无效,掩码判定简单 |\n| 多哈希靠投影合并 | 拼接后过 `proj_mat` | 投影是学习的,可自适应地融合多个哈希视角 |\n\n## FAQ\n\n**Q:碰撞了会怎样?**\nA:两个 ID 落进同一桶就共享一行嵌入。但每个实体用 2 个独立哈希,合并后等价于一个组合键;两 ID 在两个哈希上都碰撞才会完全混淆,概率约为单次碰撞率的平方。\n\n**Q:召回和排序的哈希一样吗?**\nA:`run_pipeline.py` 为 retrieval 与 ranker **各自**用其 `config.json` 里的 `hash_params` 构建哈希函数(`run_pipeline.py:226-227`),两者参数独立,因为两个模型有各自的嵌入表。\n\n## 源码锚点\n\n- `phoenix/run_pipeline.py:76-90` —— `_hash_ids` 线性同余哈希\n- `phoenix/run_pipeline.py:93-115` —— `build_hash_functions` 区段偏移\n- `phoenix/run_pipeline.py:118-129` —— `build_unified_emb_table` 统一表\n- `phoenix/recsys_model.py:93-101` —— `HashConfig`\n- `phoenix/recsys_model.py:147-197` —— `block_user_reduce` 多哈希合并\n\n## 相关页面\n\n- [phoenix-ranking](#phoenix-ranking) —— 哈希嵌入喂给排序模型的三段输入\n- [phoenix-retrieval](#phoenix-retrieval) —— 召回模型同样使用哈希嵌入\n- [recsys-model](#recsys-model) —— `block_*_reduce` 与 `HashConfig` 所在\n- [run-pipeline](#run-pipeline) —— 端到端脚本里如何重建哈希函数与嵌入表\n"}, "grox-architecture": {"title": "Grox 服务架构", "type": "concept", "group": "内容理解(Grox)", "md": "# Grox 服务架构\n\n## 这一页回答什么\n\nGrox 这个内容理解服务由哪些进程构成、任务如何从数据源流到执行、Task 与 Plan 是什么关系。\n\n## 核心结论\n\n1. **三进程架构**:`Dispatcher`(拉取调度)、`Engine`(执行)、`GrpcServer`,经共享队列通信。\n2. **Plan 是 Task 的 DAG**:一个 `Plan` 用 `TASKS` + `TASK_DEPENDENCIES` 定义任务依赖图,并发执行。\n3. **PlanMaster 并行跑所有 Plan**:每个任务交给 9 个 Plan,按 `REQUIRED_ELIGIBILITY` 过滤出真正该跑的。\n4. **旁路服务**:Grox 不在 For You 请求路径上,是流式消费帖子、产出内容信号(安全标签、嵌入、质量分)的离线管线。\n\n## 三进程\n\n`main.py::serve()` 创建一个共享 `ScheduleContext`(含 `task_queue`、`resp_queue`、shutdown 事件),启动三个组件:\n\n```mermaid\nflowchart LR\n    SRC[(Kafka / Strato<br/>数据源)] --> GEN[流式任务生成器]\n    GEN --> DISP[Dispatcher 进程]\n    DISP -->|task_queue| ENG[Engine 进程]\n    ENG -->|resp_queue| DISP\n    ENG --> PM[PlanMaster<br/>9 个 Plan]\n    PM --> SINK[(注解 / 嵌入 sink)]\n    GRPC[GrpcServer] -.同步接口.-> ENG\n```\n\n`Dispatcher` 与 `Engine` 各跑在独立的 `multiprocessing.Process` 里(`engine.py:122`、`dispatcher.py:357`),靠 `task_queue` / `resp_queue` 两个进程间队列通信。关停时 `main.py` 先发 `queue_connection_shutdown`、**等 300 秒**排空在途任务,再 `shutdown_context` 并停各组件(`main.py:39-49`)。\n\n## Dispatcher:拉取与重试\n\n`Dispatcher`(`dispatcher.py`)两个并发循环 + 一个关停等待(`dispatcher.py:342-349`):\n\n- **`_fill_loop`**:从任务生成器 `poll()` 出 `TaskPayload`,在 `len(in_flights) < max_in_flight` 时 `_submit_task` 推入 `task_queue`(`dispatcher.py:251-266`)。\n- **`_result_loop`**:从 `resp_queue` 取 `TaskResult`(`dispatcher.py:283-333`):\n  - 成功 → 从 `in_flights` 移除,`ack`\n  - 失败且 `attempt < max_attempts` → `attempt += 1`,重新 `_submit_task`\n  - 失败且重试用尽 → 记 `dispatcher.result.failed.final.count`,按 origin `ack`\n\n任务生成器是 `PriorityTaskGenerator`,包了多个带权重的 `StreamTaskGenerator`(`dispatcher.py:84-232`)。每种生成器对应一个数据流,如 `PostStreamTaskGenerator`、`PostSafetyStreamTaskGenerator`、`PostEmbeddingV5StreamTaskGenerator`、`SafetyPtosDeluxeStreamTaskGenerator`、`ReplyRankingRecoveryTaskGenerator` 等十余种,按 `weight` 加权采样。\n\n## Engine:执行\n\n`Engine`(`engine.py`)从 `task_queue` 取任务,对每个任务 `asyncio.create_task(self._run_task(task))` 并发跑(`engine.py:104-113`):\n\n```python\nasync def _process_task(self, task: TaskPayload) -> TaskResult:\n    res = await PlanMaster.exec(task)         # 核心:交给 PlanMaster\n    Metrics.histogram(\"engine.task.processing_time\").record(...)\n    return res\n```\n\n成功的 `TaskResult` 推回 `resp_queue`,失败则推一个 `success=False` 的结果。`_init_run` 还会启动 `MediaProcessor` 与 `ASRProcessor`(媒体与视频转写,`engine.py:46-49`)。\n\n## Task:最小执行单元\n\n`Task`(`grox/tasks/task.py:27`)是抽象基类:\n\n```python\nclass Task(ABC):\n    DISABLE_RULES: list[type[DisableTaskRule]] = []\n\n    @classmethod\n    @retry(stop=stop_after_attempt(2), wait=wait_fixed(1))\n    async def exec(cls, ctx: TaskContext) -> TaskResultCategory:\n        if cls.should_skip(ctx):              # DISABLE_RULES + _should_skip\n            return TaskResultCategory.SKIPPED\n        try:\n            await cls._exec(ctx)              # 子类实现\n        except TaskStopExecution:\n            return TaskResultCategory.SKIPPED\n        return TaskResultCategory.SUCCESS\n```\n\n- `exec` 自带 **2 次重试**;`should_skip` 先查 `DISABLE_RULES`(运行时开关)再查 `_should_skip`。\n- 四个便捷子类按 payload 自动取数据:`TaskWithPost`、`TaskWithUser`、`TaskWithUserContext`、`TaskWithContentAnalysis` —— 取不到对应数据就抛 `TaskStopExecution` → SKIPPED(`task.py:93-150`)。\n- `TaskResultCategory` 只有 `SUCCESS` / `SKIPPED`,失败靠异常上抛。\n\n## Plan:Task 的 DAG\n\n`Plan`(`grox/plans/plan.py:16`)把若干 Task 编成依赖图:\n\n```python\nclass Plan(ABC):\n    TASKS: dict[str, type[Task]]              # 任务名 → 任务类\n    TASK_DEPENDENCIES: dict[str, set[str]]    # 任务名 → 依赖的任务名集合\n    REQUIRED_ELIGIBILITY: TaskEligibility     # 该 Plan 生效的条件\n```\n\n`execute()`(`plan.py:28-75`):\n\n1. `_eligible` —— `REQUIRED_ELIGIBILITY` 不在 payload 的 `eligibilities` 里则直接返回 `None`\n2. 为每个被依赖的任务建一个 `asyncio.Future`\n3. `asyncio.gather` 并发跑所有任务 —— 每个任务先 `await` 其依赖的 future\n4. **依赖被 SKIPPED → 该任务也 SKIPPED**(短路传播,`plan.py:89-92`)\n\n依赖图保证顺序,无依赖关系的任务并发跑。\n\n## PlanMaster:并行所有 Plan\n\n`PlanMaster`(`plans/plan_master.py`)持有 **9 个 Plan**:\n\n| Plan | 用途 |\n|------|------|\n| `PlanInitialBanger` | 帖子质量(\"banger\")初筛 |\n| `PlanPostSafety` | 帖子安全筛查 |\n| `PlanSpamComment` | 垃圾评论检测 |\n| `PlanPostEmbeddingWithSummary` / `…ForReply` | 带摘要的帖子嵌入 |\n| `PlanPostEmbeddingV5` / `…ForReply` | v5 多模态帖子嵌入 |\n| `PlanReplyRanking` | 回复排序打分 |\n| `PlanSafetyPtos` | PTOS 安全策略 |\n\n```python\n@classmethod\nasync def exec(cls, task: TaskPayload) -> TaskResult:\n    results = await asyncio.gather(*[p.execute(task) for p in cls.ALL_PLANS])\n    return cls.merge_results(task, [r for r in results if r is not None])\n```\n\n每个任务都被丢给全部 9 个 Plan 并发执行,但只有 `REQUIRED_ELIGIBILITY` 匹配的 Plan 真正跑任务(其余 `execute` 返回 `None`)。`merge_results` 合并各 Plan 的 `content_categories`、`multimodal_post_embedding`、`reason`,`success` 取全部 Plan 的与。\n\n## 数据流总览\n\n```mermaid\nflowchart TB\n    K[Kafka/Strato 数据源] --> SG[StreamTaskGenerator<br/>注入 TaskEligibility]\n    SG --> PTG[PriorityTaskGenerator<br/>加权采样]\n    PTG --> DQ[dispatcher: task_queue]\n    DQ --> E[engine: PlanMaster.exec]\n    E --> P{9 个 Plan<br/>按 eligibility 过滤}\n    P --> T[Task DAG 并发执行]\n    T --> R[resp_queue → dispatcher ack/retry]\n    T --> SINK[写注解/嵌入到下游存储]\n```\n\n`TaskEligibility` 由生成器在产出 `TaskPayload` 时注入 —— 它既是\"该任务该走哪些 Plan\"的路由标签,也是 Plan 的 `_eligible` 判据。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 三进程分离 | dispatcher / engine / grpc | 拉取调度与重型执行隔离,一方崩溃不拖垮另一方 |\n| 进程间队列 | `task_queue` / `resp_queue` | 解耦生产与消费速率,dispatcher 可独立做限流与重试 |\n| Plan = Task DAG | `TASK_DEPENDENCIES` 显式声明 | 无依赖的任务自动并发;依赖 SKIPPED 自动短路下游 |\n| PlanMaster 全量并行 | 9 个 Plan 都跑,eligibility 过滤 | 一个帖子可同时被多种分析覆盖,互不阻塞 |\n| 双层重试 | Task 内 2 次 + dispatcher `max_attempts` 次 | 瞬时错误就地重试,持久错误重新入队 |\n| 关停等 300s | `queue_connection_shutdown` 后 sleep 300 | 排空在途任务,避免丢数据 |\n\n## FAQ\n\n**Q:同一个帖子会被处理几次?**\nA:取决于它命中了哪些数据流。一个帖子可能既进 `PostSafetyStream` 又进 `PostEmbeddingV5Stream`,生成多个带不同 `TaskEligibility` 的 `TaskPayload`,各自被对应 Plan 处理。\n\n**Q:Grox 的产出去哪了?**\nA:写入下游存储(如 Manhattan 的统一帖子注解、嵌入 sink),供 [home-mixer](#home-mixer-orchestration) 的可见性过滤、品牌安全、[召回](#phoenix-retrieval)等使用。Grox 本身不参与在线打分。\n\n## 源码锚点\n\n- `grox/main.py:21-50` —— 三进程启动与关停\n- `grox/dispatcher.py:251-333` —— `_fill_loop` 与 `_result_loop`\n- `grox/engine.py:51-113` —— 任务执行循环\n- `grox/plans/plan.py:28-102` —— Plan 的 DAG 执行\n- `grox/plans/plan_master.py:18-62` —— 9 个 Plan 与 `merge_results`\n\n## 相关页面\n\n- [grox-classifiers](#grox-classifiers) —— Plan 里跑的 VLM 内容分类器\n- [multimodal-embedders](#multimodal-embedders) —— 嵌入类 Plan 调用的多模态嵌入器\n- [system-architecture](#system-architecture) —— Grox 作为旁路服务的定位\n- [ads-blending](#ads-blending) —— 消费 Grox 安全标签的下游之一\n- [end-to-end-dataflow](#end-to-end-dataflow) —— 端到端数据流:Grox 旁路管线如何与 feed 请求路径汇合\n"}, "grox-classifiers": {"title": "Grox 内容分类器", "type": "concept", "group": "内容理解(Grox)", "md": "# Grox 内容分类器\n\n## 这一页回答什么\n\nGrox 用哪些分类器理解帖子内容(垃圾、安全、质量、回复价值),它们共同的结构,以及各自背后的模型与输出。\n\n## 核心结论\n\n1. **分类器全部基于 VLM**:每个分类器用一个视觉语言模型(`VisionSampler` + Grok 模型),温度≈0。\n2. **统一三段式**:`ContentClassifier` 把分类抽象成 `_to_convo`(渲染成对话)→ `_sample`(VLM 采样)→ `_parse`(解析 JSON)。\n3. **覆盖四类判断**:垃圾检测、安全/PTOS、帖子质量(\"banger\")、回复打分。\n4. **输出结构化**:VLM 被要求输出 JSON(常包在 `<json>...<\/json>` 里),解析成 `ContentCategoryResult` 等。\n\n## 统一基类 ContentClassifier\n\n`ContentClassifier`(`classifier.py:19`)定义所有分类器的骨架:\n\n```python\nclass ContentClassifier(ABC):\n    def __init__(self, categories: list[ContentCategoryType], llm: LiteLLM): ...\n\n    async def _classify(self, post: Post) -> list[ContentCategoryResult]:\n        convo  = await self._to_convo(post)   # 1. 把帖子渲染成对话\n        output = await self._sample(convo)    # 2. VLM 采样\n        return await self._parse(post, output)  # 3. 解析成结构化结果\n```\n\n`classify()` 在三段外包了请求/成功/错误计数与延迟直方图。`_to_convo` / `_sample` / `_parse` 由各子类实现。\n\n所有分类器构造时都从 `grox_config` 取一个模型并把 `temperature` 设成 `0.000001`(近似贪心解码,保证可复现):\n\n```python\nvlm_config = grox_config.get_model(ModelName.VLM_PRIMARY)\nvlm_config.temperature = 0.000001\nvlm = VisionSampler(GrokModelConfig(**vlm_config.model_dump()))\n```\n\n## 垃圾检测\n\n`SpamEapiLowFollowerClassifier`(`spam.py:25`):\n\n- 模型:`VLM_PRIMARY`;类别:`SPAM_COMMENT`\n- `_to_convo`:系统提示 `SpamSystemLowFollower`,再用 `ThreadRenderer` 把帖子线程渲进对话\n- `_parse`:解析 `SpamSampleResult` JSON 取 `decision`;失败则用正则兜底抓 `\"decision\"`。`decision == \"spam\"` → `positive=True, score=1.0`,否则 `0.0`\n\n从类名看,这是针对**低粉丝用户**评论的垃圾筛查。\n\n## 安全 / PTOS\n\nPTOS 指 X 的平台安全策略体系(违规内容的分级与判罚规则);这一类分类器就是判断帖子是否触犯、触犯了哪条策略。`safety_ptos.py` 有两个分类器,都服务 `SAFETY_PTOS` 类别。\n\n### SafetyPtosCategoryClassifier\n\n`safety_ptos.py:57`。判定帖子**违反了哪些安全策略类别**:\n\n- 模型:`VLM_SAFETY`\n- `deluxe` 模式:系统提示用去掉\"思考限制\"的 `SafetyPtos` 变体,并留空 assistant 消息让模型自由推理\n- 输出:`(.*)<json>(.*)<\/json>` 正则抓 JSON → `SafetyPostAnnotations`\n\n### SafetyPtosPolicyClassifier\n\n`safety_ptos.py:140`。针对**单条具体违规**做策略级判定:\n\n- 模型:`VLM_PRIMARY_CRITICAL`\n- 按违规类别选对应策略提示词,支持 **7 个策略类别**(`SUPPORTED_POLICY_CATEGORIES`,`safety_ptos.py:217-225`):\n\n| 策略类别 | 提示词 |\n|----------|--------|\n| `ViolentMedia` | `ViolentMediaPolicy` |\n| `AdultContent` | `AdultContentPolicy` |\n| `Spam` | `SpamPolicy` |\n| `IllegalAndRegulatedBehaviors` | `IllegalAndRegulatedBehaviorsPolicy` |\n| `HateOrAbuse` | `HateOrAbusePolicy` |\n| `ViolentSpeech` | `ViolentSpeechPolicy` |\n| `SuicideOrSelfHarm` | `SuicideOrSelfHarmPolicy` |\n\n- `deluxe` 模式下,对 `DELUXE_4_2_CATEGORIES`(`AdultContent`、`ViolentMedia`)走 EAPI 推理采样器(`EAPI_REASONING` / `EAPI_REASONING_INTERNAL`),失败回退到 VLM(`safety_ptos.py:269-280`)\n- 输出 `<json>` → `SafetyPolicy`\n\n## 帖子安全 Deluxe 筛查\n\n`PostSafetyDeluxeClassifier`(`post_safety_screen_deluxe.py:32`):\n\n- 模型:`VLM_PRIMARY_CRITICAL`;类别:`POST_SAFETY_SC
