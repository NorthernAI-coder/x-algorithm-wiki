REEN`\n- 系统提示 `PostSafetyDeluxe`,渲染用户 + 帖子\n- 输出 `<json>` → `PostSafetyScreenResult`,核心是 `tweet_bool_metadata`(一组布尔元数据)\n\n## 帖子质量初筛(Banger)\n\n`BangerInitialScreenClassifier`(`banger_initial_screen.py:41`):\n\n- 模型:`VLM_PRIMARY`;类别:`BANGER_INITIAL_SCREEN`、`GROK_RANKER`\n- 系统提示 `BangerMiniVlmScreenScore`(可带 `topics` 参数)\n- 输出 `<json>` → `BangerInitialScreenResult`:\n\n```python\nclass BangerInitialScreenResult(BaseModel):\n    quality_score: float\n    description: str\n    tags: list[str]\n    taxonomy_categories: list[dict] | None\n    tweet_bool_metadata: TweetBoolMetadata | None\n    is_image_editable_by_grok: bool | None\n    slop_score: int | None\n    has_minor_score: float | None\n```\n\n`_parse`(`banger_initial_screen.py:102-160`):取 `quality_score`,记 0–1 的直方图,**`score >= 0.4` 判为 positive**;还提取 `<json>` 之前的文本作为模型的推理过程(`reasoning`),以及话题分类(`taxonomy_categories`)、标签等。\n\n## 回复打分\n\n`ReplyScorer`(`reply_ranking.py:26`)—— 注意它**不是** `ContentClassifier` 子类,是独立类:\n\n- 主模型 `VLM_MINI_CRITICAL`,回退模型 `VLM_PRIMARY_CRITICAL`\n- 系统提示 `ReplyScoringSystem`;用 `ThreadRenderer` 渲染线程并 `include_signals=True`(带互动信号)\n- `_sample`:先用主模型 + JSON schema 采样;若输出里没有合法 `score` → 用回退模型重采(非推理模式)\n- `_parse`:多重容错 —— Pydantic 校验失败则用 `json_repair` 修复,再失败用正则抓 `\"score\"`\n- 输出 `ReplyScoreResult(score, reason)`,`score` 落在 0–3 的直方图桶\n\n## 共同模式\n\n```mermaid\nflowchart LR\n    P[Post] --> R[渲染:System 提示词<br/>+ User/Post/Thread]\n    R --> V[VLM 采样<br/>temperature≈0]\n    V --> O[\"输出文本<br/>含 JSON 或 &lt;json&gt;...&lt;/json&gt;\"]\n    O --> J[解析 → 结构化结果<br/>多重容错]\n```\n\n| 分类器 | 模型 | 输出类型 |\n|--------|------|---------|\n| `SpamEapiLowFollowerClassifier` | `VLM_PRIMARY` | `ContentCategoryResult`(spam 决策) |\n| `SafetyPtosCategoryClassifier` | `VLM_SAFETY` | `SafetyPostAnnotations` |\n| `SafetyPtosPolicyClassifier` | `VLM_PRIMARY_CRITICAL`(+EAPI 推理) | `SafetyPolicy` |\n| `PostSafetyDeluxeClassifier` | `VLM_PRIMARY_CRITICAL` | `PostSafetyScreenResult` |\n| `BangerInitialScreenClassifier` | `VLM_PRIMARY` | `BangerInitialScreenResult` |\n| `ReplyScorer` | `VLM_MINI_CRITICAL`(回退 `VLM_PRIMARY_CRITICAL`) | `ReplyScoreResult` |\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 用 VLM 做分类 | 替代传统专用分类模型 | 一个多模态大模型 + 不同提示词即可覆盖多种内容判断,省去逐任务建模 |\n| 温度≈0 | `temperature = 0.000001` | 近似贪心解码,判定可复现、可缓存 |\n| `<json>` 包裹输出 | 正则抓 `<json>...<\/json>` | 把模型的自由推理与结构化结论分开,推理可留作 `reason` |\n| 解析多重容错 | Pydantic → `json_repair` → 正则 | LLM 输出 JSON 偶有瑕疵,逐级降级保证尽量取到结果 |\n| 关键任务用 critical 模型 | 安全/回复用 `*_CRITICAL` 变体 | 安全判定与回复排序对质量更敏感 |\n| deluxe 模式 | 启用推理 / EAPI 推理模型 | 复杂安全判定需要更强的推理,普通模式更省成本 |\n\n## FAQ\n\n**Q:这些分类器和 [品牌安全](#ads-blending)裁定什么关系?**\nA:分类器产出的安全标签/注解写入下游存储;`home-mixer` 侧的 `compute_verdict` 再据此(含是否被 Grok 评分、是否 PTOS 审过)算出 `BrandSafetyVerdict`。Grox 是上游标注方。\n\n**Q:\"banger\" 是什么?**\nA:指高质量、可能爆款的帖子。`BangerInitialScreenClassifier` 给帖子打质量分(0–1),`>= 0.4` 视为通过初筛,供下游排序参考。\n\n## 源码锚点\n\n- `grox/classifiers/content/classifier.py:83-98` —— `_to_convo`/`_sample`/`_parse` 三段抽象\n- `grox/classifiers/content/safety_ptos.py:217-225` —— 7 个安全策略类别\n- `grox/classifiers/content/banger_initial_screen.py:102-160` —— banger 评分解析\n- `grox/classifiers/content/reply_ranking.py:74-158` —— 回复打分的回退与容错\n\n## 相关页面\n\n- [grox-architecture](#grox-architecture) —— 分类器在 Plan/Task 体系中的执行\n- [multimodal-embedders](#multimodal-embedders) —— Grox 的另一类产出:内容嵌入\n- [ads-blending](#ads-blending) —— 消费安全标签的下游\n- [filtering-pipeline](#filtering-pipeline) —— 使用可见性/安全结果的过滤器\n"}, "multimodal-embedders": {"title": "多模态帖子嵌入器", "type": "concept", "group": "内容理解(Grox)", "md": "# 多模态帖子嵌入器\n\n## 这一页回答什么\n\nGrox 如何把一条帖子(文本 + 图片 + 视频)编码成一个稠密向量,v2 与 v5 两代嵌入器有何区别。\n\n## 核心结论\n\n1. **两代嵌入器**:`MultimodalPostEmbedderV5`(精简、定型)与 `MultimodalPostEmbedderV2`(多模型、多渲染器、实验性)。\n2. **v5 是当前主力**:用 `RECSYS_EMBED_V5` 模型,输出截断到 **1024 维**并 L2 归一化。\n3. **多模态**:文本、图片、视频帧都进同一个文档表示;v5 还能注入视频的 ASR 转写(把视频里的语音自动识别成文字)。\n4. **嵌入是召回的素材**:产出的帖子向量是 [召回](#phoenix-retrieval)语料的来源之一。\n\n## V5:精简主力嵌入器\n\n`MultimodalPostEmbedderV5`(`multimodal_post_embedder_v5.py:18`):\n\n- 模型:`RECSYS_EMBED_V5`,经 `XaiEmbeddingClientHttp` 调用,`text_max_len=4096`、超时 60s\n- 常量:`TRUNCATE_DIM = 1024`\n\n`embed()` 流程(`multimodal_post_embedder_v5.py:58-120`):\n\n```mermaid\nflowchart LR\n    P[Post] --> R[\"V5EmbedPostRenderer<br/>render_for_embedding\"]\n    R --> TP[\"text_with_pads + images\"]\n    TP -->|可选| TR[\"+ Transcript: 视频 ASR 转写\"]\n    TR --> E[\"encode_with_embedded_pads_async\"]\n    E --> T[\"_maybe_truncate<br/>截断 1024 维 + L2 归一化\"]\n    T --> V[嵌入向量]\n```\n\n1. **渲染**:`V5EmbedPostRenderer.render_for_embedding(post)` 产出\"带嵌入占位符的文本\"`text_with_pads` 与图片列表。所谓\"占位符\"就是在文本里第 N 张图该出现的位置插一个特殊记号,编码时模型据此把第 N 张图的内容填回该位置,从而保留图文的相对顺序。\n2. **注入转写**:若传入 `transcript`(视频 ASR 文本),追加 `\"\\nTranscript: {transcript}\"`。\n3. **编码**:`_client.encode_with_embedded_pads_async(text_with_pads, images)` —— 文本里的占位符与图片对齐编码。\n4. **截断归一化**:`_maybe_truncate` 把嵌入截到前 1024 维并 L2 归一化(`multimodal_post_embedder_v5.py:46-56`)。\n\n每个阶段都记直方图(`render_duration_ms` / `encode_duration_ms` / `truncate_duration_ms` / `total_duration_ms`),并统计图片数与图片字节数。\n\n文本与图片都为空时直接返回空嵌入并告警。\n\n## V2:多模型实验型嵌入器\n\n`MultimodalPostEmbedderV2`(`multimodal_post_embedder_v2.py:23`)更\"全能\",一个实例里持有多个嵌入客户端:\n\n| `ModelName` | 用途 |\n|-------------|------|\n| `EMBED_PRIMARY` / `EMBED_PRIMARY_VIDEO` | 主嵌入 / 视频专用 |\n| `EMBED_SMALL` | qwen3 0.6B |\n| `EMBED_LARGE` | qwen3 8B |\n| `RECSYS_EMBED_V4` | 上一代 recsys 嵌入 |\n\n`_get_client`(`multimodal_post_embedder_v2.py:88-105`)按 `model` 字段或内容类型选客户端 —— `\"qwen3\"`、`\"qwen3_8b\"`、`\"v4\"`,或有视频时用视频客户端。\n\n### 文档渲染:document_original vs document_v1\n\nV2 把多模态内容渲成 `(类型, 内容)` 元组列表,两种方式:\n\n- **`document_original`**(`:107-152`):图片前加 `\"Image:\"` 文本;视频拼一段说明(总时长、帧采样间隔、每帧字幕),再附 `combined_video_bytes`。\n- **`document_v1`**(`:154-189`):图片逐帧 `(\"image\", frame)`,每帧字幕单独作 `(\"text\", \"subtitle: ...\")`。\n\n### 渲染器版本与可选增强\n\n`embed()`(`:244-287`)按 `renderer_version` 选帖子渲染器(`lite` / `eval` / `mmembed_summary`),并可选拼接:\n\n- `use_grok_summary` —— 调 Strato 拿 Grok 生成的帖子摘要\n- `use_media_descriptions` —— 拼媒体描述\n- `use_post_context_summary` —— 拼帖子上下文摘要\n- `use_grok_summary_versioned` —— 从本地 jsonl 读版本化摘要\n\n## v2 与 v5 对比\n\n| 维度 | v2 | v5 |\n|------|----|----|\n| 模型 | 多个(qwen3 系列、v4、视频) | 单一 `RECSYS_EMBED_V5` |\n| 客户端 | `XaiEmbeddingClient`(CLI) | `XaiEmbeddingClientHttp` |\n| 输出维度 | 模型原生 | 截断到 1024 + L2 归一化 |\n| 渲染 | 多渲染器 + 多 document 版本 | 单一 `V5EmbedPostRenderer`(带嵌入占位符) |\n| ASR 转写 | 经视频字幕进文档 | `embed()` 直接接 `transcript` 参数 |\n| 定位 | 多实验路径、可配置 | 精简、定型的当前主力 |\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 多模态统一文档 | 文本/图片/视频帧编成同一序列 | 一个嵌入同时表征帖子的全部模态 |\n| v5 截断 1024 维 | `TRUNCATE_DIM = 1024` + 归一化 | 控制存储与检索成本;归一化后点积即余弦相似度,适配召回 |\n| v5 嵌入占位符 | `text_with_pads` 中预留位置 | 图文按位置对齐编码,而非简单拼接 |\n| 注入 ASR 转写 | v5 `embed()` 接 `transcript` | 视频内容靠语音转写补充进文本侧 |\n| v2 保留多模型 | qwen3/v4/视频客户端并存 | 支持嵌入模型的对比实验与渐进迁移 |\n\n## FAQ\n\n**Q:嵌入器在 Grox 的哪个环节被调用?**\nA:由嵌入类 Plan(`PlanPostEmbeddingV5`、`PlanPostEmbeddingWithSummary` 等)下的 Task 调用,产出的向量经嵌入 sink 写入下游。见 [grox-architecture](#grox-architecture)。\n\n**Q:v5 的 1024 维向量和 Phoenix 召回什么关系?**\nA:多模态帖子嵌入是内容侧的稠密表示,可作为 [双塔召回](#phoenix-retrieval)语料的候选表示来源 —— 归一化后正好支持点积近邻检索。\n\n## 源码锚点\n\n- `grox/embedder/multimodal_post_embedder_v5.py:58-120` —— v5 `embed()` 全流程\n- `grox/embedder/multimodal_post_embedder_v5.py:46-56` —— `_maybe_truncate` 截断归一化\n- `grox/embedder/multimodal_post_embedder_v2.py:88-105` —— v2 多客户端选择\n- `grox/embedder/multimodal_post_embedder_v2.py:107-189` —— `document_original` / `document_v1`\n\n## 相关页面\n\n- [grox-architecture](#grox-architecture) —— 嵌入器在 Plan/Task 中的执行\n- [grox-classifiers](#grox-classifiers) —— Grox 的另一类产出:内容分类\n- [phoenix-retrieval](#phoenix-retrieval) —— 消费内容嵌入的双塔召回\n- [hash-based-embeddings](#hash-based-embeddings) —— Phoenix 模型侧的另一种嵌入(ID 哈希嵌入)\n"}, "candidate-pipeline": {"title": "CandidatePipeline trait（流水线执行器）", "type": "entity", "group": "Entities", "md": "# CandidatePipeline trait（流水线执行器）\n\n## 概述\n\n`CandidatePipeline<Q, C>` 是 `candidate-pipeline` 框架的**执行器 trait** —— 一条推荐流水线的\"主控\"。它定义在 `candidate-pipeline/candidate_pipeline.rs`,职责是:接收一个 `Query`,按固定的 10 个阶段顺序调度组件,产出一份排序好的候选结果。\n\n它与 [七个组件 trait](#candidate-pipeline-framework) 是分工关系:组件 trait(Source、Hydrator、Filter…)定义\"每类活儿怎么干\";`CandidatePipeline` 定义\"这些活儿按什么顺序、并行还是顺序、谁的输出喂给谁\"。业务侧(`ForYouCandidatePipeline`、`PhoenixCandidatePipeline`)实现这个 trait —— 但**只需填几个返回组件列表的 getter**,真正的编排逻辑 `execute()` 由框架以**默认方法**形式提供,业务不用、也不该重写。\n\n本页聚焦这个执行器本身:完整方法集、`execute()` 逐阶段走读、相关结构体(`PipelineStage`、`PipelineResult`、`SelectResult`)、`#[receive_stats]` 宏、日志/统计辅助函数。\n\n## trait 定义\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:67-86\n#[async_trait]\npub trait CandidatePipeline<Q, C>: Send + Sync\nwhere\n    Q: PipelineQuery,\n    C: PipelineCandidate,\n{\n    fn query_hydrators(&self) -> &[Box<dyn QueryHydrator<Q>>];\n    fn dependent_query_hydrators(&self) -> &[Box<dyn QueryHydrator<Q>>] {\n        &[]\n    }\n    fn sources(&self) -> &[Box<dyn Source<Q, C>>];\n    fn hydrators(&self) -> &[Box<dyn Hydrator<Q, C>>];\n    fn filters(&self) -> &[Box<dyn Filter<Q, C>>];\n    fn scorers(&self) -> &[Box<dyn Scorer<Q, C>>];\n    fn selector(&self) -> &dyn Selector<Q, C>;\n    fn post_selection_hydrators(&self) -> &[Box<dyn Hydrator<Q, C>>];\n    fn post_selection_filters(&self) -> &[Box<dyn Filter<Q, C>>];\n    fn side_effects(&self) -> Arc<Vec<Box<dyn SideEffect<Q, C>>>>;\n    fn result_size(&self) -> usize;\n    fn finalize(&self, _query: &Q, _candidates: &mut Vec<C>) {}\n\n    // execute() / components() / 各阶段方法 / 辅助函数 —— 全是默认方法\n}\n```\n\n`trait CandidatePipeline<Q, C>: Send + Sync` —— 执行器自身要能跨线程(它会被多个请求并发调用)。两个泛型 `Q`、`C` 的约束 `PipelineQuery` / `PipelineCandidate` 见 [candidate-pipeline-framework](#candidate-pipeline-framework)。\n\n## 完整方法集\n\ntrait 的方法分三类。\n\n### 业务必须实现的 getter（10 个）\n\n每个返回对应阶段的组件,框架的 `execute()` 靠它们取组件。\n\n| 方法 | 返回类型 | 说明 |\n|------|---------|------|\n| `query_hydrators` | `&[Box<dyn QueryHydrator<Q>>]` | Query 水合器列表 |\n| `dependent_query_hydrators` | `&[Box<dyn QueryHydrator<Q>>]` | 依赖型 Query 水合器,**有默认实现** `&[]` |\n| `sources` | `&[Box<dyn Source<Q, C>>]` | 候选源列表 |\n| `hydrators` | `&[Box<dyn Hydrator<Q, C>>]` | 候选水合器列表 |\n| `filters` | `&[Box<dyn Filter<Q, C>>]` | 打分前过滤器列表 |\n| `scorers` | `&[Box<dyn Scorer<Q, C>>]` | 打分器列表 |\n| `selector` | `&dyn Selector<Q, C>` | 选择器(**单数** —— 一条流水线只有一个) |\n| `post_selection_hydrators` | `&[Box<dyn Hydrator<Q, C>>]` | 选后候选水合器列表 |\n| `post_selection_filters` | `&[Box<dyn Filter<Q, C>>]` | 选后过滤器列表 |\n| `side_effects` | `Arc<Vec<Box<dyn SideEffect<Q, C>>>>` | 副作用列表,用 `Arc` 包(要 `move` 进后台任务) |\n| `result_size` | `usize` | 最终结果截断到多少条 |\n\n`dependent_query_hydrators` 默认返回空切片 —— 不需要依赖型水合的流水线可以不实现它。其余 getter 没有默认实现,业务必须给(空阶段返回 `&[]` 即可)。\n\n注意 `side_effects` 的返回类型是 `Arc<Vec<...>>` 而非 `&[...]` —— 其它 getter 返回切片引用,它返回 `Arc`。因为 side effect 要被 `tokio::spawn` 到后台任务里执行,需要一个能 `move` 进闭包、`'static` 的所有权句柄,`Arc` 满足这点。\n\n### 业务可选 override 的钩子（1 个）\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:86\nfn finalize(&self, _query: &Q, _candidates: &mut Vec<C>) {}\n```\n\n`finalize` 默认空实现。它在选后过滤完成、结果截断之后、跑 side effect 之前被调用(`execute()` 第 119 行),给业务一个对最终候选列表做最后调整的口子(重排、注入、打标等)。不需要就不实现。\n\n### 框架提供的默认方法（编排逻辑，业务不重写）\n\n这些方法都有默认实现,构成执行器的全部逻辑:\n\n- `execute(&self, query: Q) -> PipelineResult<Q, C>` —— **主入口**,编排 10 个阶段\n- `components(&self) -> Vec<PipelineComponents>` —— 列出所有阶段的组件名\n- `name(&self) -> &'static str` —— 流水线自身的短类型名\n- 阶段方法:`hydrate_query`、`hydrate_dependent_query`、`fetch_candidates`、`hydrate`、`hydrate_post_selection`、`run_hydrators`、`filter`、`filter_post_selection`、`run_filters`、`score`、`select`、`run_side_effects`\n- 辅助方法:`record_enabled_components`、`log_stage`、`log_stage_size`、`log_filters`、`stat_result_size`\n\n## execute() —— 十阶段编排走读\n\n`execute()` 是整个执行器的核心。完整代码:\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:88-137\n#[xai_stats_macro::receive_stats(latency=Bucket500To2500)]\nasync fn execute(&self, query: Q) -> PipelineResult<Q, C> {\n    let hydrated_query = self.hydrate_query(query).await;\n    let hydrated_query = self.hydrate_dependent_query(hydrated_query).await;\n\n    let candidates = self.fetch_candidates(&hydrated_query).await;\n\n    let hydrated_candidates = self.hydrate(&hydrated_query, candidates).await;\n\n    let (kept_candidates, mut filtered_candidates) =\n        self.filter(&hydrated_query, hydrated_candidates.clone());\n\n    let scored_candidates = self.score(&hydrated_query, kept_candidates).await;\n\n    let SelectResult {\n        selected: selected_candidates,\n        non_selected: mut non_selected_candidates,\n    } = self.select(&hydrated_query, scored_candidates);\n\n    let post_selection_hydrated_candidates = self\n        .hydrate_post_selection(&hydrated_query, selected_candidates)\n        .await;\n\n    let (mut final_candidates, post_selection_filtered_candidates) =\n        self.filter_post_selection(&hydrated_query, post_selection_hydrated_candidates);\n    filtered_candidates.extend(post_selection_filtered_candidates);\n\n    let truncated_candidates =\n        final_candidates.split_off(self.result_size().min(final_candidates.len()));\n    non_selected_candidates.extend(truncated_candidates);\n\n    self.finalize(&hydrated_query, &mut final_candidates);\n\n    self.stat_result_size(&final_candidates);\n\n    let arc_hydrated_query = Arc::new(hydrated_query);\n    let input = Arc::new(SideEffectInput {\n        query: arc_hydrated_query.clone(),\n        selected_candidates: final_candidates.clone(),\n        non_selected_candidates, // candidates are moved so we don't need to clone them\n    });\n    self.run_side_effects(input);\n\n    PipelineResult {\n        retrieved_candidates: hydrated_candidates,\n        filtered_candidates,\n        selected_candidates: final_candidates,\n        query: arc_hydrated_query,\n    }\n}\n```\n\n逐阶段拆解:\n\n```mermaid\nflowchart TB\n    Q([query: Q]) --> S1\n    S1[\"①hydrate_query<br/>QueryHydrator 并行\"] --> S2\n    S2[\"②hydrate_dependent_query<br/>DependentQueryHydrator 并行\"] --> S3\n    S3[\"③fetch_candidates<br/>Source 并行 → 候选池\"] --> S4\n    S4[\"④hydrate<br/>Hydrator 并行补字段\"] --> S5\n    S5[\"⑤filter<br/>Filter 顺序 → kept / removed\"] --> S6\n    S6[\"⑥score<br/>Scorer 顺序打分\"] --> S7\n    S7[\"⑦select<br/>Selector 排序 + 截断\"] --> S8\n    S8[\"⑧hydrate_post_selection<br/>仅对入选候选并行补字段\"] --> S9\n    S9[\"⑨filter_post_selection<br/>选后过滤 顺序\"] --> S10\n    S10[\"截断到 result_size<br/>finalize 钩子\"] --> S11\n    S11[\"⑩run_side_effects<br/>tokio::spawn 后台,不等待\"] --> R([PipelineResult])\n```\n\n**① Query 水合** `hydrate_query`(`candidate_pipeline.rs:90, 202-218`)\n所有 `QueryHydrator` 经 `enable()` 过滤后,`join_all` **并行**跑 `run()`,产出一批 `Result<Q>`;然后顺序 `zip` 逐个 `update()` 合并进 query。失败的(`Err`)跳过其 `update`。返回填好初始字段的 query。\n\n**② 依赖型 Query 水合** `hydrate_dependent_query`(`:91, 229-248`)\n逻辑与 ① 完全相同,只是用 `dependent_query_hydrators()`。开头有短路:`if all.is_empty() { return query; }` —— 没有依赖型水合器就直接返回,连 `Instant::now()` 都不调。它在 ① **之后**跑,因此能读到 ① 填好的字段。\n\n**③ 拉候选** `fetch_candidates`(`:93, 257-272`)\n所有 `Source` 经 `enable()` 过滤后 `join_all` **并行**跑。结果用 `results.into_iter().flatten()` 摊平 —— `Err` 的源被直接丢弃,只有 `Ok(Vec<C>)` 进池;逐个 `append` 拼成一个总 `Vec<C>`。把候选数记进 span 的 `candidate_count` 字段。\n\n**④ 候选水合** `hydrate`(`:95, 280-283`)\n委托给 `run_hydrators`(`:302-319`)。所有 `Hydrator` 经 `enable()` 过滤后 `join_all` **并行**跑,各产出 `Vec<Result<C,String>>`;然后顺序 `zip` 逐个 `update_all()` 合并。这里候选数量不变(Hydrator 等长契约)。\n\n**⑤ 过滤** `filter`(`:97-98, 331-333`)\n委托给 `run_filters`(`:355-386`)。注意 `execute()` 这里传的是 `hydrated_candidates.clone()` —— 克隆一份,因为原始的 `hydrated_candidates` 还要放进 `PipelineResult.retrieved_candidates`。`run_filters` 用 **for 循环顺序**跑每个启用的 `Filter`:`candidates = result.kept` 把上个 filter 的 kept 喂给下个,`all_removed.extend(result.removed)` 累积所有 removed。返回 `(kept, all_removed)`。`filtered_candidates` 收 removed。\n\n**⑥ 打分** `score`(`:100, 394-404`)\n所有 `Scorer` 经 `enable()` 过滤后,**for 循环顺序**跑:每个 scorer `run()` 产出 `Vec<Result<C>>`,立即 `update_all()` 写回 `candidates`;下个 scorer 看到的是更新后的候选。候选数量不变。\n\n**⑦ 选择** `select`(`:102-105, 407-416`)\n`select` 方法先查 `selector().enable(query)`:启用则调 `selector().run()` 排序 + 截断,产出 `SelectResult { selected, non_selected }`;**未启用**则原样返回 `SelectResult { selected: candidates, non_selected: vec![] }`(不排不截)。`execute()` 用模式匹配解构出 `selected_candidates` 和 `non_selected_candidates`。\n\n**⑧ 选后水合** `hydrate_post_selection`(`:107-109, 291-299`)\n同样委托 `run_hydrators`,但用 `post_selection_hydrators()`,且**只对 `selected_candidates`(已入选的那批)**跑。语义:有些昂贵的水合(品牌安全、可见性数据)只值得对最终会展示的候选做,放在选择之后省成本。\n\n**⑨ 选后过滤** `filter_post_selection`(`:111-113, 345-352`)\n委托 `run_filters`,用 `post_selection_filters()`。产出的 `removed` 用 `filtered_candidates.extend(...)` 并进第 ⑤ 步的 removed 里 —— `PipelineResult.filtered_candidates` 因此包含**两道过滤**剔除的全部候选。\n\n**截断 + finalize**(`:115-119`)\n`final_candidates.split_off(result_size().min(len))` —— 按 `result_size()` 截断,多出来的 `truncated_candidates` 并进 `non_selected_candidates`。然后调 `finalize()` 钩子(默认空)给业务最后修改 `final_candidates` 的机会。\n\n**stat + ⑩ side effect**(`:121-129`)\n`stat_result_size()` 把最终结果数发进直方图。然后 `Arc::new(hydrated_query)`、构造 `Arc<SideEffectInput>`(打包 query、入选、落选);`run_side_effects(input)` 用 `tokio::spawn` 把 side effect 丢后台 —— **`execute()` 不等它们完成**。\n\n**返回 `PipelineResult`**(`:131-136`)\n`retrieved_candidates` = ④ 水合后的全量候选;`filtered_candidates` = 两道过滤剔除的;`selected_candidates` = `final_candidates`;`query` = `arc_hydrated_query`。\n\n整个 `execute()` 带 `#[xai_stats_macro::receive_stats(latency=Bucket500To2500)]` —— 一次完整流水线执行的延迟落进 500~2500ms 的桶。\n\n## PipelineStage 枚举\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:21-33\n#[derive(Copy, Clone, Debug)]\npub enum PipelineStage {\n    QueryHydrator,\n    DependentQueryHydrator,\n    Source,\n    Hydrator,\n    PostSelectionHydrator,\n    Filter,\n    PostSelectionFilter,\n    Scorer,\n    Selector,\n    SideEffect,\n}\n```\n\n10 个变体,标识流水线的 10 个阶段。它**不参与 `execute()` 的控制流**(`execute()` 是写死的方法调用序列,不靠枚举驱动)。`PipelineStage` 的用途是给 `components()` 做**分类标签**:`components()` 产出 `Vec<PipelineComponents>`,每个 `PipelineComponents` 把一个 `PipelineStage` 和该阶段的组件名列表配对。\n\n注意枚举里变体的排列顺序(`PostSelectionHydrator` 排在 `Filter` 前、`PostSelectionFilter` 排在 `Scorer` 前)和 `execute()` 实际执行顺序**不一致** —— 枚举只是一个标签集合,顺序无语义。`run_hydrators` / `run_filters` 收一个 `_stage: PipelineStage` 参数但**带下划线前缀,当前未使用**。\n\n## PipelineComponents 与 components()\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:35-38\npub struct PipelineComponents {\n    pub stage: PipelineStage,\n    pub components: Vec<String>,\n}\n```\n\n`components()` 方法(`:140-188`)遍历全部 getter,为每个阶段产出一个 `PipelineComponents`。内部有个本地泛型函数 `stage<T>`,把一个组件切片映射成名字列表:\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:141-153\nfn stage<T: ?Sized>(\n    stage: PipelineStage,\n    items: &[Box<T>],\n    name: impl Fn(&T) -> &str,\n) -> PipelineComponents {\n    PipelineComponents {\n        stage,\n        components: items\n            .iter()\n            .map(|item| name(item.as_ref()).to_string())\n            .collect(),\n    }\n}\n```\n\n`selector()` 因为是单个而非切片,单独构造:`components: vec![self.selector().name().to_string()]`(`:168-171`)。`components()` 的产物适合用来打印/自检一条流水线挂了哪些组件 —— [system-architecture](#system-architecture) 里那张\"内层流水线 15 个 query 水合器 / 6 个源 / …\"的表,本质就是这个方法的输出。\n\n## PipelineResult 结构\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:40-58\npub struct PipelineResult<Q, C> {\n    pub retrieved_candidates: Vec<C>,\n    pub filtered_candidates: Vec<C>,\n    pub selected_candidates: Vec<C>,\n    pub query: Arc<Q>,\n}\n\nimpl<Q: Default, C> PipelineResult<Q, C> {\n    /// Create an empty result with a default query. Useful for short-circuiting\n    /// requests (e.g. test users) without running the pipeline.\n    pub fn empty() -> Self {\n        Self {\n            retrieved_candidates: vec![],\n            filtered_candidates: vec![],\n            selected_candidates: vec![],\n            query: Arc::new(Q::default()),\n        }\n    }\n}\n```\n\n`execute()` 的返回值。四个字段:\n\n| 字段 | 内容 |\n|------|------|\n| `retrieved_candidates` | 阶段 ④ 水合后的**全量**候选(过滤之前) |\n| `filtered_candidates` | 阶段 ⑤ 和 ⑨ **两道过滤**剔除的候选合集 |\n| `selected_candidates` | 最终入选、已截断到 `result_size` 的结果 |\n| `query` | `Arc<Q>` —— 水合完成后的 query |\n\n`PipelineResult::empty()` 是一个**短路出口**:当请求不该跑流水线(文档举例\"测试用户\")时,直接返回一份全空、query 取 `Q::default()` 的结果,跳过整个 `execute()`。它要求 `Q: Default`(注意 trait 边界里 `Q: PipelineQuery` 不含 `Default`,所以 `empty()` 在一个独立的 `impl<Q: Default, C>` 块里)。\n\n## SelectResult 结构\n\n```rust\n// candidate-pipeline/selector.rs:6-19\npub struct SelectResult<C> {\n    pub selected: Vec<C>,\n    pub non_selected: Vec<C>,\n}\n\nimpl<C> SelectResult<C> {\n    pub fn len(&self) -> usize {\n        self.selected.len()\n    }\n    pub fn is_empty(&self) -> bool {\n        self.selected.is_empty() && self.non_selected.is_empty()\n    }\n}\n```\n\n`select` 阶段(⑦)的产物。`selected` 进后续阶段,`non_selected` 是落选的。`execute()` 用 `let SelectResult { selected, non_selected } = ...` 解构它。`len()` 只数 `selected`;`is_empty()` 要求两个向量**都空**才算空。该结构体定义在 `selector.rs`,但 `execute()` 在 `candidate_pipeline.rs` 里消费它。\n\n## PipelineQuery / PipelineCandidate 约束\n\n`execute()` 的两个泛型必须满足:\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:59-65\npub trait PipelineQuery: Clone + Send + Sync + 'static {\n    fn params(&self) -> &xai_feature_switches::Params;\n    fn decider(&self) -> Option<&xai_decider::Decider>;\n}\n\npub trait PipelineCandidate: Clone + Send + Sync + 'static {}\nimpl<T> PipelineCandidate for T where T: Clone + Send + Sync + 'static {}\n```\n\n- `PipelineQuery`:`execute()` 全程要 `clone` query(进 `Arc`)、跨 await 点持有,故 `Clone + Send + Sync + 'static`。`params()` / `decider()` 是各组件 `enable()` 做实验开关的数据来源。\n- `PipelineCandidate`:空 trait + blanket impl,任何 `Clone + Send + Sync + 'static` 类型自动满足。`execute()` 里 `hydrated_candidates.clone()`、`final_candidates.clone()` 等操作要求候选可克隆。\n\n更多见 [candidate-pipeline-framework](#candidate-pipeline-framework)。\n\n## #[receive_stats] 宏\n\n`#[xai_stats_macro::receive_stats(...)]` 是一个**过程宏属性**,贴在 async 方法上,自动给该方法包一层统计埋点 —— 把方法的执行延迟(以及可选的 size)记进指定的直方图桶,无需手写埋点代码。\n\n执行器里它出现在 `execute()` 上:\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:88\n#[xai_stats_macro::receive_stats(latency=Bucket500To2500)]\nasync fn execute(&self, query: Q) -> PipelineResult<Q, C> { ... }\n```\n\n`latency=Bucket500To2500` 指定把 `execute()` 的耗时记进 500~2500ms 这档直方图桶 —— 这是对\"一次完整流水线执行\"延迟的预期区间。框架里其它组件 trait 的 `run()` 也都贴了这个宏,但配的桶不同(Filter 用 `Bucket0To50`、Hydrator 用 `Bucket50To500` 等),反映各阶段不同的耗时量级。完整对照见 [candidate-pipeline-framework](#candidate-pipeline-framework) 的\"可观测性\"一节。\n\n## 日志与统计辅助函数\n\n执行器把日志/统计逻辑抽成几个默认方法,各阶段方法复用它们。\n\n### record_enabled_components\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:435-454\nfn record_enabled_components<'a, T: 'a>(\n    items: impl Iterator<Item = &'a T>,\n    is_enabled: impl Fn(&T) -> bool,\n    get_name: impl Fn(&T) -> &str,\n) {\n    let mut total = 0usize;\n    let mut disabled: Vec<&str> = Vec::new();\n    for item in items {\n        total += 1;\n        if !is_enabled(item) {\n            disabled.push(get_name(item));\n        }\n    }\n    let span = Span::current();\n    span.record(\"total_count\", total);\n    span.record(\"enabled_count\", total - disabled.len());\n    if !disabled.is_empty() {\n        span.record(\"disabled\", disabled.join(\",\").as_str());\n    }\n}\n```\n\n每个阶段方法(`hydrate_query`、`fetch_candidates`、`run_hydrators`、`run_filters`、`score`)在过滤组件**之前**都先调它一次。它遍历组件,把 `total_count`、`enabled_count` 记进当前 tracing span;若有禁用组件,把它们的名字逗号拼接记进 `disabled` 字段。这就是\"一条流水线挂了 14 个 filter、本次请求只启用 11 个、禁用了哪 3 个\"在 trace 里可见的来源。\n\n### log_stage / log_stage_size / log_filters\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:458-476\nfn log_stage(&self, start: Instant) {\n    info!(\"latency_ms={}\", start.elapsed().as_millis());\n}\n\nfn log_stage_size(&self, start: Instant, size: usize) {\n    info!(\"latency_ms={} size={}\", start.elapsed().as_millis(), size);\n}\n\nfn log_filters(&self, kept: usize, removed: usize, removed_per_filter: &[(String, usize)]) {\n    let removed_summary = removed_per_filter\n        .iter()\n        .map(|(name, removed)| format!(\"{}={}\", name, removed))\n        .collect::<Vec<_>>()\n        .join(\",\");\n    info!(\n        \"kept {}, removed {} removed_per_filter [{}]\",\n        kept, removed, removed_summary,\n    );\n}\n```\n\n- `log_stage`:只打延迟。`hydrate_query` / `hydrate_dependent_query` 用它(query 水合不改候选数,无 size 可言)。\n- `log_stage_size`:打延迟 + 候选数。`fetch_candidates`、`run_hydrators`、`score` 用它。\n- `log_filters`:打 kept / removed 总数,以及每个 filter 各剔除了多少(`removed_per_filter` 是 `run_filters` 累积的 `(filter名, removed数)` 列表)。`run_filters` 用它。\n\n三个都是 `info!` 级日志,在每个阶段末尾调一次。\n\n### stat_result_size\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:478-492\nfn stat_result_size(&self, final_candidates: &[C]) {\n    if let Some(receiver) = global_stats_receiver() {\n        let response_size = final_candidates.len();\n        let metric_name = format!(\"{}.execute\", self.name());\n        receiver.observe(\n            metric_name.as_str(),\n            &FINAL_RESULT_SIZE_SCOPE,\n            response_size as f64,\n            HistogramBuckets::Bucket0To50,\n        );\n        if response_size == 0 {\n            receiver.incr(metric_name.as_str(), &FINAL_RESULT_EMPTY_SCOPE, 1u64);\n        }\n    }\n}\n```\n\n`execute()` 在返回前调一次。它把最终结果数 `observe` 进 `<流水线名>.execute` 指标的 `Bucket0To50` 桶;若结果**为空**,额外 `incr` 一个 `result_empty` 计数器 —— 这是监控\"流水线返回了空结果\"这一异常情况的告警信号源。两个 scope 常量定义在文件顶部:\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:18-19\nconst FINAL_RESULT_SIZE_SCOPE: [(&str, &str); 1] = [(\"requests\", \"result_size\")];\nconst FINAL_RESULT_EMPTY_SCOPE: [(&str, &str); 1] = [(\"requests\", \"result_empty\")];\n```\n\n开头的 `if let Some(receiver) = global_stats_receiver()` 是兜底 —— 没配全局 stats receiver(如单测环境)就整段跳过,不会 panic。\n\n### name()\n\n```rust\n// candidate-pipeline/candidate_pipeline.rs:190-192\nfn name(&self) -> &'static str {\n    util::short_type_name(type_name_of_val(self))\n}\n```\n\n流水线自身的短类型名,用 `util::short_type_name`(把全限定名截到最后一段,`util.rs:1-3`)。`stat_result_size` 用它拼指标名 `<name>.execute`。\n\n## 关键事实速查\n\n| 项 | 值 |\n|----|----|\n| 文件 | `candidate-pipeline/candidate_pipeline.rs`（约 494 行） |\n| trait | `CandidatePipeline<Q, C>: Send + Sync`，带 `#[async_trait]` |\n| 业务必实现 | 10 个 getter（`dependent_query_hydrators` 有默认 `&[]`） |\n| 业务可选 override | `finalize`（默认空） |\n| 主入口 | `execute(&self, query: Q) -> PipelineResult<Q, C>` |\n| 阶段数 | 10（`PipelineStage` 枚举） |\n| `execute()` 埋点 | `#[receive_stats(latency=Bucket500To2500)]` |\n| 短路出口 | `PipelineResult::empty()`（要求 `Q: Default`） |\n| side effect 调度 | `tokio::spawn`，不阻塞 `execute()` 返回 |\n\n## 设计决策\n\n| 决策点 | 选择 | 理由 |\n|--------|------|------|\n| 编排逻辑放哪 | `execute()` 作为 trait **默认方法**,业务不重写 | 10 阶段的顺序、并行性、错误处理全框架统一保证,业务只填组件,不可能写错编排 |\n| 业务接口形态 | 业务只实现\"返回组件列表\"的 getter | 把\"流水线由哪些组件构成\"和\"组件按什么顺序跑\"彻底解耦 |\n| `execute()` 控制流 | 写死的方法调用序列,不靠 `PipelineStage` 枚举驱动 | 阶段固定不变,写死最直接;枚举仅作 `components()` 的分类标签 |\n| selector 单数 | `selector()` 返回 `&dyn Selector`,不是切片 | 一条流水线只有一个\"排序+截断\"语义,多个无意义 |\n| `side_effects` 返回 `Arc` | 其它 getter 返回 `&[]`,它返回 `Arc<Vec<...>>` | side effect 要 `move` 进 `tokio::spawn` 的后台任务,需 `'static` 所有权句柄 |\n| 选后再水合/过滤 | 设 `post_selection_hydrators` / `post_selection_filters` 两个独立阶段 | 昂贵的水合(品牌安全/可见性)只对最终入选的候选做,省成本 |\n| `retrieved` vs `filtered` | `PipelineResult` 同时保留全量候选和被剔除候选 | 便于调试/审计:能回看流水线召回了什么、过滤掉了什么 |\n| 空结果短路 | `PipelineResult::empty()` 独立构造器 | 测试用户等场景直接返回空,不跑 `execute()` |\n| 空结果监控 | `stat_result_size` 对空结果额外 `incr` 一个计数器 | \"流水线返回空\"是异常,需独立告警信号 |\n\n## 源码锚点\n\n- `candidate-pipeline/candidate_pipeline.rs:21-33` —— `PipelineStage` 十阶段枚举\n- `candidate-pipeline/candidate_pipeline.rs:35-38` —— `PipelineComponents`\n- `candidate-pipeline/candidate_pipeline.rs:40-58` —— `PipelineResult` 与 `empty()`\n- `candidate-pipeline/candidate_pipeline.rs:59-65` —— `PipelineQuery` / `PipelineCandidate`\n- `candidate-pipeline/candidate_pipeline.rs:67-86` —— `CandidatePipeline` trait 头与 getter\n- `candidate-pipeline/candidate_pipeline.rs:88-137` —— `execute()` 编排主流程\n- `candidate-pipeline/candidate_pipeline.rs:140-188` —— `components()`\n- `candidate-pipeline/candidate_pipeline.rs:202-416` —— 各阶段方法实现\n- `candidate-pipeline/candidate_pipeline.rs:419-428` —— `run_side_effects`\n- `candidate-pipeline/candidate_pipeline.rs:435-492` —— 辅助方法(`record_enabled_components`、日志、`stat_result_size`)\n- `candidate-pipeline/selector.rs:6-19` —— `SelectResult`\n\n## 相关页面\n\n- [candidate-pipeline-framework](#candidate-pipeline-framework) —— 执行器调度的七个组件 trait 的签名与契约\n- [system-architecture](#system-architecture) —— `CandidatePipeline` 在两层嵌套流水线里的实际用法与全局视角\n- [home-mixer-orchestration](#home-mixer-orchestration) —— 实现本 trait 的两条真实流水线如何组装组件、暴露 gRPC\n- [run-pipeline](#run-pipeline) —— 驱动一条 `CandidatePipeline::execute()` 跑起来的入口构件\n- [filtering-pipeline](#filtering-pipeline) —— `execute()` 第 ⑤、⑨ 步两道过滤的具体过滤器\n- [scoring-and-ranking](#scoring-and-ranking) —— `execute()` 第 ⑥ 步打分阶段的具体打分器链\n- [candidate-selection](#candidate-selection) —— `execute()` 第 ⑦ 步选择阶段与选后成型步骤\n"}, "recsys-model": {"title": "PhoenixModel(排序模型)", "type": "entity", "group": "Entities", "md": "# PhoenixModel(排序模型)\n\n## 是什么\n\n`PhoenixModel` 是 Phoenix 排序模型的代码构件 —— 一个基于 Haiku/JAX 的 `hk.Module`,定义于 `phoenix/recsys_model.py:395`。本页讲它的类结构与方法;排序的工作原理见 [phoenix-ranking](#phoenix-ranking)。\n\n`recsys_model.py` 还定义了召回模型复用的公共件:`HashConfig`、`RecsysBatch`、`RecsysEmbeddings`、`block_user_reduce` / `block_history_reduce`(被 [recsys-retrieval-model](#recsys-retrieval-model) import)。\n\n## 配置:PhoenixModelConfig\n\n`@dataclass`,`recsys_model.py:335-392`:\n\n```python\n@dataclass\nclass PhoenixModelConfig:\n    model: TransformerConfig          # Grok transformer 配置\n    emb_size: int\n    num_actions: int\n    history_seq_len: int = 128\n    candidate_seq_len: int = 32\n    fprop_dtype: Any = jnp.bfloat16\n    hash_config: HashConfig = None    # __post_init__ 兜底为 HashConfig()\n    product_surface_vocab_size: int = 16\n    post_age_granularity_mins: int = 60\n    num_continuous_actions: int = 8\n    continuous_action_hidden_dim: int = 64\n    continuous_action_config: ContinuousActionConfig = None\n    use_ip_address: bool = False\n    right_anchored_rope: bool = False\n    mask_neg_feedback_on_negatives: bool = True\n```\n\n- `post_age_vocab_size`(property)= `POST_AGE_MAX_MINUTES // post_age_granularity_mins + 2` = `4800/60 + 2 = 82`\n- `initialize()` 置 `_initialized = True`;`make()` 构造 `PhoenixModel`(内部 `self.model.make()` 实例化 transformer)\n\n### 辅助配置\n\n| 类型 | 字段 | 说明 |\n|------|------|------|\n| `HashConfig` | `num_user_hashes=2`、`num_item_hashes=2`、`num_author_hashes=2`、`num_ip_hashes=0` | 各实体哈希函数数量 |\n| `NormConfig` | `norm_scale=30.0`、`use_log=False` | 连续值归一化 |\n| `ContinuousActionConfig` | `loss_weight`、`loss_type=\"mae\"`、`tweedie_power=1.5`、`norm_config` | 连续动作损失配置 |\n\n## 输入/输出类型\n\n| 类型 | 种类 | 字段 |\n|------|------|------|\n| `RecsysBatch` | `NamedTuple` | `user_hashes`、`history_post_hashes`、`history_author_hashes`、`history_actions`、`history_product_surface`、`candidate_post_hashes`、`candidate_author_hashes`、`candidate_product_surface`,+ 可选 `history_continuous_actions`、`candidate_impr_ts`、`candidate_post_creation_ts`、`user_ip_hashes` |\n| `RecsysEmbeddings` | `@dataclass` | `user_embeddings`、`history_post_embeddings`、`candidate_post_embeddings`、`history_author_embeddings`、`candidate_author_embeddings`,+ 可选 `user_ip_embeddings` |\n| `RecsysModelOutput` | `NamedTuple` | `logits`、`continuous_preds` |\n\n设计要点:`RecsysBatch` 只装**哈希值**(特征),`RecsysEmbeddings` 装**查表后的嵌入**。两者分离 —— 嵌入查表在模型外完成,模型内只做组合与 transformer。\n\n## block_*_reduce 函数(模块级)\n\n把\"多个哈希嵌入 + 各类成分\"压成 D 维序列,排序与召回共用:\n\n```python\n# recsys_model.py:147 —— 用户段\nblock_user_reduce(user_hashes, user_embeddings, num_user_hashes, emb_size, ...)\n    -> (user_embedding [B,1,D], user_padding_mask [B,1])\n\n# recsys_model.py:200 —— 历史段\nblock_history_reduce(history_post_hashes, history_post_embeddings,\n    history_author_embeddings, history_product_surface_embeddings,\n    history_actions_embeddings, num_item_hashes, num_author_hashes, ...)\n    -> (history_embedding [B,S,D], history_padding_mask [B,S])\n\n# recsys_model.py:271 —— 候选段\nblock_candidate_reduce(candidate_post_hashes, candidate_post_embeddings,\n    candidate_author_embeddings, candidate_product_surface_embeddings, ...)\n    -> (candidate_embedding [B,C,D], candidate_padding_mask [B,C])\n```\n\n每个 reduce 把多哈希嵌入 reshape 成 `[..., num_hashes*D]`、与其它成分 `concatenate`,再经一个学习投影矩阵(`proj_mat_1`/`proj_mat_3`/`proj_mat_2`)压回 D 维。padding 掩码由\"首个哈希值是否为 0\"决定(哈希 0 保留给 padding)。\n\n## PhoenixModel 方法\n\n`@dataclass` `hk.Module`,`recsys_model.py:395-680`。\n\n| 方法 | 作用 |\n|------|------|\n| `_get_action_embeddings(actions)` | 多热动作 → 嵌入;`2*actions-1` 映射到 ±1 后投影 |\n| `_single_hot_to_embeddings(input, vocab, D, name)` | 类别索引 → one-hot @ 嵌入表 |\n| `_get_unembedding()` | 取 `unembeddings` 参数 `[emb_size, num_actions]` |\n| `_get_continuous_head()` | 取 `continuous_unembeddings` 参数 `[emb_size, num_continuous_actions]` |\n| `_project_continuous_value_to_embedding(...)` | 连续值 → 归一化 → 2 层 MLP(gelu)→ 嵌入 |\n| `build_inputs(batch, embeddings)` | 拼 `[用户\\|历史\\|候选]`,返回 `(embeddings, padding_mask, candidate_start_offset)` |\n| `__call__(batch, embeddings)` | 完整前向,返回 `RecsysModelOutput` |\n\n`2*actions-1` 把多热的 0/1 动作向量映射到 ±1:这样\"未发生某动作\"也是 -1 这个有信号的值,而不是 0(0 经投影后无贡献,等于丢掉了\"没点赞\"这条负向信息)。\n\n### build_inputs\n\n`recsys_model.py:520-626`。产出 `[B, 1+history_len+num_candidates, D]` 的嵌入序列、对应 padding 掩码、以及 `candidate_start_offset = 1 + S`。历史段会注入 `dwell_time`(取 `history_continuous_actions[:, :, 1]`)的连续嵌入;候选段会注入帖龄桶嵌入。\n\n### \\_\\_call\\_\\_\n\n`recsys_model.py:628-680`。流程:`build_inputs` → (可选)`right_anchored_rope_positions` → `self.model(...)` 跑 transformer → `layer_norm` → 抽取 `out_embeddings[:, candidate_start_offset:, :]` → 离散头得 `logits [B,C,num_actions]`、连续头得 `continuous_preds [B,C,num_continuous]`(经 sigmoid)。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 特征与嵌入分离 | `RecsysBatch`(哈希)+ `RecsysEmbeddings`(嵌入)两个容器 | 嵌入查表可在模型外/不同设备完成,模型只管组合与计算 |\n| reduce 函数模块级 | `block_*_reduce` 不绑在类上 | 召回模型可直接 import 复用,排序/召回共享同一套压缩逻辑 |\n| 配置自带 `make()` | `PhoenixModelConfig.make()` 造模型 | 配置即工厂,统一初始化 transformer 与模型 |\n| `bfloat16` 前向 | `fprop_dtype = jnp.bfloat16` | 推理省显存、提吞吐;参数仍以 fp32 存 |\n\n## 源码锚点\n\n- `phoenix/recsys_model.py:335-392` —— `PhoenixModelConfig`\n- `phoenix/recsys_model.py:147-332` —— `block_user_reduce` / `block_history_reduce` / `block_candidate_reduce`\n- `phoenix/recsys_model.py:520-626` —— `build_inputs`\n- `phoenix/recsys_model.py:628-680` —— `__call__`\n\n## 相关页面\n\n- [phoenix-ranking](#phoenix-ranking) —— 排序模型的工作原理\n- [recsys-retrieval-model](#recsys-retrieval-model) —— 复用本文件公共件的召回模型\n- [grok-transformer](#grok-transformer) —— `PhoenixModelConfig.model` 指向的 transformer\n- [hash-based-embeddings](#hash-based-embeddings) —— `block_*_reduce` 处理的哈希嵌入\n- [candidate-isolation-masking](#candidate-isolation-masking) —— `candidate_start_offset` 的用途\n"}, "recsys-retrieval-model": {"title": "PhoenixRetrievalModel(召回模型)", "type": "entity", "group": "Entities", "md": "# PhoenixRetrievalModel(召回模型)\n\n## 是什么\n\n`PhoenixRetrievalModel` 是 Phoenix 双塔召回模型的代码构件 —— 一个 Haiku/JAX 的 `hk.Module`,定义于 `phoenix/recsys_retrieval_model.py:159`。本页讲类结构与方法;双塔召回的工作原理见 [phoenix-retrieval](#phoenix-retrieval)。\n\n它**复用** [recsys_model.py](#recsys-model) 的公共件:`HashConfig`、`RecsysBatch`、`RecsysEmbeddings`、`block_user_reduce`、`block_history_reduce`(`recsys_retrieval_model.py:24-30` import)。\n\n## 配置:PhoenixRetrievalModelConfig\n\n`@dataclass`,`recsys_retrieval_model.py:115-156`:\n\n```python\n@dataclass\nclass PhoenixRetrievalModelConfig:\n    model: TransformerConfig          # 与排序模型同款 Grok transformer\n    emb_size: int\n    history_seq_len: int = 128\n    candidate_seq_len: int = 32\n    fprop_dtype: Any = jnp.bfloat16\n    hash_config: HashConfig = None    # __post_init__ 兜底 HashConfig()\n    product_surface_vocab_size: int = 16\n    enable_linear_proj: bool = True   # 候选塔是否用 MLP 投影\n```\n\n文档注释明确:\"This model uses the same transformer architecture as the Phoenix ranker for encoding user representations.\" `make()` 构造 `PhoenixRetrievalModel`。\n\n## CandidateTower(候选塔)\n\n`@dataclass` `hk.Module`,`recsys_retrieval_model.py:46-112`。把\"帖嵌入 + 作者嵌入\"投影到与用户表示共享的空间,两种模式:\n\n| 模式 | `enable_linear_proj` | 行为 |\n|------|---------------------|------|\n| MLP 投影 | `True`(默认) | reshape → `proj_1 [in, 2D]` → `silu` → `proj_2 [2D, D]` → L2 归一化 |\n| 均值池化 | `False` | 沿哈希维 `mean` → L2 归一化(更省参数,表达力弱) |\n\n输入形状 `[B, C, num_hashes, D]` 或 `[B, num_hashes, D]`,输出 `[B, C, D]` 或 `[B, D]`,**始终 L2 归一化** —— 这样点积即余弦相似度。\n\n## PhoenixRetrievalModel 方法\n\n`@dataclass` `hk.Module`,`recsys_retrieval_model.py:159-388`。\n\n| 方法 | 作用 |\n|------|------|\n| `_get_action_embeddings(actions)` | 多热动作 → 嵌入(与排序模型同款 `2*actions-1` 投影) |\n| `_single_hot_to_embeddings(...)` | 类别索引 → one-hot @ 嵌入表 |\n| `build_user_representation(batch, embeddings)` | **用户塔**:编码 user+history,返回 `(user_representation [B,D], user_norm [B,1])` |\n| `build_candidate_representation(batch, embeddings)` | **候选塔**:经 `CandidateTower` 投影,返回 `(candidate_representation [B,C,D], padding_mask)` |\n| `_retrieve_top_k(user_rep, corpus, top_k, mask)` | 点积相似度 + `jax.lax.top_k` |\n| `__call__(batch, embeddings, corpus_embeddings, top_k, corpus_mask)` | 完整召回,返回 `RetrievalOutput` |\n\n### build_user_representation\n\n`recsys_retrieval_model.py:221-291`。用户塔流程:\n\n```python\n# block_user_reduce + block_history_reduce(复用 recsys_model)\nembeddings = concat([user_embeddings, history_embeddings], axis=1)\nmodel_output = self.model(embeddings, padding_mask, candidate_start_offset=None)  # 跑 transformer\n# 对有效位置做掩码均值池化\nuser_representation = sum(user_outputs * mask) / max(sum(mask), 1.0)\n# L2 归一化\nuser_representation = user_representation / user_norm\n```\n\n关键:`candidate_start_offset=None` —— 召回**不用候选隔离掩码**,因为序列里没有候选段;transformer 输出对所有有效位置做**均值池化**压成一个 `[B, D]` 向量。\n\n### \\_\\_call\\_\\_ 与 _retrieve_top_k\n\n`recsys_retrieval_model.py:330-388`:\n\n```python\nuser_representation, _ = self.build_user_representation(batch, recsys_embeddings)\nscores = jnp.matmul(user_representation, corpus_embeddings.T)   # [B, N]\nif corpus_mask is not None:\n    scores = jnp.where(corpus_mask[None, :], scores, -INF)      # 无效语料置 -1e12\ntop_k_scores, top_k_indices = jax.lax.top_k(scores, top_k)\n```\n\n把无效语料的分数压到 `-INF`,是为了保证它们在紧随其后的 `top_k` 里绝不会被选中(相当于从候选集里彻底剔除)。返回 `RetrievalOutput(user_representation, top_k_indices, top_k_scores)`。\n\n## 输出类型\n\n```python\nclass RetrievalOutput(NamedTuple):\n    user_representation: jax.Array   # [B, D] 归一化用户向量\n    top_k_indices: jax.Array         # [B, K] 命中的语料下标\n    top_k_scores: jax.Array          # [B, K] 相似度分\n```\n\n常量:`EPS = 1e-12`(归一化下界)、`INF = 1e12`(掩码用)。\n\n## 与排序模型的异同\n\n| 维度 | 召回 `PhoenixRetrievalModel` | 排序 [PhoenixModel](#recsys-model) |\n|------|------|------|\n| 序列构成 | user + history | user + history + candidate |\n| transformer 调用 | `candidate_start_offset=None` | 传 offset,启用候选隔离掩码 |\n| 用户侧输出 | 全位置均值池化 → 一个向量 | 只取候选段位置 |\n| 候选侧 | 独立 `CandidateTower` | 拼进序列,无独立塔 |\n| 最终产物 | top-K 下标 + 相似度 | 每候选多行为 logits |\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 双塔 | 用户塔 + 候选塔分离 | 候选嵌入可离线预算成语料矩阵,在线只算用户塔 + 点积,百万级可检索 |\n| 复用排序的 transformer | 用户塔用同款 Grok transformer | 用户编码能力与排序一致,减少架构分裂 |\n| L2 归一化 | 两塔输出都归一化 | 点积 = 余弦相似度,可直接 `top_k` |\n| 候选塔双模式 | `enable_linear_proj` 切换 | MLP 表达力强;均值池化省参数,按需取舍 |\n\n## 源码锚点\n\n- `phoenix/recsys_retrieval_model.py:46-112` —— `CandidateTower`\n- `phoenix/recsys_retrieval_model.py:221-291` —— `build_user_representation`\n- `phoenix/recsys_retrieval_model.py:330-388` —— `__call__` 与 `_retrieve_top_k`\n- `phoenix/recsys_model.py:147-268` —— 复用的 `block_user_reduce` / `block_history_reduce`\n\n## 相关页面\n\n- [phoenix-retrieval](#phoenix-retrieval) —— 双塔召回的工作原理\n- [recsys-model](#recsys-model) —— 提供公共件、共用 transformer 的排序模型\n- [grok-transformer](#grok-transformer) —— 用户塔的 transformer 骨架\n- [hash-based-embeddings](#hash-based-embeddings) —— 两塔输入的哈希嵌入\n- [run-pipeline](#run-pipeline) —— 端到端把召回结果喂给排序\n"}, "post-store": {"title": "PostStore", "type": "entity", "group": "Entities", "md": "# PostStore\n\n## 是什么\n\n`PostStore` 是 Thunder 的核心内存数据结构 —— 一个按用户分组的线程安全帖子存储,为站内(关注的人发的)帖子提供亚毫秒级查询。定义于 `thunder/posts/post_store.rs:39`。\n\n## 结构体定义\n\n```rust\n// thunder/posts/post_store.rs:38-53\n#[derive(Clone)]\npub struct PostStore {\n    /// 按 post_id 索引的完整帖子数据\n    posts: Arc<DashMap<i64, LightPost>>,\n    /// user_id → 原创帖(非回复非转发)的 TinyPost 队列\n    original_posts_by_user: Arc<DashMap<i64, VecDeque<TinyPost>>>,\n    /// user_id → 回复与转发的 TinyPost 队列\n    secondary_posts_by_user: Arc<DashMap<i64, VecDeque<TinyPost>>>,\n    /// user_id → 视频帖的 TinyPost 队列\n    video_posts_by_user: Arc<DashMap<i64, VecDeque<TinyPost>>>,\n    /// 删除墓碑表\n    deleted_posts: Arc<DashMap<i64, bool>>,\n    /// 保留期(秒)\n    retention_seconds: u64,\n    /// get_posts_by_users 迭代的请求超时(0 = 不超时)\n    request_timeout: Duration,\n}\n```\n\n所有字段用 `Arc<DashMap>` 包裹 —— `DashMap` 提供分片锁的并发哈希表,`Arc` 让 `PostStore` 可廉价 `Clone` 并跨线程共享(摄入线程写、请求线程读)。\n\n## 三层数据布局\n\n```mermaid\nflowchart TB\n    subgraph 时间线索引\n        OP[\"original_posts_by_user<br/>user_id → VecDeque&lt;TinyPost&gt;\"]\n        SP[\"secondary_posts_by_user<br/>回复 + 转发\"]\n        VP[\"video_posts_by_user<br/>视频帖\"]\n    end\n    subgraph 主数据\n        P[\"posts<br/>post_id → LightPost\"]\n    end\n    OP -.TinyPost.post_id 查.-> P\n    SP -.-> P\n    VP -.-> P\n```\n\n**为什么分两层**:per-user 队列只存 `TinyPost`(16 字节:`post_id` + `created_at`),按时间排序;完整 `LightPost` 单独存一份。查询时先在用户队列里按时间筛出候选 ID,再回 `posts` 表取完整数据 —— 时间线遍历轻量,完整数据不重复。\n\n### TinyPost\n\n```rust\n// thunder/posts/post_store.rs:20-24\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub struct TinyPost {\n    pub post_id: i64,\n    pub created_at: i64,\n}\n```\n\n`LightPost` 在 protobuf schema(`in-network.proto`)中定义,含 `post_id`、`author_id`、`created_at`、`in_reply_to_post_id`、`in_reply_to_user_id`、`is_retweet`、`is_reply`、`source_post_id`、`source_user_id`、`has_video`、`conversation_id`。\n\n## 构造\n\n| 方法 | 说明 |\n|------|------|\n| `new(retention_seconds: u64, request_timeout_ms: u64)` | 指定保留期与请求超时 |\n| `Default` | 保留期 2 天(`2*24*60*60`),无超时(`post_store.rs:521-526`) |\n\n## 写入方法\n\n### `insert_posts(&self, posts: Vec<LightPost>)`\n\n`post_store.rs:86-101`。两步预处理后写入:\n\n1. **过滤**:只保留 `created_at` 在过去 `retention_seconds` 内、且不在未来的帖\n2. **排序**:按 `created_at` 升序\n3. 调 `insert_posts_internal`\n\n`insert_posts_internal`(`post_store.rs:115-168`)对每条帖:\n\n- 若 `post_id` 在 `deleted_posts` 墓碑表 → 跳过(化解删除早于创建的竞态)\n- 写入 `posts` 主表;若已存在则跳过(不重复加时间线)\n- 按 `is_original = !is_reply && !is_retweet` 推入 `original_posts_by_user` 或 `secondary_posts_by_user`\n- **视频资格**:`has_video` 为真,或\"转发了一条有视频的非回复帖\";回复一律不算视频帖 → 推入 `video_posts_by_user`\n\n### `mark_as_deleted(&self, posts: Vec<TweetDeleteEvent>)`\n\n`post_store.rs:69-83`。从 `posts` 主表移除,写入 `deleted_posts` 墓碑表,并把删除记录挂到特殊 user `DELETE_EVENT_KEY` 的队列下(以便墓碑也能被裁剪)。`DELETE_EVENT_KEY` 是一个保留的哨兵 user_id —— 不对应任何真实用户,只是借 `original_posts_by_user` 这张表存一条按删除时间排序的墓碑队列,这样 `trim_old_posts` 扫该表时顺带就把过期墓碑清掉了。\n\n## 查询方法\n\n### `get_all_posts_by_users(...) -> Vec<LightPost>`\n\n`post_store.rs:193-225`。给定关注用户列表,聚合其 `original` + `secondary` 帖。\n\n### `get_videos_by_users(...) -> Vec<LightPost>`\n\n`post_store.rs:171-190`。只取 `video_posts_by_user`。\n\n### `get_posts_from_map(...)`\n\n`post_store.rs:228-328`,共享的查询核心。逐用户:\n\n1. 超时检查 —— `request_timeout` 非零且已超时则中断并记 `POST_STORE_REQUEST_TIMEOUTS`\n2. 从用户队列**逆序**(最新优先)迭代,过滤 `exclude_tweet_ids`,最多扫 `MAX_TINY_POSTS_PER_USER_SCAN` 条\n3. 回 `posts` 表取 `LightPost`(立即拷贝出值以尽快释放读锁,避免嵌套锁死锁)\n4. 过滤 `deleted_posts` 中的帖;过滤\"请求者自己转发过的源帖\"\n5. 对 secondary(`following_users` 非空时):只保留回复了关注用户原创帖、或同会话中回复关注用户的回复\n6. 每用户最多取 `max_per_user` 条\n\n## 维护方法\n\n| 方法 | 说明 |\n|------|------|\n| `finalize_init()` | 启动时:排序所有用户队列 + 裁剪 + 清理墓碑帖(`post_store.rs:103-113`) |\n| `trim_old_posts()` | 在 `spawn_blocking` 中,从各队列队首弹出超期帖、同步删主表、收缩队列容量、移除空用户(`post_store.rs:409-476`) |\n| `start_auto_trim(interval_minutes)` | 后台任务,每 `interval_minutes` 调一次 `trim_old_posts` |\n| `start_stats_logger()` | 每 5 秒输出用户数/帖数/删除数到 Prometheus |\n| `sort_all_user_posts()` | 按 `created_at` 排序每个用户队列 |\n| `clear()` | 清空全部 |\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 两层存储 | `TinyPost` 时间线 + `LightPost` 主表 | 时间线遍历只碰 16 字节小结构,完整数据不在多个用户队列间重复 |\n| 三个队列分类 | 原创 / 回复转发 / 视频 分开 | 不同请求(For You、视频流)直接命中对应队列,免运行时筛选 |\n| `DashMap` | 分片锁并发表 | 摄入线程高频写、请求线程高频读,分片锁减少争用 |\n| 墓碑表 | `deleted_posts` 记删除 | 化解删除事件早于创建事件到达的乱序 |\n| 查询逐用户超时 | `request_timeout` 中断 | 关注数极多的用户不会让单个请求无限延迟 |\n| 每用户扫描上限 | `MAX_TINY_POSTS_PER_USER_SCAN` | 不为不活跃用户回溯过深 |\n| 取值即拷贝 | 取 `LightPost` 后立刻 `*r.value()` | 尽快释放 `DashMap` 读锁,避免与写者形成嵌套锁死锁 |\n\n## 源码锚点\n\n- `thunder/posts/post_store.rs:38-67` —— 结构体与构造\n- `thunder/posts/post_store.rs:115-168` —— `insert_posts_internal` 写入与视频资格\n- `thunder/posts/post_store.rs:228-328` —— `get_posts_from_map` 查询核心\n- `thunder/posts/post_store.rs:409-476` —— `trim_old_posts` 裁剪\n\n## 相关页面\n\n- [thunder-in-network-store](#thunder-in-network-store) —— `PostStore` 之上的站内候选服务\n- [thunder-kafka-ingestion](#thunder-kafka-ingestion) —— 谁向 `PostStore` 写入(Kafka 摄入)\n- [home-mixer-orchestration](#home-mixer-orchestration) —— `ThunderSource` 经 gRPC 消费 Thunder\n- [system-architecture](#system-architecture) —— Thunder 在系统中的位置\n"}, "run-pipeline": {"title": "run_pipeline.py(端到端推理脚本)", "type": "entity", "group": "Entities", "md": "# run_pipeline.py(端到端推理脚本)\n\n## 是什么\n\n`run_pipeline.py` 是 Phoenix 的可运行入口 —— 从导出的 checkpoint 加载召回与排序两个模型,在一份预置语料上跑完整的 **召回 → 排序**,打印带各行为概率的排序结果。定义于 `phoenix/run_pipeline.py`,2026-05-15 release 用它取代了原来分开的 `run_ranker.py` / `run_retrieval.py`。\n\n## 运行方式\n\n```shell\nuv run run_pipeline.py --artifacts_dir artifacts/oss-phoenix-artifacts\n```\n\nCLI 参数(`run_pipeline.py:166-180`):\n\n| 参数 | 默认 | 说明 |\n|------|------|------|\n| `--artifacts_dir` | `./artifacts` | artifacts 根目录 |\n| `--sequence_file` | `<artifacts>/example_sequence.json` | 用户互动历史 |\n| `--corpus_file` | `<artifacts>/sports_corpus.npz` | 召回语料 |\n| `--top_k_retrieval` | `200` | 召回阶段取多少候选 |\n| `--top_k_display` | `30` | 打印多少条排序结果 |\n\n## artifacts 目录结构\n\n```\nartifacts/\n  retrieval/\n    model_params.npz        召回 transformer + 候选塔权重\n    embedding_tables.npz     用户/帖/作者哈希嵌入\n    config.json              模型配置 + 哈希函数参数\n  ranker/\n    model_params.npz         排序 transformer + 动作头权重\n    embedding_tables.npz\n    config.json\n  sports_corpus.npz          ~53.7 万条体育帖,含预计算候选表示\n  example_sequence.json      示例用户历史(3 条体育帖)\n```\n\n> artifacts 通过 Git LFS 分发(`*.npz`、`*.zip` 在 `.gitattributes` 标了 lfs)。克隆后需 `git lfs pull` 并解压 `oss-phoenix-artifacts.zip` 才能运行。\n\n## 动作索引常量\n\n`run_pipeline.py:68-73`,对应 proto `ActionName` 枚举:\n\n```python\nIDX_FAV   = 1    # 点赞\nIDX_REPLY = 4    # 回复\nIDX_QUOTE = 5    # 引用\nIDX_RT    = 6    # 转发\nIDX_DWELL = 11   # 停留\nIDX_VQV   = 13   # 视频质量观看\n```\n\n## 执行流程\n\n```mermaid\nflowchart TB\n    A[加载 retrieval/ranker config + 权重 + 嵌入表] --> B[加载语料 + 用户历史]\n    B --> C[构建哈希函数, 哈希用户/历史 ID]\n    C --> D[召回:build_user_representation → 用户向量]\n    D --> E[\"corpus_repr @ user_repr → 打分<br/>argpartition 取 top-K\"]\n    E --> F[排序:按 cand_len 分块跑排序模型]\n    F --> G[\"sigmoid(logits) → 各行为概率\"]\n    G --> H[\"加权:fav·1.0 + reply·0.5<br/>+ rt·0.3 + dwell·0.2\"]\n    H --> I[按加权分排序, 打印 top-N]\n```\n\n### 1. 加载(`run_pipeline.py:186-224`)\n\n读 `retrieval/config.json` 与 `ranker/config.json`;用 `runners.load_model_params` / `load_embedding_table` 载入权重;`build_unified_emb_table` 把拆分的用户/帖/作者嵌入拼成单一大表(见 [hash-based-embeddings](#hash-based-embeddings))。语料 `sports_corpus.npz` 含 `post_ids`、`candidate_representations`、`author_ids`、`topics`。\n\n### 2. 召回(`run_pipeline.py:245-310`)\n\n`build_model_config` 用 config 造 `PhoenixRetrievalModelConfig`(`TransformerConfig` 的 `widening_factor=2.0`、`attn_output_multiplier=0.125`)。`ret_forward` 调 `model.build_user_representation` 得用户向量 `[1, D]`。然后:\n\n```python\nscores = corpus_repr @ np.asarray(user_repr[0])     # 对全语料点积\ntop_idx = np.argpartition(scores, -TOP_K)[-TOP_K:]  # 取 top-K\ntop_idx = top_idx[np.argsort(-scores[top_idx])]      # 降序排\n```\n\n分两步是因为 `argpartition` 只保证\"top-K 这批被挑出来\",**这 K 个彼此之间并不有序**;所以再对这 K 个(而非全语料)`argsort` 排成降序。先 partition 后只对 K 个排序,比直接对整个语料 `argsort` 快得多。\n\n### 3. 排序(`run_pipeline.py:312-354`)\n\n`build_model_config` 造 `PhoenixModelConfig`。把召回出的 `TOP_K` 条候选按 `cand_len` 分块,每块:哈希候选帖/作者 ID → 组 `RecsysBatch` + `RecsysEmbeddings` → 跑排序模型 → `sigmoid(out.logits)` 得各行为概率;不足一块的补零 pad。\n\n### 4. 加权与输出(`run_pipeline.py:354-389`)\n\n```python\nweighted = (all_probs[:, IDX_FAV]   * 1.0\n          + all_probs[:, IDX_REPLY] * 0.5\n          + all_probs[:, IDX_RT]    * 0.3\n          + all_probs[:, IDX_DWELL] * 0.2)\nranked = np.argsort(-weighted)\n```\n\n按加权分降序,打印 top `--top_k_display` 条,每行含召回分、各行为概率、话题、帖子 URL。\n\n> 这里的权重(1.0 / 0.5 / 0.3 / 0.2)是脚本内的演示权重,与线上 `home-mixer` 的 [RankingScorer](#scoring-and-ranking) 用 feature switch 配置的权重不是同一套。\n\n## 关键辅助函数\n\n| 函数 | 来源 | 作用 |\n|------|------|------|\n| `build_hash_functions(config)` | run_pipeline.py:93 | 由 config 的 `hash_params` 造用户/帖/作者哈希函数 |\n| `build_unified_emb_table(emb_dict, config)` | run_pipeline.py:118 | 拆分嵌入表 → 单一大表 |\n| `build_model_config(config, config_class)` | run_pipeline.py:132 | JSON config → `PhoenixModelConfig` / `PhoenixRetrievalModelConfig` |\n| `load_model_params` / `load_embedding_table` | runners.py | 从 npz 读权重 |\n\n模型用 `hk.transform` 包成纯函数后 `apply`(`run_pipeline.py:278,318`)。\n\n## 设计决策\n\n| 决策 | 选择 | 理由 |\n|------|------|------|\n| 单一入口 | `run_pipeline.py` 合并召回+排序 | 镜像线上\"召回→排序\"两阶段的真实组合 |\n| 候选分块 | 按 `cand_len` 切块跑排序 | 排序模型的候选序列长度固定,超出需分批 |\n| 不足块补零 | `np.pad` 到 `cand_len` | 哈希 0 = padding,被掩码自然忽略 |\n| 召回/排序各自哈希 | 两个模型各用自己的 config | 两模型嵌入表独立,哈希参数不共享 |\n| 冻结 checkpoint | 用导出的 npz 而非在线训练 | 公开版是持续训练的某时刻快照 |\n\n## 源码锚点\n\n- `phoenix/run_pipeline.py:165-224` —— `main` 与加载阶段\n- `phoenix/run_pipeline.py:245-310` —— 召回阶段\n- `phoenix/run_pipeline.py:312-354` —— 排序阶段(分块)\n- `phoenix/run_pipeline.py:132-162` —— `build_model_config`\n\n## 相关页面\n\n- [phoenix-retrieval](#phoenix-retrieval) —— 召回阶段的双塔模型\n- [phoenix-ranking](#phoenix-ranking) —— 排序阶段的 transformer\n- [recsys-model](#recsys-model) / [recsys-retrieval-model](#recsys-retrieval-model) —— 被加载的两个模型构件\n- [hash-based-embeddings](#hash-based-embeddings) —— `build_hash_functions` / `build_unified_emb_table`\n- [open-source-vs-production](#open-source-vs-production) —— 开源版 vs 线上真实算法:本脚本用的迷你模型与冻结 checkpoint 等差异\n- [system-architecture](#system-architecture) —— 召回→排序在整体系统中的位置\n"}, "2026-05-18-topic-expansion": {"title": "话题扩充——5 新页 + operating-myths 增 3 迷思（2026-05-18）", "type": "changelog", "group": "Changelog", "md": "# 话题扩充:5 新页 + operating-myths 增 3 迷思\n\n应反馈 —— 在 wiki 已讲透\"算法是什么、怎么运转\"之后,列出\"还值得写的、大家关心的话题\",获准按 A/B/C 三组推进。\n\n## 动机\n\n按\"读者需求 × 源码有没有料\"挑出三组:A 组(读者最焦虑、源码料足)、B 组(最出圈的争议问题、适合做成迷思)、C 组(技术补全)。\n\n## B 组:operating-myths 从六迷思扩到九迷思\n\n三条\"出圈\"争议,先翻源码确认有料,再写成新迷思:\n\n- **迷思七「带外链的帖子会被降权」** —— 翻打分 / 过滤 / Grox 三侧,无任何针对\"外链\"的机制(`ranking_scorer.rs:12-39` 22 权重无链接项;17 个过滤器无外链过滤器;Grox 分类器无链接分类器)。\n- **迷思八「Premium / 蓝V 买曝光」** —— 22 个行为权重无订阅项;订阅在源码里只做\"订阅专属帖可见性门槛\"(`ineligible_subscription_filter.rs:6`),方向是收窄触达,不是加权。\n- **迷思九「算法给某些大账号开后门」** —— 全仓 grep `elon`/`musk` 零命中;打分输入无作者身份特例;\"无手工特征\"决定结构上没有后门位置。\n\n另:**迷思二补「预测 ≠ 计数」澄清** —— 承接读者对\"恶意刷不感兴趣会不会害我\"的疑问,点明被加权的是模型预测概率、不是事件计数。\n\n## A 组:3 个新 guide 页\n\n| 页面 | 内容 |\n|------|------|\n| `guide/visibility-and-shadowban` | 限流与 shadowban 源码级真相:三类真实\"压制\"机制 + 民间说法逐条对质 |\n| `guide/new-account-cold-start` | 新号与冷启动:四条新用户专属代码路径,各用各的阈值 |\n| `guide/your-data` | 算法用了你的哪些数据:开源代码所示的用户数据输入清单 |\n\n## C 组:2 个技术补全页\n\n| 页面 | 内容 |\n|------|------|\n| `concepts/end-to-end-dataflow` | 端到端数据流:一条帖子从发布到被推荐,写入侧(异步)vs 读取侧(实时) |\n| `guide/open-source-vs-production` | 开源版 vs 线上真实算法:已知差异清单 + 3 处源码与文档出入 |\n\n## 工作方式与核验\n\n- 5 个新页由 5 个并行 agent 按源码逐锚点核验创建,完成后逐页复核(源码锚点、诚实边界、交叉链接)。\n- agent 核验中发现并如实记录的边界:`user_action_seq` / `user_features` query hydrator 属未挂载的旧代码;`impressed_post_ids` 字段当前无 hydrator 填充 —— 均已在 `your-data` 页注明。\n\n## 规模变化\n\n| 指标 | 变化 |\n|------|------|\n| 总页数 | 29 → 34(+4 guide +1 concept) |\n| 白话导览 | 7 → 11 |\n| 概念页 | 17 → 18 |\n| operating-myths 迷思数 | 6 → 9 |\n\n## 相关页面\n\n- [operating-myths](#operating-myths) —— 扩到九迷思\n- [visibility-and-shadowban](#visibility-and-shadowban)、[new-account-cold-start](#new-account-cold-start)、[your-data](#your-data)、[end-to-end-dataflow](#end-to-end-dataflow)、[open-source-vs-production](#open-source-vs-production) —— 五个新页\n- [2026-05-17-posting-guide](#2026-05-17-posting-guide) —— 上一次更新\n"}, "2026-05-17-posting-guide": {"title": "新增发帖指南页（2026-05-17）", "type": "changelog", "group": "Changelog", "md": "# 新增「发帖指南」\n\n应反馈 —— 在 wiki 已覆盖全套算法机制的基础上,产出一页面向创作者的发帖指南,涵盖要点与技巧,配示例。\n\n## 动机\n\n读者要求:基于所有算法机制,给一页发帖指南,涵盖所有要点和技巧,必要时给例子。\n\n约束:本 wiki 刚产出 [operating-myths](#operating-myths) 打破\"运营攻略\"迷思,因此发帖指南必须与之一致 —— **每一条建议都从一个源码机制反推而来、标注行号,不写没有机制依据的 cargo-cult 建议**。指南与迷思页是\"立\"与\"破\"的配对。\n\n## 新增页面\n\n| 页面 | 类型 | 内容 |\n|------|------|------|\n| `guide/posting-guide` | guide | 从召回/排序/过滤/候选隔离/Grox 各机制反推发帖建议;含正向信号表、扣分项、破圈、发帖节奏、反面清单、一个完整 before/after 示例、边界声明 |\n\n## 覆盖的机制 → 建议\n\n- **召回(双塔)** → 主题聚焦,利于 embedding 匹配到对的受众\n- **`AgeFilter`** → 帖子有新鲜窗口,趁新发\n- **22 行为加权** → 围绕停留/回复/转发/关注等正向信号创作\n- **5 个负权重 + `not_dwelled`** → 标题党净亏;\"招黑比没人理更糟\"\n- **作者多样性衰减** → 别在一次刷新里自我刷屏\n- **`VFFilter` / Grox** → 安全与 spam 是地基,触发即出局\n- **OON 降权** → 站内是基本盘,破圈要更强\n- **候选隔离 / 几乎无手工特征** → 没有\"骗算法\"的技巧,只有\"别被机制坑掉\"\n\n## 可追溯性(出处)\n\n- 每条建议在正文标机制行号,页末另设「出处」表\n- 单列「边界」一节:机制 ≠ 数值;算法只分发不创作;权重是可变参数\n- 源码依据沿用已核对的 `ranking_scorer.rs`、`phoenix/grok.py`、`README.md`、过滤器装配\n\n## 配套改动\n\n- `index.md` / `README.md`:更新为 29 页(7 白话导览)\n- 6 个相关页补 `[posting-guide](#posting-guide)` 交叉链接:`operating-myths`、`how-it-works`、`faq`、`the-five-components`、`glossary`、`scoring-and-ranking`\n\n## 规模变化\n\n| 指标 | 变化 |\n|------|------|\n| 总页数 | 28 → 29(+1 guide) |\n| 白话导览 | 6 → 7 |\n\n## 相关页面\n\n- [posting-guide](#posting-guide) —— 新增的发帖指南页\n- [2026-05-17-operating-myths](#2026-05-17-operating-myths) —— 配对的\"破\"页:运营迷思\n"}, "2026-05-17-operating-myths": {"title": "新增运营迷思页（2026-05-17）", "type": "changelog", "group": "Changelog", "md": "# 新增「运营迷思 vs 源码真相」\n\n应反馈 —— X 算法开源后网上解读铺天盖地,但绝大多数是 AI 批量生产的同质化内容,没翻过源码。本次新增一页源码级\"打脸\"页,并配套产出一篇可对外发布的长文。\n\n## 动机\n\n读者原话:网上 95% 的分析是 AI 废话,连源码文件名都没翻过;「多互动」「多发帖」「账号要垂直」这类话说了等于没说。需要一份**带行号、可逐条核对**的高价值内容,把流行说法对到源码上。\n\n## 新增页面\n\n| 页面 | 类型 | 内容 |\n|------|------|------|\n| `guide/operating-myths` | guide | 六个流行运营迷思逐条对源码行号 + 深层机制清单 + \"如何识别真解读\"方法论 + 开源仓库边界声明 |\n\n## 六个迷思与源码依据\n\n1. **「多发帖 = 多曝光」** → 作者多样性衰减:同一作者第 N 条乘 `(1-floor)·decay^N+floor`(`ranking_scorer.rs:186-217`)\n2. **「互动量越高越好」** → 22 行为预测,5 个负权重;`not_dwelled`(划走)被显式建模扣分(`ranking_scorer.rs:83`)\n3. **「做泛内容轻松破圈」** → 站外候选乘 OON 系数降权(`ranking_scorer.rs:272-275`)\n4. **「套模板/堆关键词骗算法」** → 打分侧删光每一个手工特征(`README.md:55, 324-325`)\n5. **「被同批大 V 挤掉」** → 候选隔离注意力掩码,候选分数互不影响(`phoenix/grok.py:39-71`)\n6. **「人人适用的万能攻略」** → per-user 预测 + 权重全是 feature switch 参数(`ranking_scorer.rs:42-66`)\n\n## 配套:站外长文\n\n产出一篇可对外发布的中文深度长文 `x-algorithm-运营迷思-源码打脸.md`(置于 `code/` 目录,不进 wiki 仓库),承接读者给的开头,把六个迷思写成可发布形态。长文与 wiki 页共用同一套源码论据。\n\n## 可追溯性(出处)\n\n- 全部六条迷思的源码依据已亲自核对实际源文件:`home-mixer/scorers/ranking_scorer.rs`、`home-mixer/scorers/vm_ranker.rs`、`phoenix/grok.py`、顶层 `README.md`\n- wiki 页设「出处」表,每条核心结论对应 `文件:行号`\n- 页内单列「边界」一节,声明开源仓库不含线上权重数值、生产模型、训练数据 —— 结论只到机制层面\n\n## 配套改动\n\n- `index.md` / `README.md`:更新为 28 页(6 白话导览 + 17 概念 + 5 实体)\n- 6 个相关页补 `[operating-myths](#operating-myths)` 交叉链接:`how-it-works`、`faq`、`the-five-components`、`glossary`、`scoring-and-ranking`、`candidate-isolation-masking`\n\n## 规模变化\n\n| 指标 | 变化 |\n|------|------|\n| 总页数 | 27 → 28(+1 guide) |\n| 白话导览 | 5 → 6 |\n\n## 相关页面\n\n- [operating-myths](#operating-myths) —— 新增的源码级打脸页\n- [2026-05-17-candidate-selection](#2026-05-17-candidate-selection) —— 上一次:新增选帖过程页\n"}, "2026-05-17-candidate-selection": {"title": "新增选帖过程页（2026-05-17）", "type": "changelog", "group": "Changelog", "md": "# 新增选帖过程页\n\n应反馈 —— wiki 缺一页专门讲\"如何选择帖子、选帖过程\"。打分之后怎么定下最终展示的几十条,原先散落在多页里,没有独立成页。本次新增 1 技术页 + 1 白话页。\n\n## 动机\n\n读者问:\"如何选择帖子、选帖过程这个好像没有?\"\n\n确实没有专页。选择阶段(流水线第 ⑦ 步)及其之后的成型步骤,此前分散在:\n\n- `candidate-pipeline-framework`:只讲 `Selector` trait 的抽象签名\n- `candidate-pipeline`:`execute()` 十阶段里一笔带过选择\n- `filtering-pipeline`:讲了选后过滤,但没讲它前面的\"选择\"\n- `home-mixer-orchestration`:提到 `BlenderSelector` 但未展开\n\n读者要把\"打完分→最终信息流\"这段连起来,得跨四页拼。故独立成页。\n\n## 新增页面\n\n| 页面 | 类型 | 内容 |\n|------|------|------|\n| `concepts/candidate-selection` | concept | 选择阶段技术细节:`Selector` trait「排序 + 截断」骨架、`TopKScoreSelector`(内层按分取 top-K)、选后水合→选后过滤→截断到 `RESULT_SIZE`、`BlenderSelector`(外层组装) |\n| `guide/how-posts-are-picked` | guide | 白话版:用\"选秀收尾\"类比讲清排座次→圈入围→背景调查→终审淘汰→砍名额→编排上桌 |\n\n## 核心结论\n\n- **选择 = 排序 + 截断**:`Selector` trait 默认 `select()` 即\"按分降序排 → 截断到 `size()`\"\n- **两个选择器**:内层 `TopKScoreSelector` 按 `score` 取 top-K;外层 `BlenderSelector` 把 `FeedItem` 组装成信息流(不按分排序)\n- **两个数量上限**:内层先选 `TOP_K_CANDIDATES_TO_SELECT`(略多),经选后过滤删减后再截断到 `RESULT_SIZE` —— 留余量,避免过滤后不够数\n- **昂贵水合后置**:可见性 / 品牌安全水合放选择之后,只对会展示的入选候选做\n- **落选不丢弃**:进入 `non_selected`,供 side effect 与调试使用\n\n## 配套改动\n\n- `index.md`:白话导览增 `[how-posts-are-picked](#how-posts-are-picked)`;在线服务增 `[candidate-selection](#candidate-selection)`;统计更新为 27 页\n- `README.md`:徽章与统计更新为 27 页;白话导览(5 页)、在线服务(6 页)各增一行\n- 6 个相关页补交叉链接:`system-architecture`、`scoring-and-ranking`、`candidate-pipeline-framework`、`candidate-pipeline`、`filtering-pipeline`、`home-mixer-orchestration` 增 `[candidate-selection](#candidate-selection)`;`how-it-works`、`the-five-components`、`faq` 增 `[how-posts-are-picked](#how-posts-are-picked)`\n\n## 可追溯性(出处)\n\n- 技术页 `candidate-selection` 设「源码锚点」一节,精确到 `文件:行号`\n- 白话页 `how-posts-are-picked` 设「出处」表,把每条核心结论对应到技术页 + 主要源码\n- 主要依据源码:`candidate-pipeline/selector.rs`、`home-mixer/selectors/top_k_score_selector.rs`、`home-mixer/selectors/blender_selector.rs`、`candidate-pipeline/candidate_pipeline.rs`、`home-mixer/candidate_pipeline/phoenix_candidate_pipeline.rs`\n\n## 规模变化\n\n| 指标 | 变化 |\n|------|------|\n| 总页数 | 25 → 27(+1 concept +1 guide) |\n| 概念页 | 16 → 17 |\n| 白话导览 | 4 → 5 |\n\n## 相关页面\n\n- [candidate-selection](#candidate-selection) —— 新增的选择阶段技术页\n- [how-posts-are-picked](#how-posts-are-picked) —— 新增的选帖过程白话页\n- [2026-05-17-plain-language-guide](#2026-05-17-plain-language-guide) —— 上一次:新增 4 页白话导览\n"}, "2026-05-17-plain-language-guide": {"title": "新增白话导览（2026-05-17）", "type": "changelog", "group": "Changelog", "md": "# 新增白话导览\n\n应反馈 —— 原 21 页技术性、代码性偏强,缺一层\"快速理解\"的通俗内容。本次新增 4 页**白话导览**(`guide/`)。\n\n## 动机\n\n技术页(`concepts/` + `entities/`)适合深读源码,但不适合快速建立整体认知。白话导览作为**通俗入口层**:零代码、零公式、多类比,关键处链接回技术页供深入。\n\n## 新增页面\n\n| 页面 | 内容 |\n|------|------|\n| `guide/how-it-works` | 端到端白话总览:一条帖子怎么一步步走进你的 For You |\n| `guide/the-five-components` | 五大组件速览:各组件是干嘛的、为什么需要它 |\n| `guide/glossary` | 术语速查表:~30 个术语的一句话通俗解释 |\n| `guide/faq` | 常见疑问:读者真实疑问 14 条 |\n\n## 配套改动\n\n- `SCHEMA.md`:新增 `guide` 页面类型与「Guide Pages」章(含\"核心结论须可追溯\"规定);标签体系 Meta 增加 `guide`/`overview`/`glossary`/`faq`\n- `index.md`:顶部新增「白话导览(Guide)」分类\n- `README.md`:目录新增「白话导览 · 先读这个」;徽章与统计更新为 25 页\n- `concepts/system-architecture.md`:相关页面增加到 `[how-it-works](#how-it-works)` 的链接\n\n## 可追溯性(出处)\n\n白话页虽不放代码,核心结论仍须可追溯:\n\n- 每页 `sources` frontmatter 列出主要依据的源码文件(不再只写 `README.md`)\n- 每页正文末尾设「出处」一节:`how-it-works` / `the-five-components` 用表格把每条核心结论对应到技术页 + 关键源码文件;`glossary` / `faq` 借每行「详见」链到带源码锚点的技术页\n- 精确 `文件:行号` 统一收敛在技术页的「源码锚点」一节,白话页指向技术页、不重复行号\n\n## 规模变化\n\n| 指标 | 变化 |\n|------|------|\n| 总页数 | 21 → 25(+4 白话导览) |\n| 页面类型 | concept / entity / changelog → 增加 guide |\n\n## 相关页面\n\n- [how-it-works](#how-it-works) —— 新增的白话总览入口\n- [2026-05-16-initial-creation](#2026-05-16-initial-creation) —— 上一次:基于源码初始创建 21 页\n"}, "2026-05-16-initial-creation": {"title": "x-algorithm-wiki 初始创建（2026-05-16）", "type": "changelog", "group": "Changelog", "md": "# x-algorithm-wiki 初始创建\n\n基于 `xai-org/x-algorithm` 开源仓库(commit `0bfc279`,2026-05-15 release)源码深度分析,创建本 wiki。\n\n## 范围\n\nX \"For You\" 信息流推荐系统的五大组件:\n\n- **home-mixer**(Rust)—— 编排层\n- **candidate-pipeline**(Rust)—— 可复用流水线框架\n- **thunder**(Rust)—— 站内帖子内存库\n- **phoenix**(Python/JAX)—— ML 召回与排序\n- **grox**(Python)—— 内容理解服务\n\n## 产出\n\n| 指标 | 数值 |\n|------|------|\n| 总页数 | 21(16 概念 + 5 实体) |\n| 总行数 | 4900+ |\n| 源码版本 | `xai-org/x-algorithm` @ `0bfc279` |\n\n### 概念页(16)\n\n总览 1:`system-architecture`。\n在线服务 5:`candidate-pipeline-framework`、`home-mixer-orchestration`、`scoring-and-ranking`、`filtering-pipeline`、`ads-blending`。\nThunder 2:`thunder-in-network-store`、`thunder-kafka-ingestion`。\nPhoenix 5:`phoenix-retrieval`、`phoenix-ranking`、`candidate-isolation-masking`、`grok-transformer`、`hash-based-embeddings`。\nGrox 3:`grox-architecture`、`grox-classifiers`、`multimodal-embedders`。\n\n### 实体页(5)\n\n`candidate-pipeline`、`recsys-model`、`recsys-retrieval-model`、`post-store`、`run-pipeline`。\n\n## 方法\n\n- 每页结论均追溯到 x-algorithm 源码,附 `文件:行号` 锚点\n- 全部页面与组件级源码逐一核对验证\n- 所有 `[wiki-link](#wiki-link)` 交叉链接经检查均有效\n\n## 核对中发现并记录的源码与文档出入\n\n- **mini 模型尺寸**:顶层 `README.md` 写 \"256-dim / 2-layer\",`phoenix/README.md` 写 \"128-dim / 4-layer\"。代码默认值与 `phoenix/README.md` 一致,相关页面以后者为准并标注。见 [phoenix-ranking](#phoenix-ranking)。\n- **打分器数量**:`README.md` 描述 Weighted / Author Diversity / OON 三个独立 Scorer;实际 `scorers/mod.rs` 只声明 `phoenix_scorer`/`ranking_scorer`/`vm_ranker` 三个,加权/多样性/OON 逻辑合并在 `RankingScorer` 内。见 [scoring-and-ranking](#scoring-and-ranking)。\n- **候选隔离掩码**:`phoenix/README.md` 图示称用户+历史段\"双向注意力\",代码 `make_recsys_attn_mask` 用 `jnp.tril`(因果)。以代码为准。见 [candidate-isolation-masking](#candidate-isolation-masking)。\n\n## 相关页面\n\n- [system-architecture](#system-architecture) —— wiki 入口页\n"}};
const GROUPS=[{"label": "白话导览(Guide)", "pages": ["how-it-works", "the-five-components", "glossary", "faq", "how-posts-are-picked", "operating-myths", "posting-guide", "visibility-and-shadowban", "new-account-cold-start", "your-data", "open-source-vs-production"]}, {"label": "总览", "pages": ["system-architecture", "end-to-end-dataflow"]}, {"label": "在线服务(Rust)", "pages": ["candidate-pipeline-framework", "home-mixer-orchestration", "scoring-and-ranking", "candidate-selection", "filtering-pipeline", "ads-blending"]}, {"label": "站内库(Thunder)", "pages": ["thunder-in-network-store", "thunder-kafka-ingestion"]}, {"label": "ML — Phoenix", "pages": ["phoenix-retrieval", "phoenix-ranking", "candidate-isolation-masking", "grok-transformer", "hash-based-embeddings"]}, {"label": "内容理解(Grox)", "pages": ["grox-architecture", "grox-classifiers", "multimodal-embedders"]}, {"label": "Entities", "pages": ["candidate-pipeline", "recsys-model", "recsys-retrieval-model", "post-store", "run-pipeline"]}, {"label": "Changelog", "pages": ["2026-05-18-topic-expansion", "2026-05-17-posting-guide", "2026-05-17-operating-myths", "2026-05-17-candidate-selection", "2026-05-17-plain-language-guide", "2026-05-16-initial-creation"]}];
const CONTENT_PAGES=34;

marked.setOptions({gfm:true,breaks:false});
mermaid.initialize({startOnLoad:false,theme:'dark',securityLevel:'loose',
  themeVariables:{fontFamily:"'IBM Plex Mono',monospace",fontSize:'13px',
    primaryColor:'#1a1b22',primaryBorderColor:'#3a3d4a',primaryTextColor:'#e7e7ea',
    lineColor:'#6b6d79',background:'#16171d'}});

const nav=document.getElementById('nav'), content=document.getElementById('content'),
      crumb=document.getElementById('crumb'), sidebar=document.getElementById('sidebar'),
      scrim=document.getElementById('scrim');
document.getElementById('brand-sub').textContent=CONTENT_PAGES+' 页 · 源码级解读';

function buildNav(filter){
  filter=(filter||'').trim().toLowerCase();
  nav.innerHTML=''; let hits=0;
  GROUPS.forEach(g=>{
    const items=g.pages.filter(n=>{
      if(!filter) return true;
      const p=PAGES[n];
      return p.title.toLowerCase().includes(filter)
          || n.toLowerCase().includes(filter)
          || p.md.toLowerCase().includes(filter);
    });
    if(!items.length) return;
    const box=document.createElement('div'); box.className='grp';
    const lab=document.createElement('div'); lab.className='grp-label';
    lab.textContent=g.label; box.appendChild(lab);
    items.forEach(n=>{
      hits++;
      const a=document.createElement('a');
      a.className='nav-item'; a.href='#'+n; a.dataset.page=n;
      a.textContent=PAGES[n].title;
      box.appendChild(a);
    });
    nav.appendChild(box);
  });
  if(!hits){nav.innerHTML='<div class="nav-empty">无匹配页面</div>';}
}

function decorate(){
  // wrap wide tables for horizontal scroll
  content.querySelectorAll('table').forEach(t=>{
    if(t.parentElement.classList.contains('table-wrap'))return;
    const w=document.createElement('div'); w.className='table-wrap';
    t.replaceWith(w); w.appendChild(t);
  });
  // gold "evidence tag" for source anchors  file.rs:NN / path/x.py:NN-NN
  content.querySelectorAll('code').forEach(c=>{
    if(/[\w/.\-]+\.(rs|py|md):\d/.test(c.textContent)) c.classList.add('anchor');
  });
  // render mermaid
  const blocks=[...content.querySelectorAll('code.language-mermaid')];
  blocks.forEach((c,i)=>{
    const d=document.createElement('div'); d.className='mermaid';
    d.id='mmd-'+Date.now()+'-'+i; d.textContent=c.textContent;
    c.closest('pre').replaceWith(d);
  });
  if(blocks.length){
    mermaid.run({nodes:content.querySelectorAll('.mermaid')}).catch(()=>{});
  }
}

function render(name){
  const p=PAGES[name];
  if(!p){content.innerHTML='<h1>页面未找到</h1><p>'+name+'</p>';return;}
  crumb.innerHTML='<span class="t">'+p.group+'</span> &nbsp;/&nbsp; '+p.type;
  content.className='md'; void content.offsetWidth; content.classList.add('md');
  content.innerHTML=marked.parse(p.md);
  decorate();
  document.title=p.title+' · X 算法 Wiki';
  document.querySelectorAll('.nav-item').forEach(a=>
    a.classList.toggle('active',a.dataset.page===name));
  document.getElementById('main').scrollTop=0;
  sidebar.classList.remove('open'); scrim.classList.remove('show');
}

function route(){
  const n=decodeURIComponent(location.hash.slice(1));
  render(PAGES[n]?n:GROUPS[0].pages[0]);
}
window.addEventListener('hashchange',route);

const q=document.getElementById('q');
q.addEventListener('input',()=>buildNav(q.value));
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==q){e.preventDefault();q.focus();}
});
document.getElementById('menu-btn').onclick=()=>{
  sidebar.classList.toggle('open');scrim.classList.toggle('show');};
scrim.onclick=()=>{sidebar.classList.remove('open');scrim.classList.remove('show');};

buildNav();
route();
</script>
